    const entry=lineageRegistry.get(lid);
    if(!entry)continue;
    const y=phyloY+16+li*20;
    const col=entry.color;

    // Lineage color swatch
    X.fillStyle=`rgb(${col[0]|0},${col[1]|0},${col[2]|0})`;
    X.fillRect(phyloX,y+2,8,8);

    // Lineage info
    const totalSize=cls.reduce((a,c)=>a+c.size,0);
    const age=genome.totalTicks-entry.birthTick;
    const ageStr=age>6000?Math.floor(age/600)+'k':age>600?Math.floor(age/60)+'c':String(age);
    const buds=entry.budCount;
    const parentSym=entry.parentLineage>0?'←'+entry.parentLineage:'⊙';

    X.fillStyle='rgba(220,220,230,0.8)';
    X.fillText(`L${lid} ${cls.length}cl ${totalSize}p age:${ageStr} ${buds}bud ${parentSym}`,phyloX+12,y);
  }

  // Divergence matrix — pairwise divergence between living lineages (top 6)
  const topLineages=livingLineages.slice(0,6);
  if(topLineages.length>=2){
    const matY=phyloY+16+nLin*20+8;
    X.fillStyle='rgba(200,210,220,0.5)';
    X.fillText('DIVERGENCE:',phyloX,matY);

    const matStart=matY+12;
    const cellSz=14;
    for(let i=0;i<topLineages.length;i++){
      const[lidA,clsA]=topLineages[i];
      const colA=lineageRegistry.get(lidA)?.color||[128,128,128];
      // Row label
      X.fillStyle=`rgb(${colA[0]|0},${colA[1]|0},${colA[2]|0})`;
      X.fillRect(phyloX,matStart+i*cellSz+2,6,6);

      for(let j=i+1;j<topLineages.length;j++){
        const[lidB,clsB]=topLineages[j];
        // Compute divergence between representative clusters
        const repA=clsA[0],repB=clsB[0];
        const div=clusterDivergence(repA,repB);
        // Color: green=low divergence, red=high divergence
        const dR=Math.min(255,Math.floor(div*500));
        const dG=Math.min(255,Math.floor((1-div)*300));
        X.fillStyle=`rgba(${dR},${dG},60,0.7)`;
        X.fillRect(phyloX+10+j*cellSz,matStart+i*cellSz,cellSz-1,cellSz-1);
        // Value text
        X.fillStyle='rgba(255,255,255,0.7)';
        X.fillText(div.toFixed(1),phyloX+11+j*cellSz,matStart+i*cellSz+2);
      }
    }
  }
}

function evolvePlasmids(){
  const sampleSize=Math.min(N,Math.floor(N*0.085)+40); // scales with population

  for(let s=0;s<sampleSize;s++){
    const i=Math.floor(Math.random()*N);
    if(!palive[i])continue;

    let nP=pPlasmidLen[i];

    // Stress-induced evolvability (low amp = higher mutation)
    const stress=Math.max(0,1-amp[i]*1.65);
    const effectiveMutRate=genome.plasmidMutRate*(1+stress*5.5);

    for(let p=0;p<nP;p++){
      if(Math.random()>effectiveMutRate)continue;

      const base=i*PLASMID_SLOTS+p*4;
      const roll=Math.random();

      if(roll<0.38){
        // Gentle point mutation on constant
        pPlasmid[base+3]+=(Math.random()-0.5)*0.48;
        pPlasmid[base+3]=Math.max(-3.8,Math.min(3.8,pPlasmid[base+3]));
      }
      else if(roll<0.58){
        // Structural change (opcode or registers)
        if(Math.random()<0.5)pPlasmid[base]=Math.floor(Math.random()*OPCODE_COUNT);
        else{
          pPlasmid[base+1]=Math.floor(Math.random()*12);
          pPlasmid[base+2]=Math.floor(Math.random()*12);
        }
      }
      else if(roll<0.78&&nP<MAX_PLASMID){
        // DUPLICATION — prefer functional (EMIT) instructions, like HGT
        let srcP=p;
        const emitters=[];
        for(let k=0;k<nP;k++){
          if(pPlasmid[i*PLASMID_SLOTS+k*4]===4)emitters.push(k);
        }
        if(emitters.length>0&&Math.random()<0.65){
          srcP=emitters[Math.floor(Math.random()*emitters.length)];
        }
        const newBase=i*PLASMID_SLOTS+nP*4;
        for(let v=0;v<4;v++)pPlasmid[newBase+v]=pPlasmid[i*PLASMID_SLOTS+srcP*4+v];
        pPlasmid[newBase+3]+=(Math.random()-0.5)*0.35;
        pPlasmidLen[i]++;
        nP++;
      }
      else if(roll<0.88&&nP>1){
        // Deletion (rare, only when bloated)
        for(let q=p;q<nP-1;q++){
          for(let v=0;v<4;v++)pPlasmid[i*PLASMID_SLOTS+q*4+v]=pPlasmid[i*PLASMID_SLOTS+(q+1)*4+v];
        }
        pPlasmidLen[i]--;
        p--;
        nP--;
      }
      else if(nP>1){
        // Recombination — swap registers between two random instructions on same particle
        const p2=Math.floor(Math.random()*nP);
        if(p2===p)continue;
        const base2=i*PLASMID_SLOTS+p2*4;
        const tempSrc=pPlasmid[base+1];
        const tempDst=pPlasmid[base+2];
        pPlasmid[base+1]=pPlasmid[base2+1];
        pPlasmid[base+2]=pPlasmid[base2+2];
        pPlasmid[base2+1]=tempSrc;
        pPlasmid[base2+2]=tempDst;
      }
    }

    // Spontaneous generation — only in high-resonance environments
    if(nP<MAX_PLASMID&&Math.random()<genome.plasmidSpawnRate*(1+localRes[i]*4)){
      const newBase=i*PLASMID_SLOTS+nP*4;
      pPlasmid[newBase]=Math.floor(Math.random()*OPCODE_COUNT);
      pPlasmid[newBase+1]=Math.floor(Math.random()*12);
      pPlasmid[newBase+2]=Math.floor(Math.random()*12);
      pPlasmid[newBase+3]=(Math.random()-0.5)*0.75;
      pPlasmidLen[i]++;
    }
  }
}

// ═══ HORIZONTAL GENE TRANSFER ═══
// Runs once per mutation cycle (not per interaction!).
// Gated by peak resonance bond in the recent tick window.
// High resonance = the population is coherent = good time to share code.
// Copies 1-hgtMax instructions from the existing program, mutates slightly,
// and splices them back at random positions. Successful code duplicates.
function attemptHGT(){
  if(peakBondThisTick<0.4)return; // not enough resonance to trigger
  if(Math.random()>genome.hgtRate)return;
  if(genome.vmProgram.length>=genome.vmMaxInstructions-1)return;

  const transfers=1+Math.floor(Math.random()*Math.min(genome.hgtMax,genome.vmMaxInstructions-genome.vmProgram.length));

  for(let t=0;t<transfers;t++){
    if(genome.vmProgram.length>=genome.vmMaxInstructions)break;

    // Pick a source instruction (biased toward instructions that emit — they're "successful")
    let srcIdx;
    const emitters=genome.vmProgram.map((inst,idx)=>inst[0]===4?idx:-1).filter(x=>x>=0);
    if(emitters.length>0&&Math.random()<0.6){
      srcIdx=emitters[Math.floor(Math.random()*emitters.length)];
    }else{
      srcIdx=Math.floor(Math.random()*genome.vmProgram.length);
    }

    const donor=[...genome.vmProgram[srcIdx]];
    // Light mutation on transfer (conjugation isn't perfect copy)
    donor[3]+=(Math.random()-0.5)*genome.hgtSpliceNoise;
    donor[3]=Math.max(-2.5,Math.min(2.5,donor[3]));
    // Occasional opcode drift during transfer
    if(Math.random()<0.08)donor[0]=Math.floor(Math.random()*OPCODE_COUNT);

    const insertPos=Math.floor(Math.random()*(genome.vmProgram.length+1));
    genome.vmProgram.splice(insertPos,0,donor);
  }

  hgtEventsTotal++;
  hgtWindow++;
  peakBondThisTick=0; // reset after transfer
  commonsStrength=0; // reset so strongest writer wins each tick
  commonsWriter=-1;
}

// ═══ RESOURCE FIELD — shared writable environment with territorial signatures ═══
// Energy diffuses and decays. Signatures blend during diffusion (territory fades at edges).
// Ownership decays faster than energy — territory must be actively maintained.
function updateField(){
  // ═══ STAGE 1: CELL-LEVEL VM EXECUTION ═══
  // Each cell holds one VM instruction inscribed by particles.
  // Cells execute their instructions on local state: c1 (this cell, channel 1),
  // c2 (this cell, channel 2), nN/nS/nE/nW (neighbour channel 1 values).
  // No fixed vocabulary — just primitives. The system chooses which patterns survive.
  // Snapshot both channels first so all cells see consistent state.
  const f1Snap=field.slice();
  const f2Snap=field2.slice();
  for(let y=0;y<FIELD_H;y++){
    for(let x=0;x<FIELD_W;x++){
      const idx=y*FIELD_W+x;
      const strength=cellProgStr[idx];
      if(strength<0.05)continue;
      const op=cellProgOp[idx];
      const A=cellProgA[idx];
      const B=cellProgB[idx];
      // Local state available to the cell:
      const c1=f1Snap[idx];
      const c2=f2Snap[idx];
      const nN=y>0?f1Snap[idx-FIELD_W]:c1;
      const nS=y<FIELD_H-1?f1Snap[idx+FIELD_W]:c1;
      const nE=x<FIELD_W-1?f1Snap[idx+1]:c1;
      const nW=x>0?f1Snap[idx-1]:c1;
      const m2N=y>0?f2Snap[idx-FIELD_W]:c2;
      const m2S=y<FIELD_H-1?f2Snap[idx+FIELD_W]:c2;
      const m2E=x<FIELD_W-1?f2Snap[idx+1]:c2;
      const m2W=x>0?f2Snap[idx-1]:c2;
      const nbAvg1=(nN+nS+nE+nW)*0.25;
      const nbAvg2=(m2N+m2S+m2E+m2W)*0.25;
      // Pe22e: recipes are programs, not sums. Each monomial can read the
      // d1/d2 accumulated by earlier monomials, plus a literal 1.0 slot.
      // Coefs include ±1 alongside ±A,±B. Expression space within a single
      // tick is now arbitrary polynomial in local states, not just bilinear.
      let d1=0,d2=0;
      const recipe=genome.chemistryTable[op%12];
      if(recipe){
        const ls0=c1,ls1=c2,ls2=nN,ls3=nS,ls4=nE,ls5=nW,ls6=m2N,ls7=m2S,ls8=m2E,ls9=m2W,ls10=nbAvg1,ls11=nbAvg2;
        const lsArr=[ls0,ls1,ls2,ls3,ls4,ls5,ls6,ls7,ls8,ls9,ls10,ls11,1.0,0,0]; // [12]=1, [13]=d1, [14]=d2
        for(let mi=0;mi<recipe.length;mi++){
          const mono=recipe[mi];
          const cs=mono[0]%6, ta=mono[1]%15, tb=mono[2]%15, tgt=mono[3]&1;
          const coef=cs===0?A:cs===1?B:cs===2?-A:cs===3?-B:cs===4?1:-1;
          const contrib=coef*lsArr[ta]*lsArr[tb];
          if(!isFinite(contrib))continue; // blown intermediate: skip, keep executing
          if(tgt===0)d1+=contrib; else d2+=contrib;
          lsArr[13]=d1; lsArr[14]=d2; // feed accumulating outputs forward
        }
      }
      // Skeleton: if the recipe produced NaN/Infinity, zero the contribution for this cell
      if(!isFinite(d1))d1=0;
      if(!isFinite(d2))d2=0;
      // Apply, scaled by inscription strength
      field[idx]+=d1*strength*0.05;
      field2[idx]+=d2*strength*0.05;
      field[idx]=Math.max(0,Math.min(100,field[idx]));
      field2[idx]=Math.max(0,Math.min(100,field2[idx]));
      // Inscription decay — rules fade unless reinforced
      cellProgStr[idx]*=0.998;
    }
  }

  // ═══ STAGE 2: STANDARD DIFFUSION + DECAY ═══
  for(let y=0;y<FIELD_H;y++){
    for(let x=0;x<FIELD_W;x++){
      const idx=y*FIELD_W+x;

      // Energy diffusion + decay — MEMORY-DEPENDENT
      // Cells with history decay slower. The world remembers what lived here.
      let sum=field[idx]*(1-FIELD_DIFFUSE*4);
      if(x>0)sum+=field[idx-1]*FIELD_DIFFUSE;
      if(x<FIELD_W-1)sum+=field[idx+1]*FIELD_DIFFUSE;
      if(y>0)sum+=field[(y-1)*FIELD_W+x]*FIELD_DIFFUSE;
      if(y<FIELD_H-1)sum+=field[(y+1)*FIELD_W+x]*FIELD_DIFFUSE;
      const memBonus=Math.min(0.015,fieldMemory[idx]*0.003); // history slows decay, max 0.015
      field[idx]=sum*(FIELD_DECAY+memBonus);
      if(isNaN(field[idx]))field[idx]=0;

      // Second channel — diffuses at slower rate
      const F2D=FIELD_DIFFUSE*0.5;
      let sum2=field2[idx]*(1-F2D*4);
      if(x>0)sum2+=field2[idx-1]*F2D;
      if(x<FIELD_W-1)sum2+=field2[idx+1]*F2D;
      if(y>0)sum2+=field2[(y-1)*FIELD_W+x]*F2D;
      if(y<FIELD_H-1)sum2+=field2[(y+1)*FIELD_W+x]*F2D;
      field2[idx]=sum2*FIELD_DECAY;
      if(isNaN(field2[idx]))field2[idx]=0;

      // Update field memory — writing to a cell accumulates history
      if(field[idx]>0.1){
        fieldMemory[idx]=Math.min(5,fieldMemory[idx]+0.001); // slow accumulation
      }else{
        fieldMemory[idx]*=0.9995; // very slow forgetting — scars last
      }

      // Signature diffusion — signatures blend at territory borders
      const sBase=idx*FIELD_SIG_DIMS;
      for(let s=0;s<FIELD_SIG_DIMS;s++){
        let sSum=fieldSig[sBase+s]*(1-FIELD_DIFFUSE*4);
        if(x>0)sSum+=fieldSig[(idx-1)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        if(x<FIELD_W-1)sSum+=fieldSig[(idx+1)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        if(y>0)sSum+=fieldSig[((y-1)*FIELD_W+x)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        if(y<FIELD_H-1)sSum+=fieldSig[((y+1)*FIELD_W+x)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        fieldSig[sBase+s]=sSum*FIELD_DECAY;
      }

      // Ownership decays faster — territory must be actively maintained
      fieldOwnership[idx]*=0.975;
    }
  }
}

// ═══ Pe26 LAYER 16c: CLUSTER UPWARD SIGNAL ═══
// Successful persistent clusters donate motifs and genome signals upward.
// The buffer is consumed by mutateGenome. This closes the loop: particles → clusters
// was already present (cluster VMs, cluster genomes); clusters → global was the missing path.
// gradientUpstreamBias=0 makes this a no-op, recovering Pe25 behavior exactly.
// Pe30 Layer 20b: the scenario fossil is now the cluster's BIRTH-TIME snapshot
// (carried on c.scenarioFossil since trackClusterPersistence), not a fresh snapshot of
// the current top. A long-lived cluster carries a genuinely aged fossil — so when it
// drains into the bank, the source scenario is often already evicted and the
// resurrection path actually fires.
function collectClusterUpstream(){
  const ub=genome.gradientUpstreamBias||0;
  if(ub<=0.01)return;
  for(const c of clusters){
    // Qualification: old enough, coherent enough, energetically viable
    if(c.persistAge<6||c.coherence<0.45||c.avgAmp<0.38)continue;
    if(!c.vmProgram||c.vmProgram.length<2)continue;
    if(clusterUpstreamBuffer.length>=MAX_UPSTREAM_BUFFER)break;
    // Sample a 1-2 instruction motif from the cluster's VM
    const start=Math.floor(Math.random()*(c.vmProgram.length-1));
    const len=1+(Math.random()<0.5?1:0);
    const motif=[];
    for(let i=0;i<len&&start+i<c.vmProgram.length;i++){
      const inst=c.vmProgram[start+i];
      motif.push([inst[0],inst[1],inst[2],inst[3]]);
    }
    if(motif.length>0){
      // Pe30: the cluster's birth-time scenario fossil, packaged as a bank-ready
      // blueprint (counters zeroed, src tagged). Null if the cluster was born before
      // any scenario had won.
      const cf=c.scenarioFossil;
      const fossil=cf?{e:cf.e,k:cf.k,r:cf.r,c:cf.c,t:cf.t,
        f:cf.f||0,p:cf.p||0,a:cf.a||0,tb:cf.tb||0,sp:cf.sp||0,sm:cf.sm||0,mp:cf.mp||0,
        wins:0,age:0,src:'fossil',creditTrace:cf.creditTrace||0}:null;
      clusterUpstreamBuffer.push({
        motif,
        clusterGenome:c.clusterGenome?{...c.clusterGenome}:null,
        scenarioFossil:fossil, // Pe30: birth-time fossil, carried for the cluster's life
        quality:c.coherence*c.avgAmp*(1+c.persistAge*0.02) // signal strength
      });
    }
  }
}

function mutateGenome(){
  // Pe22b: substrate physics — defensive defaults for old genomes
  // (the actual mutation happens further down, after `rate` and `maybe` exist)
  if(genome.fieldDecay===undefined)genome.fieldDecay=0.982;
  if(genome.fieldDiffuse===undefined)genome.fieldDiffuse=0.11;
  // ═══ STRESS-RESPONSIVE MUTATION TIMING ═══
  // Mutation rate is modulated by: (a) genome parameter, (b) system stability, (c) VM pressure
  // Under collapse → mutate faster. Under stability → slower. VM code can push either way.
  const mutationPressure=mutPressureAccum;
  const stabilityFactor=Math.max(0.3,Math.min(2.0,
    1.0+(1.0-selfModel.stability)*0.8  // instability increases mutation
    -selfModel.stability*0.3            // stability decreases it
    +Math.tanh(mutationPressure)*0.4    // VM channel 6 pushes mutation rate
  ));
  const rate=genome.mutationRate*stabilityFactor;
  const scale=genome.mutationScale;
  mutPressureAccum=0; // reset accumulator for next cycle after snapshotting pressure

  // Pe26 Layer 16a: gradient-biased perturbation.
  // When collapseRisk is elevated, blend random walk with the direction the shadow sim
  // last found helpful. gradientBias=0 → pure random walk (Pe25 behavior).
  // The gradient nudge is kept smaller than the random component so it's a lean, not a lock.
  // Shadow sim still vets candidates after this step, so bad gradient directions get rejected.
  const gBias=Math.max(0,Math.min(1,genome.gradientBias||0));
  const risk=selfModel.collapseRisk||0;
  const gradientActive=gBias>0.05&&risk>0.25&&(lastShadowNudgeDir[0]!==0||lastShadowNudgeDir[2]!==0||lastShadowNudgeDir[3]!==0);

  // Helper: maybe mutate a value.
  // Pe22b — GLOVES OFF (revised). No spring, no prior, no restoring force.
  // The (min,max) arguments are historical — retained so callers don't break,
  // but they do nothing. Mutation is pure random walk, modulated only by the
  // stress-responsive rate/scale above. Skeleton-level sanity (NaN/Infinity) is
  // the ONLY surviving check. If the system wants a value of -47 or 12000, it
  // gets one. If that value produces crashes elsewhere, that's a finding, not
  // a failure to guard.
  function maybe(val,min,max,magnitude){
    if(Math.random()>rate)return val;
    const next=val+(Math.random()-0.5)*magnitude*scale;
    if(!isFinite(next))return val;
    return next;
  }
  // Gradient-biased version for physics parameters with a known shadow-nudge direction.
  // nudgeDir: ±1 direction from lastShadowNudgeDir, 0 = no prior signal.
  function gradMaybe(val,min,max,magnitude,nudgeDir){
    if(Math.random()>rate)return val;
    const randomStep=(Math.random()-0.5)*magnitude*scale;
    if(!gradientActive||nudgeDir===0){
      const next=val+randomStep;
      return isFinite(next)?next:val;
    }
    // Blend: random walk attenuated by gradient strength + directed step.
    // Attenuation keeps randomness alive — gradient is a lean, not a command.
    const gradientStrength=gBias*Math.min(1,risk*1.5);
    const step=randomStep*(1-gradientStrength*0.5)+nudgeDir*magnitude*gradientStrength*0.4;
    const next=val+step;
    return isFinite(next)?next:val;
  }

  // LAYER 1: Physics mutations
  // Pe22b: substrate physics — the ground the particles live on now evolves
  genome.fieldDecay=maybe(genome.fieldDecay,0.9,0.999,0.004);
  genome.fieldDiffuse=maybe(genome.fieldDiffuse,0.02,0.25,0.01);
  // Pe22c: evolvable chemistry table — mutate monomials in the opcode recipes.
  // Defensive defaults for old genomes that don't have a table yet.
  if(!genome.chemistryTable)genome.chemistryTable=seedChemistryTable();
  if(genome.chemistryMutRate===undefined)genome.chemistryMutRate=0.02;
  const chemRate=genome.chemistryMutRate*(1+Math.tanh(mutationPressure)*0.3);
  for(let oi=0;oi<genome.chemistryTable.length;oi++){
    const recipe=genome.chemistryTable[oi];
    for(let mi=0;mi<recipe.length;mi++){
      const mono=recipe[mi];
      // Point mutations: flip coef source (now 0..5), swap a variable (now 0..14), or change target
      if(Math.random()<chemRate)mono[0]=(Math.random()*6)|0;
      if(Math.random()<chemRate)mono[1]=(Math.random()*15)|0;
      if(Math.random()<chemRate)mono[2]=(Math.random()*15)|0;
      if(Math.random()<chemRate*0.5)mono[3]=1-mono[3];
    }
    // Rare: add a new monomial (recipes can grow to 12)
    if(recipe.length<12&&Math.random()<chemRate*0.1){
      recipe.push([(Math.random()*6)|0,(Math.random()*15)|0,(Math.random()*15)|0,(Math.random()*2)|0]);
    }
    // Rare: drop a monomial (recipes can shrink, but never below 1)
    if(recipe.length>1&&Math.random()<chemRate*0.05){
      recipe.splice((Math.random()*recipe.length)|0,1);
    }
  }
  // Meta-mutation on the chemistry mutation rate itself
  genome.chemistryMutRate=maybe(genome.chemistryMutRate,0.005,0.1,0.005);
  // Live kernel sync — clamped to the stable-kernel regime (skeleton, not cage:
  // outside these bounds the diffusion equation produces NaN)
  FIELD_DECAY=Math.max(0.5,Math.min(1.0,genome.fieldDecay));
  FIELD_DIFFUSE=Math.max(0,Math.min(0.24,genome.fieldDiffuse));
  genome.entropyBaseline=gradMaybe(genome.entropyBaseline,0.00005,0.005,0.0002,lastShadowNudgeDir[0]);
  genome.entropyK=gradMaybe(genome.entropyK,0.00002,0.003,0.0001,lastShadowNudgeDir[1]);
  genome.entrainRate=gradMaybe(genome.entrainRate,0.002,0.06,0.003,lastShadowNudgeDir[2]);
  genome.entrainThresh=gradMaybe(genome.entrainThresh,0.05,0.6,0.03,lastShadowNudgeDir[4]);
  genome.creationCost=gradMaybe(genome.creationCost,0.05,0.7,0.04,lastShadowNudgeDir[3]);
  genome.creationThresh=maybe(genome.creationThresh,0.05,0.6,0.03);
  genome.destructThresh=maybe(genome.destructThresh,-0.6,-0.05,0.03);
  genome.tendencyBleed=maybe(genome.tendencyBleed,0.00005,0.003,0.0002);
  genome.magneticThresh=maybe(genome.magneticThresh,0.1,0.8,0.04);
  genome.velocityDamping=maybe(genome.velocityDamping,0.98,0.9999,0.003);
  genome.deathThreshold=maybe(genome.deathThreshold,0.01,0.15,0.01);

  // LAYER 2: Perception mutations
  genome.clusterBondThresh=maybe(genome.clusterBondThresh,0.05,0.5,0.03);
  genome.clusterMinSize=Math.max(1,Math.round(maybe(genome.clusterMinSize,2,8,0.5)));
  genome.ghostDecay=maybe(genome.ghostDecay,0.98,0.9999,0.003);
  genome.ghostAmpDrip=maybe(genome.ghostAmpDrip,0.00005,0.002,0.0002);

  // LAYER 3: Evaluation mutations (objective weights)
  for(let i=0;i<4;i++){
    if(Math.random()<rate)genome.objWeights[i]=Math.max(0,genome.objWeights[i]+(Math.random()-0.5)*0.06*scale);
  }
  const wSum=genome.objWeights.reduce((a,b)=>a+b,0);
  if(wSum>0){
    for(let i=0;i<4;i++)genome.objWeights[i]/=wSum;
  }else{
    genome.objWeights=[0.25,0.25,0.25,0.25];
  }
  // Pe25 Layer 15 credit rate
  genome.creditLearnRate=Math.max(0,Math.min(3,maybe(genome.creditLearnRate,0,3,0.15)));

  // Pe26 Layer 16: gradient bias params — lineage selection decides whether learning helps
  genome.gradientBias=Math.max(0,Math.min(1,maybe(genome.gradientBias,0,1,0.06)));
  genome.gradientUpstreamBias=Math.max(0,Math.min(1,maybe(genome.gradientUpstreamBias,0,1,0.06)));
  genome.behaviorGradientBias=Math.max(0,Math.min(1,maybe(genome.behaviorGradientBias,0,1,0.06))); // Pe33

  // Pe31 Layer 21: mutual recognition — all three can evolve to 0 (recovering Pe30b behavior)
  genome.neighborModelUpdateRate=Math.max(0,Math.min(1,maybe(genome.neighborModelUpdateRate,0,1,0.05)));
  genome.neighborPredictionInfluence=Math.max(0,Math.min(0.5,maybe(genome.neighborPredictionInfluence,0,0.5,0.04)));
  genome.mutualRecognitionThresh=Math.max(0,Math.min(1,maybe(genome.mutualRecognitionThresh,0,1,0.06)));
  genome.relationalWeight=Math.max(0,Math.min(1,maybe(genome.relationalWeight,0,1,0.05))); // Pe34 Layer 24
  genome.relationalUseBias=Math.max(0,Math.min(1,maybe(genome.relationalUseBias,0,1,0.05))); // Pe35 Layer 24b

  // ═══ Pe26 Layer 16c: CLUSTER UPWARD SIGNAL injection ═══
  // Drain the upstream buffer — soft-inject successful cluster motifs into the global VM.
  // This is the same mechanism as network motif injection: probabilistic overwrite, not replace.
  // gradientUpstreamBias=0 → buffer is never populated, this is a no-op.
  const ub=genome.gradientUpstreamBias||0;
  if(ub>0.01&&clusterUpstreamBuffer.length>0&&Math.random()<ub){
    // Pick the highest-quality upstream signal
    clusterUpstreamBuffer.sort((a,b)=>b.quality-a.quality);
    const upstream=clusterUpstreamBuffer.shift();
    if(upstream&&upstream.motif&&genome.vmProgram.length>0){
      const insertAt=Math.floor(Math.random()*genome.vmProgram.length);
      for(let i=0;i<upstream.motif.length&&insertAt+i<genome.vmProgram.length;i++){
        // Soft overwrite — not every cluster instruction lands, adds noise for diversity
        if(Math.random()<0.35){
          const src=upstream.motif[i];
          genome.vmProgram[insertAt+i]=[src[0],src[1],src[2],src[3]+(Math.random()-0.5)*0.08];
        }
      }
      recordEvent('cluster_upstream',{q:+(upstream.quality.toFixed(2)),vm:genome.vmProgram.length},600);
    }
    // Also: if the cluster had a clusterGenome, nudge the global mutation interval
    // and interaction radius gently toward cluster-successful values.
    // This is the weakest possible signal — a whisper, not a command.
    if(upstream&&upstream.clusterGenome&&ub>0.15){
      const cg=upstream.clusterGenome;
      if(isFinite(cg.metabolicBias))genome.velocityDamping+=(cg.metabolicBias-genome.velocityDamping)*0.002*ub;
      if(isFinite(cg.innovationRate))genome.mutationRate+=(cg.innovationRate*0.5-genome.mutationRate)*0.001*ub;
    }
    // ═══ Pe28 Layer 18: SCENARIO FOSSIL INJECTION ═══
    // Cluster-carried scenario snapshot. If a structurally-similar scenario lives in
    // the bank, refresh its age (re-ratification). If novel, inject it as a fresh entry.
    // Pe32: similarity measured over all 12 axes.
    if(upstream&&upstream.scenarioFossil&&Array.isArray(genome.shadowScenarioBank)){
      const fos=upstream.scenarioFossil;
      const bank=genome.shadowScenarioBank;
      let matchIdx=-1,bestDist=0.3; // similarity threshold
      for(let i=0;i<bank.length;i++){
        const dist=scenarioDist(bank[i],fos);
        if(dist<bestDist){bestDist=dist;matchIdx=i}
      }
      if(matchIdx>=0){
        bank[matchIdx].age=Math.max(0,bank[matchIdx].age-30);
        recordEvent('scenario_ratified',{i:matchIdx,w:bank[matchIdx].wins},600);
      }else if(bank.length<SHADOW_SCENARIOS_MAX){
        // Pe32: fossil carries all 12 axes into the bank.
        bank.push({e:fos.e,k:fos.k,r:fos.r,c:fos.c,t:fos.t,
          f:fos.f||0,p:fos.p||0,a:fos.a||0,tb:fos.tb||0,sp:fos.sp||0,sm:fos.sm||0,mp:fos.mp||0,
          wins:0,age:0,src:'fossil',creditTrace:fos.creditTrace||0});
        recordEvent('scenario_fossil',{e:+fos.e.toFixed(2),r:+fos.r.toFixed(2)},600);
      }
    }
  }
  // Trim buffer if it fills faster than it drains
  if(clusterUpstreamBuffer.length>MAX_UPSTREAM_BUFFER)clusterUpstreamBuffer.length=MAX_UPSTREAM_BUFFER;

  // LAYER 4: META-MUTATIONS
  genome.mutationRate=maybe(genome.mutationRate,0.01,0.25,0.02);
  genome.mutationScale=maybe(genome.mutationScale,0.3,3.0,0.2);
  genome.shadowHorizon=Math.max(2,Math.min(500,Math.round(maybe(genome.shadowHorizon,10,120,8))));
  genome.perturbScale=maybe(genome.perturbScale,0.2,3.0,0.2);
  genome.extinctionThresh=Math.max(1,Math.round(maybe(genome.extinctionThresh,2,20,2)));
  genome.motifMemorySize=Math.max(1,Math.min(40,Math.round(maybe(genome.motifMemorySize,2,10,1))));
  genome.culturalBias=maybe(genome.culturalBias,0.05,0.6,0.04);

  // Pe27 Layer 17: imagination bank cap and churn rate. The system decides how many
  // counterfactual futures to maintain and how aggressively to refresh them.
  genome.shadowScenarios=Math.max(3,Math.min(SHADOW_SCENARIOS_MAX,Math.round(maybe(genome.shadowScenarios,3,SHADOW_SCENARIOS_MAX,0.8))));
  genome.shadowBankChurn=Math.max(0,Math.min(1,maybe(genome.shadowBankChurn,0,1,0.06)));
  // Pe30b: explore rate evolvable, bounded [0.1,0.9] — see refill-loop note for why
  // the bounds are tighter than the [0,1] of other freed params.
  genome.shadowExploreRate=Math.max(0.1,Math.min(0.9,maybe(genome.shadowExploreRate,0.1,0.9,0.06)));
  // Pe29 Layer 19: how strongly real-fitness credit affects eviction. 0=Pe28 behavior.
  genome.scenarioCreditWeight=Math.max(0,Math.min(1,maybe(genome.scenarioCreditWeight,0,1,0.06)));
  // Evict-and-spawn pass: probabilistic, gated by the churn rate.
  if(Math.random()<(genome.shadowBankChurn||0.5))evolveShadowBank();

  // Trim motif memory if size shrunk
  while(genome.stableMotifs.length>genome.motifMemorySize)genome.stableMotifs.shift();

  // ═══ LAYER 6: VM PROGRAM MUTATION ═══
  // The system's discovered physics evolve.
  // Instructions change. Programs grow/shrink. Conditional thresholds drift.
  // vmInfluence evolves: the system decides how much its rules matter.
  genome.vmInfluence=maybe(genome.vmInfluence,0.05,2.0,0.08);
  genome.ruleScale=maybe(genome.ruleScale,0.2,3.0,0.2);
  genome.vmMaxInstructions=Math.max(1,Math.min(48,Math.round(maybe(genome.vmMaxInstructions,6,20,1))));
  genome.metabolicCost=maybe(genome.metabolicCost,0.000002,0.0002,0.00002);

  // HGT parameter evolution
  genome.hgtRate=maybe(genome.hgtRate,0.01,0.5,0.04);
  genome.hgtMax=Math.max(1,Math.min(12,Math.round(maybe(genome.hgtMax,1,4,0.5))));
  genome.hgtSpliceNoise=maybe(genome.hgtSpliceNoise,0.05,0.5,0.04);

  // Plasmid parameter evolution
  genome.plasmidTransferRate=maybe(genome.plasmidTransferRate,0.001,0.05,0.004);
  genome.plasmidMutRate=maybe(genome.plasmidMutRate,0.005,0.15,0.015);
  genome.plasmidTransferThresh=maybe(genome.plasmidTransferThresh,0.3,0.85,0.05);
  genome.plasmidSpawnRate=maybe(genome.plasmidSpawnRate,0.0005,0.01,0.001);
  genome.fieldInfluence=maybe(genome.fieldInfluence,0.1,1.5,0.08);
  genome.fieldWeight=maybe(genome.fieldWeight,0.02,0.8,0.04);

  // Network parameter evolution — the system decides how social to be
  if(genome.netMigrantRate===undefined)genome.netMigrantRate=0.003;
  if(genome.netPlasmidRate===undefined)genome.netPlasmidRate=0.004;
  if(genome.netMotifRate===undefined)genome.netMotifRate=0.005;
  if(genome.netInscribeRate===undefined)genome.netInscribeRate=0.004;
  if(genome.netReceptivity===undefined)genome.netReceptivity=0.5;
  genome.netMigrantRate=maybe(genome.netMigrantRate,0,0.02,0.002);
  genome.netPlasmidRate=maybe(genome.netPlasmidRate,0,0.02,0.002);
  genome.netMotifRate=maybe(genome.netMotifRate,0,0.02,0.002);
  genome.netInscribeRate=maybe(genome.netInscribeRate,0,0.02,0.002);
  genome.netReceptivity=maybe(genome.netReceptivity,0,1,0.08);

  // ═══ AUTONOMY PARAMETER MUTATION ═══
  genome.mutationInterval=maybe(genome.mutationInterval,60,1200,40);
  genome.interactionRadius=maybe(genome.interactionRadius,25,120,5);
  genome.densityCostK=maybe(genome.densityCostK,0.000003,0.0003,0.00003);
  genome.fieldBirthGate=maybe(genome.fieldBirthGate,0.01,5.0,0.05);

  // ═══ LAYER 10: REFLEXIVITY PARAMETER MUTATION ═══
  // The system evolves whether self-modelling is useful.
  // reflexInfluence can go to 0 — killing the feedback loop — if it's not adaptive.
  // Or it can grow — deepening self-reference — if the system benefits.
  genome.reflexSampleRate=maybe(genome.reflexSampleRate,0.02,0.5,0.04);
  genome.reflexDepth=Math.max(1,Math.min(REFLEX_DEPTH,Math.round(maybe(genome.reflexDepth,2,8,0.5))));
  genome.reflexInfluence=maybe(genome.reflexInfluence,0,1.5,0.06);
  genome.reflexDecay=maybe(genome.reflexDecay,0.7,0.99,0.03);
  genome.clusterReflexAge=Math.max(1,Math.round(maybe(genome.clusterReflexAge,2,15,1)));
  genome.clusterReflexWeight=maybe(genome.clusterReflexWeight,0,0.8,0.05);
  // Pe24 Layer 12: cluster genome self-read strength evolves alongside other reflex params
  if(genome.clusterGenomeReadStrength===undefined)genome.clusterGenomeReadStrength=0.05;
  genome.clusterGenomeReadStrength=maybe(genome.clusterGenomeReadStrength,0,1.5,0.05);

  // ═══ EVOLVABLE FITNESS SENSOR MUTATION ═══
  // Mutate existing sensors (program + weight)
  // Pe23: src/dst range expanded 8 → 16 to address meta-sensing registers S8-S15.
  // Existing sensors using indices 0-7 continue to work (still read current-state channels).
  // New mutations can hit 8-15 (trajectory channels). Selection decides which matter.
  // Pe24: each sensor also has realWeight — its contribution to ACTUAL fitness (not shadow).
  // weight drives shadow-scenario nudges; realWeight drives currentFitness directly.
  // Both evolve independently. A sensor can be useful in one role and not the other.
  for(const sensor of genome.fitnessSensors){
    // Weight mutation (shadow-scoring weight, original behaviour)
    if(Math.random()<rate)sensor.weight=Math.max(-1,Math.min(1,sensor.weight+(Math.random()-0.5)*0.1*scale));
    // Pe24: realWeight mutation. Defensive default so old saves load cleanly.
    if(sensor.realWeight===undefined)sensor.realWeight=0;
    if(Math.random()<rate)sensor.realWeight=Math.max(-1,Math.min(1,sensor.realWeight+(Math.random()-0.5)*0.08*scale));
    // Program mutation
    for(const inst of sensor.program){
      if(Math.random()>rate*0.8)continue;
      inst[3]+=(Math.random()-0.5)*0.2*scale;
      inst[3]=Math.max(-2,Math.min(2,inst[3]));
      if(Math.random()<0.15)inst[0]=Math.floor(Math.random()*5); // opcodes 0-4 only
      if(Math.random()<0.15)inst[1]=Math.floor(Math.random()*16); // Pe23: 16 registers
      if(Math.random()<0.15)inst[2]=Math.floor(Math.random()*16); // Pe23: 16 registers
    }
    // Add instruction to sensor — Pe22e: no hard cap on length.
    // The evolved weight is the selection pressure; long useless sensors
    // get diluted, long useful ones justify themselves.
    if(Math.random()<rate*0.1){
      sensor.program.push([Math.floor(Math.random()*5),Math.floor(Math.random()*16),Math.floor(Math.random()*16),(Math.random()-0.5)*0.5]);
    }
    // Remove instruction
    if(sensor.program.length>1&&Math.random()<rate*0.05){
      sensor.program.splice(Math.floor(Math.random()*sensor.program.length),1);
    }
  }
  // Birth new sensor — Pe22e: no hard cap on count. The system
  // can evolve as many dimensions of value as it can sustain.
  // Starting weight is low so new sensors have to prove themselves;
  // dead weight gets culled below. Pe24: realWeight starts at 0 — new sensors
  // have to earn entry into real fitness through mutation, not by default.
  if(Math.random()<rate*0.03){
    genome.fitnessSensors.push({
      program:[[Math.floor(Math.random()*5),Math.floor(Math.random()*16),Math.floor(Math.random()*16),(Math.random()-0.5)]],
      weight:0.05,
      realWeight:0,
      creditTrace:0,  // Pe25 Layer 15
      lastEmit:0,
      prevEmit:0
    });
  }
  // Death of useless sensor — Pe24: post-bifurcation, a sensor's utility is
  // max(|weight|,|realWeight|). A sensor with weight=0 but realWeight=0.5 is
  // doing real-fitness work and must not be culled as "useless." The old rule
  // looked only at shadow weight and would silently strangle real-role sensors
  // before they could establish, undermining Layer 14's whole point.
  if(genome.fitnessSensors.length>1&&Math.random()<rate*0.02){
    const sensorUtility=s=>Math.max(Math.abs(s.weight),Math.abs(s.realWeight||0));
    const weakest=genome.fitnessSensors.reduce((min,s,i)=>sensorUtility(s)<sensorUtility(genome.fitnessSensors[min])?i:min,0);
    if(sensorUtility(genome.fitnessSensors[weakest])<0.03)genome.fitnessSensors.splice(weakest,1);
  }

  // ═══ Pe22f: USER ATOM MUTATION ═══
  // The system evolves its own JS primitives. New atoms are born with
  // random expressions from the loose grammar. Mutations replace the
  // whole expression (simpler than surgical string edits and produces
  // wider exploration). Atoms that never get used get culled — if
  // opcode 22 never references an atom, its uses stays 0 and it's dead weight.
  if(!genome.userAtoms)genome.userAtoms=[];
  // Mutate existing atoms — replace expression entirely.
  for(const ua of genome.userAtoms){
    if(Math.random()<rate*0.3){
      ua.expression=uaGenExpression();
      ua.compiled=null;
      ua.failed=false;
      ua.uses=0; // reset usage count on mutation
    }
  }
  // Birth new atom — no hard cap. Compute pressure self-limits via uses.
  if(Math.random()<rate*0.15){
    const expression=uaGenExpression();
    genome.userAtoms.push({expression,compiled:null,failed:false,uses:0});
    recordEvent('ua_birth',{expr:expression.slice(0,48),n:genome.userAtoms.length},600);
  }
  // Cull atoms that are failed (invalid JS) or proven unused.
  // "Proven unused" = been alive for a mutation cycle with zero uses.
  if(genome.userAtoms.length>0&&Math.random()<rate*0.1){
    // Find one to remove: prefer failed, then unused-and-aged
    let removeIdx=-1;
    for(let i=0;i<genome.userAtoms.length;i++){
      if(genome.userAtoms[i].failed){removeIdx=i;break;}
    }
    if(removeIdx<0){
      for(let i=0;i<genome.userAtoms.length;i++){
        const a=genome.userAtoms[i];
        if((a.uses|0)===0&&(a.age|0)>2){removeIdx=i;break;}
      }
    }
    if(removeIdx>=0){
      const removed=genome.userAtoms[removeIdx];
      genome.userAtoms.splice(removeIdx,1);
      recordEvent('ua_cull',{failed:!!removed.failed,n:genome.userAtoms.length},600);
    }
  }
  // Age all atoms — lets us distinguish "never used yet" from "used to be used"
  for(const ua of genome.userAtoms)ua.age=(ua.age|0)+1;

  // ═══ Pe32/Pe33 LAYER 23: BEHAVIORAL GRADIENT — shadow sim biases VM mutations ═══
  // Pe32: k-value nudge on existing EMIT instructions toward winning behavioral axis.
  // Pe33: uses behaviorGradientBias (separate from gradientBias) so physics and behavioral
  // gradient can evolve independently. A genome can discover "ignore behavioral gradient"
  // while still following physics gradient, or vice versa.
  // Action channel mapping: 0=force, 1=phaseShift, 2=ampTransfer, 3=tendBleed,
  //                          4=spawnDrive, 5=sigModulate, 6=mutPressure
  const bgbActive=Math.max(0,Math.min(1,genome.behaviorGradientBias||0));
  const vmGradActive=bgbActive>0.05&&risk>0.15;
  if(vmGradActive){
    const vmNudgeScale=genome.perturbScale*bgbActive*Math.min(1,risk*1.5)*0.08;
    const vmNudgeDirs=lastShadowNudgeDir.slice(5,12); // [f,p,a,tb,sp,sm,mp]
    for(let ip=0;ip<genome.vmProgram.length;ip++){
      const inst=genome.vmProgram[ip];
      if(inst[0]!==4)continue; // only EMIT instructions
      const actionCh=Math.abs(inst[2])%8;
      if(actionCh<7&&vmNudgeDirs[actionCh]!==0){
        inst[3]+=vmNudgeDirs[actionCh]*vmNudgeScale;
        inst[3]=Math.max(-2,Math.min(2,inst[3]));
      }
    }
  }

  // Mutate existing instructions
  for(let ip=0;ip<genome.vmProgram.length;ip++){
    if(Math.random()>rate*1.2)continue;
    const inst=genome.vmProgram[ip];

    inst[3]+=(Math.random()-0.5)*0.15*scale;
    inst[3]=Math.max(-2,Math.min(2,inst[3]));

    // Opcode swap — now includes FEEDBACK (5), LOAD_MEM (6), STORE_MEM (7)
    if(Math.random()<rate*0.2)inst[0]=Math.floor(Math.random()*OPCODE_COUNT);

    // Source register swap (now 12 registers)
    if(Math.random()<rate*0.2)inst[1]=Math.floor(Math.random()*12);

    // Destination register/action swap
    if(Math.random()<rate*0.2)inst[2]=Math.floor(Math.random()*12);
  }

  // Program growth: insert a random instruction — Pe33: biased when behavioral gradient active
  if(genome.vmProgram.length<genome.vmMaxInstructions&&Math.random()<rate*0.15){
    const pos=Math.floor(Math.random()*(genome.vmProgram.length+1));
    const bgb=Math.max(0,Math.min(1,genome.behaviorGradientBias||0));
    const vmNudgeDirs33=lastShadowNudgeDir.slice(5,12); // [f,p,a,tb,sp,sm,mp]
    const bestBehavAxis=vmNudgeDirs33.reduce((best,v,i)=>Math.abs(v)>Math.abs(vmNudgeDirs33[best])?i:best,0);
    const bestBehavDir=vmNudgeDirs33[bestBehavAxis]; // ±1 or 0
    const behavGradStrong=bgb>0.05&&risk>0.1&&bestBehavDir!==0;

    let newInst;
    if(behavGradStrong&&Math.random()<bgb){
      // Pe33: targeted EMIT insertion. The gradient says "more of channel X" — insert
      // an EMIT instruction that contributes to exactly that channel.
      // k-value initialized in the gradient direction; magnitude proportional to bias strength.
      const initK=bestBehavDir*(0.2+Math.random()*0.4)*bgb;
      newInst=[4, Math.floor(Math.random()*12), bestBehavAxis, initK]; // opcode 4 = EMIT
      recordEvent('directed_emit',{ch:bestBehavAxis,dir:bestBehavDir,bgb:+bgb.toFixed(2)},800);
    } else {
      newInst=[Math.floor(Math.random()*OPCODE_COUNT),Math.floor(Math.random()*12),Math.floor(Math.random()*12),(Math.random()-0.5)*0.6];
      // Pe33: anti-gradient vetting — if inserting an EMIT that opposes a strong gradient,
      // 60% chance to re-roll once. Not a lock: randomness is still alive.
      if(behavGradStrong&&newInst[0]===4){
        const ch=Math.abs(newInst[2])%8;
        if(ch<7&&vmNudgeDirs33[ch]!==0&&Math.sign(newInst[3])!==bestBehavDir&&Math.random()<0.6){
          newInst=[Math.floor(Math.random()*OPCODE_COUNT),Math.floor(Math.random()*12),Math.floor(Math.random()*12),(Math.random()-0.5)*0.6];
        }
      }
    }
    genome.vmProgram.splice(pos,0,newInst);
  }

  // Program shrinkage: delete an instruction
  if(genome.vmProgram.length>6&&Math.random()<rate*0.1){
    const pos=Math.floor(Math.random()*genome.vmProgram.length);
    genome.vmProgram.splice(pos,1);
  }

  // Instruction duplication (with mutation — a powerful evolutionary operator)
  if(genome.vmProgram.length<genome.vmMaxInstructions-1&&Math.random()<rate*0.08){
    const src=Math.floor(Math.random()*genome.vmProgram.length);
    const copy=[...genome.vmProgram[src]];
    copy[3]+=(Math.random()-0.5)*0.2; // mutate the constant on copy
    genome.vmProgram.splice(src+1,0,copy);
  }

  // Trim if over max
  while(genome.vmProgram.length>genome.vmMaxInstructions)genome.vmProgram.pop();

  // ═══ LAYER 9: CLUSTER VM MUTATION ═══
  // Persistent clusters evolve their own programs independently.
  // Young clusters keep their seed. Old clusters differentiate.
  // vmInfluence per cluster also mutates — some clusters amplify their local policy,
  // others let global physics dominate.
  for(const c of clusters){
    if(!c.vmProgram||c.persistAge<3)continue;
    // Mutation probability scales with persistence — older clusters mutate more confidently
    const clMutRate=rate*0.25*Math.min(2,1+c.persistAge*0.05);
    for(let ip=0;ip<c.vmProgram.length;ip++){
      if(Math.random()>clMutRate)continue;
      const inst=c.vmProgram[ip];
      // Constant drift
      inst[3]+=(Math.random()-0.5)*0.15*scale;
      inst[3]=Math.max(-2,Math.min(2,inst[3]));
      // Structural mutations (rarer)
      if(Math.random()<0.2)inst[0]=Math.floor(Math.random()*OPCODE_COUNT);
      if(Math.random()<0.15)inst[1]=Math.floor(Math.random()*12);
      if(Math.random()<0.15)inst[2]=Math.floor(Math.random()*12);
    }
    // vmInfluence per cluster mutates
    if(Math.random()<rate*0.3){
      c.vmInfluence=Math.max(0.05,Math.min(1.5,c.vmInfluence+(Math.random()-0.5)*0.1*scale));
    }
    // Field signature drift — territorial identity evolves slowly
    // This is what creates divergent group identities over time
    if(c.fieldSignature&&Math.random()<rate*0.2){
      for(let s=0;s<FIELD_SIG_DIMS;s++){
        c.fieldSignature[s]+=(Math.random()-0.5)*0.06*scale;
        c.fieldSignature[s]=Math.max(-1.5,Math.min(1.5,c.fieldSignature[s]));
      }
    }
  }
}

// ═══ TEMPORAL GENOME COMPETITION — NO SAFETY RAILS ═══
// Reversion is human fear. Let lineages die.
// If genome drifts into extinction, the system RESTARTS from motifs.
// That IS information — failed lineages are discarded.
function archiveGenome(){
  const snapshot={
    params:{
      entropyBaseline:genome.entropyBaseline,
      entropyK:genome.entropyK,
      entrainRate:genome.entrainRate,
      entrainThresh:genome.entrainThresh,
      creationCost:genome.creationCost,
      objWeights:[...genome.objWeights]
    },
    fitness:currentFitness,
    tick:genome.totalTicks
  };
  genomeArchive.push(snapshot);
  if(genomeArchive.length>ARCHIVE_SIZE)genomeArchive.shift();
  // PERSIST TO LOCALSTORAGE — survives page close
  try{const g=encodeGenome();if(g.length<500000)localStorage.setItem('selection_genome',g)}catch(e){}
}

function checkExtinction(){
  let alive=0;
  for(let i=0;i<N;i++)if(palive[i])alive++;

  if(alive<genome.extinctionThresh&&tick>500){
    genome.extinctions++;
    extinctionCount++;
    lastExtinctionTick=genome.totalTicks;

    genome.lineage.push({
      t:genome.totalTicks,event:'extinction',
      cause:selfModel.trend<0?'decline':'collapse',
      lastFitness:+(currentFitness.toFixed(3)),
      mutRate:+(genome.mutationRate.toFixed(3))
    });
    if(genome.lineage.length>4)genome.lineage.shift();
    recordEvent('extinction',{alive,fit:+currentFitness.toFixed(3),mut:+genome.mutationRate.toFixed(3)});

    genome.generation++;
    try{const g2=encodeGenome();if(g2.length<500000)localStorage.setItem('selection_genome',g2)}catch(e){}
    N=0;
    const n=Math.min(300,(W*H/3000)|0);

    if(genome.stableMotifs.length>0){
      const motifCount=Math.floor(n*genome.culturalBias);
      for(let i=0;i<motifCount;i++){
        const motif=genome.stableMotifs[Math.random()*genome.stableMotifs.length|0];
        const tv=new Float32Array(DIMS);
        for(let d=0;d<DIMS;d++)tv[d]=motif.t[d]+(Math.random()-0.5)*0.2;
        addParticle(Math.random()*W,Math.random()*H,tv,false);
      }
      for(let i=motifCount;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
    }else{
      for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
    }

    // Post-extinction mutation burst — higher mutation for one cycle
    const savedRate=genome.mutationRate;
    genome.mutationRate=Math.min(0.25,genome.mutationRate*2);
    mutateGenome();
    genome.mutationRate=savedRate;

    currentFitness=0;fitnessSamples=0;
    // Pe25 Layer 15: clear credit-trace state across extinction so the first
    // post-extinction tick doesn't see a giant spurious fitness delta.
    genome.prevSmoothedFitness=0;
    genome.objCreditTrace=[0,0,0,0];
    genome.prevObjValues=[0,0,0,0];
    for(const s of genome.fitnessSensors){s.creditTrace=0;s.prevEmit=0;s.lastEmit=0;}
    // Pe34 Layer 24: clear prediction-error accumulators; post-extinction the neighbor
    // model arrays will be stale references to particles that may not exist anymore.
    predictionErrorAccum=0;
    predictionUpdateCount=0;
    predictionQueriedCount=0; // Pe35 Layer 24b
    genomeArchive.length=0;
    genome.currentStableStreak=0;
    saveGenome();
    return true;
  }
  return false;
}

// ═══ D. REAL BOUNDARY INFERENCE — MULTI-DIMENSIONAL ═══
// Track prediction errors across ALL structural dimensions.
// A spike in ANY dimension = inferred external event.
function inferBoundary(){
  const dims=['pop','coherence','clusters','diversity'];
  let anomalyScore=0;

  for(const dim of dims){
    const err=Math.abs(selfModel.errors[dim]);
    // Compare to rolling baseline variance for this dimension
    anomalyScore+=err;
  }

  // Store composite error for rolling baseline
  selfModel.errorHistory.push(anomalyScore);
  if(selfModel.errorHistory.length>20)selfModel.errorHistory.shift();

  // Compute baseline: mean + 2*std of recent errors
  if(selfModel.errorHistory.length>5){
    const mean=selfModel.errorHistory.reduce((a,b)=>a+b,0)/selfModel.errorHistory.length;
    const variance=selfModel.errorHistory.reduce((a,b)=>a+(b-mean)*(b-mean),0)/selfModel.errorHistory.length;
    const threshold=mean+2*Math.sqrt(variance)+0.1;

    if(anomalyScore>threshold*2){
      selfModel.inferredExogenous=true;
      // System recognizes external perturbation from multi-dimensional mismatch
      // Response is subject to weight mutation — not hardcoded
    }else{
      selfModel.inferredExogenous=false;
    }
  }
}

function clusterDiversity(){
  if(clusters.length<2)return 0;
  // Average pairwise tendency distance between cluster centroids
  let totalDist=0,pairs=0;
  for(let i=0;i<clusters.length;i++){
    for(let j=i+1;j<clusters.length;j++){
      let d=0;
      for(let dd=0;dd<DIMS;dd++){
        const diff=clusters[i].tendency[dd]-clusters[j].tendency[dd];
        d+=diff*diff;
      }
      totalDist+=Math.sqrt(d);
      pairs++;
    }
  }
  return pairs>0?Math.min(1,totalDist/pairs):0;
}

// EXOGENOUS PERTURBATIONS
// Random noise the system cannot predict.
// Forces distinction between self and environment.
// ═══════════════════════════════════════
function exogenousPerturbation(){
  if(Math.random()>0.003)return; // rare, unpredictable
  // NO COUNTER. NO BOOKKEEPING. The system is not told this happened.
  // It must infer from prediction error alone.
  const type=Math.random();
  if(type<0.33){
    // Amplitude storm — random subset loses amplitude
    const cx=Math.random()*W,cy=Math.random()*H,r=50+Math.random()*100;
    for(let i=0;i<N;i++){
      if(!palive[i])continue;
      const dx=px[i]-cx,dy=py[i]-cy;
      if(dx*dx+dy*dy<r*r){
        amp[i]*=0.7;
        phase[i]+=(Math.random()-0.5)*1.5;
      }
    }
    addShock(cx,cy,0.6,80,60,120);
  }else if(type<0.66){
    // Phase scramble — region loses coherence
    const cx=Math.random()*W,cy=Math.random()*H,r=80+Math.random()*80;
    for(let i=0;i<N;i++){
      if(!palive[i])continue;
      const dx=px[i]-cx,dy=py[i]-cy;
      if(dx*dx+dy*dy<r*r){
        phase[i]=Math.random()*Math.PI*2;
        freq[i]+=(Math.random()-0.5)*0.01;
      }
    }
    addShock(cx,cy,0.4,60,120,80);
  }else{
    // Tendency injection — foreign tendency vector floods a region
    const cx=Math.random()*W,cy=Math.random()*H,r=60+Math.random()*60;
    const foreign=randomTendency();
    for(let i=0;i<N;i++){
      if(!palive[i])continue;
      const dx=px[i]-cx,dy=py[i]-cy;
      if(dx*dx+dy*dy<r*r){
        for(let d=0;d<DIMS;d++)tend[i*DIMS+d]+=(foreign[d]-tend[i*DIMS+d])*0.3;
      }
    }
    addShock(cx,cy,0.5,120,100,60);
  }
}

// ═══ TERRITORIAL FIELD HELPERS ═══
function fieldAffinity(fieldIdx,clusterSig){
  if(!clusterSig)return 0.5;
  const sBase=fieldIdx*FIELD_SIG_DIMS;
  const own=fieldOwnership[fieldIdx];
  if(own<0.05)return 0.8;
  let dot=0,nA=0,nB=0;
  for(let s=0;s<FIELD_SIG_DIMS;s++){
    dot+=fieldSig[sBase+s]*clusterSig[s];
    nA+=fieldSig[sBase+s]*fieldSig[sBase+s];
    nB+=clusterSig[s]*clusterSig[s];
  }
  const sim=dot/(Math.sqrt(nA*nB)+0.001);
  return 0.35+0.65*Math.max(0,(sim+1)*0.5)*own+(1-own)*0.5;
}

function stampField(fieldIdx,clusterSig,energy){
  if(!clusterSig)return;
  const sBase=fieldIdx*FIELD_SIG_DIMS;
  const blendRate=Math.min(0.3,energy*0.15);
  for(let s=0;s<FIELD_SIG_DIMS;s++){
    fieldSig[sBase+s]+=(clusterSig[s]-fieldSig[sBase+s])*blendRate;
  }
  fieldOwnership[fieldIdx]=Math.min(1,fieldOwnership[fieldIdx]+blendRate*0.5);
}

function getParticleSig(i){
  const cid=clusterID[i];
  if(cid<0)return null;
  const cIdx=cid<MAX_CLUSTERS?clusterByID[cid]:-1;
  if(cIdx<0)return null;
  return clusters[cIdx].fieldSignature||null;
}

// ═══ LAYER 10: PARTICLE REFLEXIVITY ENGINE ═══
function updateParticleReflex(){
  const sampleRate=genome.reflexSampleRate||0.15;
  const depth=Math.max(2,Math.min(REFLEX_DEPTH,Math.round(genome.reflexDepth||4)));
  const decay=genome.reflexDecay||0.95;

  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    if(Math.random()>sampleRate)continue;

    amp[i]-=genome.metabolicCost*2;

    const ridx=pReflexIdx[i]%depth;
    const base=i*REFLEX_DEPTH*2+ridx*2;
    pReflexHist[base]=amp[i];
    pReflexHist[base+1]=localRes[i];
    pReflexIdx[i]++;

    const recentInteractions=pMem[i*MEM_SIZE+6];
    pInteractionDensity[i]=pInteractionDensity[i]*0.8+recentInteractions*0.2;

    const rBase=i*REFLEX_DIMS;
    const nSamples=Math.min(pReflexIdx[i],depth);

    if(nSamples>=2){
      let recentAmp=0,olderAmp=0,recentN=0,olderN=0;
      let peakRes=0;
      for(let s=0;s<nSamples;s++){
        const sIdx=((pReflexIdx[i]-1-s)%depth+depth)%depth;
        const sBase=i*REFLEX_DEPTH*2+sIdx*2;
        const sAmp=pReflexHist[sBase];
        const sRes=pReflexHist[sBase+1];
        const weight=Math.pow(decay,s);
        if(s<nSamples/2){recentAmp+=sAmp*weight;recentN+=weight}
        else{olderAmp+=sAmp*weight;olderN+=weight}
        if(sRes>peakRes)peakRes=sRes;
      }
      recentAmp=recentN>0?recentAmp/recentN:amp[i];
      olderAmp=olderN>0?olderAmp/olderN:amp[i];

      pReflexState[rBase]=(recentAmp-olderAmp)*10;
      pReflexState[rBase]=Math.max(-2,Math.min(2,pReflexState[rBase]));

      pReflexState[rBase+1]=peakRes;
      pReflexState[rBase+2]=Math.max(0,Math.min(1,1-pInteractionDensity[i]*0.5));
      pReflexState[rBase+3]=Math.min(2,page[i]/500);
    }else{
      pReflexState[rBase]=0;
      pReflexState[rBase+1]=0;
      pReflexState[rBase+2]=0.5;
      pReflexState[rBase+3]=0;
    }
  }
}

function updateClusterReflex(){
  const minAge=genome.clusterReflexAge||5;

  for(const c of clusters){
    if(c.persistAge<minAge)continue;

    if(!c.reflex){
      c.reflex={
        ampHistory:[],
        sizeHistory:[],
        coherenceHistory:[],
        trend:0,
        cohesionTrend:0,
        threatLevel:0,
        selfRecognition:0
      };
    }

    const r=c.reflex;

    r.ampHistory.push(c.avgAmp);
    r.sizeHistory.push(c.size);
    r.coherenceHistory.push(c.coherence);
    if(r.ampHistory.length>8)r.ampHistory.shift();
    if(r.sizeHistory.length>8)r.sizeHistory.shift();
    if(r.coherenceHistory.length>8)r.coherenceHistory.shift();

    if(r.sizeHistory.length>=3){
      const recent=r.sizeHistory.slice(-2).reduce((a,b)=>a+b,0)/2;
      const older=r.sizeHistory.slice(0,2).reduce((a,b)=>a+b,0)/2;
      r.trend=Math.max(-1,Math.min(1,(recent-older)/(Math.max(1,older))*5));
    }

    if(r.coherenceHistory.length>=3){
      const recent=r.coherenceHistory.slice(-2).reduce((a,b)=>a+b,0)/2;
      const older=r.coherenceHistory.slice(0,2).reduce((a,b)=>a+b,0)/2;
      r.cohesionTrend=Math.max(-1,Math.min(1,(recent-older)*10));
    }

    r.threatLevel=Math.max(0,Math.min(1,
      (-r.trend*0.5)+(-r.cohesionTrend*0.3)+(c.size<4?0.3:0)
    ));

    r.selfRecognition=Math.min(1,c.persistAge/20);

    c.reflexTrend=r.trend;
    c.reflexThreat=r.threatLevel;
    c.reflexRecognition=r.selfRecognition;
    c.reflexCohesion=r.cohesionTrend;
  }
}

// === HELPERS ===
function tendSim(i,j){
  let dot=0,ni=0,nj=0;
  for(let d=0;d<DIMS;d++){
    dot+=tend[i*DIMS+d]*tend[j*DIMS+d];
    ni+=tend[i*DIMS+d]*tend[i*DIMS+d];
    nj+=tend[j*DIMS+d]*tend[j*DIMS+d];
  }
  return dot/(Math.sqrt(ni*nj)+0.001);
}
function randomTendency(){
  const v=new Float32Array(DIMS);
  let norm=0;
  for(let d=0;d<DIMS;d++){v[d]=Math.random()*2-1;norm+=v[d]*v[d]}
  norm=Math.sqrt(norm)||1;
  const scale=0.3+Math.random()*0.7;
  for(let d=0;d<DIMS;d++)v[d]=v[d]/norm*scale;
  return v;
}
function hslToRgb(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const cc=(1-Math.abs(2*l-1))*s,x=cc*(1-Math.abs((h/60)%2-1)),m=l-cc/2;
  let r=0,g=0,b=0;
  if(h<60){r=cc;g=x}else if(h<120){r=x;g=cc}else if(h<180){g=cc;b=x}
  else if(h<240){g=x;b=cc}else if(h<300){r=x;b=cc}else{r=cc;b=x}
  return[(r+m)*255,(g+m)*255,(b+m)*255];
}
function addParticle(x,y,tv,born,parentA,parentB){
  if(N>=CAP)return-1;
  const i=N++;
  px[i]=x;py[i]=y;
  vx[i]=(Math.random()-.5)*(born?2:.3);vy[i]=(Math.random()-.5)*(born?2:.3);
  for(let d=0;d<DIMS;d++)tend[i*DIMS+d]=tv?tv[d]:0;
  phase[i]=Math.random()*Math.PI*2;freq[i]=0.02+Math.random()*0.04;
  amp[i]=born?0.5:0.3+Math.random()*0.5;
  palive[i]=1;page[i]=0;localRes[i]=0;collapse[i]=0;clusterID[i]=-1;
  echoIdx[i]=0;
  for(let e=0;e<EL;e++){echox[i*EL+e]=x;echoy[i*EL+e]=y}
  for(let m=0;m<MEM_SIZE;m++){
    let val=0;
    if(parentA>=0&&parentA<N)val+=pMem[parentA*MEM_SIZE+m]*0.65;
    if(parentB>=0&&parentB<N)val+=pMem[parentB*MEM_SIZE+m]*0.35;
    pMem[i*MEM_SIZE+m]=val+(Math.random()-0.5)*0.15;
  }
  pPlasmidLen[i]=0;
  if(parentA>=0&&parentA<N&&pPlasmidLen[parentA]>0){
    const donor=parentA;
    const nP=pPlasmidLen[donor];
    pPlasmidLen[i]=nP;
    for(let p=0;p<nP*4;p++){
      pPlasmid[i*PLASMID_SLOTS+p]=pPlasmid[donor*PLASMID_SLOTS+p];
    }
    for(let p=0;p<nP;p++){
      if(Math.random()<0.15){
        pPlasmid[i*PLASMID_SLOTS+p*4+3]+=(Math.random()-0.5)*0.2;
      }
    }
  }
  return i;
}
function addCompound(x,y,nt,nvx,nvy,na,np,nf,parentA,parentB){
  if(N>=CAP)return-1;
  const i=N++;
  px[i]=x;py[i]=y;vx[i]=nvx;vy[i]=nvy;
  for(let d=0;d<DIMS;d++)tend[i*DIMS+d]=nt[d];
  phase[i]=np;freq[i]=nf;amp[i]=na;
  palive[i]=1;page[i]=0;localRes[i]=0;collapse[i]=0;clusterID[i]=-1;
  echoIdx[i]=0;
  for(let e=0;e<EL;e++){echox[i*EL+e]=x;echoy[i*EL+e]=y}
  for(let m=0;m<MEM_SIZE;m++){
    let val=0;
    if(parentA>=0&&parentA<N)val+=pMem[parentA*MEM_SIZE+m]*0.65;
    if(parentB>=0&&parentB<N)val+=pMem[parentB*MEM_SIZE+m]*0.35;
    pMem[i*MEM_SIZE+m]=val+(Math.random()-0.5)*0.15;
  }

function computeVisuals(i){

function applyEntropy(){
  const deaths=[];
  deathsThisTick=0;
  const densityCost=(genome.densityCostK||0.00003)*Math.max(0,N-100);
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    amp[i]-=genome.entropyBaseline;
    amp[i]-=densityCost;
    amp[i]+=localRes[i]*genome.entropyK;
    if(isNaN(amp[i]))amp[i]=0;
    if(amp[i]<genome.deathThreshold){
      deaths.push(i);deathsThisTick++;deathsByPhysics++;
      addBits(px[i],py[i],2,pR[i],pG[i],pB[i],0.3);
      palive[i]=0;
    }
    if(amp[i]>1.2)amp[i]=1.2;
  }
  for(let d=0;d<deaths.length;d++){
    const di=deaths[d];
    const deadAmp=Math.max(0.05,amp[di]+genome.deathThreshold);
    const gx=(px[di]/CELL)|0,gy=(py[di]/CELL)|0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const nnx=gx+dx,nny=gy+dy;
      if(nnx<0||nny<0||nnx>=gW||nny>=gH)continue;
      let j=grid[nny*gW+nnx];
      let _lc=0;while(j>=0&&j<CAP&&_lc++<CAP){
        if(palive[j]){
          const ddx=px[di]-px[j],ddy=py[di]-py[j];
          const dist=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dist<CELL&&dist>0){
            const sim=tendSim(di,j);
            if(sim>0.1){amp[j]-=deadAmp*sim*(1-dist/CELL)*0.15;phase[j]+=(Math.random()-0.5)*deadAmp*sim*0.3}
          }
        }
        j=pnext[j];
      }
    }
  }
}

        case 9:{const pwx=Math.floor(px[i]/(W/FIELD_W)),pwy=Math.floor(py[i]/(H/FIELD_H));const pwi=Math.max(0,Math.min(FIELD_W*FIELD_H-1,pwy*FIELD_W+pwx));field[pwi]+=vmRegs[si]*k;field[pwi]=Math.max(0,Math.min(2.5,field[pwi]));stampField(pwi,getParticleSig(i),Math.abs(vmRegs[si]*k));}break;
        case 10:{if(clusterID[i]>=0){const cIdx10p=clusterID[i]<MAX_CLUSTERS?clusterByID[clusterID[i]]:-1;if(cIdx10p>=0){const c=clusters[cIdx10p];const cfx2=Math.floor(c.cx/(W/FIELD_W)),cfy2=Math.floor(c.cy/(H/FIELD_H));const cfi2=Math.max(0,Math.min(FIELD_W*FIELD_H-1,cfy2*FIELD_W+cfx2));field[cfi2]+=vmRegs[si]*k;field[cfi2]=Math.max(0,Math.min(2.5,field[cfi2]));stampField(cfi2,c.fieldSignature,Math.abs(vmRegs[si]*k));}}}break;
