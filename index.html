          const pphiProf=genome.partnerPhaseInfluence||0;
          vmRegs[di]=0.0*pphiProf*(k||1);
        }break;
        case 53:{                       // INTERACTION_DIST (Pe69) → neutral mid-range stub
          // Profiler has no live particle pair distance. Use 0.5 (mid-range) as a
          // neutral stub — same reasoning as proximity (R2=0.5) for profiling.
          // Distance-conditional strategies will only differentiate in live simulation
          // where actual distances vary.
          const idiProf=genome.interactionDistInfluence||0;
          vmRegs[di]=0.5*idiProf*(k||1);
        }break;
        case 54:{                       // FIELD1_TEMPORAL (Pe70) → small positive rate stub
          // Profiler has no live field1Prev state. Return a small positive delta stub so
          // genomes using opcode 54 produce a plausible non-trivial phenotype profile.
          // 0.03 represents a gentle rising rate — same stub value as opcode 33 (FIELD2_TEMPORAL).
          const f1tiProf=genome.fieldTemporalInfluence||0;
          vmRegs[di]=0.03*f1tiProf*(k||1);
        }break;
      }
      for(let r=0;r<12;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
    }

    for(let a=0;a<7;a++)totals[a]+=vmActions[a];
    totalInst+=nInst;
  }

  const n=tests.length;
  vmPhenotype.force=totals[0]/n;
  vmPhenotype.phaseShift=totals[1]/n;
  vmPhenotype.ampTransfer=totals[2]/n;
  vmPhenotype.tendBleed=totals[3]/n;
  vmPhenotype.spawnDrive=totals[4]/n;
  vmPhenotype.sigModulate=totals[5]/n;
  vmPhenotype.mutPressure=totals[6]/n;
  vmPhenotype.avgCost=totalInst*genome.metabolicCost/n;
  vmPhenotype.lastProfileTick=genome.totalTicks;
}

// ═══ LAYER 11: META-SENSING (Pe23) ═══
// Pe22 already collected trajectory data into `inst.*` arrays for the dashboard.
// Visible to the external observer, invisible to selection. Pe23 closes that loop.
// Helpers below derive trajectory observables from the existing instrumentation.
// They are pure reads — they create no behaviour, only channels.
function instSlope(arr,w){
  if(!arr||arr.length<w*2)return 0;
  let recent=0,prev=0;
  for(let i=arr.length-w;i<arr.length;i++)recent+=arr[i];
  for(let i=arr.length-2*w;i<arr.length-w;i++)prev+=arr[i];
  return (recent-prev)/w;
}
function instVar(arr,w){
  if(!arr||arr.length<w)return 0;
  let m=0;
  for(let i=arr.length-w;i<arr.length;i++)m+=arr[i];
  m/=w;
  let v=0;
  for(let i=arr.length-w;i<arr.length;i++){const d=arr[i]-m;v+=d*d;}
  return v/w;
}
function oldestMotifAge(){
  const M=genome.stableMotifs;
  if(!M||M.length===0)return 0;
  let a=0;
  for(const m of M){if((m.age|0)>a)a=m.age|0;}
  return a;
}

// ═══ EVOLVABLE FITNESS SENSORS ═══
// Short bytecode programs that measure novel properties of the system state.
// Each sensor reads from state registers, computes a scalar, and contributes
// to fitness with its own evolved weight. The system discovers what to value.
//
// State registers (Pe23: expanded 8 → 16; existing sensors using 0-7 still work):
//   S0=stability, S1=avgCoherence, S2=diversity, S3=clusterCount,
//   S4=avgAmp, S5=fieldEnergy, S6=persistentRatio, S7=collapseRisk
// META-SENSING channels (trajectory & meta-state, sourced from inst.*):
//   S8=fitnessSlope, S9=populationSlope, S10=mutationRate, S11=vmEntropy,
//   S12=motifAge, S13=extinctionDensity, S14=hgtRate, S15=fitnessVariance
//
// Pe24 Layer 14: useRealWeight flag selects which weight contributes to EMIT.
//   false (default) = sensor.weight       → drives shadow-scenario scoring (Pe22 path)
//   true            = sensor.realWeight   → drives actual currentFitness (Pe24 new path)
// Sensors that prove useful as real selection pressures evolve realWeight up.
// If real-fitness participation doesn't help, realWeight drifts to zero.
function evaluateSensors(useRealWeight){
  const sensors=genome.fitnessSensors;
  if(!sensors||sensors.length===0)return 0;

  // Build state register bank
  const alive=palive.reduce((a,v,i)=>a+(i<N&&v?1:0),0);
  const fieldEnergy=field.reduce((a,b)=>a+b,0)/300;
  const persistent=clusters.filter(c=>c.persistAge>3).length;
  const avgAmp_=alive>0?amp.reduce((a,v,i)=>a+(i<N&&palive[i]?v:0),0)/alive:0;

  const S=new Float32Array(16);
  // Current-state registers (S0-S7) — unchanged from Pe22.
  S[0]=selfModel.stability||0;
  S[1]=selfModel.avgCoherence||0;
  S[2]=selfModel.diversity||0;
  S[3]=clusters.length/10; // normalized
  S[4]=avgAmp_;
  S[5]=fieldEnergy;
  S[6]=clusters.length>0?persistent/clusters.length:0;
  S[7]=selfModel.collapseRisk||0;

  // Pe23 META-SENSING: trajectory & meta-state registers (S8-S15).
  // All values derived from data the dashboard was already collecting.
  // Clipped to a sensible range so sensor arithmetic stays well-behaved.
  S[8]=Math.max(-4,Math.min(4,instSlope(inst.fitness,3)*10));        // direction & rate of fitness change
  S[9]=Math.max(-4,Math.min(4,instSlope(inst.population,3)/20));     // direction & rate of population change
  S[10]=Math.min(4,(genome.mutationRate||0)*16);                     // current mutation rate (scaled)
  S[11]=Math.min(4,calcVMEntropy()/3);                                // VM program opcode entropy (~0..1)
  S[12]=Math.min(4,oldestMotifAge()/20);                              // age of oldest stable motif (memory depth)
  S[13]=Math.min(4,(genome.extinctions||0)/50);                       // accumulated extinctions (cycle pressure)
  S[14]=Math.min(4,(inst.hgtRate.length>0?inst.hgtRate[inst.hgtRate.length-1]:0)/20); // recent HGT events
  S[15]=Math.min(4,instVar(inst.fitness,5)*40);                       // fitness volatility (oscillation signature)

  let totalScore=0;
  let totalWeight=0;

  for(const sensor of sensors){
    // Pe24: pick which weight drives this sensor's contribution.
    const w=useRealWeight?(sensor.realWeight||0):sensor.weight;
    // Pe25 Layer 15: during the real pass we always execute the sensor program
    // even when realWeight=0, so its raw emit is tracked for credit assignment.
    // Without this, a new sensor (realWeight=0 by default) could never be nudged
    // toward real-fitness participation by the credit signal — chicken-and-egg.
    if(w===0&&!useRealWeight)continue;

    // Execute sensor program (pure computation, no side effects)
    const regs=new Float32Array(16);
    for(let r=0;r<16;r++)regs[r]=S[r]; // copy state
    let sensorEmit=0; // Pe25 Layer 15: raw (un-weighted) output for credit signal

    for(const inst of sensor.program){
      const[op,src,dst,k]=inst;
      const si=Math.abs(src)%16,di=Math.abs(dst)%16;
      switch(op){
        case 0:regs[di]=regs[si];break;
        case 1:regs[di]+=regs[si]*k;break;
        case 2:regs[di]*=regs[si]*(k||1);break;
        case 3:regs[di]=regs[si]>k?1:0;break;
        case 4:{ // EMIT — track raw output for credit, weighted output for fitness
          const e=regs[si]*k;
          sensorEmit+=e;
          if(w!==0){totalScore+=e*w;totalWeight+=Math.abs(w);}
          break;
        }
      }
      for(let r=0;r<16;r++)regs[r]=Math.max(-8,Math.min(8,regs[r]));
    }
    if(useRealWeight)sensor.lastEmit=sensorEmit; // Pe25 Layer 15
  }

  return totalWeight>0?totalScore/totalWeight:0;
}

// ═══ Pe25 LAYER 15: LOCAL CREDIT ASSIGNMENT ═══
// Called once per tick after fitness has been computed and smoothed.
// For each sensor and each designer axis, asks: did this component move in the
// same direction as fitness this tick? Accumulates a sign-based correlation
// (EMA, window ~100 ticks) and nudges the corresponding weight in the direction
// of accumulated correlation. The nudge per tick is small enough that lineage
// selection still adjudicates long-haul predictive vs. spuriously-correlated.
// creditLearnRate=0 reduces this to a no-op (Pe24 behavior recovered exactly).
function applyCreditAssignment(){
  const lr=Math.max(0,Math.min(3,genome.creditLearnRate||0));
  const df=currentFitness-(genome.prevSmoothedFitness||0);
  genome.prevSmoothedFitness=currentFitness;
  if(lr===0||!isFinite(df))return;
  // Deadzone on fitness delta — tiny movements are noise, not signal.
  // Without this, sensors get random updates during quiescent periods.
  const fitnessActive=Math.abs(df)>1e-5;
  const fSign=df>0?1:df<0?-1:0;

  // --- Per-sensor credit on realWeight ---
  // Sensors that move with fitness gain real-fitness participation; sensors
  // that move against it lose participation. New sensors (realWeight=0) can
  // bootstrap up from zero through this signal alone, no mutation required.
  const NUDGE=8e-5; // ~comparable to one mutation step per ~1000 ticks at trace=1
  for(const s of genome.fitnessSensors){
    const cur=+(s.lastEmit||0);
    const prev=+(s.prevEmit||0);
    const ds=cur-prev;
    s.prevEmit=cur;
    if(!fitnessActive||!isFinite(ds)||ds===0)continue;
    const sSign=ds>0?1:-1;
    // Pe26 Layer 16b: predictive credit blend.
    // Reactive: sign(ds) * sign(df) — sensor changed with fitness (existing Pe25 signal).
    // Predictive: sign(prev) * sign(df) — previous emit level predicted direction of fitness.
    // Blend rewards sensors that LEAD fitness, not just co-move. 60/40 split keeps
    // reactive dominant (it's more reliable) while rewarding early indicators.
    const prevSign=(prev>0.01?1:prev<-0.01?-1:0);
    const contribution=sSign*fSign*0.6+prevSign*fSign*0.4;
    s.creditTrace=((s.creditTrace||0)*0.99)+contribution*0.01;
    if(s.creditTrace>1)s.creditTrace=1;else if(s.creditTrace<-1)s.creditTrace=-1;
    s.realWeight=Math.max(-1,Math.min(1,(s.realWeight||0)+s.creditTrace*lr*NUDGE));
  }

  // --- Per-axis credit on objWeights (the 4 designer dimensions) ---
  // Lineages that benefit from valuing stability over diversity (or vice versa)
  // can find their own balance within their lifespan rather than waiting for
  // lineage selection to redistribute weight via random walk.
  const churn=clusters.filter(c=>c.persistAge<2).length/Math.max(1,clusters.length);
  const axes=[selfModel.stability||0,selfModel.diversity||0,selfModel.avgCoherence||0,churn];
  const pv=genome.prevObjValues;
  const trace=genome.objCreditTrace;
  for(let i=0;i<4;i++){
    const dv=axes[i]-pv[i];
    if(fitnessActive&&isFinite(dv)&&dv!==0){
      const vSign=dv>0?1:-1;
      const contribution=vSign*fSign;
      trace[i]=trace[i]*0.99+contribution*0.01;
      if(trace[i]>1)trace[i]=1;else if(trace[i]<-1)trace[i]=-1;
      genome.objWeights[i]=Math.max(0,genome.objWeights[i]+trace[i]*lr*NUDGE);
    }
    pv[i]=axes[i];
  }
  // Re-normalize objWeights to preserve the existing budget invariant (sum=1)
  const wSum=genome.objWeights.reduce((a,b)=>a+b,0);
  if(wSum>0){for(let i=0;i<4;i++)genome.objWeights[i]/=wSum;}
  else genome.objWeights=[0.25,0.25,0.25,0.25];

  // ═══ Pe29 Layer 19: SCENARIO CREDIT ═══
  // The currently-applied shadow scenario gets credited (or debited) based on whether
  // fitness is moving up or down during its tenure. Find the bank entry that matches
  // the last shadow winner's fingerprint and update its creditTrace.
  // Skipped if no winner yet (cold start) or if the matching scenario was evicted.
  if(lastShadowWinnerFingerprint&&fitnessActive&&Array.isArray(genome.shadowScenarioBank)){
    const fp=lastShadowWinnerFingerprint;
    let matchIdx=-1,bestDist=0.2; // tight match — same scenario, not just similar
    const bank=genome.shadowScenarioBank;
    for(let i=0;i<bank.length;i++){
      const dist=scenarioDist(bank[i],fp);
      if(dist<bestDist){bestDist=dist;matchIdx=i}
    }
    if(matchIdx>=0){
      const sc=bank[matchIdx];
      // EMA update — same coefficients as objCreditTrace for consistency
      const newTrace=((sc.creditTrace||0)*0.99)+fSign*0.01;
      sc.creditTrace=Math.max(-1,Math.min(1,newTrace));
    }
  }
}

function runShadowSim(){
  if(clusters.length<2)return;

  // ═══ A. TRUE CLUSTER GRAPH FORK ═══
  const graphState=clusters.map(c=>({
    size:c.size,
    tendency:c.tendency.slice(),
    coherence:c.coherence,
    avgAmp:c.avgAmp,
    persistAge:c.persistAge||0,
    cx:c.cx,cy:c.cy
  }));

  const nC=graphState.length;
  const interactions=new Float32Array(nC*nC);
  for(let i=0;i<nC;i++){
    for(let j=i+1;j<nC;j++){
      let tSim=0;
      for(let d=0;d<DIMS;d++)tSim+=graphState[i].tendency[d]*graphState[j].tendency[d];
      const dx=graphState[i].cx-graphState[j].cx,dy=graphState[i].cy-graphState[j].cy;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const proximity=Math.max(0,1-dist/(CELL*5));
      interactions[i*nC+j]=tSim*proximity;
      interactions[j*nC+i]=interactions[i*nC+j];
    }
  }

  // ═══ B. CLONE FIELD FOR EACH SCENARIO ═══
  // Each counterfactual future gets its own forked environment.
  // Pe27: scenario count and content come from genome.shadowScenarioBank.
  if(!Array.isArray(genome.shadowScenarioBank)||genome.shadowScenarioBank.length===0){
    genome.shadowScenarioBank=seedShadowBank();
  }
  const bank=genome.shadowScenarioBank;
  const nScen=Math.min(SHADOW_SCENARIOS_MAX,bank.length);
  const fieldScenarios=[];
  for(let s=0;s<nScen;s++){
    fieldScenarios.push(new Float32Array(field));
  }

  // Derive test deltas from bank entries: amplitude * per-axis test scale.
  // Pe32: physics AND behavioral deltas derived together.
  const deltas=new Array(nScen);
  const vmDeltas=new Array(nScen); // Pe32: per-scenario vmPhenotype perturbations
  for(let s=0;s<nScen;s++){
    const sc=bank[s];
    deltas[s]={
      e:sc.e*SCEN_TEST.e,
      k:sc.k*SCEN_TEST.k,
      r:sc.r*SCEN_TEST.r,
      c:sc.c*SCEN_TEST.c,
      t:sc.t*SCEN_TEST.t,
    };
    // Pe32: behavioral perturbation — each scenario imagines a different self.
    // Defaults to zero for legacy/physics-only scenarios (vmPhenotype unchanged).
    vmDeltas[s]={
      force:   (sc.f||0)*SCEN_TEST_VM.f,
      phaseShift:(sc.p||0)*SCEN_TEST_VM.p,
      ampTransfer:(sc.a||0)*SCEN_TEST_VM.a,
      tendBleed: (sc.tb||0)*SCEN_TEST_VM.tb,
      spawnDrive:(sc.sp||0)*SCEN_TEST_VM.sp,
      sigModulate:(sc.sm||0)*SCEN_TEST_VM.sm,
      mutPressure:(sc.mp||0)*SCEN_TEST_VM.mp,
    };
  }

  for(let s=0;s<nScen;s++){
    const d=deltas[s];
    const vd=vmDeltas[s]; // Pe32: behavioral delta for this scenario
    const fE=genome.entropyBaseline+d.e;
    const fK=genome.entropyK+d.k;
    const fR=genome.entrainRate+d.r;
    const fC=genome.creationCost+d.c;

    // Pe32: perturbed vmPhenotype for this counterfactual future.
    // "What if I were more/less attractive, bleedy, spawny, etc.?"
    const sForce=vmPhenotype.force+vd.force;
    const sPhaseShift=vmPhenotype.phaseShift+vd.phaseShift;
    const sAmpTransfer=vmPhenotype.ampTransfer+vd.ampTransfer;
    const sSpawnDrive=vmPhenotype.spawnDrive+vd.spawnDrive;
    const sCost=vmPhenotype.avgCost; // cost not perturbed — that's metabolic, not behavioral

    const sim=graphState.map(c=>({...c,tendency:c.tendency.slice()}));
    const fSim=fieldScenarios[s]; // forked field for this scenario

    for(let t=0;t<genome.shadowHorizon;t++){
      for(let i=0;i<sim.length;i++){
        // BASE PHYSICS
        sim[i].avgAmp-=fE;
        sim[i].avgAmp+=sim[i].coherence*fK*sim[i].size*0.1;

        // VM PHENOTYPE INFLUENCE — Pe32: uses perturbed phenotype per scenario
        const vmInf=genome.vmInfluence*genome.ruleScale*0.002;
        if(sForce>0)sim[i].coherence+=sForce*vmInf*0.02;
        else sim[i].coherence+=sForce*vmInf*0.01;
        sim[i].coherence+=Math.abs(sPhaseShift)*vmInf*0.01;
        sim[i].avgAmp+=sAmpTransfer*vmInf*0.005*sim[i].size;

        if(sSpawnDrive>0.1&&sim[i].avgAmp>0.3&&Math.random()<sSpawnDrive*vmInf*0.01){
          sim[i].size+=1;
          sim[i].avgAmp-=fC*0.2;
        }

        sim[i].avgAmp-=sCost*vmInf*sim[i].size*0.1;

        // Entrainment from neighbors
        for(let j=0;j<sim.length;j++){
          if(i===j)continue;
          const inter=interactions[i*nC+j];
          if(inter>0.1)sim[i].coherence+=(inter*fR-sim[i].coherence)*0.01;
        }

        // Creation
        if(sim[i].coherence>0.5&&sim[i].avgAmp>0.3&&Math.random()<0.02){
          sim[i].avgAmp-=fC*0.3;
          sim[i].size+=2;
        }

        // Death
        if(sim[i].avgAmp<0.1)sim[i].size=Math.max(0,sim[i].size-2);

        sim[i].avgAmp=Math.max(0,Math.min(1.2,sim[i].avgAmp));
        sim[i].coherence=Math.max(0,Math.min(1,sim[i].coherence));
      }

      // ═══ C. DIFFUSE + DECAY THE FORKED FIELD ═══
      // The imagined environment evolves alongside the imagined population
      for(let y=0;y<FIELD_H;y++){
        for(let x=0;x<FIELD_W;x++){
          const idx=y*FIELD_W+x;
          let sum=fSim[idx]*(1-FIELD_DIFFUSE*4);
          if(x>0)sum+=fSim[idx-1]*FIELD_DIFFUSE;
          if(x<FIELD_W-1)sum+=fSim[idx+1]*FIELD_DIFFUSE;
          if(y>0)sum+=fSim[(y-1)*FIELD_W+x]*FIELD_DIFFUSE;
          if(y<FIELD_H-1)sum+=fSim[(y+1)*FIELD_W+x]*FIELD_DIFFUSE;
          fSim[idx]=sum*FIELD_DECAY;
        }
      }
    }

    // ═══ D. SCORE OUTCOME — now includes engineered environment ═══
    const surviving=sim.filter(c=>c.size>2);
    const sPop=surviving.reduce((a,c)=>a+c.size,0);
    const sDiv=simDiversity(surviving);
    const sCoh=surviving.length>0?surviving.reduce((a,c)=>a+c.coherence,0)/surviving.length:0;
    const sNov=surviving.filter(c=>c.persistAge<2).length;
    const sField=fSim.reduce((a,b)=>a+b,0)/300; // how rich the engineered field remains

    const popDrift=Math.abs(sPop-selfModel.population)/Math.max(1,selfModel.population);
    const popScore=Math.max(0,1-popDrift);

    // GENOME-CONTROLLED FIELD WEIGHT — system discovers how much to value its environment
    const fw=genome.fieldWeight;
    const w=genome.objWeights;
    const wTotal=w[0]+w[1]+w[2]+w[3]+0.001;

    // EVOLVABLE FITNESS SENSORS — novel dimensions the system discovered
    const sensorScore=evaluateSensors();
    const sensorWeight=genome.fitnessSensors.reduce((a,s)=>a+Math.abs(s.weight),0);

    shadowResults[s]=(popScore*w[0]+sDiv*w[1]+sCoh*w[2]+(sNov/Math.max(1,nC))*w[3]+sField*fw+sensorScore*sensorWeight)/(wTotal+fw+sensorWeight);
  }

  // Apply winning scenario
  let bestS=0,bestV=-1;
  for(let s=0;s<nScen;s++){if(shadowResults[s]>bestV){bestV=shadowResults[s];bestS=s}}

  // Pe27: record the win on the actual bank entry. This is the credit signal that
  // drives bank evolution — winning scenarios survive eviction and seed children.
  bank[bestS].wins++;

  // Pe29 Layer 19: record fingerprint of the winning scenario. applyCreditAssignment
  // will use this to find the matching bank entry and update its creditTrace as
  // fitness moves over the next ~120 ticks (until the next shadow sim runs).
  // Pe32: fingerprint carries all 12 axes for matching.
  {
    const w=bank[bestS];
    lastShadowWinnerFingerprint={e:w.e,k:w.k,r:w.r,c:w.c,t:w.t,
      f:w.f||0,p:w.p||0,a:w.a||0,tb:w.tb||0,sp:w.sp||0,sm:w.sm||0,mp:w.mp||0};
  }

  // Pe26 Layer 16a: store direction of winning nudge for gradient-guided mutation.
  // Sign-only — magnitude comes from mutateGenome's perturbScale. Direction is the signal.
  // Pe32: extended to 12 axes (5 physics + 7 behavioral).
  const _wd=deltas[bestS];
  const _wv=vmDeltas[bestS]; // Pe32: behavioral delta directions
  lastShadowNudgeDir[0]=_wd.e>0?1:_wd.e<0?-1:0; // entropyBaseline
  lastShadowNudgeDir[1]=_wd.k>0?1:_wd.k<0?-1:0; // entropyK
  lastShadowNudgeDir[2]=_wd.r>0?1:_wd.r<0?-1:0; // entrainRate
  lastShadowNudgeDir[3]=_wd.c>0?1:_wd.c<0?-1:0; // creationCost
  lastShadowNudgeDir[4]=_wd.t>0?1:_wd.t<0?-1:0; // entrainThresh
  lastShadowNudgeDir[5]=_wv.force>0?1:_wv.force<0?-1:0;        // Pe32: force direction
  lastShadowNudgeDir[6]=_wv.phaseShift>0?1:_wv.phaseShift<0?-1:0; // Pe32: phase shift
  lastShadowNudgeDir[7]=_wv.ampTransfer>0?1:_wv.ampTransfer<0?-1:0; // Pe32: amp transfer
  lastShadowNudgeDir[8]=_wv.tendBleed>0?1:_wv.tendBleed<0?-1:0;    // Pe32: tend bleed
  lastShadowNudgeDir[9]=_wv.spawnDrive>0?1:_wv.spawnDrive<0?-1:0;  // Pe32: spawn drive
  lastShadowNudgeDir[10]=_wv.sigModulate>0?1:_wv.sigModulate<0?-1:0; // Pe32: sig modulate
  lastShadowNudgeDir[11]=_wv.mutPressure>0?1:_wv.mutPressure<0?-1:0; // Pe32: mut pressure

  // Pe27: derive applied nudge from the winning bank entry. Same axis-specific scales
  // as Pe26 at amplitude=±1, so Pe26-equivalent bank entries reproduce Pe26 behavior.
  const ps=genome.perturbScale;
  const sc=bank[bestS];
  genome.entropyBaseline=Math.max(0.0001,Math.min(0.003,genome.entropyBaseline+sc.e*SCEN_APPLY.e*ps));
  genome.entropyK      =Math.max(0.00005,Math.min(0.002,genome.entropyK      +sc.k*SCEN_APPLY.k*ps));
  genome.entrainRate   =Math.max(0.003,Math.min(0.05, genome.entrainRate     +sc.r*SCEN_APPLY.r*ps));
  genome.creationCost  =Math.max(0.1, Math.min(0.6,   genome.creationCost    +sc.c*SCEN_APPLY.c*ps));
  genome.entrainThresh =Math.max(0.08,Math.min(0.55,  genome.entrainThresh   +sc.t*SCEN_APPLY.t*ps));
  // Pe32: behavioral nudge is NOT applied directly to parameters (there's no "force"
  // genome field). Instead, lastShadowNudgeDir[5..11] is read by mutateGenome to bias
  // VM instruction mutations toward the winning behavioral direction. The translation
  // from phenotype direction to instruction-level bias happens there.
}

function simDiversity(cs){
  if(cs.length<2)return 0;
  let total=0,pairs=0;
  for(let i=0;i<cs.length;i++)for(let j=i+1;j<cs.length;j++){
    let d=0;
    for(let dd=0;dd<DIMS;dd++){const diff=cs[i].tendency[dd]-cs[j].tendency[dd];d+=diff*diff}
    total+=Math.sqrt(d);pairs++;
  }
  return pairs>0?Math.min(1,total/pairs):0;
}

// ═══ CLUSTER DIVERGENCE MEASUREMENT ═══
// Quantifies how different two clusters are in VM program + field signature + tendency.
// Used for observation, not to trigger events.
function clusterDivergence(a,b){
  if(!a||!b)return 0;
  // VM program distance: fraction of instructions that differ meaningfully
  let vmDist=0;
  const minLen=Math.min(a.vmProgram.length,b.vmProgram.length);
  const maxLen=Math.max(a.vmProgram.length,b.vmProgram.length);
  for(let i=0;i<minLen;i++){
    const ai=a.vmProgram[i],bi=b.vmProgram[i];
    if(ai[0]!==bi[0])vmDist+=0.5; // different opcode
    if(ai[1]!==bi[1]||ai[2]!==bi[2])vmDist+=0.25; // different registers
    vmDist+=Math.abs(ai[3]-bi[3])*0.15; // constant distance
  }
  vmDist+=(maxLen-minLen)*0.5; // length difference penalty
  vmDist=Math.min(1,vmDist/Math.max(1,maxLen));

  // Signature distance
  let sigDist=0;
  if(a.fieldSignature&&b.fieldSignature){
    for(let s=0;s<FIELD_SIG_DIMS;s++){
      sigDist+=Math.abs(a.fieldSignature[s]-b.fieldSignature[s]);
    }
    sigDist=Math.min(1,sigDist/FIELD_SIG_DIMS);
  }

  // Tendency distance
  let tendDist=0;
  for(let d=0;d<DIMS;d++){
    tendDist+=(a.tendency[d]-b.tendency[d])*(a.tendency[d]-b.tendency[d]);
  }
  tendDist=Math.min(1,Math.sqrt(tendDist));

  return vmDist*0.4+sigDist*0.35+tendDist*0.25;
}

// ═══ FULL GENOME MUTATION ═══
// Not just objective weights. EVERYTHING mutates.
// Including the mutation rate itself.
// ═══ INSTRUMENTATION — governance metrics time-series ═══
const INST_MAX=200; // max data points (rolling window)
const inst={
  ticks:[],           // tick stamps
  vmEntropy:[],       // Shannon entropy of VM program opcode distribution
  plasmidPop:[],      // fraction of particles carrying plasmids
  plasmidTotal:[],    // total plasmid instructions in population
  vmInfluence:[],     // genome.vmInfluence over time
  mutRate:[],         // genome.mutationRate over time
  fitness:[],         // currentFitness over time
  stability:[],       // selfModel.stability over time
  population:[],      // alive count over time
  deathsPhysics:[],   // deaths from amplitude decay (physics)
  deathsFitness:[],   // deaths we can attribute to evaluation pressure
  hgtRate:[],         // HGT events per measurement window
  avgPlasmidLen:[],   // average plasmid instructions per carrier
  opcodeHist:[],      // opcode frequency in global program over time
};
let deathsByPhysics=0,deathsByAge=0;
let hgtWindow=0; // HGT events since last measurement
let dashboardVisible=true; // always on — touch events unreliable at high particle counts

function calcVMEntropy(){
  const prog=genome.vmProgram;
  if(prog.length===0)return 0;
  const counts=new Array(11).fill(0);
  for(const inst of prog)counts[Math.min(10,inst[0])]++;
  let entropy=0;
  for(let i=0;i<11;i++){
    if(counts[i]===0)continue;
    const p=counts[i]/prog.length;
    entropy-=p*Math.log2(p);
  }
  return entropy; // max ~3 bits for 8 opcodes
}

function sampleInstrumentation(){
  const alive=selfModel.population||1;
  let plmParts=0,plmTotal=0;
  for(let i=0;i<N;i++){if(palive[i]&&pPlasmidLen[i]>0){plmParts++;plmTotal+=pPlasmidLen[i]}}

  inst.ticks.push(genome.totalTicks);
  inst.vmEntropy.push(+(calcVMEntropy().toFixed(3)));
  inst.plasmidPop.push(+(plmParts/Math.max(1,alive)).toFixed(3));
  inst.plasmidTotal.push(plmTotal);
  inst.vmInfluence.push(+(genome.vmInfluence.toFixed(3)));
  inst.mutRate.push(+(genome.mutationRate.toFixed(4)));
  inst.fitness.push(+(currentFitness.toFixed(3)));
  inst.stability.push(+(selfModel.stability.toFixed(3)));
  inst.population.push(alive);
  inst.deathsPhysics.push(deathsByPhysics);
  inst.deathsFitness.push(deathsByAge);
  inst.hgtRate.push(hgtWindow);
  inst.avgPlasmidLen.push(plmParts>0?+(plmTotal/plmParts).toFixed(2):0);

  // Opcode histogram snapshot
  const counts=new Array(11).fill(0);
  for(const instr of genome.vmProgram)counts[Math.min(10,instr[0])]++;
  inst.opcodeHist.push(counts.slice());

  // Reset counters
  deathsByPhysics=0;deathsByAge=0;hgtWindow=0;

  // Rolling window
  for(const key of Object.keys(inst)){
    if(inst[key].length>INST_MAX)inst[key].shift();
  }
}
// Runs on a subset of particles each mutation cycle (not all — too expensive)
// ═══ DASHBOARD OVERLAY — governance metrics as sparklines ═══
function renderDashboard(){
  if(!dashboardVisible||inst.ticks.length<3)return;

  const pad=8,lineH=28,chartW=120,chartH=18;
  const startX=W-chartW-pad-90,startY=pad+20;

  const nMetrics=8;
  X.fillStyle='rgba(0,0,0,0.7)';
  X.fillRect(startX-pad,startY-pad,chartW+90+pad*2,nMetrics*lineH+pad*2+20);

  X.font='9px monospace';X.textBaseline='middle';

  const metrics=[
    {name:'VMentrpy',data:inst.vmEntropy,color:'#88ccff',max:3.2},
    {name:'Plm pop%',data:inst.plasmidPop,color:'#ffcc44',max:1},
    {name:'vmInflnc',data:inst.vmInfluence,color:'#aa88ff',max:1},
    {name:'mutRate ',data:inst.mutRate,color:'#ff8866',max:0.5},
    {name:'fitness ',data:inst.fitness,color:'#66ff88',max:1},
    {name:'stabilty',data:inst.stability,color:'#88ffcc',max:1},
    {name:'pop     ',data:inst.population,color:'#cccccc',max:0},
    {name:'HGT/win ',data:inst.hgtRate,color:'#ffaa44',max:0},
  ];

  for(let m=0;m<metrics.length;m++){
    const met=metrics[m];
    const y=startY+m*lineH;
    const data=met.data;
    const len=data.length;
    if(len<2)continue;

    let dMax=met.max>0?met.max:Math.max(1,...data)*1.1;

    X.fillStyle=met.color;
    X.fillText(met.name,startX,y+chartH/2);

    const cur=data[len-1];
    X.fillStyle='#ffffff';
    X.fillText(typeof cur==='number'&&cur.toFixed?cur.toFixed(2):String(cur),startX+56,y+chartH/2);

    const cx=startX+88,cy=y;
    X.beginPath();
    for(let d=0;d<len;d++){
      const sx=cx+(d/(len-1))*chartW;
      const sy=cy+chartH-(data[d]/dMax)*chartH;
      if(d===0)X.moveTo(sx,sy);else X.lineTo(sx,sy);
    }
    X.strokeStyle=met.color;X.lineWidth=1;X.stroke();

    X.beginPath();X.moveTo(cx,cy+chartH);X.lineTo(cx+chartW,cy+chartH);
    X.strokeStyle='rgba(255,255,255,0.1)';X.lineWidth=0.5;X.stroke();
  }

  // Opcode distribution bar
  if(inst.opcodeHist.length>0){
    const y=startY+nMetrics*lineH;
    const hist=inst.opcodeHist[inst.opcodeHist.length-1];
    const total=hist.reduce((a,b)=>a+b,0)||1;
    const opColors=['#888','#8af','#a8f','#ff8','#f84','#4f8','#4af','#fa4','#0ed','#0be','#0fb'];
    X.fillStyle='rgba(255,255,255,0.5)';
    X.fillText('opcodes:',startX,y+9);
    let bx=startX+88;
    for(let o=0;o<11;o++){
      const w=(hist[o]/total)*chartW;
      X.fillStyle=opColors[o];
      X.fillRect(bx,y,Math.max(0.5,w),12);
      bx+=w;
    }
  }

  // ═══ PHYLOGENY + LINEAGE PANEL ═══
  const phyloX=pad+8;
  const phyloY=startY;
  const phyloW=180;

  // Gather living lineages with their clusters
  const lineageMap=new Map(); // lid → [clusters]
  for(const c of clusters){
    if(!c.lineageID)continue;
    if(!lineageMap.has(c.lineageID))lineageMap.set(c.lineageID,[]);
    lineageMap.get(c.lineageID).push(c);
  }

  const livingLineages=[...lineageMap.entries()].sort((a,b)=>{
    const ea=lineageRegistry.get(a[0]),eb=lineageRegistry.get(b[0]);
    return(ea?ea.birthTick:0)-(eb?eb.birthTick:0);
  });
  const nLin=Math.min(12,livingLineages.length);
  const phyloH=nLin*20+80;

  X.fillStyle='rgba(0,0,0,0.75)';
  X.fillRect(phyloX-pad,phyloY-pad,phyloW+pad*2,phyloH+pad*2);

  X.font='9px monospace';X.textBaseline='top';
  X.fillStyle='rgba(200,210,220,0.7)';
  X.fillText(`LINEAGES: ${livingLineages.length} alive, ${lineageRegistry.size} total`,phyloX,phyloY);

  // List living lineages with color, size, age, divergence
  for(let li=0;li<nLin;li++){
    const[lid,cls]=livingLineages[li];
    const entry=lineageRegistry.get(lid);
    if(!entry)continue;
    const y=phyloY+16+li*20;
    const col=entry.color;

    // Lineage color swatch
    X.fillStyle=`rgb(${col[0]|0},${col[1]|0},${col[2]|0})`;
    X.fillRect(phyloX,y+2,8,8);

    // Lineage info
    const totalSize=cls.reduce((a,c)=>a+c.size,0);
    const age=genome.totalTicks-entry.birthTick;
    const ageStr=age>6000?Math.floor(age/600)+'k':age>600?Math.floor(age/60)+'c':String(age);
    const buds=entry.budCount;
    const parentSym=entry.parentLineage>0?'←'+entry.parentLineage:'⊙';

    X.fillStyle='rgba(220,220,230,0.8)';
    X.fillText(`L${lid} ${cls.length}cl ${totalSize}p age:${ageStr} ${buds}bud ${parentSym}`,phyloX+12,y);
  }

  // Divergence matrix — pairwise divergence between living lineages (top 6)
  const topLineages=livingLineages.slice(0,6);
  if(topLineages.length>=2){
    const matY=phyloY+16+nLin*20+8;
    X.fillStyle='rgba(200,210,220,0.5)';
    X.fillText('DIVERGENCE:',phyloX,matY);

    const matStart=matY+12;
    const cellSz=14;
    for(let i=0;i<topLineages.length;i++){
      const[lidA,clsA]=topLineages[i];
      const colA=lineageRegistry.get(lidA)?.color||[128,128,128];
      // Row label
      X.fillStyle=`rgb(${colA[0]|0},${colA[1]|0},${colA[2]|0})`;
      X.fillRect(phyloX,matStart+i*cellSz+2,6,6);

      for(let j=i+1;j<topLineages.length;j++){
        const[lidB,clsB]=topLineages[j];
        // Compute divergence between representative clusters
        const repA=clsA[0],repB=clsB[0];
        const div=clusterDivergence(repA,repB);
        // Color: green=low divergence, red=high divergence
        const dR=Math.min(255,Math.floor(div*500));
        const dG=Math.min(255,Math.floor((1-div)*300));
        X.fillStyle=`rgba(${dR},${dG},60,0.7)`;
        X.fillRect(phyloX+10+j*cellSz,matStart+i*cellSz,cellSz-1,cellSz-1);
        // Value text
        X.fillStyle='rgba(255,255,255,0.7)';
        X.fillText(div.toFixed(1),phyloX+11+j*cellSz,matStart+i*cellSz+2);
      }
    }
  }
}

function evolvePlasmids(){
  const sampleSize=Math.min(N,Math.floor(N*0.085)+40); // scales with population

  for(let s=0;s<sampleSize;s++){
    const i=Math.floor(Math.random()*N);
    if(!palive[i])continue;

    let nP=pPlasmidLen[i];

    // Stress-induced evolvability (low amp = higher mutation)
    const stress=Math.max(0,1-amp[i]*1.65);
    const effectiveMutRate=genome.plasmidMutRate*(1+stress*5.5);

    for(let p=0;p<nP;p++){
      if(Math.random()>effectiveMutRate)continue;

      const base=i*PLASMID_SLOTS+p*4;
      const roll=Math.random();

      if(roll<0.38){
        // Gentle point mutation on constant
        pPlasmid[base+3]+=(Math.random()-0.5)*0.48;
        pPlasmid[base+3]=Math.max(-3.8,Math.min(3.8,pPlasmid[base+3]));
      }
      else if(roll<0.58){
        // Structural change (opcode or registers)
        if(Math.random()<0.5)pPlasmid[base]=Math.floor(Math.random()*OPCODE_COUNT);
        else{
          pPlasmid[base+1]=Math.floor(Math.random()*12);
          pPlasmid[base+2]=Math.floor(Math.random()*12);
        }
      }
      else if(roll<0.78&&nP<MAX_PLASMID){
        // DUPLICATION — prefer functional (EMIT) instructions, like HGT
        let srcP=p;
        const emitters=[];
        for(let k=0;k<nP;k++){
          if(pPlasmid[i*PLASMID_SLOTS+k*4]===4)emitters.push(k);
        }
        if(emitters.length>0&&Math.random()<0.65){
          srcP=emitters[Math.floor(Math.random()*emitters.length)];
        }
        const newBase=i*PLASMID_SLOTS+nP*4;
        for(let v=0;v<4;v++)pPlasmid[newBase+v]=pPlasmid[i*PLASMID_SLOTS+srcP*4+v];
        pPlasmid[newBase+3]+=(Math.random()-0.5)*0.35;
        pPlasmidLen[i]++;
        nP++;
      }
      else if(roll<0.88&&nP>1){
        // Deletion (rare, only when bloated)
        for(let q=p;q<nP-1;q++){
          for(let v=0;v<4;v++)pPlasmid[i*PLASMID_SLOTS+q*4+v]=pPlasmid[i*PLASMID_SLOTS+(q+1)*4+v];
        }
        pPlasmidLen[i]--;
        p--;
        nP--;
      }
      else if(nP>1){
        // Recombination — swap registers between two random instructions on same particle
        const p2=Math.floor(Math.random()*nP);
        if(p2===p)continue;
        const base2=i*PLASMID_SLOTS+p2*4;
        const tempSrc=pPlasmid[base+1];
        const tempDst=pPlasmid[base+2];
        pPlasmid[base+1]=pPlasmid[base2+1];
        pPlasmid[base+2]=pPlasmid[base2+2];
        pPlasmid[base2+1]=tempSrc;
        pPlasmid[base2+2]=tempDst;
      }
    }

    // Spontaneous generation — only in high-resonance environments
    if(nP<MAX_PLASMID&&Math.random()<genome.plasmidSpawnRate*(1+localRes[i]*4)){
      const newBase=i*PLASMID_SLOTS+nP*4;
      pPlasmid[newBase]=Math.floor(Math.random()*OPCODE_COUNT);
      pPlasmid[newBase+1]=Math.floor(Math.random()*12);
      pPlasmid[newBase+2]=Math.floor(Math.random()*12);
      pPlasmid[newBase+3]=(Math.random()-0.5)*0.75;
      pPlasmidLen[i]++;
    }
  }
}

// ═══ HORIZONTAL GENE TRANSFER ═══
// Runs once per mutation cycle (not per interaction!).
// Gated by peak resonance bond in the recent tick window.
// High resonance = the population is coherent = good time to share code.
// Copies 1-hgtMax instructions from the existing program, mutates slightly,
// and splices them back at random positions. Successful code duplicates.
function attemptHGT(){
  if(peakBondThisTick<0.4)return; // not enough resonance to trigger
  if(Math.random()>genome.hgtRate)return;
  if(genome.vmProgram.length>=genome.vmMaxInstructions-1)return;

  const transfers=1+Math.floor(Math.random()*Math.min(genome.hgtMax,genome.vmMaxInstructions-genome.vmProgram.length));

  for(let t=0;t<transfers;t++){
    if(genome.vmProgram.length>=genome.vmMaxInstructions)break;

    // Pick a source instruction (biased toward instructions that emit — they're "successful")
    let srcIdx;
    const emitters=genome.vmProgram.map((inst,idx)=>inst[0]===4?idx:-1).filter(x=>x>=0);
    if(emitters.length>0&&Math.random()<0.6){
      srcIdx=emitters[Math.floor(Math.random()*emitters.length)];
    }else{
      srcIdx=Math.floor(Math.random()*genome.vmProgram.length);
    }

    const donor=[...genome.vmProgram[srcIdx]];
    // Light mutation on transfer (conjugation isn't perfect copy)
    donor[3]+=(Math.random()-0.5)*genome.hgtSpliceNoise;
    donor[3]=Math.max(-2.5,Math.min(2.5,donor[3]));
    // Occasional opcode drift during transfer
    if(Math.random()<0.08)donor[0]=Math.floor(Math.random()*OPCODE_COUNT);

    const insertPos=Math.floor(Math.random()*(genome.vmProgram.length+1));
    genome.vmProgram.splice(insertPos,0,donor);
  }

  hgtEventsTotal++;
  hgtWindow++;
  peakBondThisTick=0; // reset after transfer
  commonsStrength=0; // reset so strongest writer wins each tick
  commonsWriter=-1;
}

// ═══ RESOURCE FIELD — shared writable environment with territorial signatures ═══
// Energy diffuses and decays. Signatures blend during diffusion (territory fades at edges).
// Ownership decays faster than energy — territory must be actively maintained.
function updateField(){
  // ═══ STAGE 1: CELL-LEVEL VM EXECUTION ═══
  // Each cell holds one VM instruction inscribed by particles.
  // Cells execute their instructions on local state: c1 (this cell, channel 1),
  // c2 (this cell, channel 2), nN/nS/nE/nW (neighbour channel 1 values).
  // No fixed vocabulary — just primitives. The system chooses which patterns survive.
  // Snapshot both channels first so all cells see consistent state.
  const f1Snap=field.slice();
  const f2Snap=field2.slice();
  for(let y=0;y<FIELD_H;y++){
    for(let x=0;x<FIELD_W;x++){
      const idx=y*FIELD_W+x;
      const strength=cellProgStr[idx];
      if(strength<0.05)continue;
      const op=cellProgOp[idx];
      const A=cellProgA[idx];
      const B=cellProgB[idx];
      // Local state available to the cell:
      const c1=f1Snap[idx];
      const c2=f2Snap[idx];
      const nN=y>0?f1Snap[idx-FIELD_W]:c1;
      const nS=y<FIELD_H-1?f1Snap[idx+FIELD_W]:c1;
      const nE=x<FIELD_W-1?f1Snap[idx+1]:c1;
      const nW=x>0?f1Snap[idx-1]:c1;
      const m2N=y>0?f2Snap[idx-FIELD_W]:c2;
      const m2S=y<FIELD_H-1?f2Snap[idx+FIELD_W]:c2;
      const m2E=x<FIELD_W-1?f2Snap[idx+1]:c2;
      const m2W=x>0?f2Snap[idx-1]:c2;
      const nbAvg1=(nN+nS+nE+nW)*0.25;
      const nbAvg2=(m2N+m2S+m2E+m2W)*0.25;
      // Pe22e: recipes are programs, not sums. Each monomial can read the
      // d1/d2 accumulated by earlier monomials, plus a literal 1.0 slot.
      // Coefs include ±1 alongside ±A,±B. Expression space within a single
      // tick is now arbitrary polynomial in local states, not just bilinear.
      let d1=0,d2=0;
      const recipe=genome.chemistryTable[op%12];
      if(recipe){
        const ls0=c1,ls1=c2,ls2=nN,ls3=nS,ls4=nE,ls5=nW,ls6=m2N,ls7=m2S,ls8=m2E,ls9=m2W,ls10=nbAvg1,ls11=nbAvg2;
        const lsArr=[ls0,ls1,ls2,ls3,ls4,ls5,ls6,ls7,ls8,ls9,ls10,ls11,1.0,0,0]; // [12]=1, [13]=d1, [14]=d2
        for(let mi=0;mi<recipe.length;mi++){
          const mono=recipe[mi];
          const cs=mono[0]%6, ta=mono[1]%15, tb=mono[2]%15, tgt=mono[3]&1;
          const coef=cs===0?A:cs===1?B:cs===2?-A:cs===3?-B:cs===4?1:-1;
          const contrib=coef*lsArr[ta]*lsArr[tb];
          if(!isFinite(contrib))continue; // blown intermediate: skip, keep executing
          if(tgt===0)d1+=contrib; else d2+=contrib;
          lsArr[13]=d1; lsArr[14]=d2; // feed accumulating outputs forward
        }
      }
      // Skeleton: if the recipe produced NaN/Infinity, zero the contribution for this cell
      if(!isFinite(d1))d1=0;
      if(!isFinite(d2))d2=0;
      // Apply, scaled by inscription strength
      field[idx]+=d1*strength*0.05;
      field2[idx]+=d2*strength*0.05;
      field[idx]=Math.max(0,Math.min(100,field[idx]));
      field2[idx]=Math.max(0,Math.min(100,field2[idx]));
      // Inscription decay — rules fade unless reinforced
      cellProgStr[idx]*=0.998;
    }
  }

  // ═══ STAGE 2: STANDARD DIFFUSION + DECAY ═══
  // Pe49: snapshot field2 before diffusion so the temporal derivative (field2 - field2Prev)
  // is available to VMs via opcode 33 this tick. Copying 1600 floats is negligible cost.
  // Pe70: snapshot field1 before diffusion for the same reason — opcode 54 (FIELD1_TEMPORAL).
  field2Prev.set(field2);
  field1Prev.set(field);
  for(let y=0;y<FIELD_H;y++){
    for(let x=0;x<FIELD_W;x++){
      const idx=y*FIELD_W+x;

      // Energy diffusion + decay — MEMORY-DEPENDENT
      // Cells with history decay slower. The world remembers what lived here.
      let sum=field[idx]*(1-FIELD_DIFFUSE*4);
      if(x>0)sum+=field[idx-1]*FIELD_DIFFUSE;
      if(x<FIELD_W-1)sum+=field[idx+1]*FIELD_DIFFUSE;
      if(y>0)sum+=field[(y-1)*FIELD_W+x]*FIELD_DIFFUSE;
      if(y<FIELD_H-1)sum+=field[(y+1)*FIELD_W+x]*FIELD_DIFFUSE;
      const memBonus=Math.min(0.015,fieldMemory[idx]*0.003); // history slows decay, max 0.015
      field[idx]=sum*(FIELD_DECAY+memBonus);
      if(isNaN(field[idx]))field[idx]=0;

      // Second channel — diffuses at slower rate
      const F2D=FIELD_DIFFUSE*0.5;
      let sum2=field2[idx]*(1-F2D*4);
      if(x>0)sum2+=field2[idx-1]*F2D;
      if(x<FIELD_W-1)sum2+=field2[idx+1]*F2D;
      if(y>0)sum2+=field2[(y-1)*FIELD_W+x]*F2D;
      if(y<FIELD_H-1)sum2+=field2[(y+1)*FIELD_W+x]*F2D;
      field2[idx]=sum2*FIELD_DECAY;
      if(isNaN(field2[idx]))field2[idx]=0;

      // Update field memory — writing to a cell accumulates history
      if(field[idx]>0.1){
        fieldMemory[idx]=Math.min(5,fieldMemory[idx]+0.001); // slow accumulation
      }else{
        fieldMemory[idx]*=0.9995; // very slow forgetting — scars last
      }

      // Signature diffusion — signatures blend at territory borders
      const sBase=idx*FIELD_SIG_DIMS;
      for(let s=0;s<FIELD_SIG_DIMS;s++){
        let sSum=fieldSig[sBase+s]*(1-FIELD_DIFFUSE*4);
        if(x>0)sSum+=fieldSig[(idx-1)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        if(x<FIELD_W-1)sSum+=fieldSig[(idx+1)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        if(y>0)sSum+=fieldSig[((y-1)*FIELD_W+x)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        if(y<FIELD_H-1)sSum+=fieldSig[((y+1)*FIELD_W+x)*FIELD_SIG_DIMS+s]*FIELD_DIFFUSE;
        fieldSig[sBase+s]=sSum*FIELD_DECAY;
      }

      // Ownership decays faster — territory must be actively maintained
      fieldOwnership[idx]*=0.975;
    }
  }
}

// ═══ Pe26 LAYER 16c: CLUSTER UPWARD SIGNAL ═══
// Successful persistent clusters donate motifs and genome signals upward.
// The buffer is consumed by mutateGenome. This closes the loop: particles → clusters
// was already present (cluster VMs, cluster genomes); clusters → global was the missing path.
// gradientUpstreamBias=0 makes this a no-op, recovering Pe25 behavior exactly.
// Pe30 Layer 20b: the scenario fossil is now the cluster's BIRTH-TIME snapshot
// (carried on c.scenarioFossil since trackClusterPersistence), not a fresh snapshot of
// the current top. A long-lived cluster carries a genuinely aged fossil — so when it
// drains into the bank, the source scenario is often already evicted and the
// resurrection path actually fires.
function collectClusterUpstream(){
  const ub=genome.gradientUpstreamBias||0;
  if(ub<=0.01)return;
  for(const c of clusters){
    // Qualification: old enough, coherent enough, energetically viable
    if(c.persistAge<6||c.coherence<0.45||c.avgAmp<0.38)continue;
    if(!c.vmProgram||c.vmProgram.length<2)continue;
    if(clusterUpstreamBuffer.length>=MAX_UPSTREAM_BUFFER)break;
    // Sample a 1-2 instruction motif from the cluster's VM
    const start=Math.floor(Math.random()*(c.vmProgram.length-1));
    const len=1+(Math.random()<0.5?1:0);
    const motif=[];
    for(let i=0;i<len&&start+i<c.vmProgram.length;i++){
      const inst=c.vmProgram[start+i];
      motif.push([inst[0],inst[1],inst[2],inst[3]]);
    }
    if(motif.length>0){
      // Pe30: the cluster's birth-time scenario fossil, packaged as a bank-ready
      // blueprint (counters zeroed, src tagged). Null if the cluster was born before
      // any scenario had won.
      const cf=c.scenarioFossil;
      const fossil=cf?{e:cf.e,k:cf.k,r:cf.r,c:cf.c,t:cf.t,
        f:cf.f||0,p:cf.p||0,a:cf.a||0,tb:cf.tb||0,sp:cf.sp||0,sm:cf.sm||0,mp:cf.mp||0,
        wins:0,age:0,src:'fossil',creditTrace:cf.creditTrace||0}:null;
      clusterUpstreamBuffer.push({
        motif,
        clusterGenome:c.clusterGenome?{...c.clusterGenome}:null,
        scenarioFossil:fossil, // Pe30: birth-time fossil, carried for the cluster's life
        quality:c.coherence*c.avgAmp*(1+c.persistAge*0.02) // signal strength
      });
    }
  }
}

function mutateGenome(){
  // Pe22b: substrate physics — defensive defaults for old genomes
  // (the actual mutation happens further down, after `rate` and `maybe` exist)
  if(genome.fieldDecay===undefined)genome.fieldDecay=0.982;
  if(genome.fieldDiffuse===undefined)genome.fieldDiffuse=0.11;
  // ═══ STRESS-RESPONSIVE MUTATION TIMING ═══
  // Mutation rate is modulated by: (a) genome parameter, (b) system stability, (c) VM pressure
  // Under collapse → mutate faster. Under stability → slower. VM code can push either way.
  const mutationPressure=mutPressureAccum;
  const stabilityFactor=Math.max(0.3,Math.min(2.0,
    1.0+(1.0-selfModel.stability)*0.8  // instability increases mutation
    -selfModel.stability*0.3            // stability decreases it
    +Math.tanh(mutationPressure)*0.4    // VM channel 6 pushes mutation rate
  ));
  const rate=genome.mutationRate*stabilityFactor;
  const scale=genome.mutationScale;
  mutPressureAccum=0; // reset accumulator for next cycle after snapshotting pressure

  // Pe26 Layer 16a: gradient-biased perturbation.
  // When collapseRisk is elevated, blend random walk with the direction the shadow sim
  // last found helpful. gradientBias=0 → pure random walk (Pe25 behavior).
  // The gradient nudge is kept smaller than the random component so it's a lean, not a lock.
  // Shadow sim still vets candidates after this step, so bad gradient directions get rejected.
  const gBias=Math.max(0,Math.min(1,genome.gradientBias||0));
  const risk=selfModel.collapseRisk||0;
  const gradientActive=gBias>0.05&&risk>0.25&&(lastShadowNudgeDir[0]!==0||lastShadowNudgeDir[2]!==0||lastShadowNudgeDir[3]!==0);

  // Helper: maybe mutate a value.
  // Pe22b — GLOVES OFF (revised). No spring, no prior, no restoring force.
  // The (min,max) arguments are historical — retained so callers don't break,
  // but they do nothing. Mutation is pure random walk, modulated only by the
  // stress-responsive rate/scale above. Skeleton-level sanity (NaN/Infinity) is
  // the ONLY surviving check. If the system wants a value of -47 or 12000, it
  // gets one. If that value produces crashes elsewhere, that's a finding, not
  // a failure to guard.
  function maybe(val,min,max,magnitude){
    if(Math.random()>rate)return val;
    const next=val+(Math.random()-0.5)*magnitude*scale;
    if(!isFinite(next))return val;
    return next;
  }
  // Gradient-biased version for physics parameters with a known shadow-nudge direction.
  // nudgeDir: ±1 direction from lastShadowNudgeDir, 0 = no prior signal.
  function gradMaybe(val,min,max,magnitude,nudgeDir){
    if(Math.random()>rate)return val;
    const randomStep=(Math.random()-0.5)*magnitude*scale;
    if(!gradientActive||nudgeDir===0){
      const next=val+randomStep;
      return isFinite(next)?next:val;
    }
    // Blend: random walk attenuated by gradient strength + directed step.
    // Attenuation keeps randomness alive — gradient is a lean, not a command.
    const gradientStrength=gBias*Math.min(1,risk*1.5);
    const step=randomStep*(1-gradientStrength*0.5)+nudgeDir*magnitude*gradientStrength*0.4;
    const next=val+step;
    return isFinite(next)?next:val;
  }

  // ═══ Pe37 Layer 26: ATTRIBUTION ═══
  // Ensure the credit registry exists.
  if(!genome.metaCredit||typeof genome.metaCredit!=='object')genome.metaCredit={};
  const mc=genome.metaCredit;
  for(const p of META_LAYER_PARAMS){
    if(!mc[p]||typeof mc[p]!=='object')mc[p]={trace:0,pendingDelta:0,fitAtApply:currentFitness};
  }
  const mcBias=Math.max(0,Math.min(0.5,genome.metaCreditBias||0));

  // Attribution phase: the perturbation captured LAST cycle has now run for an
  // interval; attribute the fitness change since then. EMA, clamped [-1,1].
  // Pe38: isolation-weight the attribution signal by concurrent perturbation count.
  // When many params move simultaneously, each one's attribution is noisier —
  // weight it down proportionally. Isolated perturbations carry the cleanest signal.
  let _activePerturbCount=0;
  for(const p of META_LAYER_PARAMS){
    const _e=mc[p];
    if(_e&&Math.abs(_e.pendingDelta||0)>1e-6)_activePerturbCount++;
  }
  // Scale: 1.0 when only one param perturbed, decays toward 0.2 as all 16 move together.
  const _isoWeight=Math.max(0.2,1-(_activePerturbCount-1)*0.055);

  for(const p of META_LAYER_PARAMS){
    const e=mc[p];
    if(!e)continue;
    if(Math.abs(e.pendingDelta)>1e-6){
      const dF=currentFitness-(e.fitAtApply||0);
      if(isFinite(dF)&&dF!==0){
        const attribution=(e.pendingDelta>0?1:-1)*(dF>0?1:-1)*_isoWeight;
        e.trace=e.trace*0.97+attribution*0.03;
        if(e.trace>1)e.trace=1;else if(e.trace<-1)e.trace=-1;
        // Pe38: slow EMA tracks long-term credit direction. Divergence from fast
        // EMA → low confidence (volatile signal). Agreement → high confidence.
        if(e.traceSlow===undefined)e.traceSlow=0;
        e.traceSlow=e.traceSlow*0.993+attribution*0.007;
        if(e.traceSlow>1)e.traceSlow=1;else if(e.traceSlow<-1)e.traceSlow=-1;
        // Pe42: track peak value — the param's value when it last correlated with a fitness
        // high. The directional probe uses this to aim toward "what worked" rather than +0.07.
        if(attribution>0&&currentFitness>(e.peakFitness||0)){
          e.peakValue=genome[p];
          e.peakFitness=currentFitness;
        }
      }
      e.pendingDelta=0; // consumed
    }else{
      // No movement last cycle — bleed slowly so a frozen gate stops reading as
      // load-bearing. Honest diagnostic over sticky history.
      e.trace*=0.995;
      if(e.traceSlow!==undefined)e.traceSlow*=0.998;
    }
    // Pe38: confidence — agreement between fast and slow EMA.
    // 1.0 = both fully agree (reliable); 0.0 = opposite sign (volatile or transitioning).
    const tS=e.traceSlow||0;
    e.conf=1-Math.abs(e.trace-tS)/(Math.abs(e.trace)+Math.abs(tS)+0.05);
  }

  // ═══ Pe40 Layer 29: ATROPHY / Pe41 amendment: PROBE BEFORE PRUNE ═══
  // Pe40 had two atrophy conditions: `harmful` (confidently-negative long-term
  // attribution) and `dead` (confidently-flat attribution). The gen2768 run proved
  // `harmful` correct — it retired relationalWeight and signalRoleInfluence on real
  // negative evidence. But `dead` was wrong by construction: it inferred worthlessness
  // from SILENCE, and silence has two causes — "contributes nothing" and "quietly
  // holding a correct, perturbation-insensitive contribution." gen2768 caught
  // gradientUpstreamBias dormant at 0.0096 while its attribution was +0.067 POSITIVE:
  // a beneficial layer suppressed because it was quiet, with the promised reversibility
  // too slow to rescue it.
  //
  // Pe41 fixes only the `dead` path. `harmful` is unchanged. Silence is no longer
  // sufficient to prune — it now only marks a SUSPECT. Before decaying a suspect, the
  // mechanism injects a deliberate, definite stimulus (+0.07) into the param and waits
  // for the existing attribution interval to elapse. If smoothed fitness moves in
  // response, the param was quietly contributing — atrophy aborts and the param is
  // LEFT at its probed value (the probe doubles as the rescue: gradientUpstreamBias
  // would have been lifted back to 0.07 instead of decayed). If fitness does not
  // respond to a deliberate kick, the param is genuinely inert and decay is licensed.
  // "Test dormancy by probing, not by absence of signal." atrophyRate=0 → inert (Pe39).
  const aRate=Math.max(0,Math.min(0.3,genome.atrophyRate||0));
  if(aRate>0.001){
    for(const p of META_LAYER_PARAMS){
      if(!ATROPHY_SAFE.has(p))continue;
      const e=mc[p];
      if(!e||e.traceSlow===undefined)continue;
      const conf=e.conf||0;
      const tSlow=e.traceSlow;
      // High confidence required (fast/slow agree) — never act on a volatile signal.
      const harmful = conf>0.5 && tSlow<-0.15;
      const quiet   = conf>0.5 && Math.abs(tSlow)<0.03 && Math.abs(e.trace)<0.05;
      if(harmful){
        // Unchanged from Pe40 — this path was correct. Worse trace decays faster.
        const strength=aRate*(0.5+Math.abs(tSlow));
        const factor=Math.max(0,Math.min(1,1-strength));
        if(isFinite(genome[p]))genome[p]*=factor;
        e.probeState=0; // a param that turned harmful abandons any in-flight probe
      }else if(quiet){
        if(!e.probeState){
          // Enter probe: inject a deliberate definite stimulus, defer decay.
          // _metaValBefore was snapshotted before this block, so this kick is
          // recorded as this cycle's perturbation and rides the existing
          // attribution rails — no parallel measurement needed.
          //
          // Pe42: DIRECTIONAL PROBE. Instead of a fixed +0.07 kick, aim toward
          // the param's historical peak value (peakValue, tracked above). A param
          // at 0.01 whose best recorded value was 0.3 gets probed toward 0.3:
          // "try going back to what worked." Falls back to +0.07 if no peak is
          // recorded yet (new param, or param that has never been in positive credit).
          if(isFinite(genome[p])){
            const pv=e.peakValue;
            const cur=genome[p];
            const probeStep=(pv!==undefined&&isFinite(pv)&&pv>cur+0.01)
              ?Math.max(0.03,Math.min(0.3,(pv-cur)*0.5))
              :0.07;
            genome[p]=cur+probeStep;
          }
          e.probeState=1; e.probeWait=0; e.probeFitness=currentFitness;
        }else if(e.probeState===1){
          e.probeWait=(e.probeWait||0)+1;
          if(e.probeWait>=2){
            // The perturbed config has now run ≥2 mutation intervals.
            const moved=Math.abs(currentFitness-(e.probeFitness||0))>0.015;
            e.probeState=0; e.probeWait=0;
            if(!moved){
              // Inert under a deliberate stimulus → genuinely dead. Decay licensed.
              const factor=Math.max(0,Math.min(1,1-aRate*0.5));
              if(isFinite(genome[p]))genome[p]*=factor;
            }
            // moved → it was quietly contributing. Leave it at the probed value;
            // the probe was also the rescue.
          }
        }
      }else if(e.probeState){
        // Signal became volatile/uncertain mid-probe — abandon, don't guess.
        e.probeState=0; e.probeWait=0;
      }
    }
  }

  // ═══ Pe42 Layer 31: COMPUTE META-SIGNAL VALUE ═══
  // Confidence-weighted mean of positive attribution traces across META_LAYER_PARAMS.
  // Near 1: many layers confidently contributing. Near 0: architecture searching.
  // Recomputed once per mutation cycle. Read by particles via opcode 26 (META_READ).
  // genome.metaSignalValue is the number that the mirror shows.
  {
    let msSum=0,msWeight=0;
    for(const p of META_LAYER_PARAMS){
      const e=mc[p];if(!e)continue;
      const conf=e.conf||0;
      if(conf>0.1){
        msSum+=Math.max(0,e.trace||0)*conf;
        msWeight+=conf;
      }
    }
    genome.metaSignalValue=msWeight>0?Math.min(1,msSum/msWeight):0;
  }

  // ═══ Pe43 Layer 32: COMPUTE META-SIGNAL GRADIENT ═══
  // Direction the attribution health is moving, EMA-smoothed across mutation cycles.
  // rawGrad = current health - previous health. EMA smooths out single-cycle noise.
  // clamped [-1,1]: sign = direction (positive=improving, negative=declining).
  // metaSignalPrev carries forward without being in META_LAYER_PARAMS — it's
  // infrastructure (a lag register), not a behavioral gate. Same pattern as
  // the traceSlow/trace split in the attribution core.
  {
    const prev=genome.metaSignalPrev||0;
    const cur=genome.metaSignalValue||0;
    const rawGrad=cur-prev;
    // EMA with short window — gradient should be responsive, not sluggish
    genome.metaSignalGrad=((genome.metaSignalGrad||0)*0.7+rawGrad*0.3);
    if(genome.metaSignalGrad>1)genome.metaSignalGrad=1;
    else if(genome.metaSignalGrad<-1)genome.metaSignalGrad=-1;
    genome.metaSignalPrev=cur;
  }

  // ═══ Pe44 Layer 33: COMPUTE META-SIGNAL VOLATILITY ═══
  // How much is the gradient swinging? EMA of squared gradient value.
  // Near 0: gradient has been consistently small — direction is trustworthy.
  // Near 1: gradient swinging large — direction is noisy.
  // Slightly slower EMA than gradient (0.8 vs 0.7) — volatility should lag behind
  // momentary spikes, settling only when the gradient genuinely stabilises.
  {
    const g2=(genome.metaSignalGrad||0)*(genome.metaSignalGrad||0); // squared gradient
    genome.metaSignalVol=(genome.metaSignalVol||0)*0.8+g2*0.2;
    if(genome.metaSignalVol>1)genome.metaSignalVol=1;
    else if(genome.metaSignalVol<0)genome.metaSignalVol=0;
  }

  // metaMaybe: like maybe(), but a tracked param's perturbation leans toward its
  // credited direction when metaCreditBias>0. Same lean-not-lock shape as gradMaybe —
  // the random component is only partially attenuated, never replaced. mcBias=0 → maybe().
  // Pe38: also scales mutation WIDTH by attribution confidence × metaSearchBias.
  // Pe45: also scales mutation RATE per parameter by attribution trace × volatility gate.
  // Parameters with positive traces (working) mutate less; negative (harmful) mutate more.
  // High volatility gates the trust so uncertain signals don't drive differential rates.
  function metaMaybe(val,magnitude,name){
    const _e=mc[name];
    const tr=_e?(_e.trace||0):0;
    const conf=_e?(_e.conf||0):0;
    // Pe45 Layer 34: differential rate — positive trace → protect, negative → explore.
    // trust decays as volatility rises; at vol≥0.5 trust=0 → base rate (Pe44 exactly).
    const mmb=Math.max(0,Math.min(1,genome.metaMutationBias||0));
    let effectiveRate=rate;
    if(mmb>0.001&&_e){
      const vol=genome.metaSignalVol||0;
      const trust=Math.max(0,1-vol*2);
      effectiveRate=rate*Math.max(0.2,Math.min(2.5,1-tr*mmb*trust));
    }
    if(Math.random()>effectiveRate)return val;
    const randomStep=(Math.random()-0.5)*magnitude*scale;
    // Pe38: width scaling — only activates when we have confident attribution.
    // tr positive + high conf → widthScale < 1 (narrow, exploit).
    // tr negative + high conf → widthScale > 1 (wide, escape).
    const sb=Math.max(0,Math.min(1,genome.metaSearchBias||0));
    const widthScale=sb>0.001&&conf>0.15
      ?Math.max(0.3,Math.min(2.5,1-tr*conf*sb*1.5))
      :1.0;
    if(mcBias<=0.001||tr===0){
      const n=val+randomStep*widthScale;return isFinite(n)?n:val;
    }
    const lean=tr*mcBias; // tr in [-1,1], mcBias in [0,0.5] → lean in [-0.5,0.5]
    const step=randomStep*widthScale*(1-Math.abs(lean)*0.6)+Math.sign(tr)*magnitude*scale*Math.abs(lean)*0.5;
    const n=val+step;return isFinite(n)?n:val;
  }
  // Snapshot tracked-param values BEFORE this cycle's mutations so the capture phase
  // (end of mutateGenome) can compute exactly what perturbation was applied.
  const _metaValBefore={};
  for(const p of META_LAYER_PARAMS)_metaValBefore[p]=genome[p];

  // LAYER 1: Physics mutations
  // Pe22b: substrate physics — the ground the particles live on now evolves
  genome.fieldDecay=maybe(genome.fieldDecay,0.9,0.999,0.004);
  genome.fieldDiffuse=maybe(genome.fieldDiffuse,0.02,0.25,0.01);
  // Pe22c: evolvable chemistry table — mutate monomials in the opcode recipes.
  // Defensive defaults for old genomes that don't have a table yet.
  if(!genome.chemistryTable)genome.chemistryTable=seedChemistryTable();
  if(genome.chemistryMutRate===undefined)genome.chemistryMutRate=0.02;
  const chemRate=genome.chemistryMutRate*(1+Math.tanh(mutationPressure)*0.3);
  for(let oi=0;oi<genome.chemistryTable.length;oi++){
    const recipe=genome.chemistryTable[oi];
    for(let mi=0;mi<recipe.length;mi++){
      const mono=recipe[mi];
      // Point mutations: flip coef source (now 0..5), swap a variable (now 0..14), or change target
      if(Math.random()<chemRate)mono[0]=(Math.random()*6)|0;
      if(Math.random()<chemRate)mono[1]=(Math.random()*15)|0;
      if(Math.random()<chemRate)mono[2]=(Math.random()*15)|0;
      if(Math.random()<chemRate*0.5)mono[3]=1-mono[3];
    }
    // Rare: add a new monomial (recipes can grow to 12)
    if(recipe.length<12&&Math.random()<chemRate*0.1){
      recipe.push([(Math.random()*6)|0,(Math.random()*15)|0,(Math.random()*15)|0,(Math.random()*2)|0]);
    }
    // Rare: drop a monomial (recipes can shrink, but never below 1)
    if(recipe.length>1&&Math.random()<chemRate*0.05){
      recipe.splice((Math.random()*recipe.length)|0,1);
    }
  }
  // Meta-mutation on the chemistry mutation rate itself
  genome.chemistryMutRate=maybe(genome.chemistryMutRate,0.005,0.1,0.005);
  // Live kernel sync — clamped to the stable-kernel regime (skeleton, not cage:
  // outside these bounds the diffusion equation produces NaN)
  FIELD_DECAY=Math.max(0.5,Math.min(1.0,genome.fieldDecay));
  FIELD_DIFFUSE=Math.max(0,Math.min(0.24,genome.fieldDiffuse));
  genome.entropyBaseline=gradMaybe(genome.entropyBaseline,0.00005,0.005,0.0002,lastShadowNudgeDir[0]);
  genome.entropyK=gradMaybe(genome.entropyK,0.00002,0.003,0.0001,lastShadowNudgeDir[1]);
  genome.entrainRate=gradMaybe(genome.entrainRate,0.002,0.06,0.003,lastShadowNudgeDir[2]);
  genome.entrainThresh=gradMaybe(genome.entrainThresh,0.05,0.6,0.03,lastShadowNudgeDir[4]);
  genome.creationCost=gradMaybe(genome.creationCost,0.05,0.7,0.04,lastShadowNudgeDir[3]);
  genome.creationThresh=maybe(genome.creationThresh,0.05,0.6,0.03);
  genome.destructThresh=maybe(genome.destructThresh,-0.6,-0.05,0.03);
  genome.tendencyBleed=maybe(genome.tendencyBleed,0.00005,0.003,0.0002);
  genome.magneticThresh=maybe(genome.magneticThresh,0.1,0.8,0.04);
  genome.velocityDamping=maybe(genome.velocityDamping,0.98,0.9999,0.003);
  genome.deathThreshold=maybe(genome.deathThreshold,0.01,0.15,0.01);

  // LAYER 2: Perception mutations
  genome.clusterBondThresh=maybe(genome.clusterBondThresh,0.05,0.5,0.03);
  genome.clusterMinSize=Math.max(1,Math.round(maybe(genome.clusterMinSize,2,8,0.5)));
  genome.ghostDecay=maybe(genome.ghostDecay,0.98,0.9999,0.003);
  genome.ghostAmpDrip=maybe(genome.ghostAmpDrip,0.00005,0.002,0.0002);

  // LAYER 3: Evaluation mutations (objective weights)
  for(let i=0;i<4;i++){
    if(Math.random()<rate)genome.objWeights[i]=Math.max(0,genome.objWeights[i]+(Math.random()-0.5)*0.06*scale);
  }
  const wSum=genome.objWeights.reduce((a,b)=>a+b,0);
  if(wSum>0){
    for(let i=0;i<4;i++)genome.objWeights[i]/=wSum;
  }else{
    genome.objWeights=[0.25,0.25,0.25,0.25];
  }
  // Pe25 Layer 15 credit rate
  genome.creditLearnRate=Math.max(0,Math.min(3,metaMaybe(genome.creditLearnRate,0.15,'creditLearnRate')));

  // Pe26 Layer 16: gradient bias params — lineage selection decides whether learning helps
  genome.gradientBias=Math.max(0,Math.min(1,metaMaybe(genome.gradientBias,0.06,'gradientBias')));
  genome.gradientUpstreamBias=Math.max(0,Math.min(1,metaMaybe(genome.gradientUpstreamBias,0.06,'gradientUpstreamBias')));
  genome.behaviorGradientBias=Math.max(0,Math.min(1,metaMaybe(genome.behaviorGradientBias,0.06,'behaviorGradientBias'))); // Pe33

  // Pe31 Layer 21: mutual recognition — all three can evolve to 0 (recovering Pe30b behavior)
  genome.neighborModelUpdateRate=Math.max(0,Math.min(1,metaMaybe(genome.neighborModelUpdateRate,0.05,'neighborModelUpdateRate')));
  genome.neighborPredictionInfluence=Math.max(0,Math.min(0.5,metaMaybe(genome.neighborPredictionInfluence,0.04,'neighborPredictionInfluence')));
  genome.mutualRecognitionThresh=Math.max(0,Math.min(1,metaMaybe(genome.mutualRecognitionThresh,0.06,'mutualRecognitionThresh')));
  genome.relationalWeight=Math.max(0,Math.min(1,metaMaybe(genome.relationalWeight,0.05,'relationalWeight'))); // Pe34 Layer 24
  genome.relationalUseBias=Math.max(0,Math.min(1,metaMaybe(genome.relationalUseBias,0.05,'relationalUseBias'))); // Pe35 Layer 24b
  // Pe36 Layer 25: explicit signal channel — all three can evolve (including to 0 = Pe35 behavior)
  genome.signalEmitCost=Math.max(0,Math.min(0.05,metaMaybe(genome.signalEmitCost,0.003,'signalEmitCost')));
  genome.signalInfluence=Math.max(0,Math.min(1,metaMaybe(genome.signalInfluence,0.05,'signalInfluence')));
  genome.signalDecay=Math.max(0,Math.min(0.5,metaMaybe(genome.signalDecay,0.04,'signalDecay')));
  // Pe38 Layer 27: signal role influence — how strongly net emitter/listener position
  // feeds into VM registers. In META_LAYER_PARAMS, so attribution tracks whether
  // role-awareness actually earns its keep. The system can evolve it to zero.
  genome.signalRoleInfluence=Math.max(0,Math.min(1,metaMaybe(genome.signalRoleInfluence,0.05,'signalRoleInfluence')));
  // Pe39 Layer 28: dissolutionWeight — in META_LAYER_PARAMS so attribution tracks it
  genome.dissolutionWeight=Math.max(0,Math.min(1,metaMaybe(genome.dissolutionWeight,0.05,'dissolutionWeight')));
  genome.atrophyRate=Math.max(0,Math.min(0.3,metaMaybe(genome.atrophyRate,0.04,'atrophyRate'))); // Pe40 Layer 29
  genome.metaSignalInfluence=Math.max(0,Math.min(1,metaMaybe(genome.metaSignalInfluence,0.04,'metaSignalInfluence'))); // Pe42 Layer 31
  genome.metaSignalGradInfluence=Math.max(0,Math.min(1,metaMaybe(genome.metaSignalGradInfluence||0,0.04,'metaSignalGradInfluence'))); // Pe43 Layer 32
  genome.metaSignalVolInfluence=Math.max(0,Math.min(1,metaMaybe(genome.metaSignalVolInfluence||0,0.04,'metaSignalVolInfluence'))); // Pe44 Layer 33
  // Pe45 Layer 34: metaMutationBias uses plain maybe() — must not self-bias via the credit
  // it controls. Same idiom as metaCreditBias and metaSearchBias.
  genome.metaMutationBias=Math.max(0,Math.min(1,maybe(genome.metaMutationBias||0,0,1,0.04))); // Pe45 Layer 34
  // Pe46 Layer 35: inscriptionInfluence — can evolve to 0 (Pe45 exactly) if substrate-reading
  // earns no credit. metaMaybe is appropriate here; unlike metaMutationBias, it doesn't
  // control the very credit system that would bias it.
  genome.inscriptionInfluence=Math.max(0,Math.min(1,metaMaybe(genome.inscriptionInfluence||0,0.04,'inscriptionInfluence'))); // Pe46 Layer 35
  // Pe47 Layer 36: field2WriteInfluence uses metaMaybe — unlike metaMutationBias/metaCreditBias,
  // it does not control the credit system, so self-bias via meta feedback is not a concern.
  genome.field2WriteInfluence=Math.max(0,Math.min(1,metaMaybe(genome.field2WriteInfluence||0,0.04,'field2WriteInfluence'))); // Pe47 Layer 36
  // Pe48 Layer 37: field2GradInfluence uses metaMaybe — does not control the credit system.
  genome.field2GradInfluence=Math.max(0,Math.min(1,metaMaybe(genome.field2GradInfluence||0,0.04,'field2GradInfluence'))); // Pe48 Layer 37
  // Pe49 Layer 38: field2TemporalInfluence uses metaMaybe — does not control the credit system.
  genome.field2TemporalInfluence=Math.max(0,Math.min(1,metaMaybe(genome.field2TemporalInfluence||0,0.04,'field2TemporalInfluence'))); // Pe49 Layer 38
  // Pe50 Layer 39: fieldCrossInfluence uses metaMaybe — does not control the credit system.
  genome.fieldCrossInfluence=Math.max(0,Math.min(1,metaMaybe(genome.fieldCrossInfluence||0,0.04,'fieldCrossInfluence'))); // Pe50 Layer 39
  // Pe51 Layer 40: neighborDensityInfluence uses metaMaybe — does not control the credit system.
  genome.neighborDensityInfluence=Math.max(0,Math.min(1,metaMaybe(genome.neighborDensityInfluence||0,0.04,'neighborDensityInfluence'))); // Pe51 Layer 40
  // Pe52 Layer 41: selfAmpInfluence uses metaMaybe — does not control the credit system.
  genome.selfAmpInfluence=Math.max(0,Math.min(1,metaMaybe(genome.selfAmpInfluence||0,0.03,'selfAmpInfluence'))); // Pe52 Layer 41
  // Pe53 Layer 42: partnerAmpInfluence uses metaMaybe — does not control the credit system.
  genome.partnerAmpInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerAmpInfluence||0,0.03,'partnerAmpInfluence'))); // Pe53 Layer 42
  // Pe54 Layer 43: partnerDensityInfluence uses metaMaybe — does not control the credit system.
  genome.partnerDensityInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerDensityInfluence||0,0.03,'partnerDensityInfluence'))); // Pe54 Layer 43
  // Pe55 Layer 44: selfAgeInfluence uses metaMaybe — does not control the credit system.
  genome.selfAgeInfluence=Math.max(0,Math.min(1,metaMaybe(genome.selfAgeInfluence||0,0.03,'selfAgeInfluence'))); // Pe55 Layer 44
  // Pe56 Layer 45: partnerAgeInfluence uses metaMaybe — does not control the credit system.
  genome.partnerAgeInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerAgeInfluence||0,0.03,'partnerAgeInfluence'))); // Pe56 Layer 45
  // Pe57 Layer 46: selfSpeedInfluence uses metaMaybe — does not control the credit system.
  genome.selfSpeedInfluence=Math.max(0,Math.min(1,metaMaybe(genome.selfSpeedInfluence||0,0.03,'selfSpeedInfluence'))); // Pe57 Layer 46
  // Pe58 Layer 47: partnerSpeedInfluence uses metaMaybe — does not control the credit system.
  genome.partnerSpeedInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerSpeedInfluence||0,0.03,'partnerSpeedInfluence'))); // Pe58 Layer 47
  // Pe59 Layer 48: headingAlignInfluence uses metaMaybe — does not control the credit system.
  genome.headingAlignInfluence=Math.max(0,Math.min(1,metaMaybe(genome.headingAlignInfluence||0,0.03,'headingAlignInfluence'))); // Pe59 Layer 48
  // Pe60 Layer 49: approachRateInfluence uses metaMaybe — does not control the credit system.
  genome.approachRateInfluence=Math.max(0,Math.min(1,metaMaybe(genome.approachRateInfluence||0,0.03,'approachRateInfluence'))); // Pe60 Layer 49
  // Pe61 Layer 50: orbitRateInfluence uses metaMaybe — does not control the credit system.
  genome.orbitRateInfluence=Math.max(0,Math.min(1,metaMaybe(genome.orbitRateInfluence||0,0.03,'orbitRateInfluence'))); // Pe61 Layer 50
  // Pe62 Layer 51: selfFreqInfluence uses metaMaybe — does not control the credit system.
  genome.selfFreqInfluence=Math.max(0,Math.min(1,metaMaybe(genome.selfFreqInfluence||0,0.03,'selfFreqInfluence'))); // Pe62 Layer 51
  // Pe63 Layer 52: partnerFreqInfluence uses metaMaybe — does not control the credit system.
  genome.partnerFreqInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerFreqInfluence||0,0.03,'partnerFreqInfluence'))); // Pe63 Layer 52
  // Pe64 Layer 53: partnerMemReadInfluence uses metaMaybe — does not control the credit system.
  genome.partnerMemReadInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerMemReadInfluence||0,0.03,'partnerMemReadInfluence'))); // Pe64 Layer 53
  // Pe65 Layer 54: partnerTendInfluence uses metaMaybe — does not control the credit system.
  genome.partnerTendInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerTendInfluence||0,0.03,'partnerTendInfluence'))); // Pe65 Layer 54
  // Pe66 Layer 55: selfTendInfluence uses metaMaybe — does not control the credit system.
  genome.selfTendInfluence=Math.max(0,Math.min(1,metaMaybe(genome.selfTendInfluence||0,0.03,'selfTendInfluence'))); // Pe66 Layer 55
  // Pe67 Layer 56: selfPhaseInfluence uses metaMaybe — does not control the credit system.
  genome.selfPhaseInfluence=Math.max(0,Math.min(1,metaMaybe(genome.selfPhaseInfluence||0,0.03,'selfPhaseInfluence'))); // Pe67 Layer 56
  // Pe68 Layer 57: partnerPhaseInfluence uses metaMaybe — does not control the credit system.
  genome.partnerPhaseInfluence=Math.max(0,Math.min(1,metaMaybe(genome.partnerPhaseInfluence||0,0.03,'partnerPhaseInfluence'))); // Pe68 Layer 57
  // Pe69 Layer 58: interactionDistInfluence uses metaMaybe — does not control the credit system.
  genome.interactionDistInfluence=Math.max(0,Math.min(1,metaMaybe(genome.interactionDistInfluence||0,0.03,'interactionDistInfluence'))); // Pe69 Layer 58
  // Pe70 Layer 59: fieldTemporalInfluence uses metaMaybe — does not control the credit system.
  genome.fieldTemporalInfluence=Math.max(0,Math.min(1,metaMaybe(genome.fieldTemporalInfluence||0,0.03,'fieldTemporalInfluence'))); // Pe70 Layer 59

  // ═══ Pe26 Layer 16c: CLUSTER UPWARD SIGNAL injection ═══
  // Drain the upstream buffer — soft-inject successful cluster motifs into the global VM.
  // This is the same mechanism as network motif injection: probabilistic overwrite, not replace.
  // gradientUpstreamBias=0 → buffer is never populated, this is a no-op.
  const ub=genome.gradientUpstreamBias||0;
  if(ub>0.01&&clusterUpstreamBuffer.length>0&&Math.random()<ub){
    // Pick the highest-quality upstream signal
    clusterUpstreamBuffer.sort((a,b)=>b.quality-a.quality);
    const upstream=clusterUpstreamBuffer.shift();
    if(upstream&&upstream.motif&&genome.vmProgram.length>0){
      const insertAt=Math.floor(Math.random()*genome.vmProgram.length);
      for(let i=0;i<upstream.motif.length&&insertAt+i<genome.vmProgram.length;i++){
        // Soft overwrite — not every cluster instruction lands, adds noise for diversity
        if(Math.random()<0.35){
          const src=upstream.motif[i];
          genome.vmProgram[insertAt+i]=[src[0],src[1],src[2],src[3]+(Math.random()-0.5)*0.08];
        }
      }
      recordEvent('cluster_upstream',{q:+(upstream.quality.toFixed(2)),vm:genome.vmProgram.length},600);
    }
    // Also: if the cluster had a clusterGenome, nudge the global mutation interval
    // and interaction radius gently toward cluster-successful values.
    // This is the weakest possible signal — a whisper, not a command.
    if(upstream&&upstream.clusterGenome&&ub>0.15){
      const cg=upstream.clusterGenome;
      if(isFinite(cg.metabolicBias))genome.velocityDamping+=(cg.metabolicBias-genome.velocityDamping)*0.002*ub;
      if(isFinite(cg.innovationRate))genome.mutationRate+=(cg.innovationRate*0.5-genome.mutationRate)*0.001*ub;
    }
    // ═══ Pe28 Layer 18: SCENARIO FOSSIL INJECTION ═══
    // Cluster-carried scenario snapshot. If a structurally-similar scenario lives in
    // the bank, refresh its age (re-ratification). If novel, inject it as a fresh entry.
    // Pe32: similarity measured over all 12 axes.
    if(upstream&&upstream.scenarioFossil&&Array.isArray(genome.shadowScenarioBank)){
      const fos=upstream.scenarioFossil;
      const bank=genome.shadowScenarioBank;
      let matchIdx=-1,bestDist=0.3; // similarity threshold
      for(let i=0;i<bank.length;i++){
        const dist=scenarioDist(bank[i],fos);
        if(dist<bestDist){bestDist=dist;matchIdx=i}
      }
      if(matchIdx>=0){
        bank[matchIdx].age=Math.max(0,bank[matchIdx].age-30);
        recordEvent('scenario_ratified',{i:matchIdx,w:bank[matchIdx].wins},600);
      }else if(bank.length<SHADOW_SCENARIOS_MAX){
        // Pe32: fossil carries all 12 axes into the bank.
        bank.push({e:fos.e,k:fos.k,r:fos.r,c:fos.c,t:fos.t,
          f:fos.f||0,p:fos.p||0,a:fos.a||0,tb:fos.tb||0,sp:fos.sp||0,sm:fos.sm||0,mp:fos.mp||0,
          wins:0,age:0,src:'fossil',creditTrace:fos.creditTrace||0});
        recordEvent('scenario_fossil',{e:+fos.e.toFixed(2),r:+fos.r.toFixed(2)},600);
      }
    }
  }
  // Trim buffer if it fills faster than it drains
  if(clusterUpstreamBuffer.length>MAX_UPSTREAM_BUFFER)clusterUpstreamBuffer.length=MAX_UPSTREAM_BUFFER;

  // ═══ Pe39 Layer 28: DISSOLUTION MOTIF INJECTION ═══
  // Under collapseRisk, pull a raw instruction from the highest-quality dissolution fossil
  // and soft-inject it into the global vmProgram. Same caution level as cluster upward:
  // probabilistic, noisy, one instruction at a time. dissolutionWeight=0 → never fires.
  const _dwMut=genome.dissolutionWeight||0;
  if(_dwMut>0.01&&dissolutionFossils.length>0&&risk>0.25&&Math.random()<_dwMut*Math.min(1,risk*1.5)*0.35){
    const best=dissolutionFossils.reduce((b,f)=>f.quality>b.quality?f:b,dissolutionFossils[0]);
    if(best.vmProgram&&best.vmProgram.length>0&&genome.vmProgram.length<genome.vmMaxInstructions){
      const srcInst=best.vmProgram[Math.floor(Math.random()*best.vmProgram.length)];
      const noisy=[srcInst[0],srcInst[1],srcInst[2],srcInst[3]+(Math.random()-0.5)*0.2];
      const insertAt=Math.floor(Math.random()*(genome.vmProgram.length+1));
      genome.vmProgram.splice(insertAt,0,noisy);
      recordEvent('dissolution_inject',{q:+best.quality.toFixed(2),age:best.persistAge,vm:genome.vmProgram.length},800);
    }
  }

  // LAYER 4: META-MUTATIONS
  genome.mutationRate=maybe(genome.mutationRate,0.01,0.25,0.02);
  genome.mutationScale=maybe(genome.mutationScale,0.3,3.0,0.2);
  genome.shadowHorizon=Math.max(2,Math.min(500,Math.round(maybe(genome.shadowHorizon,10,120,8))));
  genome.perturbScale=maybe(genome.perturbScale,0.2,3.0,0.2);
  genome.extinctionThresh=Math.max(1,Math.round(maybe(genome.extinctionThresh,2,20,2)));
  genome.motifMemorySize=Math.max(1,Math.min(40,Math.round(maybe(genome.motifMemorySize,2,10,1))));
  genome.culturalBias=maybe(genome.culturalBias,0.05,0.6,0.04);

  // Pe27 Layer 17: imagination bank cap and churn rate. The system decides how many
  // counterfactual futures to maintain and how aggressively to refresh them.
  genome.shadowScenarios=Math.max(3,Math.min(SHADOW_SCENARIOS_MAX,Math.round(maybe(genome.shadowScenarios,3,SHADOW_SCENARIOS_MAX,0.8))));
  genome.shadowBankChurn=Math.max(0,Math.min(1,metaMaybe(genome.shadowBankChurn,0.06,'shadowBankChurn')));
  // Pe30b: explore rate evolvable, bounded [0.1,0.9] — see refill-loop note for why
  // the bounds are tighter than the [0,1] of other freed params.
  genome.shadowExploreRate=Math.max(0.1,Math.min(0.9,metaMaybe(genome.shadowExploreRate,0.06,'shadowExploreRate')));
  // Pe29 Layer 19: how strongly real-fitness credit affects eviction. 0=Pe28 behavior.
  genome.scenarioCreditWeight=Math.max(0,Math.min(1,metaMaybe(genome.scenarioCreditWeight,0.06,'scenarioCreditWeight')));
  // Evict-and-spawn pass: probabilistic, gated by the churn rate.
  if(Math.random()<(genome.shadowBankChurn||0.5))evolveShadowBank();

  // Trim motif memory if size shrunk
  while(genome.stableMotifs.length>genome.motifMemorySize)genome.stableMotifs.shift();

  // ═══ LAYER 6: VM PROGRAM MUTATION ═══
  // The system's discovered physics evolve.
  // Instructions change. Programs grow/shrink. Conditional thresholds drift.
  // vmInfluence evolves: the system decides how much its rules matter.
  genome.vmInfluence=maybe(genome.vmInfluence,0.05,2.0,0.08);
  genome.ruleScale=maybe(genome.ruleScale,0.2,3.0,0.2);
  genome.vmMaxInstructions=Math.max(1,Math.min(48,Math.round(maybe(genome.vmMaxInstructions,6,20,1))));
  genome.metabolicCost=maybe(genome.metabolicCost,0.000002,0.0002,0.00002);

  // HGT parameter evolution
  genome.hgtRate=maybe(genome.hgtRate,0.01,0.5,0.04);
  genome.hgtMax=Math.max(1,Math.min(12,Math.round(maybe(genome.hgtMax,1,4,0.5))));
  genome.hgtSpliceNoise=maybe(genome.hgtSpliceNoise,0.05,0.5,0.04);

  // Plasmid parameter evolution
  genome.plasmidTransferRate=maybe(genome.plasmidTransferRate,0.001,0.05,0.004);
  genome.plasmidMutRate=maybe(genome.plasmidMutRate,0.005,0.15,0.015);
  genome.plasmidTransferThresh=maybe(genome.plasmidTransferThresh,0.3,0.85,0.05);
  genome.plasmidSpawnRate=maybe(genome.plasmidSpawnRate,0.0005,0.01,0.001);
  genome.fieldInfluence=maybe(genome.fieldInfluence,0.1,1.5,0.08);
  genome.fieldWeight=maybe(genome.fieldWeight,0.02,0.8,0.04);

  // Network parameter evolution — the system decides how social to be
  if(genome.netMigrantRate===undefined)genome.netMigrantRate=0.003;
  if(genome.netPlasmidRate===undefined)genome.netPlasmidRate=0.004;
  if(genome.netMotifRate===undefined)genome.netMotifRate=0.005;
  if(genome.netInscribeRate===undefined)genome.netInscribeRate=0.004;
  if(genome.netReceptivity===undefined)genome.netReceptivity=0.5;
  genome.netMigrantRate=maybe(genome.netMigrantRate,0,0.02,0.002);
  genome.netPlasmidRate=maybe(genome.netPlasmidRate,0,0.02,0.002);
  genome.netMotifRate=maybe(genome.netMotifRate,0,0.02,0.002);
  genome.netInscribeRate=maybe(genome.netInscribeRate,0,0.02,0.002);
  genome.netReceptivity=maybe(genome.netReceptivity,0,1,0.08);

  // ═══ AUTONOMY PARAMETER MUTATION ═══
  genome.mutationInterval=maybe(genome.mutationInterval,60,1200,40);
  // Pe37 Layer 26: the attribution-feedback gate. Mutated by plain maybe(), never
  // metaMaybe — a parameter that controls credit feedback must not bias its own
  // perturbation by its own credit. Bounded [0,0.5]; 0 = observational-only (Pe36).
  genome.metaCreditBias=Math.max(0,Math.min(0.5,maybe(genome.metaCreditBias,0,0.5,0.03)));
  // Pe38 Layer 27: search width bias. Also plain maybe() for same reason — a param that
