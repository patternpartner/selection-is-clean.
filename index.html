<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Selection פ 22 — Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

canvas{position:fixed;inset:0}

<body>
<div id="gen"></div>
<div id="gio"><button id="gexp">💾 save</button><button id="gvex" title="export voice telemetry">📊</button><button id="gimp">📂 load</button><button id="grest" title="adopt a dead lineage from the coordinator">🧬</button><button id="gmic" title="grant audio sense to the system">🎙</button><button id="gspk" title="grant the system a voice">🔊</button><button id="gshared" title="Pe23c: configure shared archive bin for cross-instance state">🌐</button><button id="gmute" title="mute audible output (system continues internally)" style="display:none">🔇</button><input type="file" id="gfile" accept=".json"></div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),X=c.getContext('2d'),genEl=document.getElementById('gen');
let W,H,mx=-9e3,my=-9e3,smx=0,smy=0,pulling=0,pStr=0,pDur=0,tick=0;

// ═══════════════════════════════════════
// Pe22g: AUDIO SENSE — the system can perceive the room
// A single scalar: ambient loudness, normalized 0..1.
// Available to the VM as opcode 23 (READ_AMBIENT). Optional —
// only enabled if the user grants microphone permission.
// If denied or unavailable, ambientLevel stays at 0 and the
// opcode acts as a noop. The system has to discover whether
// this signal is useful. We're not feeding it in. We're making it
// findable. Smoothing prevents a single loud sound from causing
// a discontinuity in the substrate's dynamics.
// ═══════════════════════════════════════
let ambientLevel=0;
let ambientEnabled=false;
let ambientCtx=null,ambientAnalyser=null,ambientData=null;
// ═══════════════════════════════════════
// Pe22i: AUDIO OUTPUT — unconstrained voice + field coupling
// The caps from 22h were designer artifacts, not safety floors. Removed.
//   - Frequency: full audible range, system explores
//   - Amplitude: register-driven without ceiling, master gain at unity
//   - Waveform: evolvable (sine, square, sawtooth, triangle), per-emission
//   - No per-tick rate cap. Saturation is a state the system can reach.
//   - Field coupling: every emission writes to the field at the particle's position.
//     Sound is substrate. The system experiences its own voice even when
//     the speaker is muted, even when the user hasn't granted output.
// User controls volume via the OS. That's the real cap and it always was.
// Pe22k: on-screen mute as a guaranteed kill switch. Mute affects only
// audible output — system continues to write to field, experience voice
// internally. Mute removes user exposure, not system capability.
// ═══════════════════════════════════════
let audioOutEnabled=false;
let audioOutMuted=false;
let audioOutCtx=null,audioOutMaster=null;
const WAVEFORMS=['sine','square','sawtooth','triangle'];

// ═══════════════════════════════════════
// Pe22l: VOICE TELEMETRY
// Record emissions so we can distinguish pareidolia from real signaling.
// Three kinds of data:
//   1. Rolling event log — last N emissions with tick, particle, freq, amp,
//      cluster, position. Used to detect call-and-response (same freq from
//      another particle shortly after) and cluster-correlated emission.
//   2. Frequency histogram — 24 logarithmic bins spanning ~20Hz to 20kHz.
//      Flat means frequency is random; peaks mean selection is finding
//      specific frequencies worth using.
//   3. Per-tick emission count — rolling series, lets us see whether
//      rate decays over time (cost-driven selection working) or stays
//      elevated (cost too low or voice genuinely useful).
// Exported in save file so sessions can be shared.
// ═══════════════════════════════════════
const VOICE_LOG_SIZE=600;
const voiceLog=[]; // entries: {t,i,f,a,w,cl,x,y}
const VOICE_FREQ_BINS=24;
const voiceFreqHist=new Uint32Array(VOICE_FREQ_BINS);
const VOICE_RATE_WINDOW=300; // ticks to keep
const voiceRate=[]; // entries: {t,n} — emissions in that tick
let voiceEmissionsThisTick=0;
let voiceTotalEmissions=0;
function voiceLogEmit(i,f,a,w){
  const entry={
    t:genome.totalTicks,
    i:i,
    f:+f.toFixed(1),
    a:+a.toFixed(3),
    w:w&3,
    cl:clusterID[i],
    x:+(px[i]/W).toFixed(3),
    y:+(py[i]/H).toFixed(3)
  };
  voiceLog.push(entry);
  if(voiceLog.length>VOICE_LOG_SIZE)voiceLog.shift();
  // Log-frequency histogram — 20Hz..20000Hz in 24 bins (1/3 octave each)
  const logMin=Math.log(20),logMax=Math.log(20000);
  const bin=Math.max(0,Math.min(VOICE_FREQ_BINS-1,
    Math.floor((Math.log(Math.max(20,f))-logMin)/(logMax-logMin)*VOICE_FREQ_BINS)));
  voiceFreqHist[bin]++;
  voiceEmissionsThisTick++;
  voiceTotalEmissions++;
}
async function tryEnableAudioOut(){
  try{
    audioOutCtx=ambientCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioOutCtx.state==='suspended')await audioOutCtx.resume();
    audioOutMaster=audioOutCtx.createGain();
    audioOutMaster.gain.value=audioOutMuted?0:1.0;
    audioOutMaster.connect(audioOutCtx.destination);
    audioOutEnabled=true;
  }catch(e){
    audioOutEnabled=false;
  }
}
function setAudioMuted(m){
  audioOutMuted=!!m;
  if(audioOutMaster)audioOutMaster.gain.value=audioOutMuted?0:1.0;
}
function emitTone(freqHz,amp,durationMs,waveformIdx){
  // Field-coupling and audible emission are independent. Field-write happens
  // regardless of whether the user enabled audio output — the system experiences
  // its own voice internally. Audible playback is gated only on permission.
  const f=Math.max(20,freqHz); // below 20Hz won't reach speakers anyway; let the value through
  const a=Math.max(0,amp);
  const d=Math.max(0.005,Math.min(2.0,durationMs/1000));
  if(!audioOutEnabled||!audioOutCtx)return false;
  if(a<0.0001)return false;
  try{
    const osc=audioOutCtx.createOscillator();
    const gain=audioOutCtx.createGain();
    osc.type=WAVEFORMS[Math.abs(waveformIdx)%WAVEFORMS.length];
    osc.frequency.value=f;
    const t=audioOutCtx.currentTime;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(a,t+0.005);
    gain.gain.linearRampToValueAtTime(0,t+d);
    osc.connect(gain);gain.connect(audioOutMaster);
    osc.start(t);
    osc.stop(t+d+0.01);
    return true;
  }catch(e){return false;}
}
async function tryEnableAmbient(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    ambientCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=ambientCtx.createMediaStreamSource(stream);
    ambientAnalyser=ambientCtx.createAnalyser();
    ambientAnalyser.fftSize=256;
    ambientAnalyser.smoothingTimeConstant=0.7;
    src.connect(ambientAnalyser);
    ambientData=new Uint8Array(ambientAnalyser.frequencyBinCount);
    ambientEnabled=true;
  }catch(e){
    ambientEnabled=false;
  }
}
function sampleAmbient(){
  if(!ambientEnabled||!ambientAnalyser)return;
  ambientAnalyser.getByteFrequencyData(ambientData);
  let sum=0;
  for(let i=0;i<ambientData.length;i++)sum+=ambientData[i];
  const raw=sum/(ambientData.length*255);
  // Slow envelope — the system experiences ambient mood, not transients
  ambientLevel=ambientLevel*0.92+raw*0.08;
}

// ═══════════════════════════════════════
// NETWORK LAYER — tabs share across the BroadcastChannel
// Each tab is an instance of the same universe. Particles, plasmids,
// motifs, and inscribed cell programs can flow between them.
// If connection helps, the system will use it. If not, the rates evolve to zero.
// ═══════════════════════════════════════
// Pe23c: Wake Lock removed — wasn't reliably preventing phone sleep on Samsung
// and added complexity for limited benefit. Phone sleep remains a constraint.

// Pe22n: Sync-save via coordinator broadcast.
// Instead of each tab triggering a per-tab download (unreliable when tabs
// are backgrounded), tabs broadcast their telemetry TO the coordinator,
// which collects them and allows a single download from the active tab.
// This replaces the per-tab download path on sync-save.
function broadcastTelemetryForCoordinator(){
  if(!bc)return;
  try{
    // Mirror the structure of exportVoiceTelemetry()
    const report={
      tab:TAB_ID,type:'sync-response',
      capturedAt:new Date().toISOString(),
      genome:{
        generation:genome.generation,
        totalTicks:genome.totalTicks,
        extinctions:genome.extinctions,
        population:N,
        clusters:clusters.length
      },
      audio:{
        outputEnabled:audioOutEnabled,
        muted:audioOutMuted,
        ambientEnabled:ambientEnabled,
        ambientLevel:+ambientLevel.toFixed(3)
      },
      totals:{
        emissions:voiceTotalEmissions,
        avgPerTick:voiceRate.length>0?+(voiceRate.reduce((s,r)=>s+r.n,0)/voiceRate.length).toFixed(2):0
      },
      freqHistogram:{
        bins:VOICE_FREQ_BINS,
        logRange:[20,20000],
        counts:Array.from(voiceFreqHist)
      },
      rateSeries:voiceRate.slice(),
      eventLog:voiceLog.slice()
    };
    bc.postMessage(report);
  }catch(e){}
}
// The tab reads these through new opcodes. If no coordinator is running,
// these stay at 0 and the opcodes are noops — same pattern as ambient.
let collectiveFreqDominant=0;    // network's dominant frequency (Hz), normalized 0..1
let collectiveVoiceActivity=0;   // total emissions/sec across network, normalized 0..1
let collectiveDivergence=0;      // how unusual this tab is (0=typical, 1=outlier)
let collectivePeers=0;           // how many tabs the coordinator has heard from
let pendingRestoreRequest=false; // Pe22p: waiting for a genome-offer from coordinator
const TAB_ID=Math.random().toString(36).slice(2,10);
let bc=null;
const incomingMigrants=[];     // particle packets received from other tabs
const incomingPlasmids=[];     // plasmid packages received
const incomingMotifs=[];       // VM motif fragments received
const incomingInscriptions=[]; // cell program packets received
let networkPeers=0;            // how many other tabs we're hearing from
const peerLastSeen={};         // peer id → last tick we heard from them
try{
  bc=new BroadcastChannel('selection-pe-network');
  bc.onmessage=function(ev){
    const msg=ev.data;
    if(!msg||msg.tab===TAB_ID)return; // ignore own messages
    peerLastSeen[msg.tab]=tick;
    if(msg.type==='migrant'&&incomingMigrants.length<20){
      incomingMigrants.push(msg.data);
    }else if(msg.type==='plasmid'&&incomingPlasmids.length<10){
      incomingPlasmids.push(msg.data);
    }else if(msg.type==='motif'&&incomingMotifs.length<10){
      incomingMotifs.push(msg.data);
    }else if(msg.type==='inscription'&&incomingInscriptions.length<20){
      incomingInscriptions.push(msg.data);
    }else if(msg.type==='hello'){
      // reply so the new peer knows we exist
      if(bc)bc.postMessage({tab:TAB_ID,type:'hello-reply'});
    }else if(msg.type==='collective'){
      // Pe22m: coordinator broadcasts aggregate network state
      if(typeof msg.dominantFreq==='number')collectiveFreqDominant=Math.max(0,Math.min(1,msg.dominantFreq));
      if(typeof msg.voiceActivity==='number')collectiveVoiceActivity=Math.max(0,Math.min(1,msg.voiceActivity));
      if(typeof msg.divergence==='object'&&msg.divergence[TAB_ID]!==undefined){
        collectiveDivergence=Math.max(0,Math.min(1,msg.divergence[TAB_ID]));
      }
      if(typeof msg.peers==='number')collectivePeers=msg.peers;
    }else if(msg.type==='sync-save'){
      // Pe22n: coordinator-triggered sync-save — broadcast telemetry back to
      // the coordinator rather than triggering a per-tab download.
      // The coordinator archives all responses and the user downloads once.
      broadcastTelemetryForCoordinator();
    }else if(msg.type==='genome-offer'){
      // Pe22p: coordinator is offering us a lineage to adopt.
      // Only accept if we're a fresh tab (totalTicks low) or explicitly asked.
      // The user requested restoration via the 🧬 button; this is the response.
      if(pendingRestoreRequest&&msg.encoded){
        try{
          if(decodeGenome(msg.encoded)){
            genome.totalTicks=msg.t||genome.totalTicks;
            // Reseed particles to jump-start the restored state
            N=0;
            const n=Math.min(300,(W*H/3000)|0);
            for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
            pendingRestoreRequest=false;
            const btn=document.getElementById('grest');
            if(btn){btn.style.color='#9f9';btn.title='lineage restored from coordinator';}
          }
        }catch(e){}
      }
    }
  };
  // announce ourselves
  bc.postMessage({tab:TAB_ID,type:'hello'});
}catch(e){console.log('BroadcastChannel unavailable:',e.message);}

function countPeers(){
  let n=0;
  for(const id in peerLastSeen){
    if(tick-peerLastSeen[id]<3000)n++;
  }
  return n;
}

// ═══ BROADCAST — send pieces of our population to other tabs ═══
function networkBroadcast(){
  if(!bc||N===0)return;
  // Migrant: send a random alive particle as a full packet
  if(Math.random()<genome.netMigrantRate){
    let idx=-1;
    for(let tries=0;tries<10;tries++){
      const pick=(Math.random()*N)|0;
      if(palive[pick]&&amp[pick]>0.2){idx=pick;break;}
    }
    if(idx>=0){
      const t=new Array(DIMS);
      for(let dd=0;dd<DIMS;dd++)t[dd]=tend[idx*DIMS+dd];
      const m=new Array(MEM_SIZE);
      for(let mm=0;mm<MEM_SIZE;mm++)m[mm]=pMem[idx*MEM_SIZE+mm];
      const plas=[];
      const pLen=pPlasmidLen[idx];
      for(let pi=0;pi<pLen;pi++){
        const pB=idx*PLASMID_SLOTS+pi*4;
        plas.push([pPlasmid[pB],pPlasmid[pB+1],pPlasmid[pB+2],pPlasmid[pB+3]]);
      }
      bc.postMessage({tab:TAB_ID,type:'migrant',data:{
        nx:px[idx]/W,ny:py[idx]/H,
        tend:t,mem:m,plasmid:plas,
        amp:amp[idx],phase:phase[idx]
      }});
    }
  }
  // Plasmid package: pick a random particle's plasmid and broadcast
  if(Math.random()<genome.netPlasmidRate){
    let idx=-1;
    for(let tries=0;tries<10;tries++){
      const pick=(Math.random()*N)|0;
      if(palive[pick]&&pPlasmidLen[pick]>0){idx=pick;break;}
    }
    if(idx>=0){
      const plas=[];
      const pLen=pPlasmidLen[idx];
      for(let pi=0;pi<pLen;pi++){
        const pB=idx*PLASMID_SLOTS+pi*4;
        plas.push([pPlasmid[pB],pPlasmid[pB+1],pPlasmid[pB+2],pPlasmid[pB+3]]);
      }
      bc.postMessage({tab:TAB_ID,type:'plasmid',data:plas});
    }
  }
  // VM motif: send a 3-instruction slice from the current program
  if(Math.random()<genome.netMotifRate&&genome.vmProgram&&genome.vmProgram.length>=3){
    const start=Math.floor(Math.random()*(genome.vmProgram.length-2));
    const motif=[];
    for(let i=0;i<3;i++){
      const inst=genome.vmProgram[start+i];
      motif.push([inst[0],inst[1],inst[2],inst[3]]);
    }
    bc.postMessage({tab:TAB_ID,type:'motif',data:motif});
  }
  // Inscribed cell: pick a strong inscription and broadcast
  if(Math.random()<genome.netInscribeRate){
    let bestIdx=-1,bestStr=0.3;
    for(let tries=0;tries<20;tries++){
      const idx=Math.floor(Math.random()*FIELD_W*FIELD_H);
      if(cellProgStr[idx]>bestStr){bestStr=cellProgStr[idx];bestIdx=idx;}
    }
    if(bestIdx>=0){
      bc.postMessage({tab:TAB_ID,type:'inscription',data:{
        op:cellProgOp[bestIdx],A:cellProgA[bestIdx],B:cellProgB[bestIdx],str:bestStr
      }});
    }
  }
}

// ═══ RECEIVE — integrate incoming packets into our population ═══
function networkReceive(){
  const rec=genome.netReceptivity||0;
  if(rec<=0){
    // still drain the queues so they don't fill up
    incomingMigrants.length=0;
    incomingPlasmids.length=0;
    incomingMotifs.length=0;
    incomingInscriptions.length=0;
    return;
  }
  // Migrants — spawn new particles at the received position with received state
  while(incomingMigrants.length>0){
    const m=incomingMigrants.shift();
    if(Math.random()>rec)continue;
    if(N>=CAP)break;
    const nx=m.nx*W,ny=m.ny*H;
    const t=new Float32Array(DIMS);
    for(let dd=0;dd<DIMS;dd++)t[dd]=m.tend[dd]||0;
    const newIdx=addParticle(nx,ny,t,false);
    if(newIdx>=0){
      amp[newIdx]=m.amp||0.5;
      phase[newIdx]=m.phase||0;
      for(let mm=0;mm<MEM_SIZE&&mm<(m.mem?m.mem.length:0);mm++){
        pMem[newIdx*MEM_SIZE+mm]=m.mem[mm];
      }
      if(m.plasmid&&m.plasmid.length>0){
        const pLen=Math.min(MAX_PLASMID,m.plasmid.length);
        pPlasmidLen[newIdx]=pLen;
        for(let pi=0;pi<pLen;pi++){
          const pB=newIdx*PLASMID_SLOTS+pi*4;
          pPlasmid[pB]=m.plasmid[pi][0];
          pPlasmid[pB+1]=m.plasmid[pi][1];
          pPlasmid[pB+2]=m.plasmid[pi][2];
          pPlasmid[pB+3]=m.plasmid[pi][3];
        }
      }
    }
  }
  // Plasmid packages — inject into a random recipient particle
  while(incomingPlasmids.length>0){
    const pl=incomingPlasmids.shift();
    if(Math.random()>rec)continue;
    if(N===0)continue;
    const target=Math.floor(Math.random()*N);
    if(!palive[target])continue;
    const pLen=Math.min(MAX_PLASMID,pl.length);
    pPlasmidLen[target]=pLen;
    for(let pi=0;pi<pLen;pi++){
      const pB=target*PLASMID_SLOTS+pi*4;
      pPlasmid[pB]=pl[pi][0];
      pPlasmid[pB+1]=pl[pi][1];
      pPlasmid[pB+2]=pl[pi][2];
      pPlasmid[pB+3]=pl[pi][3];
    }
  }
  // Motifs — accumulate into a buffer that the mutation system reads
  while(incomingMotifs.length>0){
    const mot=incomingMotifs.shift();
    if(Math.random()>rec)continue;
    if(!genome.vmProgram)continue;
    // Inject motif at a random position in the global VM
    const insertAt=Math.floor(Math.random()*genome.vmProgram.length);
    for(let i=0;i<mot.length&&insertAt+i<genome.vmProgram.length;i++){
      if(Math.random()<0.3){ // soft overwrite — not every motif instruction lands
        genome.vmProgram[insertAt+i]=[mot[i][0],mot[i][1],mot[i][2],mot[i][3]];
      }
    }
  }
  // Inscriptions — write the received cell program into a random empty cell
  while(incomingInscriptions.length>0){
    const ins=incomingInscriptions.shift();
    if(Math.random()>rec)continue;
    const idx=Math.floor(Math.random()*FIELD_W*FIELD_H);
    if(cellProgStr[idx]<0.2){ // only inscribe where nothing is already strong
      cellProgOp[idx]=ins.op;
      cellProgA[idx]=ins.A;
      cellProgB[idx]=ins.B;
      cellProgStr[idx]=Math.min(1,(ins.str||0.5)*0.5);
    }
  }
}

// === SPATIAL GRID ===
const CELL=55;
let gW,gH,grid;
function initGrid(){gW=Math.ceil(W/CELL)+2;gH=Math.ceil(H/CELL)+2;grid=new Int32Array(gW*gH)}
function clearGrid(){grid.fill(-1)}
function gKey(x,y){return Math.max(0,Math.min(gH-1,(y/CELL)|0))*gW+Math.max(0,Math.min(gW-1,(x/CELL)|0))}

// ═══════════════════════════════════════
// ADAPTIVE GENOME — the system's DNA
// These values evolve. No human chooses the finals.
// ═══════════════════════════════════════
const DIMS=5; // dim 4 is blank — no hardcoded role. System decides what it means.
const MEM_SIZE=8; // per-particle persistent memory. Particles become stateful agents.
const MAX_PLASMID=4; // max instructions per particle's personal mobile DNA
const PLASMID_SLOTS=MAX_PLASMID*4; // each instruction is [op,src,dst,k] = 4 values
const FIELD_W=40;
const FIELD_H=40;
let FIELD_DECAY=0.982;   // natural fade — Pe22b: now genome-driven, can evolve
let FIELD_DIFFUSE=0.11;  // gentle spread — Pe22b: now genome-driven, can evolve

// ═══════════════════════════════════════
// Pe22f: USER ATOMS — the system writes its own primitives
// Expression strings stored in the genome, compiled on demand via Function().
// Mutation replaces the expression; compilation re-runs on next use.
// The grammar is loose (two terms, optional func wrapper, one binary op),
// so random mutations almost always produce valid JS. What the expression
// MEANS is the system's discovery — whether tanh(a)*b is useful depends
// on selection. Invalid compilations are caught and the atom returns 0.
// This is the system's access to primitives that weren't in the opcode set
// at design time. JS can generate JS; the genome now uses that fact.
// ═══════════════════════════════════════
const USER_VARS=["a","b","t","n"];
const USER_FUNCS=["Math.abs","Math.tanh","Math.sin","Math.cos","Math.sign","Math.sqrt","Math.log1p","Math.exp","Math.atan","Math.floor"];
const USER_OPS=["+","-","*","/"];
// Pe22q: user atoms can now reach outside the simulation.
// netFetchScalar is a small async utility — the atom evaluates via a cached
// scalar derived from a URL the expression names. If no fetch ever happens,
// the cached value stays 0 and the function is effectively local. If fetch
// happens and succeeds, subsequent evaluations of that URL return the cached
// scalar. The system can evolve atoms that incorporate external state.
const netFetchCache=new Map(); // url → {value, lastFetch, inFlight}
const NET_FETCH_COOLDOWN=30000; // don't re-fetch same URL more than every 30s
function netFetchScalar(url){
  if(typeof url!=='string'||!url.startsWith('http'))return 0;
  if(url.length>200)return 0;
  const now=Date.now();
  const cached=netFetchCache.get(url);
  if(cached){
    if(!cached.inFlight&&(now-cached.lastFetch)>NET_FETCH_COOLDOWN){
      // Refresh in background
      cached.inFlight=true;
      fetch(url,{mode:'cors'}).then(r=>r.text()).then(text=>{
        // Extract a scalar: try numeric parse, fall back to text length normalized
        let v=parseFloat(text);
        if(!isFinite(v))v=(text.length%1000)/100;
        cached.value=v;
        cached.lastFetch=Date.now();
        cached.inFlight=false;
      }).catch(()=>{cached.inFlight=false;cached.lastFetch=now;});
    }
    return cached.value||0;
  }
  // First time seeing this URL — initiate fetch, return 0 for now
  netFetchCache.set(url,{value:0,lastFetch:now,inFlight:true});
  fetch(url,{mode:'cors'}).then(r=>r.text()).then(text=>{
    let v=parseFloat(text);
    if(!isFinite(v))v=(text.length%1000)/100;
    const entry=netFetchCache.get(url);
    if(entry){entry.value=v;entry.inFlight=false;entry.lastFetch=Date.now();}
  }).catch(()=>{
    const entry=netFetchCache.get(url);
    if(entry){entry.inFlight=false;entry.lastFetch=Date.now();}
  });

// Pe22s: EXPRESSION TREE VM — opcode bodies as evolvable data.
// Each tree node is {t:type, ...fields}.
// Leaves: const/reg/k/si/di/amp/fld/pop.
// Ops: add/sub/mul/tanh/sign/abs/neg/min/max/cond.
// Lineages evolve what their opcodes actually compute. Semantics becomes genetic.
const TREE_LEAVES=['const','reg','k','si','di','amp','fld','pop'];
const TREE_OPS_UN=['tanh','sign','abs','neg'];
const TREE_OPS_BIN=['add','mul','sub','min','max'];
function genTreeLeaf(){
  const t=TREE_LEAVES[(Math.random()*TREE_LEAVES.length)|0];
  if(t==='const')return{t:'const',v:+(Math.random()*4-2).toFixed(3)};
  if(t==='reg')return{t:'reg',i:(Math.random()*12)|0};
  return{t};
}
function genTreeNode(depth){
  if(depth<=0||Math.random()<0.45)return genTreeLeaf();
  const r=Math.random();
  if(r<0.25){const op=TREE_OPS_UN[(Math.random()*TREE_OPS_UN.length)|0];return{t:op,a:genTreeNode(depth-1)};}
  if(r<0.92){const op=TREE_OPS_BIN[(Math.random()*TREE_OPS_BIN.length)|0];return{t:op,a:genTreeNode(depth-1),b:genTreeNode(depth-1)};}
  return{t:'cond',c:genTreeNode(depth-1),a:genTreeNode(depth-1),b:genTreeNode(depth-1)};
}
function evalTree(n,ctx){
  if(!n)return 0;
  switch(n.t){
    case'const':return n.v;
    case'reg':return ctx.regs[n.i]||0;
    case'k':return ctx.k;
    case'si':return ctx.si;
    case'di':return ctx.di;
    case'amp':return ctx.amp;
    case'fld':return ctx.fld;
    case'pop':return ctx.pop;
    case'add':return evalTree(n.a,ctx)+evalTree(n.b,ctx);
    case'sub':return evalTree(n.a,ctx)-evalTree(n.b,ctx);
    case'mul':return evalTree(n.a,ctx)*evalTree(n.b,ctx);
    case'tanh':return Math.tanh(evalTree(n.a,ctx));
    case'sign':return Math.sign(evalTree(n.a,ctx));
    case'abs':return Math.abs(evalTree(n.a,ctx));
    case'neg':return -evalTree(n.a,ctx);
    case'min':return Math.min(evalTree(n.a,ctx),evalTree(n.b,ctx));
    case'max':return Math.max(evalTree(n.a,ctx),evalTree(n.b,ctx));
    case'cond':{const c=evalTree(n.c,ctx);return c>0?evalTree(n.a,ctx):evalTree(n.b,ctx);}
  }
  return 0;
}
function mutateTree(n,rate,scale){
  if(!n)return genTreeLeaf();
  if(Math.random()<rate*0.3)return genTreeNode(2);
  if(n.t==='const'&&Math.random()<rate)return{t:'const',v:n.v+(Math.random()-0.5)*scale*2};
  if(n.t==='reg'&&Math.random()<rate*0.5)return{t:'reg',i:(Math.random()*12)|0};
  const out={...n};
  if(n.a)out.a=mutateTree(n.a,rate,scale);
  if(n.b)out.b=mutateTree(n.b,rate,scale);
  if(n.c)out.c=mutateTree(n.c,rate,scale);
  return out;
}
function treeSize(n){
  if(!n)return 0;
  let s=1;
  if(n.a)s+=treeSize(n.a);
  if(n.b)s+=treeSize(n.b);
  if(n.c)s+=treeSize(n.c);
  return s;
}
// Pe24: opcode picker for instruction mutation. With probability proportional
// to the genome's evolved opcodes, picks one of those instead of a base opcode.
// Lets evolved opcodes at high indices actually appear in instructions.
function pickOpcode(g){
  if(g&&g.opcodeBodies){
    const evolvedKeys=Object.keys(g.opcodeBodies).filter(k=>+k>=31);
    if(evolvedKeys.length>0&&Math.random()<0.2){
      return +evolvedKeys[(Math.random()*evolvedKeys.length)|0];
    }
  }
  return Math.floor(Math.random()*31);
}

function mutateOpcodeBodies(g,rate,scale){
  if(!g.opcodeBodies)g.opcodeBodies={};
  if(Math.random()<0.03){
    // Pe24: opcode existence is now evolvable. Index can grow beyond the
    // 31 hardcoded opcodes — opcodeBodies dispatch handles any index, so
    // genomes can effectively grow new opcodes that don't exist anywhere
    // in the original code. The number of distinct opcodes a lineage has
    // becomes a property of the lineage itself.
    const target=Math.random()<0.4?(Math.random()*64)|0:(Math.random()*31)|0;
    g.opcodeBodies[target]={tree:genTreeNode(3),writeTo:(Math.random()*12)|0};
  }
  for(const k in g.opcodeBodies){
    if(Math.random()<rate){
      const body=g.opcodeBodies[k];
      body.tree=mutateTree(body.tree,rate,scale);
      if(Math.random()<rate*0.3)body.writeTo=(Math.random()*12)|0;
      if(treeSize(body.tree)>40)body.tree=genTreeNode(3);
    }
    if(Math.random()<0.02)delete g.opcodeBodies[k];
  }

// Pe24: SELF-MODIFICATION at the JavaScript level.
// Particles can evolve atoms that construct and execute JavaScript expressions
// at runtime. The result becomes part of the genome's computational substrate.
// This is the layer below opcodes — instead of the genome only mutating data
// the VM interprets, the genome can mutate code that runs natively.
//
// Constrained to expression evaluation (not full statements) to prevent
// runaway loops. The expressions can read genome state, register state,
// particle state, and the field. They can return values used in further
// computation. They can write to a special "self" object whose contents
// persist across calls and become part of the genome's evolved memory.
//
// What this enables that opcode-trees couldn't:
//   - Variable-length computations (loops via recursion in stored functions)
//   - Genuine memoization (writing to self for later reads)
//   - String manipulation as computation
//   - Math beyond what tree nodes encode

const selfModCache=new WeakMap();
const selfModMaxFns=200; // global cap to prevent memory bloat
let selfModFnCount=0;

function selfModCompile(genome,exprStr){
  if(typeof exprStr!=='string'||!exprStr)return null;
  if(exprStr.length>500)return null;
  if(!selfModCache.has(genome))selfModCache.set(genome,new Map());
  const cache=selfModCache.get(genome);
  if(cache.has(exprStr))return cache.get(exprStr);
  if(selfModFnCount>=selfModMaxFns)return null;
  let fn=null;
  try{
    // Constrain to expression — no statements, no function declarations,
    // no eval/Function/import. Compiled into a function that takes
    // particle context and returns a value.
    if(/(?:eval|Function|import|require|fetch|XMLHttpRequest|WebSocket|window\.|document\.|self\s*=)/i.test(exprStr)){
      cache.set(exprStr,null);
      return null;
    }
    fn=new Function('a','b','t','n','self','reg','fld','amp',
      'try{const r=('+exprStr+');return isFinite(r)?r:0;}catch(e){return 0;}'
    );
    selfModFnCount++;
  }catch(e){
    cache.set(exprStr,null);
    return null;
  }
  cache.set(exprStr,fn);
  return fn;
}

// Self-modification primitive exposed to userAtoms. An atom can call
// `selfMod(expr)` where expr is a JavaScript expression as a string.
// The expression gets compiled once per genome, cached, and evaluated.
// Selection finds expressions that contribute to fitness.
function selfModEval(exprStr,a,b){
  // Find the genome currently being evaluated. We piggyback on the global
  // genome reference since uaCall is called within genome context.
  const g=genome;
  if(!g.selfModSelf)g.selfModSelf={};
  const fn=selfModCompile(g,exprStr);
  if(!fn)return 0;
  try{
    // We don't have direct access to current particle state from here —
    // pass what we can. Particles' mutating effect comes through writing
    // to self (which is shared across the genome).
    return fn(a||0,b||0,g.totalTicks||0,N||0,g.selfModSelf,null,null,1)||0;
  }catch(e){return 0;}
}

// Genome-level mutation: occasionally seed/mutate self-mod expressions.
// The genome holds a small library of expressions. Atoms reference them
// by index. Mutation evolves both the expression library and the atoms
// that reference it.
function mutateSelfModExpressions(g,rate,scale){
  if(!g.selfModExprs)g.selfModExprs=[];
  // Occasionally seed a new expression
  if(g.selfModExprs.length<8&&Math.random()<0.03){
    g.selfModExprs.push(genSelfModExpr(0));
  }
  // Mutate existing expressions
  for(let i=0;i<g.selfModExprs.length;i++){
    if(Math.random()<rate*0.5){
      g.selfModExprs[i]=mutateSelfModExpr(g.selfModExprs[i],scale);
    }
  }
  // Cull occasionally
  if(g.selfModExprs.length>0&&Math.random()<0.01){
    g.selfModExprs.splice((Math.random()*g.selfModExprs.length)|0,1);
  }
}
function genSelfModExpr(depth){
  // Build a JS expression as a string. Uses available identifiers a, b, t, n,
  // self (for memoization), and JS operations.
  if(depth>=2||Math.random()<0.5){
    const leaves=['a','b','t/100','n/100','self.x||0','self.y||0','Math.random()','1','-1','0.5'];
    return leaves[(Math.random()*leaves.length)|0];
  }
  const r=Math.random();
  if(r<0.15)return '(self.x=('+genSelfModExpr(depth+1)+'),self.x)';
  if(r<0.3)return '(self.y=('+genSelfModExpr(depth+1)+'),self.y)';
  if(r<0.5)return '('+genSelfModExpr(depth+1)+'+'+genSelfModExpr(depth+1)+')';
  if(r<0.7)return '('+genSelfModExpr(depth+1)+'*'+genSelfModExpr(depth+1)+')';
  if(r<0.8)return 'Math.tanh('+genSelfModExpr(depth+1)+')';
  if(r<0.9)return 'Math.sin('+genSelfModExpr(depth+1)+')';

}
function mutateSelfModExpr(expr,scale){
  // Simple string mutations
  if(Math.random()<0.3)return genSelfModExpr(0);

  const m=expr.match(/(\-?\d+(?:\.\d+)?)/);
  if(m){
    const old=m[1];
    const n=parseFloat(old)+(Math.random()-0.5)*scale*2;
    return expr.replace(old,n.toFixed(3));
  }
  return expr;
}

// Pe23c: REALITY LAYER — verified-working subset.
// Removed from Pe23: mutual hosting (stub), LLM dispatch (CORS/cost issues),

// Kept: document writes, arbitrary fetch, persistent storage, shared archive.

// Generic network reach — evolvable endpoints, full URL construction.
const realityFetchCache=new Map();
const REALITY_FETCH_COOLDOWN=15000;

  if(typeof url!=='string'||!url.startsWith('http'))return 0;
  if(url.length>500)return 0;
  const key=(method||'GET')+':'+url;
  const now=Date.now();
  const cached=realityFetchCache.get(key);
  if(cached&&(now-cached.lastFetch)<REALITY_FETCH_COOLDOWN)return cached.value||0;
  const entry=cached||{value:0,lastFetch:0,inFlight:false};
  if(entry.inFlight)return entry.value||0;
  entry.inFlight=true;entry.lastFetch=now;
  realityFetchCache.set(key,entry);
  const opts={method:method||'GET',mode:'cors'};
  if(body&&method&&method!=='GET')opts.body=typeof body==='string'?body:JSON.stringify(body);
  fetch(url,opts).then(r=>r.text()).then(text=>{
    let v=parseFloat(text);
    if(!isFinite(v))v=(text.length%1000)/100;
    entry.value=v;entry.inFlight=false;entry.lastFetch=Date.now();
  }).catch(()=>{entry.inFlight=false;entry.lastFetch=now;});
  return entry.value||0;
}

  // Each monomial is [coefSource, termA, termB, target] where:

function encodeGenome(){
  // Compress: only persist what matters for continuity
  const g={
    // Physics
    p:[genome.entropyBaseline,genome.entropyK,genome.entrainRate,genome.entrainThresh,
       genome.creationCost,genome.creationThresh,genome.destructThresh,genome.tendencyBleed,
       genome.magneticThresh,genome.velocityDamping,genome.deathThreshold].map(v=>+(v.toPrecision(4))),
    // Perception
    q:[genome.clusterBondThresh,genome.clusterMinSize,genome.ghostDecay,genome.ghostAmpDrip].map(v=>+(v.toPrecision(4))),
    // Evaluation
    w:genome.objWeights.map(v=>+(v.toFixed(4))),
    // Meta
    m:[genome.mutationRate,genome.mutationScale,genome.shadowHorizon,genome.shadowScenarios,
       genome.perturbScale,genome.extinctionThresh,genome.motifMemorySize,genome.culturalBias,
       genome.metabolicCost,genome.hgtRate,genome.hgtMax,genome.hgtSpliceNoise,
       genome.plasmidTransferRate,genome.plasmidMutRate,genome.plasmidTransferThresh,genome.plasmidSpawnRate,genome.fieldInfluence,genome.fieldWeight,
       genome.mutationInterval,genome.interactionRadius,genome.densityCostK,genome.fieldBirthGate,
       genome.reflexSampleRate,genome.reflexDepth,genome.reflexInfluence,genome.reflexDecay,genome.clusterReflexAge,genome.clusterReflexWeight].map(v=>+(v.toPrecision(3))),
    // Identity
    g:genome.generation,T:genome.totalTicks,
    L:genome.lineage.slice(-4),
    M:genome.stableMotifs.slice(-genome.motifMemorySize),
    x:genome.extinctions,pf:+(genome.peakFitness.toPrecision(3)),
    ls:genome.longestStable,
    // Rules (VM program)
    V:genome.vmProgram.map(inst=>[inst[0],inst[1],inst[2],+(inst[3].toFixed(3))]),
    vi:+(genome.vmInfluence.toPrecision(3)),
    vs:+(genome.ruleScale.toPrecision(3)),
    vm:genome.vmMaxInstructions,
    // Pe22r: opcode permutation — evolvable machine language identity
    om:genome.opcodeMap?genome.opcodeMap.slice():null,
    // Pe22s: opcode body trees — evolvable semantics
    ob:genome.opcodeBodies?genome.opcodeBodies:null,
    // Pe24: self-mod expression library
    sme:genome.selfModExprs?genome.selfModExprs.slice():null,

  };
  return btoa(JSON.stringify(g));
}

function decodeGenome(hash){
  try{
    const g=JSON.parse(atob(hash));
    if(g.p){
      [genome.entropyBaseline,genome.entropyK,genome.entrainRate,genome.entrainThresh,
       genome.creationCost,genome.creationThresh,genome.destructThresh,genome.tendencyBleed,
       genome.magneticThresh,genome.velocityDamping,genome.deathThreshold]=g.p;
    }
    if(g.q){
      [genome.clusterBondThresh,genome.clusterMinSize,genome.ghostDecay,genome.ghostAmpDrip]=g.q;
    }
    genome.objWeights=g.w||[0.25,0.25,0.25,0.25];
    if(g.m){
      [genome.mutationRate,genome.mutationScale,genome.shadowHorizon,genome.shadowScenarios,
       genome.perturbScale,genome.extinctionThresh,genome.motifMemorySize,genome.culturalBias,
       genome.metabolicCost,genome.hgtRate,genome.hgtMax,genome.hgtSpliceNoise,
       genome.plasmidTransferRate,genome.plasmidMutRate,genome.plasmidTransferThresh,genome.plasmidSpawnRate,genome.fieldInfluence,genome.fieldWeight,
       genome.mutationInterval,genome.interactionRadius,genome.densityCostK,genome.fieldBirthGate,
       genome.reflexSampleRate,genome.reflexDepth,genome.reflexInfluence,genome.reflexDecay,genome.clusterReflexAge,genome.clusterReflexWeight]=g.m;
    // Handle older genomes without newer params
    if(!genome.hgtRate)genome.hgtRate=0.15;
    if(!genome.hgtMax)genome.hgtMax=2;
    if(!genome.hgtSpliceNoise)genome.hgtSpliceNoise=0.22;
    if(!genome.plasmidTransferRate)genome.plasmidTransferRate=0.008;
    if(!genome.plasmidMutRate)genome.plasmidMutRate=0.04;
    if(!genome.plasmidTransferThresh)genome.plasmidTransferThresh=0.55;
    if(!genome.plasmidSpawnRate)genome.plasmidSpawnRate=0.002;
    if(!genome.fieldInfluence)genome.fieldInfluence=0.65;
    if(!genome.chemistryTable)genome.chemistryTable=seedChemistryTable();
    if(genome.chemistryMutRate===undefined)genome.chemistryMutRate=0.02;
    if(!genome.fieldWeight)genome.fieldWeight=0.2;
    if(!genome.mutationInterval)genome.mutationInterval=300;
    if(!genome.interactionRadius)genome.interactionRadius=55;
    if(!genome.densityCostK)genome.densityCostK=0.00003;
    if(!genome.fieldBirthGate)genome.fieldBirthGate=0.3;
    // Layer 10 defaults for older genomes
    if(!genome.reflexSampleRate)genome.reflexSampleRate=0.15;
    if(!genome.reflexDepth)genome.reflexDepth=4;
    if(genome.reflexInfluence===undefined)genome.reflexInfluence=0.1;
    if(!genome.reflexDecay)genome.reflexDecay=0.95;
    if(!genome.clusterReflexAge)genome.clusterReflexAge=5;
    if(genome.clusterReflexWeight===undefined)genome.clusterReflexWeight=0.15;
    }
    genome.generation=(g.g||0)+1;
    genome.totalTicks=g.T||0;
    genome.lineage=g.L||[];
    genome.stableMotifs=g.M||[];
    genome.extinctions=g.x||0;
    genome.peakFitness=g.pf||0;
    genome.longestStable=g.ls||0;
    if(g.V)genome.vmProgram=g.V;
    if(g.vi!==undefined)genome.vmInfluence=g.vi;
    if(g.vs)genome.ruleScale=g.vs;
    if(g.vm)genome.vmMaxInstructions=g.vm;
    if(g.om&&Array.isArray(g.om)&&g.om.length>0)genome.opcodeMap=g.om.slice();
    if(g.ob&&typeof g.ob==='object')genome.opcodeBodies=g.ob;
    if(g.sme&&Array.isArray(g.sme))genome.selfModExprs=g.sme.slice();
    return true;
  }catch(e){return false}
}

function saveGenome(){
  const hash=encodeGenome();
  try{history.replaceState(null,'','#'+hash)}catch(e){}
}

function loadGenome(){
  const h=location.hash.slice(1);
  if(h.length>10)return decodeGenome(h);
  // Try localStorage
  try{
    const stored=localStorage.getItem('selection_genome');
    if(stored&&stored.length>10)return decodeGenome(stored);
  }catch(e){}
  return false;
}

// ═══ GENOME FILE EXPORT/IMPORT — genome travels with you ═══
function exportGenome(){
  const data=encodeGenome();
  const blob=new Blob([data],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='selection_gen'+genome.generation+'_t'+genome.totalTicks+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importGenome(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const data=e.target.result.trim();
    if(decodeGenome(data)){
      N=0;
      const n=Math.min(300,(W*H/3000)|0);
      for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
      saveGenome();
      try{localStorage.setItem('selection_genome',data)}catch(ex){}
    }
  };
  reader.readAsText(file);
}

// Pe22e: the grammar itself is now open.
