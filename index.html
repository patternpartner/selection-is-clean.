  // evolve to mutate their own innovation rate based on what their VM is doing.
  // If reading own genome helps, this strength grows; if not, it falls to 0.
  clusterGenomeReadStrength:0.05
};

const EVENT_LOG_SIZE=36;
const eventLastSeen={};
function recordEvent(kind,data,minGap){
  try{
    if(!genome||!genome.eventLog)return;
    const gap=minGap||0;
    if(gap>0&&eventLastSeen[kind]!==undefined&&genome.totalTicks-eventLastSeen[kind]<gap)return;
    eventLastSeen[kind]=genome.totalTicks;
    const ev={t:genome.totalTicks||tick,k:kind};
    if(data!==undefined)ev.d=data;
    genome.eventLog.push(ev);
    while(genome.eventLog.length>EVENT_LOG_SIZE)genome.eventLog.shift();
  }catch(e){}
}
function flushNetworkEvents(){
  for(const type in netEventPending){
    const n=netEventPending[type];
    if(n>0){recordEvent('net_'+type,{n,a:netStats.accepted},900);netEventPending[type]=0}
  }
}

function seedProblemTopology(){
  for(let y=0;y<FIELD_H;y++){
    for(let x=0;x<FIELD_W;x++){
      const idx=y*FIELD_W+x;
      const a=((x*3+y*5+11)%15)-7;
      const b=((x*7+y*2+3)%15)-7;
      problemA[idx]=a;
      problemB[idx]=b;
      // target is a tiny logic puzzle: rotate/xor-like mix reduced to nibble.
      const mix=((a&15)^((b&15)<<1)^((x+y)&15)^((x*3)&15))&15;
      problemTarget[idx]=mix;
    }
  }
}

//  - cellProgOp[], cellProgA[], cellProgB[] — a 1-instruction inscribed program
//  - cellProgStr[] — inscription strength (decays over time, reinforced by rewrites)
// Each tick, cells with inscribed programs run them on themselves + neighbours.
// The particles literally write the physics of their world.
const field2=new Float32Array(FIELD_W*FIELD_H); // second channel — enables reactions between channels
const field2Prev=new Float32Array(FIELD_W*FIELD_H); // Pe49: snapshot of field2 before each tick's diffusion — enables temporal derivative
const field1Prev=new Float32Array(FIELD_W*FIELD_H); // Pe70: snapshot of field1 before each tick's diffusion — enables temporal derivative (Layer 59)
const cellProgOp=new Uint8Array(FIELD_W*FIELD_H);    // opcode: which transformation this cell runs
const cellProgA=new Float32Array(FIELD_W*FIELD_H);   // parameter A
const cellProgB=new Float32Array(FIELD_W*FIELD_H);   // parameter B
const cellProgStr=new Float32Array(FIELD_W*FIELD_H); // inscription strength [0..1], decays if not reinforced
// Cell opcode meanings (evolved through selection on inscription patterns):
//  0: NONE        — cell does nothing, standard diffusion only
//  1: REACT       — field += field2 * A ; field2 -= field * B  (Gray-Scott-like but evolvable)
//  2: AMPLIFY     — field *= (1 + A * 0.1)  (local energy injection)
//  3: CONVERT     — field2 += field * A ; field *= (1 - B * 0.05)  (channel conversion)
//  4: SUPPRESS    — field *= (1 - A * 0.05) ; field2 *= (1 - B * 0.05)  (decay accelerator)
//  5: GRADIENT_AMP — amplify gradient: value += (max_neighbor - value) * A
//  6: INVERT      — swap channels: temp = field ; field = field2 * A ; field2 = temp * B
//  7: OSCILLATE   — field += sin(tick * A) * B  (temporal oscillation)

// ═══ LAYER 10: PER-PARTICLE SELF-MODEL ═══
// Each particle maintains a compressed model of its own recent state.
// ampHistory: rolling window of amplitude samples — the particle can detect its own trajectory
// resHistory: rolling window of resonance — the particle knows if it's been connecting
// reflexState: derived signals fed into the VM as additional registers
//   [0]=ampTrend (-1 declining, +1 rising), [1]=resPeak (best recent resonance),
//   [2]=isolation (inverse of interaction density), [3]=age_pressure (ontogenetic position)
const REFLEX_DEPTH=4; // samples per particle (overridden by genome at runtime)
const REFLEX_DIMS=4;  // derived signals
const pReflexHist=new Float32Array(CAP*REFLEX_DEPTH*2); // interleaved [amp,res] per sample
const pReflexState=new Float32Array(CAP*REFLEX_DIMS);   // derived self-model signals
const pReflexIdx=new Uint8Array(CAP);                    // ring buffer index per particle
const pInteractionDensity=new Float32Array(CAP);          // rolling interaction count

// ═══ LAYER 21: MUTUAL RECOGNITION — particles model each other (Pe31) ═══
// Each particle maintains compressed models of up to 3 recent interaction partners.
// Model per partner: [tend0, tend1, phaseAlign, resonance] — 4 floats.
// 3 partners × 4 floats = 12 floats per particle.
// Freshness tracks how recently this partner was observed; decays naturally.
// pNeighborIDs stores which particle occupies each slot (-1 = empty).
// These three arrays are the only structural addition Pe31 makes.
const NM_SLOTS=3;   // max partners tracked per particle
const NM_DIMS=4;    // [tend0, tend1, phaseAlign, resonance] per partner
const pNeighborModels=new Float32Array(CAP*NM_SLOTS*NM_DIMS); // compressed partner models
const pNeighborIDs=new Int16Array(CAP*NM_SLOTS).fill(-1);     // which particle in each slot
const pNeighborFresh=new Float32Array(CAP*NM_SLOTS);          // freshness (0=stale, 1=fresh)
// ═══ Pe35 Layer 24b: VM-QUERY STAMP ═══
// Records, per particle, the last partner its VM consulted via opcode 23 and the tick
// it did so. updateNeighborModel reads this to weight error contribution by actual use.
// Tick-stamped, so stale entries auto-invalidate as tick advances — no reset needed
// across extinction (tick is monotonic; exact-equality compare). Defensive -1 fill.
const pVmQueryPartner=new Int16Array(CAP).fill(-1); // partner index VM last queried
const pVmQueryTick=new Int32Array(CAP).fill(-1);    // tick of that query

// ═══ Pe36 LAYER 25: EXPLICIT SIGNAL CHANNEL ═══
// Each particle can EMIT and RECEIVE explicit numeric signals.
// pSignalEmit: what this particle broadcasts this tick (VM opcode 24 writes here)
// pSignalReceive: accumulated signals from neighbors (VM opcode 25 reads here)
// During interactions, emitted signals propagate to neighbors weighted by proximity.
// Signals decay per tick (genome.signalDecay) to prevent runaway accumulation.
// Emitting costs amplitude (genome.signalEmitCost * |signal|).
// The genome evolves whether this channel helps or should atrophy to zero cost.
const pSignalEmit=new Float32Array(CAP);     // signal this particle emits this tick
const pSignalReceive=new Float32Array(CAP);  // accumulated incoming signals
// Pe37: double-buffer the emission channel. Pe36 propagation read pSignalEmit[j]
// mid-loop, so whether j had emitted yet this tick depended on grid iteration order
// (some receives saw this tick's emission, some last tick's stale value). Reading the
// PREVIOUS tick's fully-formed emission field makes the channel deterministic and gives
// it a clean one-tick propagation delay — biologically sensible, order-independent.
const pSignalEmitPrev=new Float32Array(CAP); // last tick's final emissions (read by propagation)
// Pe38 Layer 27: per-particle net signal position. EMA of (|emit| - |receive|) each tick,
// normalized to [-1,1]. Positive → net broadcaster; negative → net listener.
// Feeds into VM via signalRoleInfluence genome param, allowing role-conditioned behavior
// to emerge. The VM sees its own communication role as data — it can evolve to act
// differently depending on whether it has been talking or listening recently.
const pSignalNetPos=new Float32Array(CAP);
// ═══ Pe51 LAYER 40: PER-PARTICLE NEIGHBOR COUNT ═══
// Counts living particles within interactionRadius of each particle, updated each tick
// during the processGrid pair sweep. Reset to 0 at the start of processGrid.
// Opcode 35 (NEIGHBOR_DENSITY) reads this as a VM-accessible pressure signal.
const pNeighborCount=new Int16Array(CAP);
// Pe37: honest loop-closure metric. Pe36's util was avgEmit * signalInfluence — emission
// weighted by a genome knob, not a measurement of whether anything LISTENS. This counts
// actual opcode-25 (SIGNAL_READ) executions, mirroring how Pe34/35 tracked opcode-23.
let signalReadCount=0; // monotonic count of SIGNAL_READ executions across all VMs


// ═══ Pe34 Layer 24: PREDICTION-ERROR ACCUMULATOR ═══
// Filled by updateNeighborModel each time a re-encounter happens (slot already held j).
// Drained and reset by the fitness compute each tick. Mean error → quality score.
let predictionErrorAccum=0;
let predictionUpdateCount=0;
// Pe35 Layer 24b: weight that came specifically from VM-consulted re-encounters.
// qf = predictionQueriedCount / predictionUpdateCount is THE loop-closure diagnostic.
let predictionQueriedCount=0;
let lastPredQuality=0,lastPredQF=0; // Pe35: most-recent drain snapshot for the HUD
// Cache: lineage color per field cell, rebuilt on cluster detection cycles (not every frame)
let fieldLineageCache=new Uint8Array(FIELD_W*FIELD_H*3); // R,G,B per cell
const EL=4;
const echox=new Float32Array(CAP*EL),echoy=new Float32Array(CAP*EL);
const echoIdx=new Uint8Array(CAP);
// Cluster membership
const clusterID=new Int16Array(CAP);

let deathsThisTick=0,birthsThisTick=0;
// BIRTH QUEUE — births deferred to after interaction loop to avoid modifying arrays mid-iteration
const birthQueue=[];

// ═══════════════════════════════════════
// PERSISTENT MEMORY VIA URL HASH
// The URL is the organism's genome.
// Copy URL = copy lineage. Share URL = share history.
// ═══════════════════════════════════════
function encodeGenome(){
  // Compress: persist evolvable genome state while omitting runtime-only compiled functions.
  const cleanAtoms=(genome.userAtoms||[]).map(a=>({
    expression:a.expression,
    failed:!!a.failed,
    uses:a.uses|0,
    age:a.age|0
  }));
  const cleanSensors=(genome.fitnessSensors||[]).map(s=>({
    program:(s.program||[]).map(inst=>cleanInstruction(inst)),
    weight:+((s.weight||0).toFixed(4)),
    realWeight:+((s.realWeight||0).toFixed(4))
  }));
  const g={
    z:2,
    // Physics
    p:[genome.entropyBaseline,genome.entropyK,genome.entrainRate,genome.entrainThresh,
       genome.creationCost,genome.creationThresh,genome.destructThresh,genome.tendencyBleed,
       genome.magneticThresh,genome.velocityDamping,genome.deathThreshold].map(v=>+(v.toPrecision(4))),
    // Perception
    q:[genome.clusterBondThresh,genome.clusterMinSize,genome.ghostDecay,genome.ghostAmpDrip].map(v=>+(v.toPrecision(4))),
    // Evaluation
    w:genome.objWeights.map(v=>+(v.toFixed(4))),
    fs:cleanSensors,
    // Meta
    m:[genome.mutationRate,genome.mutationScale,genome.shadowHorizon,genome.shadowScenarios,
       genome.perturbScale,genome.extinctionThresh,genome.motifMemorySize,genome.culturalBias,
       genome.metabolicCost,genome.hgtRate,genome.hgtMax,genome.hgtSpliceNoise,
       genome.plasmidTransferRate,genome.plasmidMutRate,genome.plasmidTransferThresh,genome.plasmidSpawnRate,genome.fieldInfluence,genome.fieldWeight,
       genome.mutationInterval,genome.interactionRadius,genome.densityCostK,genome.fieldBirthGate,
       genome.reflexSampleRate,genome.reflexDepth,genome.reflexInfluence,genome.reflexDecay,genome.clusterReflexAge,genome.clusterReflexWeight,
       genome.clusterGenomeReadStrength].map(v=>+(v.toPrecision(3))),
    // Substrate chemistry
    f:[genome.fieldDecay,genome.fieldDiffuse,genome.chemistryMutRate].map(v=>+(v.toPrecision(4))),
    C:genome.chemistryTable,
    // Network coupling
    n:[genome.netMigrantRate,genome.netPlasmidRate,genome.netMotifRate,genome.netInscribeRate,genome.netReceptivity].map(v=>+(v.toPrecision(4))),
    // Identity
    g:genome.generation,T:genome.totalTicks,
    L:genome.lineage.slice(-4),
    E:(genome.eventLog||[]).slice(-EVENT_LOG_SIZE),
    M:genome.stableMotifs.slice(-genome.motifMemorySize),
    x:genome.extinctions,pf:+(genome.peakFitness.toPrecision(3)),
    ls:genome.longestStable,
    // Rules (VM program)
    V:genome.vmProgram.map(inst=>cleanInstruction(inst)),
    vi:+(genome.vmInfluence.toPrecision(3)),
    vs:+(genome.ruleScale.toPrecision(3)),
    vm:genome.vmMaxInstructions,
    ua:cleanAtoms,
    clr:+(genome.creditLearnRate||1).toFixed(4), // Pe25 Layer 15: evolvable learning rate
    gb:+(genome.gradientBias||0.3).toFixed(4),   // Pe26 Layer 16a: gradient bias
    gub:+(genome.gradientUpstreamBias||0.2).toFixed(4), // Pe26 Layer 16c: upstream bias
    bgb:+(genome.behaviorGradientBias||0.2).toFixed(4), // Pe33: behavioral gradient bias
    // Pe31 Layer 21: mutual recognition
    nmr:+(genome.neighborModelUpdateRate||0.3).toFixed(4),
    npi:+(genome.neighborPredictionInfluence||0.15).toFixed(4),
    mrt:+(genome.mutualRecognitionThresh||0.5).toFixed(4),
    rw:+(genome.relationalWeight||0.15).toFixed(4), // Pe34 Layer 24: relational fitness weight
    rub:+((typeof genome.relationalUseBias==='number'?genome.relationalUseBias:0.2)).toFixed(4), // Pe35 Layer 24b: use-gate sharpening (0 is a valid evolved value — must not be ||-erased)
    // Pe36 Layer 25: explicit signal channel
    sec:+(genome.signalEmitCost||0.005).toFixed(4),      // signal emission metabolic cost
    sinf:+(genome.signalInfluence||0.15).toFixed(4),     // signal influence into VM
    sdec:+(genome.signalDecay||0.2).toFixed(4),          // signal decay rate per tick
    // Pe37 Layer 26: attribution. mcb = feedback gate; mct = credit traces in
    // META_LAYER_PARAMS order (compact array, traces only — deltas are transient).
    mcb:+(genome.metaCreditBias||0).toFixed(4),
    // Pe38 Layer 27: search width bias gate.
    msb:+(genome.metaSearchBias||0).toFixed(4),
    dw39:+(genome.dissolutionWeight||0.2).toFixed(4), // Pe39 Layer 28
    ar40:+(genome.atrophyRate||0).toFixed(4), // Pe40 Layer 29
    msi42:+(genome.metaSignalInfluence||0).toFixed(4), // Pe42 Layer 31
    msgi43:+(genome.metaSignalGradInfluence||0).toFixed(4), // Pe43 Layer 32
    msvi44:+(genome.metaSignalVolInfluence||0).toFixed(4), // Pe44 Layer 33
    mmb45:+(genome.metaMutationBias||0.2).toFixed(4),      // Pe45 Layer 34 (was missing — bug fix)
    ini46:+(genome.inscriptionInfluence||0).toFixed(4),    // Pe46 Layer 35
    fw47:+(genome.field2WriteInfluence||0).toFixed(4),       // Pe47 Layer 36
    f2gi48:+(genome.field2GradInfluence||0).toFixed(4),      // Pe48 Layer 37
    f2ti49:+(genome.field2TemporalInfluence||0).toFixed(4),  // Pe49 Layer 38
    f2xi50:+(genome.fieldCrossInfluence||0).toFixed(4),      // Pe50 Layer 39
    ndi51:+(genome.neighborDensityInfluence||0).toFixed(4),  // Pe51 Layer 40
    sai52:+(genome.selfAmpInfluence||0).toFixed(4),           // Pe52 Layer 41
    pai53:+(genome.partnerAmpInfluence||0).toFixed(4),        // Pe53 Layer 42
    pdi54:+(genome.partnerDensityInfluence||0).toFixed(4),    // Pe54 Layer 43
    sagi55:+(genome.selfAgeInfluence||0).toFixed(4),           // Pe55 Layer 44
    pagei56:+(genome.partnerAgeInfluence||0).toFixed(4),        // Pe56 Layer 45
    sspi57:+(genome.selfSpeedInfluence||0).toFixed(4),           // Pe57 Layer 46
    pspdi58:+(genome.partnerSpeedInfluence||0).toFixed(4),          // Pe58 Layer 47
    hai59:+(genome.headingAlignInfluence||0).toFixed(4),             // Pe59 Layer 48
    ari60:+(genome.approachRateInfluence||0).toFixed(4),              // Pe60 Layer 49
    ori61:+(genome.orbitRateInfluence||0).toFixed(4),                  // Pe61 Layer 50
    sfi62:+(genome.selfFreqInfluence||0).toFixed(4),                    // Pe62 Layer 51
    pfsi63:+(genome.partnerFreqInfluence||0).toFixed(4),                 // Pe63 Layer 52 (was missing — bug fix)
    pmri64:+(genome.partnerMemReadInfluence||0).toFixed(4),              // Pe64 Layer 53
    ptri65:+(genome.partnerTendInfluence||0).toFixed(4),                  // Pe65 Layer 54
    stri66:+(genome.selfTendInfluence||0).toFixed(4),                      // Pe66 Layer 55
    sphi67:+(genome.selfPhaseInfluence||0).toFixed(4),                      // Pe67 Layer 56
    pphi68:+(genome.partnerPhaseInfluence||0).toFixed(4),                   // Pe68 Layer 57 (bug fix — was missing)
    idi69:+(genome.interactionDistInfluence||0).toFixed(4),                  // Pe69 Layer 58
    f1ti70:+(genome.fieldTemporalInfluence||0).toFixed(4),                    // Pe70 Layer 59
    mct:META_LAYER_PARAMS.map(p=>{
      const e=genome.metaCredit&&genome.metaCredit[p];
      return +((e&&e.trace)||0).toFixed(3);
    }),
    // Pe27 Layer 17: shadow scenario bank. Compact tuple per entry.
    // [e,k,r,c,t, wins, age, srcIdx, creditTrace(Pe29), f,p,a,tb,sp,sm,mp(Pe32)]
    // srcIdx: 0=seed,1=child,2=random,3=fossil(Pe28)
    sb:Array.isArray(genome.shadowScenarioBank)?genome.shadowScenarioBank.map(sc=>[
      +sc.e.toFixed(3),+sc.k.toFixed(3),+sc.r.toFixed(3),+sc.c.toFixed(3),+sc.t.toFixed(3),
      sc.wins|0,sc.age|0,
      sc.src==='seed'?0:sc.src==='child'?1:sc.src==='fossil'?3:2,
      +(sc.creditTrace||0).toFixed(3),
      +(sc.f||0).toFixed(3),+(sc.p||0).toFixed(3),+(sc.a||0).toFixed(3),
      +(sc.tb||0).toFixed(3),+(sc.sp||0).toFixed(3),+(sc.sm||0).toFixed(3),+(sc.mp||0).toFixed(3)
    ]):null,
    sbc:+(genome.shadowBankChurn||0.5).toFixed(3),
    scw:+(genome.scenarioCreditWeight||0).toFixed(3), // Pe29 Layer 19
    ser:+(genome.shadowExploreRate||0.5).toFixed(3) // Pe30b: explore rate
  };
  return btoa(JSON.stringify(g));
}

  try{
    data=(data||'').trim();
    if(data[0]==='{'){
      const wrapper=JSON.parse(data);

    }
    const g=JSON.parse(atob(data));
    if(g.p){
      [genome.entropyBaseline,genome.entropyK,genome.entrainRate,genome.entrainThresh,
       genome.creationCost,genome.creationThresh,genome.destructThresh,genome.tendencyBleed,
       genome.magneticThresh,genome.velocityDamping,genome.deathThreshold]=g.p;
    }
    if(g.q){
      [genome.clusterBondThresh,genome.clusterMinSize,genome.ghostDecay,genome.ghostAmpDrip]=g.q;
    }
    genome.objWeights=g.w||[0.25,0.25,0.25,0.25];
    if(g.fs)genome.fitnessSensors=g.fs;
    if(g.m){
      [genome.mutationRate,genome.mutationScale,genome.shadowHorizon,genome.shadowScenarios,
       genome.perturbScale,genome.extinctionThresh,genome.motifMemorySize,genome.culturalBias,
       genome.metabolicCost,genome.hgtRate,genome.hgtMax,genome.hgtSpliceNoise,
       genome.plasmidTransferRate,genome.plasmidMutRate,genome.plasmidTransferThresh,genome.plasmidSpawnRate,genome.fieldInfluence,genome.fieldWeight,
       genome.mutationInterval,genome.interactionRadius,genome.densityCostK,genome.fieldBirthGate,
       genome.reflexSampleRate,genome.reflexDepth,genome.reflexInfluence,genome.reflexDecay,genome.clusterReflexAge,genome.clusterReflexWeight,
       genome.clusterGenomeReadStrength]=g.m;
    }
    if(g.f){
      [genome.fieldDecay,genome.fieldDiffuse,genome.chemistryMutRate]=g.f;
    }
    if(g.C)genome.chemistryTable=g.C;
    if(g.n){
      [genome.netMigrantRate,genome.netPlasmidRate,genome.netMotifRate,genome.netInscribeRate,genome.netReceptivity]=g.n;

    if(typeof g.pmri64==='number')genome.partnerMemReadInfluence=g.pmri64;            // Pe64 Layer 53
    if(typeof g.ptri65==='number')genome.partnerTendInfluence=g.ptri65;                // Pe65 Layer 54
    if(typeof g.stri66==='number')genome.selfTendInfluence=g.stri66;                    // Pe66 Layer 55
    if(typeof g.sphi67==='number')genome.selfPhaseInfluence=g.sphi67;                    // Pe67 Layer 56
    if(typeof g.pphi68==='number')genome.partnerPhaseInfluence=g.pphi68;                 // Pe68 Layer 57 (bug fix)
    if(typeof g.idi69==='number')genome.interactionDistInfluence=g.idi69;                // Pe69 Layer 58
    if(typeof g.f1ti70==='number')genome.fieldTemporalInfluence=g.f1ti70;              // Pe70 Layer 59
    // Pe37 Layer 26: attribution
    if(typeof g.mcb==='number')genome.metaCreditBias=g.mcb;
    if(typeof g.msb==='number')genome.metaSearchBias=g.msb; // Pe38 Layer 27: search width bias
    if(Array.isArray(g.mct)){
      const reg={};
      META_LAYER_PARAMS.forEach((p,idx)=>{
        // Pe38: traceSlow and conf rebuild from zero — cheap to reconstruct, no need to save.
        reg[p]={trace:finiteOr(g.mct[idx],0),traceSlow:0,conf:0,pendingDelta:0,fitAtApply:0};
      });
      genome.metaCredit=reg;
    }
    // Pe27 Layer 17: shadow scenario bank
    if(Array.isArray(g.sb)){
      genome.shadowScenarioBank=g.sb.map(a=>({
        e:finiteOr(a[0],0),k:finiteOr(a[1],0),r:finiteOr(a[2],0),
        c:finiteOr(a[3],0),t:finiteOr(a[4],0),
        wins:(a[5]|0),age:(a[6]|0),
        src:['seed','child','random','fossil'][a[7]|0]||'random',
        creditTrace:finiteOr(a[8],0), // Pe29 — defaults to 0 for legacy genomes
        // Pe32: behavioral axes — default to 0 for legacy genomes (Pe31 behavior)
        f:finiteOr(a[9],0),p:finiteOr(a[10],0),a:finiteOr(a[11],0),
        tb:finiteOr(a[12],0),sp:finiteOr(a[13],0),sm:finiteOr(a[14],0),mp:finiteOr(a[15],0)
      }));
    }
    if(typeof g.sbc==='number')genome.shadowBankChurn=g.sbc;
    if(typeof g.scw==='number')genome.scenarioCreditWeight=g.scw; // Pe29 Layer 19
    if(typeof g.ser==='number')genome.shadowExploreRate=g.ser; // Pe30b: explore rate
    sanitizeGenome();
    return true;
  }catch(e){return false}
}

function finiteOr(v,fallback){return typeof v==='number'&&isFinite(v)?v:fallback}
function cleanInstruction(inst){
  if(!Array.isArray(inst))return [0,0,0,0];
  return [finiteOr(inst[0],0),finiteOr(inst[1],0),finiteOr(inst[2],0),finiteOr(inst[3],0)];
}
function validChemistryTable(table){
  return Array.isArray(table)&&table.length>=12&&table.every(recipe=>Array.isArray(recipe)&&recipe.length>0&&recipe.every(mono=>Array.isArray(mono)&&mono.length>=4&&mono.every(v=>typeof v==='number'&&isFinite(v))));
}
function sanitizeGenome(){
  if(!Array.isArray(genome.objWeights)||genome.objWeights.length<4)genome.objWeights=[0.25,0.25,0.25,0.25];
  genome.objWeights=genome.objWeights.slice(0,4).map(v=>Math.max(0,finiteOr(v,0)));
  const wSum=genome.objWeights.reduce((a,b)=>a+b,0);
  genome.objWeights=wSum>0?genome.objWeights.map(v=>v/wSum):[0.25,0.25,0.25,0.25];
  genome.vmProgram=Array.isArray(genome.vmProgram)?genome.vmProgram.map(cleanInstruction).slice(0,48):[[0,0,0,0]];
  if(genome.vmProgram.length===0)genome.vmProgram=[[0,0,0,0]];
  genome.vmMaxInstructions=Math.max(1,Math.min(48,Math.round(finiteOr(genome.vmMaxInstructions,16))));
  genome.fitnessSensors=Array.isArray(genome.fitnessSensors)?genome.fitnessSensors.filter(s=>s&&Array.isArray(s.program)).map(s=>({program:s.program.map(cleanInstruction),weight:finiteOr(s.weight,0),realWeight:finiteOr(s.realWeight,0),creditTrace:finiteOr(s.creditTrace,0),lastEmit:finiteOr(s.lastEmit,0),prevEmit:finiteOr(s.prevEmit,0)})):[{program:[[2,5,6,1.0],[4,6,0,1.0]],weight:0.1,realWeight:0,creditTrace:0,lastEmit:0,prevEmit:0}];
  if(genome.fitnessSensors.length===0)genome.fitnessSensors=[{program:[[2,5,6,1.0],[4,6,0,1.0]],weight:0.1,realWeight:0,creditTrace:0,lastEmit:0,prevEmit:0}];
  // Pe25 Layer 15: credit-assignment defaults for old saves
  genome.creditLearnRate=Math.max(0,Math.min(3,finiteOr(genome.creditLearnRate,1.0)));
  // Pe26 Layer 16: gradient defaults for old saves
  genome.gradientBias=Math.max(0,Math.min(1,finiteOr(genome.gradientBias,0.3)));
  genome.gradientUpstreamBias=Math.max(0,Math.min(1,finiteOr(genome.gradientUpstreamBias,0.2)));
  genome.behaviorGradientBias=Math.max(0,Math.min(1,finiteOr(genome.behaviorGradientBias,0.2))); // Pe33
  // Pe31 Layer 21: mutual recognition defaults for old saves
  genome.neighborModelUpdateRate=Math.max(0,Math.min(1,finiteOr(genome.neighborModelUpdateRate,0.3)));
  genome.neighborPredictionInfluence=Math.max(0,Math.min(0.5,finiteOr(genome.neighborPredictionInfluence,0.15)));
  genome.mutualRecognitionThresh=Math.max(0,Math.min(1,finiteOr(genome.mutualRecognitionThresh,0.5)));
  genome.relationalWeight=Math.max(0,Math.min(1,finiteOr(genome.relationalWeight,0.15))); // Pe34 Layer 24
  genome.relationalUseBias=Math.max(0,Math.min(1,finiteOr(genome.relationalUseBias,0.2))); // Pe35 Layer 24b
  // Pe36 Layer 25: explicit signal channel defaults and bounds
  genome.signalEmitCost=Math.max(0,Math.min(0.05,finiteOr(genome.signalEmitCost,0.005)));
  genome.signalInfluence=Math.max(0,Math.min(1,finiteOr(genome.signalInfluence,0.15)));
  genome.signalDecay=Math.max(0,Math.min(0.5,finiteOr(genome.signalDecay,0.2)));
  // Pe37 Layer 26: attribution defaults. metaCreditBias bounded [0,0.5]. metaCredit

  genome.metaCreditBias=Math.max(0,Math.min(0.5,finiteOr(genome.metaCreditBias,0.1)));
  // Pe38 Layer 27: search width bias — controls how much confidence scales mutation width.

  genome.metaSearchBias=Math.max(0,Math.min(1,finiteOr(genome.metaSearchBias,0.15)));
  // Pe38 Layer 27: signal role influence — how strongly net signal role feeds into VM.
  genome.signalRoleInfluence=Math.max(0,Math.min(1,finiteOr(genome.signalRoleInfluence,0.1)));
  genome.dissolutionWeight=Math.max(0,Math.min(1,finiteOr(genome.dissolutionWeight,0.2))); // Pe39
  genome.atrophyRate=Math.max(0,Math.min(0.3,finiteOr(genome.atrophyRate,0.05))); // Pe40 Layer 29
  genome.metaSignalInfluence=Math.max(0,Math.min(1,finiteOr(genome.metaSignalInfluence,0.1))); // Pe42 Layer 31
  if(genome.metaSignalValue===undefined)genome.metaSignalValue=0;
  if(genome.metaSignalGrad===undefined)genome.metaSignalGrad=0;

  if(genome.selfSpeedInfluence===undefined)genome.selfSpeedInfluence=0.15;

  if(genome.selfFreqInfluence===undefined)genome.selfFreqInfluence=0.15;

  if(genome.partnerMemReadInfluence===undefined)genome.partnerMemReadInfluence=0.15;

  if(genome.partnerTendInfluence===undefined)genome.partnerTendInfluence=0.15;
  genome.partnerTendInfluence=Math.max(0,Math.min(1,finiteOr(genome.partnerTendInfluence,0.15)));             // Pe65 Layer 54
  if(genome.selfPhaseInfluence===undefined)genome.selfPhaseInfluence=0.15;
  genome.selfPhaseInfluence=Math.max(0,Math.min(1,finiteOr(genome.selfPhaseInfluence,0.15)));                  // Pe67 Layer 56

  genome.partnerPhaseInfluence=Math.max(0,Math.min(1,finiteOr(genome.partnerPhaseInfluence,0.15)));            // Pe68 Layer 57 (bug fix — was missing from sanitize)
  if(genome.interactionDistInfluence===undefined)genome.interactionDistInfluence=0.15;
  genome.interactionDistInfluence=Math.max(0,Math.min(1,finiteOr(genome.interactionDistInfluence,0.15)));      // Pe69 Layer 58
  if(genome.fieldTemporalInfluence===undefined)genome.fieldTemporalInfluence=0.1;

  {

  genome.fieldDecay=finiteOr(genome.fieldDecay,0.982);
  genome.fieldDiffuse=finiteOr(genome.fieldDiffuse,0.11);
  genome.chemistryMutRate=finiteOr(genome.chemistryMutRate,0.02);
  FIELD_DECAY=Math.max(0.5,Math.min(1.0,genome.fieldDecay));

  if(!Array.isArray(genome.shadowScenarioBank)||genome.shadowScenarioBank.length<3){

  }else{

      t:Math.max(-2,Math.min(2,finiteOr(sc&&sc.t,0))),
      // Pe32: behavioral axes — clamped to ±2, default 0 for legacy genomes
      f:Math.max(-2,Math.min(2,finiteOr(sc&&sc.f,0))),
      p:Math.max(-2,Math.min(2,finiteOr(sc&&sc.p,0))),
      a:Math.max(-2,Math.min(2,finiteOr(sc&&sc.a,0))),
      tb:Math.max(-2,Math.min(2,finiteOr(sc&&sc.tb,0))),
      sp:Math.max(-2,Math.min(2,finiteOr(sc&&sc.sp,0))),
      sm:Math.max(-2,Math.min(2,finiteOr(sc&&sc.sm,0))),
      mp:Math.max(-2,Math.min(2,finiteOr(sc&&sc.mp,0))),
      wins:Math.max(0,(sc&&sc.wins|0)||0),
      age:Math.max(0,(sc&&sc.age|0)||0),
      src:sc&&typeof sc.src==='string'?sc.src:'random',

    })).slice(0,SHADOW_SCENARIOS_MAX);

  genome.scenarioCreditWeight=Math.max(0,Math.min(1,finiteOr(genome.scenarioCreditWeight,0.4)));
}

function saveGenome(){
  const hash=encodeGenome();
  try{history.replaceState(null,'','#'+hash)}catch(e){}
}

const MAX_STORED_GENOME_BYTES=500000;
function decodeGenomeSafe(data,source){
  if(!data||data.length<=10)return false;
  if(data.length>MAX_STORED_GENOME_BYTES){
    console.warn('Ignoring oversized genome from '+source,data.length);
    return false;
  }
  const ok=decodeGenome(data);
  if(!ok)console.warn('Ignoring unreadable genome from '+source);
  return ok;
}
function loadGenome(){
  const h=location.hash.slice(1);
  if(h==='reset'){
    try{localStorage.removeItem('selection_genome')}catch(e){}
    try{history.replaceState(null,'',location.pathname||' ')}catch(e){}
    return false;
  }
  if(decodeGenomeSafe(h,'url'))return true;
  // Try localStorage. Bad stored genomes are quarantined so one corrupt lineage
  // cannot keep producing a black screen on every reload.
  try{
    const stored=localStorage.getItem('selection_genome');
    if(stored&&stored.length>10){
      const ok=decodeGenomeSafe(stored,'localStorage');
      if(!ok)try{localStorage.removeItem('selection_genome')}catch(e){}
      return ok;
    }
  }catch(e){}
  return false;
}

// ═══ GENOME FILE EXPORT/IMPORT — genome travels with you ═══
function exportGenome(){
  const data=JSON.stringify({type:'selection-genome',version:2,exportedAt:new Date().toISOString(),genome:encodeGenome()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='selection_gen'+genome.generation+'_t'+genome.totalTicks+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importGenome(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const data=e.target.result.trim();
    if(decodeGenome(data)){
      N=0;
      const n=Math.min(300,(W*H/3000)|0);
      for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
      saveGenome();
      try{localStorage.setItem('selection_genome',data)}catch(ex){}
    }
  };
  reader.readAsText(file);
}
document.getElementById('gexp').onclick=exportGenome;
document.getElementById('gimp').onclick=function(){document.getElementById('gfile').click()};
document.getElementById('gfile').onchange=function(e){if(e.target.files[0])importGenome(e.target.files[0])};

// ═══════════════════════════════════════
// CLUSTER DETECTION — STRUCTURAL COMPRESSION
// Not scalars. Structure. The system sees its own topology.
// ═══════════════════════════════════════

// Pe22e: the grammar itself is now open.
//   - Coef inventory: {+A, +B, -A, -B, +1, -1}. The ±1 entries enable true
//     constant rates — the Gray-Scott refill term the 22d grammar forbade.
//   - Term inventory: 15 slots. 0..11 = local/neighbour states (as before),
//     12 = the literal 1.0 (linear terms: stateX * 1 = stateX),
//     13,14 = the accumulating d1, d2 (sequential feedback within a tick).
//   - Execution: monomials are now a sequence, not a sum. Each monomial
//     sees the d1/d2 built by the earlier ones. Single-tick expression space
//     goes from bilinear → arbitrary polynomial.
//   - Recipes can grow longer (up to 12) because they now do more work per
//     monomial than they did when each one was an independent additive term.
// Risks: intermediates can explode before the downstream clamp catches them.
// isFinite skip keeps a blown monomial from poisoning the rest of the recipe.
function seedChemistryTable(){
  const table=[];
  for(let oi=0;oi<12;oi++){
    const len=3+((Math.random()*5)|0); // 3..7 monomials
    const recipe=[];
    for(let mi=0;mi<len;mi++){
      recipe.push([
        (Math.random()*6)|0,   // coefSource: 0..5 (A, B, -A, -B, +1, -1)
        (Math.random()*15)|0,  // termA: 0..14 (12 states + 1.0 + d1 + d2)
        (Math.random()*15)|0,  // termB: 0..14
        (Math.random()*2)|0    // target: d1 or d2
      ]);
    }
    table.push(recipe);
  }
  return table;
}

const MAX_CLUSTERS=30;
const clusters=[];
const prevClusters=[];

// ═══ Pe39 LAYER 28: DISSOLUTION FOSSIL POOL ═══
// Capped pool of behavioral fingerprints from dissolved long-lived clusters.
// Quality-ordered: lower-quality fossils are evicted when pool is full.
// Each fossil carries: persistAge, coherence, avgAmp, derived scenario axes,
// and up to 4 raw instructions from the cluster's vmProgram for motif injection.
const DISSOLUTION_MIN_AGE=8;    // cluster must have survived ≥8 detection cycles
const MAX_DISSOLUTION_FOSSILS=6;
const dissolutionFossils=[];    // [{quality,persistAge,coherence,avgAmp,scenarioAxes,physicsAxes,vmProgram}]

function recordDissolutionFossil(c,quality){
  // Evict lowest-quality fossil if pool is full
  if(dissolutionFossils.length>=MAX_DISSOLUTION_FOSSILS){
    let minIdx=0;
    for(let i=1;i<dissolutionFossils.length;i++){
      if(dissolutionFossils[i].quality<dissolutionFossils[minIdx].quality)minIdx=i;
    }
    if(dissolutionFossils[minIdx].quality>=quality)return; // incoming not better, skip
    dissolutionFossils.splice(minIdx,1);
  }
  // Derive behavioral scenario axes from observable cluster state.
  // These are heuristic probes — the shadow sim validates them, weak ones age out.
  // High coherence → cluster thrived on phase alignment → probe force + entrainRate.
  // High avgAmp   → cluster was energetically rich → probe spawnDrive.
  const f=Math.max(-1.5,Math.min(1.5,(c.coherence-0.4)*3));
  const sp=Math.max(-1.5,Math.min(1.5,(c.avgAmp-0.4)*3));
  const r=Math.max(-1.5,Math.min(1.5,c.coherence-0.5));
  dissolutionFossils.push({
    quality,
    persistAge:c.persistAge,
    coherence:c.coherence,
    avgAmp:c.avgAmp,
    // Behavioral axes derived from cluster observable state
    scenarioAxes:{f,p:0,a:0,tb:0,sp,sm:0,mp:0},
    // Physics axes: entrainRate nudge from coherence
    physicsAxes:{e:0,k:0,r,c:0,t:0},
    // Raw cluster vmProgram motifs for direct injection (up to 4 instructions)
    vmProgram:c.vmProgram?c.vmProgram.slice(0,4).map(inst=>[...inst]):[]
  });
  recordEvent('dissolution_fossil',{age:c.persistAge,q:+quality.toFixed(2),n:dissolutionFossils.length},600);
}
let clusterAge=new Map(); // track persistence across snapshots
let clusterVMs=new Map(); // persist per-cluster VM programs across detection cycles (keyed by hash)
// Pe30 Layer 20: per-cluster scenario fossil. A cluster snapshots the global bank's
// top scenario AT BIRTH and carries it for its whole life. This is what makes Pe28's
// resurrection pathway genuinely fire — a long-lived cluster's snapshot is genuinely
// old, so by the time it signals upstream, the source scenario has often been evicted.
let clusterFossils=new Map(); // hash → {e,k,r,c,t,creditTrace} birth-time scenario snapshot
// ═══════════════════════════════════════
// Pe22f: CLUSTER-LEVEL GENOME — major evolutionary transition.
// Clusters become units of selection with heritable cluster-level traits.
// These traits control WHAT A CLUSTER DOES: its reproduction rate, how much
// it splits on budding, how much it mutates, what it costs itself to bud.
// All were designer-hardcoded constants; now they're evolvable per-lineage.
// Persistence: clusterGenomes[hash] carries forward across detection cycles
// the same way clusterVMs carries forward cluster bytecode.
// Inheritance: daughter clusters inherit mutated copies of parent's genome.
// Selection: clusters that bud successfully propagate their clusterGenome;
// clusters that don't bud leave no cluster-level descendants. This is a real
// second level of selection — particles-within-clusters still evolve via
// the global genome, AND clusters-among-clusters evolve via the clusterGenome.
// ═══════════════════════════════════════
let clusterGenomes=new Map(); // hash → {budRate, budThreshold, splitFraction, innovationRate, metabolicBias}
function seedClusterGenome(){
  return{
    budRate:0.6+Math.random()*0.8,          // multiplier on bud chance (0.6..1.4)
    budThreshold:6+Math.random()*6,         // min persistAge to bud (6..12)
    splitFraction:0.25+Math.random()*0.2,   // fraction moved to daughter (0.25..0.45)
    innovationRate:0.1+Math.random()*0.3,   // VM mutation rate on bud (0.1..0.4)
    metabolicBias:0.85+Math.random()*0.1,   // parent amp retention after bud (0.85..0.95)
  };
}
function mutateClusterGenome(parent,scale){
  return{
    budRate:Math.max(0.1,Math.min(3,parent.budRate+(Math.random()-0.5)*scale*0.4)),
    budThreshold:Math.max(2,Math.min(30,parent.budThreshold+(Math.random()-0.5)*scale*2)),
    splitFraction:Math.max(0.1,Math.min(0.7,parent.splitFraction+(Math.random()-0.5)*scale*0.1)),
    innovationRate:Math.max(0.01,Math.min(0.8,parent.innovationRate+(Math.random()-0.5)*scale*0.15)),
    metabolicBias:Math.max(0.6,Math.min(0.99,parent.metabolicBias+(Math.random()-0.5)*scale*0.05)),
  };
}
let clusterByID=new Int16Array(0); // fast lookup: clusterByID[cid] = index into clusters[]

// ═══ LINEAGE REGISTRY — ancestry tracking for emergent speciation ═══
// Every cluster belongs to a lineage. New clusters from flood-fill get new lineage IDs.
// Persistent clusters inherit their lineage across detection cycles.
// Budded daughters inherit parent lineage. We OBSERVE divergence, not prescribe it.
let nextLineageID=1;
const lineageRegistry=new Map(); // lineageID → {color, birthTick, parentLineage, budCount, lastSeen, extinct, children}
const MAX_LINEAGE_HISTORY=60; // how many lineages to keep in registry before pruning dead ones

function createLineage(parentLineageID){
  const lid=nextLineageID++;
  // Generate a distinctive color from lineage ID — golden ratio hue spacing
  const hue=(lid*137.508)%360;
  const sat=55+((lid*31)%30);
  const lit=40+((lid*17)%25);
  const [r,g,b]=hslToRgb(hue,sat,lit);
  lineageRegistry.set(lid,{
    color:[r,g,b],
    hue,
    birthTick:genome.totalTicks,
    parentLineage:parentLineageID,
    budCount:0,
    lastSeen:genome.totalTicks,
    extinct:false,
    children:[] // child lineage IDs (from budding speciation events)
  });
  if(parentLineageID>0){
    const parent=lineageRegistry.get(parentLineageID);
    if(parent)parent.children.push(lid);
  }
  return lid;
}

function getLineageColor(lid){
  const entry=lineageRegistry.get(lid);
  if(entry)return entry.color;
  return[120,140,130]; // fallback neutral
}

// Prune extinct lineages that haven't been seen in a long time
function pruneLineages(){
  if(lineageRegistry.size<MAX_LINEAGE_HISTORY)return;
  const cutoff=genome.totalTicks-30000;
  for(const[lid,entry] of lineageRegistry){
    if(entry.extinct&&entry.lastSeen<cutoff&&entry.children.length===0){
      lineageRegistry.delete(lid);
    }
  }
}

// Rebuild field-to-lineage color cache (called on cluster detection, not every frame)
function rebuildFieldLineageCache(){
  if(clusters.length===0)return;
  for(let fIdx=0;fIdx<FIELD_W*FIELD_H;fIdx++){
    if(fieldOwnership[fIdx]<0.05){
      fieldLineageCache[fIdx*3]=100;fieldLineageCache[fIdx*3+1]=240;fieldLineageCache[fIdx*3+2]=220;
      continue;
    }
    const sBase=fIdx*FIELD_SIG_DIMS;
    let bestLin=0,bestSim=-1;
    for(const c of clusters){
      if(!c.fieldSignature)continue;
      let dot=0,nA=0,nB=0;
      for(let s=0;s<FIELD_SIG_DIMS;s++){
        dot+=fieldSig[sBase+s]*c.fieldSignature[s];
        nA+=fieldSig[sBase+s]*fieldSig[sBase+s];
        nB+=c.fieldSignature[s]*c.fieldSignature[s];
      }
      const sim=dot/(Math.sqrt(nA*nB)+0.001);
      if(sim>bestSim){bestSim=sim;bestLin=c.lineageID}
    }
    const col=getLineageColor(bestLin);
    fieldLineageCache[fIdx*3]=col[0];fieldLineageCache[fIdx*3+1]=col[1];fieldLineageCache[fIdx*3+2]=col[2];
  }
}

// ═══ CLUSTER VM SEEDING ═══
// New clusters inherit a mutated subset of the global VM program.
// Not NOPs — functional code that can differentiate FROM something.
function seedClusterVM(){
  const globalProg=genome.vmProgram;
  const prog=[];
  // Sample up to MAX_CLUSTER_VM instructions from the global program
  // Bias toward EMIT instructions — those are the behaviorally active ones
  const emitters=[];
  const others=[];
  for(let i=0;i<globalProg.length;i++){
    if(globalProg[i][0]===4)emitters.push(i);
    else others.push(i);
  }
  // Take emitters first (up to half), fill rest from others
  const emitCount=Math.min(Math.floor(MAX_CLUSTER_VM/2),emitters.length);
  const otherCount=Math.min(MAX_CLUSTER_VM-emitCount,others.length);
  const indices=[];
  for(let i=0;i<emitCount;i++)indices.push(emitters[Math.floor(Math.random()*emitters.length)]);
  for(let i=0;i<otherCount;i++)indices.push(others[Math.floor(Math.random()*others.length)]);
  // Pad with NOPs if global program is tiny
  while(indices.length<MAX_CLUSTER_VM)indices.push(-1);

  for(const idx of indices){
    if(idx>=0&&idx<globalProg.length){
      const inst=[...globalProg[idx]];
      // Light mutation on seeding — differentiation starts immediately
      inst[3]+=(Math.random()-0.5)*0.25;
      inst[3]=Math.max(-2,Math.min(2,inst[3]));
      prog.push(inst);
    }else{
      prog.push([0,0,0,0]); // NOP padding
    }
  }
  return prog;
}

// Fast cluster lookup by ID — rebuilt each detection cycle
function buildClusterLookup(){
  // Ensure array is large enough
  if(clusterByID.length<MAX_CLUSTERS){
    clusterByID=new Int16Array(MAX_CLUSTERS);
  }
  clusterByID.fill(-1);
  for(let i=0;i<clusters.length;i++){
    if(clusters[i].id<MAX_CLUSTERS)clusterByID[clusters[i].id]=i;
  }
}

function detectClusters(){
  // Flood-fill on spatial grid using resonance bonds
  clusterID.fill(-1);
  let cid=0;
  clusters.length=0;

  for(let i=0;i<N;i++){
    if(!palive[i]||clusterID[i]>=0)continue;
    if(cid>=MAX_CLUSTERS)break;

    // BFS flood fill
    const queue=[i];
    const members=[];
    clusterID[i]=cid;

    while(queue.length>0){
      const cur=queue.shift();
      members.push(cur);

      const gx=(px[cur]/CELL)|0,gy=(py[cur]/CELL)|0;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        const nnx=gx+dx,nny=gy+dy;
        if(nnx<0||nny<0||nnx>=gW||nny>=gH)continue;
        let j=grid[nny*gW+nnx];
        let _lc=0;while(j>=0&&j<CAP&&_lc++<CAP){
          if(palive[j]&&clusterID[j]<0&&j!==cur){
            const sim=tendSim(cur,j);
            const pa=Math.cos(phase[cur]-phase[j]);
            const bond=sim*Math.max(0,pa);
            const ddx=px[cur]-px[j],ddy=py[cur]-py[j];
            const d=Math.sqrt(ddx*ddx+ddy*ddy);
            if(bond>genome.clusterBondThresh&&d<Math.max(10,genome.interactionRadius||CELL)){
              clusterID[j]=cid;
              queue.push(j);
            }
          }
          j=pnext[j];
        }
      }
    }

    if(members.length>=genome.clusterMinSize){
      // Compress cluster to signature
      let cx=0,cy=0,tSum=new Float32Array(DIMS),phCoh=0,aSum=0,ageSum=0;
      for(const m of members){
        cx+=px[m];cy+=py[m];
        for(let d=0;d<DIMS;d++)tSum[d]+=tend[m*DIMS+d];
        aSum+=amp[m];
        ageSum+=page[m];
      }
      const n=members.length;
      cx/=n;cy/=n;aSum/=n;ageSum/=n;
      for(let d=0;d<DIMS;d++)tSum[d]/=n;

      // Phase coherence: mean resultant length
      let sinSum=0,cosSum=0;
      for(const m of members){sinSum+=Math.sin(phase[m]);cosSum+=Math.cos(phase[m])}
      phCoh=Math.sqrt(sinSum*sinSum+cosSum*cosSum)/n;

      clusters.push({
        id:cid,cx,cy,size:n,
        tendency:Array.from(tSum),
        coherence:phCoh,
        avgAmp:aSum,
        avgAge:ageSum,
        hash:clusterHash(tSum,phCoh,n),
        vmProgram:seedClusterVM(),
        vmInfluence:0.3+Math.random()*0.2,
        fieldSignature:new Float32Array([
          tSum[0]*0.5+tSum[1]*0.3,
          tSum[1]*0.5+tSum[2]*0.3,
          tSum[2]*0.5+tSum[3]*0.3
        ]),
        // Lineage: new spontaneous clusters get new lineage IDs
        // Persistence inheritance overwrites this in trackClusterPersistence()
        lineageID:createLineage(0)
      });
      cid++;
    }
  }
}

function clusterHash(t,coh,size){
  // Simple fingerprint: quantized tendency + coherence band + size band
  let h='';
  for(let d=0;d<DIMS;d++)h+=((t[d]*10)|0)+',';
  h+=((coh*10)|0)+','+Math.min(9,(size/10)|0);
  return h;
}

function trackClusterPersistence(){
  // Match current clusters to previous by spatial proximity + tendency similarity
  const newAge=new Map();
  const newVMs=new Map();
  const newFossils=new Map(); // Pe30 Layer 20b: carry birth-time scenario fossils forward
  // Pe39: snapshot prevClusters and track which indices get matched, for dissolution detection
  const prevClusters_snapshot=prevClusters.map(p=>({...p,tendency:[...p.tendency],vmProgram:p.vmProgram?p.vmProgram.slice(0,4).map(i=>[...i]):[]}));
  const matchedPrevIdxSet=new Set();
  for(const c of clusters){
    let bestMatch=null,bestScore=-1,bestMatchIdx=-1;
    for(let pi=0;pi<prevClusters.length;pi++){
      const p=prevClusters[pi];
      const dx=c.cx-p.cx,dy=c.cy-p.cy;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>CELL*3)continue;
      let tSim=0;
      for(let d=0;d<DIMS;d++)tSim+=c.tendency[d]*p.tendency[d];
      const score=tSim*(1-dist/(CELL*3))*Math.min(1,c.size/Math.max(1,p.size));
      if(score>bestScore){bestScore=score;bestMatch=p;bestMatchIdx=pi;}
    }
    if(bestMatch&&bestScore>0.1){
      matchedPrevIdxSet.add(bestMatchIdx); // Pe39: mark as survived
      const prevAge=clusterAge.get(bestMatch.hash)||0;
      newAge.set(c.hash,prevAge+1);
      c.persistAge=prevAge+1;
      // ═══ CLUSTER VM INHERITANCE ═══
      // Carry the previous cluster's evolved VM forward — this is what makes
      // cluster programs accumulate rather than reset every detection cycle
      const prevVM=clusterVMs.get(bestMatch.hash);
      if(prevVM){
        c.vmProgram=prevVM.prog.map(inst=>[...inst]); // deep copy
        c.vmInfluence=prevVM.inf;
        // Territorial signature inheritance — identity persists
        if(prevVM.sig)c.fieldSignature=new Float32Array(prevVM.sig);
        // Lineage inheritance — persistent clusters keep their ancestry
        if(prevVM.lineage){
          c.lineageID=prevVM.lineage;
          const entry=lineageRegistry.get(c.lineageID);
          if(entry)entry.lastSeen=genome.totalTicks;
        }
      }
      // ═══ CLUSTER GENOME INHERITANCE (Pe22f) ═══
      // Carry cluster-level heritable traits across detection cycles,
      // with occasional drift mutation so lineages diverge over time.
      const prevCG=clusterGenomes.get(bestMatch.hash);
      if(prevCG){
        if(Math.random()<0.04){
          c.clusterGenome=mutateClusterGenome(prevCG,0.3); // small drift
        }else{
          c.clusterGenome={...prevCG};
        }
      }else{
        c.clusterGenome=seedClusterGenome();
      }
      // Pe30 Layer 20b: scenario fossil inheritance — a persistent cluster keeps
      // the snapshot it took at birth. The fossil ages with the cluster, unchanged.
      c.scenarioFossil=clusterFossils.get(bestMatch.hash)||null;
    }else{
      newAge.set(c.hash,0);
      c.persistAge=0;
      // New cluster — keeps the seeded VM and new lineage from detectClusters()
      // And seeds a fresh cluster genome: new-to-the-world clusters start random.
      if(!c.clusterGenome)c.clusterGenome=seedClusterGenome();
      // Pe30 Layer 20b: a newborn cluster snapshots the global bank's current top
      // scenario. This is "what was winning when I formed" — carried for its whole life.
      c.scenarioFossil=topScenarioSnapshot();
    }
    // Store this cluster's VM, signature, lineage, AND clusterGenome for next cycle
    newVMs.set(c.hash,{prog:c.vmProgram.map(inst=>[...inst]),inf:c.vmInfluence,sig:Array.from(c.fieldSignature||[0,0,0]),lineage:c.lineageID});
    clusterGenomes.set(c.hash,c.clusterGenome);
    if(c.scenarioFossil)newFossils.set(c.hash,c.scenarioFossil);
  }
  clusterAge=newAge;
  clusterVMs=newVMs;
  clusterFossils=newFossils; // Pe30: drop fossils of clusters that no longer exist
  prevClusters.length=0;

  // Pe39 Layer 28: detect dissolved clusters.
  // Any prevCluster that found no match in current clusters has dissolved.
  // If it was old enough (persistAge ≥ DISSOLUTION_MIN_AGE), record its terminal
  // behavioral state as a dissolution fossil. The identification mirrors the matching
  // logic above — same spatial + tendency threshold, so "no match" means exactly what
  // the persistence tracker means by "this cluster ceased to exist."
  const dw=genome.dissolutionWeight||0;
  if(dw>0.01&&prevClusters_snapshot.length>0){
    for(let pi=0;pi<prevClusters_snapshot.length;pi++){
      if(matchedPrevIdxSet.has(pi))continue; // survived
      const p=prevClusters_snapshot[pi];
      if((p.persistAge||0)<DISSOLUTION_MIN_AGE)continue;
      const quality=(p.persistAge||1)*(p.coherence||0.3)*(p.avgAmp||0.3);
      if(isFinite(quality)&&quality>0)recordDissolutionFossil(p,quality);
    }
  }

  for(const c of clusters)prevClusters.push({...c,tendency:[...c.tendency]});
  // Rebuild fast lookup
  buildClusterLookup();

  // ═══ LINEAGE CENSUS — mark extinct lineages, measure divergence ═══
  const livingLineages=new Set();
  for(const c of clusters)if(c.lineageID)livingLineages.add(c.lineageID);
  for(const[lid,entry] of lineageRegistry){
    if(!entry.extinct&&!livingLineages.has(lid)){
      entry.extinct=true;
      entry.deathTick=genome.totalTicks;
    }
  }
  pruneLineages();
}

// ═══ CLUSTER BUDDING — GROUP-LEVEL REPRODUCTION ═══
// Successful clusters (persistent, coherent, energy-rich) can bud daughter clusters.
// The daughter inherits the parent's VM program and field signature (with mutation).
// This makes clusters true reproductive units — lineages that engineer well spread.
// Budding physically displaces particles to create real spatial separation.
function attemptClusterBudding(){
  if(clusters.length>=MAX_CLUSTERS-2)return; // leave room
  // Snapshot cluster count — don't iterate over newly budded clusters
  const nClusters=clusters.length;

  for(let ci=0;ci<nClusters;ci++){
    const c=clusters[ci];
    // Pe22f: cluster genome drives budding dynamics. Designer constants become evolvable.
    const cg=c.clusterGenome||(c.clusterGenome=seedClusterGenome());
    if(c.persistAge<cg.budThreshold||c.size<14)continue; // threshold is now heritable

    // Success metric: territorial control + coherence + energy
    // Clusters that engineer rich environments AND maintain internal order can reproduce
    const territoryScore=c.avgAmp*0.5+c.coherence*0.35;

    // Field richness at cluster center
    const cfx=Math.max(0,Math.min(FIELD_W-1,Math.floor(c.cx/(W/FIELD_W))));
    const cfy=Math.max(0,Math.min(FIELD_H-1,Math.floor(c.cy/(H/FIELD_H))));
    const centerField=field[cfy*FIELD_W+cfx];
    const fieldBonus=Math.min(0.3,centerField*0.2);

    const budChance=(territoryScore+fieldBonus)*0.008*cg.budRate; // bud rate now heritable
    if(Math.random()>budChance)continue;

    // Find bud direction — prefer direction with unclaimed territory
    let bestAngle=Math.random()*Math.PI*2;
    let bestUnclaimed=0;
    for(let probe=0;probe<6;probe++){
      const angle=Math.random()*Math.PI*2;
      const probeX=c.cx+Math.cos(angle)*CELL*3;
      const probeY=c.cy+Math.sin(angle)*CELL*3;
      const pfx=Math.max(0,Math.min(FIELD_W-1,Math.floor(probeX/(W/FIELD_W))));
      const pfy=Math.max(0,Math.min(FIELD_H-1,Math.floor(probeY/(H/FIELD_H))));
      const pIdx=pfy*FIELD_W+pfx;
      const unclaimed=1-fieldOwnership[pIdx];
      if(unclaimed>bestUnclaimed){bestUnclaimed=unclaimed;bestAngle=angle}
    }

    const budDist=CELL*(2.5+Math.random()*2);
    const bx=Math.max(CELL,Math.min(W-CELL,c.cx+Math.cos(bestAngle)*budDist));
    const by=Math.max(CELL,Math.min(H-CELL,c.cy+Math.sin(bestAngle)*budDist));

    // Select particles to move — those on the side of the cluster facing the bud direction
    const splitFraction=cg.splitFraction; // Pe22f: split fraction now heritable
    const targetSplit=Math.floor(c.size*splitFraction);
    const budded=[];

    // Score each member by how much they face the bud direction
    const candidates=[];
    for(let i=0;i<N;i++){
      if(!palive[i]||clusterID[i]!==c.id)continue;
      const dx=px[i]-c.cx,dy=py[i]-c.cy;
      // Dot product with bud direction — particles facing the bud site go first
      const facing=dx*Math.cos(bestAngle)+dy*Math.sin(bestAngle);
      candidates.push({idx:i,facing});
    }
    // Sort by facing direction — those closest to the bud side move
    candidates.sort((a,b)=>b.facing-a.facing);

    const toMove=Math.min(targetSplit,candidates.length-3); // parent keeps at least 3
    if(toMove<3)continue; // not enough to form viable daughter

    for(let m=0;m<toMove;m++){
      const pi=candidates[m].idx;
      budded.push(pi);
      // PHYSICAL DISPLACEMENT — actually move particles toward bud site
      const pushStrength=0.4+Math.random()*0.3;
      px[pi]+=(bx-px[pi])*pushStrength;
      py[pi]+=(by-py[pi])*pushStrength;
      // Velocity kick toward bud site
      vx[pi]+=(bx-px[pi])*0.003;
      vy[pi]+=(by-py[pi])*0.003;
    }

    // METABOLIC COST — budding is expensive for both parent and daughter
    // Pe22f: parent retention factor is heritable (metabolicBias). Daughter pays a derived cost.
    for(let i=0;i<N;i++){
      if(!palive[i]||clusterID[i]!==c.id)continue;
      amp[i]*=cg.metabolicBias; // parent loses energy — heritable
    }
    const daughterCost=Math.min(0.98,cg.metabolicBias+0.05); // slightly less than parent retention
    for(const pi of budded){
      amp[pi]*=daughterCost;
    }

    // Create daughter cluster entry
    // Daughter inherits parent's lineage — same ancestry, divergence happens naturally
    const daughterLineage=createLineage(c.lineageID);
    const parentEntry=lineageRegistry.get(c.lineageID);
    if(parentEntry)parentEntry.budCount++;
    // Pe22f: daughter's cluster genome is a mutated copy of parent's.
    // Budding is a speciation event — scale=1.0 is the full mutation magnitude.
    const daughterCG=mutateClusterGenome(cg,1.0);

    const daughter={
      id:clusters.length,
      cx:bx,cy:by,
      size:budded.length,
      tendency:c.tendency.map(v=>v+(Math.random()-0.5)*0.06),
      coherence:c.coherence*0.85,
      avgAmp:c.avgAmp*0.8,
      avgAge:0,
      hash:'bud_'+Math.random().toString(36).slice(2,8)+'_'+genome.totalTicks,
      persistAge:1,
      vmProgram:c.vmProgram.map(inst=>{
        const copy=[...inst];
        // Pe22f: VM mutation rate on bud is now heritable (innovationRate).
        // Conservative lineages preserve programs; innovative ones explore.
        if(Math.random()<cg.innovationRate){
          copy[3]+=(Math.random()-0.5)*0.2;
          copy[3]=Math.max(-2,Math.min(2,copy[3]));
        }
        if(Math.random()<cg.innovationRate*0.27)copy[0]=Math.floor(Math.random()*23);
        return copy;
      }),
      vmInfluence:Math.max(0.05,c.vmInfluence+(Math.random()-0.5)*0.1),
      fieldSignature:new Float32Array(c.fieldSignature.map(s=>s+(Math.random()-0.5)*0.1)),
      lineageID:daughterLineage,
      clusterGenome:daughterCG,
      // Pe30 Layer 20b: daughter inherits parent's birth-time scenario fossil —
      // ancestral memory passes down the bud line, joining vmProgram/clusterGenome/
      // lineage as heritable cluster state. Falls back to a fresh snapshot if the
      // parent somehow carried none.
      scenarioFossil:c.scenarioFossil?{...c.scenarioFossil}:topScenarioSnapshot()
    };

    clusters.push(daughter);
    clusterGenomes.set(daughter.hash,daughterCG);
    if(daughter.scenarioFossil)clusterFossils.set(daughter.hash,daughter.scenarioFossil);

    // TERRITORY SEEDING — stamp a small footprint at the bud site
    // The daughter doesn't arrive in a vacuum
    const seedRadius=2; // field cells
    const bfx=Math.floor(bx/(W/FIELD_W));
    const bfy=Math.floor(by/(H/FIELD_H));
    for(let dy=-seedRadius;dy<=seedRadius;dy++){
      for(let dx=-seedRadius;dx<=seedRadius;dx++){
        const sx=bfx+dx,sy=bfy+dy;
        if(sx<0||sx>=FIELD_W||sy<0||sy>=FIELD_H)continue;
        const sIdx=sy*FIELD_W+sx;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>seedRadius)continue;
        const seedStr=(1-dist/seedRadius)*0.3;
        field[sIdx]+=seedStr*0.5; // small energy deposit
        stampField(sIdx,daughter.fieldSignature,seedStr);
      }
    }

    // Visual feedback — shockwave at bud site
    const r=(pR[budded[0]]||150),g=(pG[budded[0]]||180),b_=(pB[budded[0]]||160);
    addShock(bx,by,0.5,r,g,b_);
    addShock(c.cx,c.cy,0.3,r*0.7,g*0.7,b_*0.7);

    // Record in lineage
    genome.lineage.push({
      t:genome.totalTicks,event:'bud',
      parentSize:c.size,daughterSize:budded.length,
      parentAge:c.persistAge
    });
    if(genome.lineage.length>6)genome.lineage.shift();
    recordEvent('cluster_bud',{p:c.size,d:budded.length,a:c.persistAge},300);
  }

  // Rebuild lookup if any budding happened
  if(clusters.length>nClusters)buildClusterLookup();
}

// ═══ Pe38 LAYER 27: ATTRIBUTION DEPTH ═══
// Pe37 built the attribution instrument: 15 layer-gate params, each with a credit trace

// Pe32: 12D Euclidean distance between two scenario entries.
// Used for diversity pressure, fingerprint matching, and fossil matching.
function scenarioDist(a,b){
  const de=(a.e||0)-(b.e||0),dk=(a.k||0)-(b.k||0),dr=(a.r||0)-(b.r||0),
        dc=(a.c||0)-(b.c||0),dt=(a.t||0)-(b.t||0);
  const df=(a.f||0)-(b.f||0),dp=(a.p||0)-(b.p||0),da=(a.a||0)-(b.a||0),
        dtb=(a.tb||0)-(b.tb||0),dsp=(a.sp||0)-(b.sp||0),dsm=(a.sm||0)-(b.sm||0),dmp=(a.mp||0)-(b.mp||0);
  return Math.sqrt(de*de+dk*dk+dr*dr+dc*dc+dt*dt+df*df+dp*dp+da*da+dtb*dtb+dsp*dsp+dsm*dsm+dmp*dmp);
}

function seedShadowBank(){
  // Five seed scenarios matching Pe26's hardcoded set exactly.
  // Source tag 'seed' is a label; once age>0 they obey the same rules as everyone else
  // except that the LAST surviving seed/random is protected (see evolveShadowBank).
  // Pe29: creditTrace starts at 0 (neutral, no protection bonus, no penalty).
  // Pe32: 7 behavioral axes (f,p,a,tb,sp,sm,mp) added — all zero in seeds.
  // Seed scenarios probe physics only; evolution discovers behavioral probes.
  return [
    {e:+1,k:0,r:0,c:0,t:0,f:0,p:0,a:0,tb:0,sp:0,sm:0,mp:0,wins:0,age:0,src:'seed',creditTrace:0},
    {e:-1,k:0,r:0,c:0,t:0,f:0,p:0,a:0,tb:0,sp:0,sm:0,mp:0,wins:0,age:0,src:'seed',creditTrace:0},
    {e:0,k:0,r:+1,c:0,t:0,f:0,p:0,a:0,tb:0,sp:0,sm:0,mp:0,wins:0,age:0,src:'seed',creditTrace:0},
    {e:0,k:0,r:-1,c:0,t:0,f:0,p:0,a:0,tb:0,sp:0,sm:0,mp:0,wins:0,age:0,src:'seed',creditTrace:0},
    {e:0,k:+1,r:0,c:-1,t:-1,f:0,p:0,a:0,tb:0,sp:0,sm:0,mp:0,wins:0,age:0,src:'seed',creditTrace:0},
  ];
}

function randomScenario(){
  // Sparse vectors — 1-2 non-zero axes, amplitudes in [0.5, 1.5].
  // Pe32: probes can now land on any of 12 axes (5 physics + 7 behavioral).
  // The full axis set lets the system discover "try being more attractive"
  // alongside "try increasing entropy." Physics axes have 60% weight to
  // preserve the existing exploration budget; behavioral axes share 40%.
  const sc={e:0,k:0,r:0,c:0,t:0,f:0,p:0,a:0,tb:0,sp:0,sm:0,mp:0,wins:0,age:0,src:'random',creditTrace:0};
  const physAxes=['e','k','r','c','t'];
  const vmAxes=['f','p','a','tb','sp','sm','mp'];
  const allAxes=Math.random()<0.6?physAxes:(Math.random()<0.5?vmAxes:physAxes.concat(vmAxes));
  const nAxes=Math.random()<0.3?2:1;
  const picked=new Set();
  for(let i=0;i<nAxes;i++){
    let ax;do{ax=allAxes[(Math.random()*allAxes.length)|0]}while(picked.has(ax));
    picked.add(ax);
    sc[ax]=(Math.random()<0.5?-1:1)*(0.5+Math.random());
  }
  return sc;
}

function childScenario(parent){
  // Mutated clone — small Gaussian-ish noise on every axis, amplitudes clamped to ±2.
  // Pe29: creditTrace inherits HALF of parent's — partial knowledge transfer of fitness
  // history. Pe32: behavioral axes included in mutation and inheritance.
  const noise=0.35;
  return {
    e:Math.max(-2,Math.min(2,parent.e+(Math.random()-0.5)*noise)),
    k:Math.max(-2,Math.min(2,parent.k+(Math.random()-0.5)*noise)),
    r:Math.max(-2,Math.min(2,parent.r+(Math.random()-0.5)*noise)),
    c:Math.max(-2,Math.min(2,parent.c+(Math.random()-0.5)*noise)),
    t:Math.max(-2,Math.min(2,parent.t+(Math.random()-0.5)*noise)),
    f:Math.max(-2,Math.min(2,(parent.f||0)+(Math.random()-0.5)*noise)),
    p:Math.max(-2,Math.min(2,(parent.p||0)+(Math.random()-0.5)*noise)),
    a:Math.max(-2,Math.min(2,(parent.a||0)+(Math.random()-0.5)*noise)),
    tb:Math.max(-2,Math.min(2,(parent.tb||0)+(Math.random()-0.5)*noise)),
    sp:Math.max(-2,Math.min(2,(parent.sp||0)+(Math.random()-0.5)*noise)),
    sm:Math.max(-2,Math.min(2,(parent.sm||0)+(Math.random()-0.5)*noise)),
    mp:Math.max(-2,Math.min(2,(parent.mp||0)+(Math.random()-0.5)*noise)),
    wins:0,age:0,src:'child',creditTrace:(parent.creditTrace||0)*0.5
  };
}

function evolveShadowBank(){
  if(!Array.isArray(genome.shadowScenarioBank)||genome.shadowScenarioBank.length===0){
    genome.shadowScenarioBank=seedShadowBank();
  }
  const bank=genome.shadowScenarioBank;
  for(const sc of bank)sc.age++;

  // Eviction: scenarios must keep earning their slot. Threshold scales with age, so
  // a one-time winner can't sit forever — to survive past age=60 it needs ~5 wins,
  // past age=100 it needs ~8. Encourages bank refresh without churning fresh entrants.
  // Pe29 Layer 19: creditTrace modulates both thresholds. scenarioCreditWeight=0
  // disables this (Pe28 behavior). At weight=1, +1 creditTrace adds 15 age-grace and
  // halves the win requirement; -1 creditTrace cuts age-grace and doubles the win bar.
  // Floor: bank cannot drop below 3 — three is the minimum that lets the shadow sim
  // make meaningful comparisons. Reserved slot: never evict the LAST random/seed entry,
  // so the bank can't collapse to children-of-one-winner. This is the insurance.
  const scw=Math.max(0,Math.min(1,genome.scenarioCreditWeight||0));
  if(bank.length>3){
    let reservedIdx=-1;
    for(let i=0;i<bank.length;i++){
      if(bank[i].src==='seed'||bank[i].src==='random'){reservedIdx=i;break}
    }
    for(let i=bank.length-1;i>=0;i--){
      if(bank.length<=3)break;
      if(i===reservedIdx)continue;
      const sc=bank[i];
      const ct=Math.max(-1,Math.min(1,sc.creditTrace||0));
      const ageThresh=30-ct*15*scw;
      const winThresh=Math.max(2,Math.floor(sc.age*0.08*(1-ct*0.5*scw)));
      if(sc.age>ageThresh&&sc.wins<winThresh){
        bank.splice(i,1);
        if(i<reservedIdx)reservedIdx--;
      }
    }
  }

  // Refill toward cap.
  // Pe30 Layer 20a: credit-weighted reproduction. Parent selection is weighted by
  // wins * (1 + creditTrace * scenarioCreditWeight) rather than raw wins. A scenario
  // with real-fitness credit reproduces more; one with negative credit fades from the
  // lineage even with a high raw win count. scenarioCreditWeight=0 → pure-wins (Pe29).
  // Pe30 Layer 20c: diversity pressure. A spawned child landing within similarity ε
  // of an existing bank entry is re-rolled with amplified noise (up to 3 attempts).
  // Keeps the bank's coverage broad — no two slots on near-duplicate scenarios.
  //
  // Pe30b: the explore/exploit split is genome.shadowExploreRate, not a hardcoded 0.5.
  // It was hardcoded in Pe30 — an oversight, since freeing exactly this kind of constant
  // is the codebase's whole through-line. With probability shadowExploreRate a refill
  // slot gets a fresh random scenario (explore); otherwise a credit-weighted child of a
  // winner (exploit). It is bounded [0.1, 0.9], UNLIKE gradientBias or scenarioCredit
  // Weight which are free in [0,1]. The reason is asymmetric consequences: those params
  // have valid behavior at their extremes (gradientBias=0 is just Pe25; scenarioCredit
  // Weight=0 is just Pe28). shadowExploreRate does not — at 0 the bank can only ever
  // spawn children of existing winners, collapsing toward a single dynasty plus one
  // never-refreshed reserved-random slot; at 1 no children spawn at all, which kills
  // Pe27's multi-axis discovery and Pe30's credit-weighted reproduction outright. Both
  // extremes structurally disable architecture layers, so the bounds keep selection
  // inside the range where the mechanism still exists. Default 0.5 = Pe30 behavior.
  const cap=Math.max(3,Math.min(SHADOW_SCENARIOS_MAX,(genome.shadowScenarios|0)||5));
  const exploreRate=Math.max(0.1,Math.min(0.9,genome.shadowExploreRate||0.5));
  let safety=20;
  while(bank.length<cap&&safety-->0){
    const winners=bank.filter(s=>s.wins>0);
    let candidate;
    if(winners.length>0&&Math.random()>=exploreRate){
      // Credit-weighted parent sampling.
      let totalW=0;
      for(const w of winners){
        const ct=Math.max(-1,Math.min(1,w.creditTrace||0));
        totalW+=w.wins*(1+ct*scw);
      }
      let parent=winners[0];
      if(totalW>0){
        let pick=Math.random()*totalW;
        for(const w of winners){
          const ct=Math.max(-1,Math.min(1,w.creditTrace||0));
          pick-=w.wins*(1+ct*scw);
          if(pick<=0){parent=w;break}
        }
      }
      candidate=childScenario(parent);
      // Diversity pressure — re-roll a too-similar child with growing noise.
      // Pe32: distance now measured over all 12 axes (physics + behavioral).
      for(let attempt=0;attempt<3;attempt++){
        let tooClose=false;
        for(const sc of bank){
          if(scenarioDist(sc,candidate)<0.35){tooClose=true;break}
        }
        if(!tooClose)break;
        // Re-roll: child of same parent but with amplified noise each attempt.
        const amp=0.6+attempt*0.6;
        candidate={
          e:Math.max(-2,Math.min(2,parent.e+(Math.random()-0.5)*amp)),
          k:Math.max(-2,Math.min(2,parent.k+(Math.random()-0.5)*amp)),
          r:Math.max(-2,Math.min(2,parent.r+(Math.random()-0.5)*amp)),
          c:Math.max(-2,Math.min(2,parent.c+(Math.random()-0.5)*amp)),
          t:Math.max(-2,Math.min(2,parent.t+(Math.random()-0.5)*amp)),
          f:Math.max(-2,Math.min(2,(parent.f||0)+(Math.random()-0.5)*amp)),
          p:Math.max(-2,Math.min(2,(parent.p||0)+(Math.random()-0.5)*amp)),
          a:Math.max(-2,Math.min(2,(parent.a||0)+(Math.random()-0.5)*amp)),
          tb:Math.max(-2,Math.min(2,(parent.tb||0)+(Math.random()-0.5)*amp)),
          sp:Math.max(-2,Math.min(2,(parent.sp||0)+(Math.random()-0.5)*amp)),
          sm:Math.max(-2,Math.min(2,(parent.sm||0)+(Math.random()-0.5)*amp)),
          mp:Math.max(-2,Math.min(2,(parent.mp||0)+(Math.random()-0.5)*amp)),
          wins:0,age:0,src:'child',creditTrace:(parent.creditTrace||0)*0.5
        };
      }
    }else{
      candidate=randomScenario();
    }
    // Pe39 Layer 28: dissolution fossil scenario override.
    // With probability dissolutionWeight, replace the candidate with a probe derived
    // from the highest-quality dissolution fossil. Shadow sim vets it — weak probes
    // age out normally. At dissolutionWeight=0 this never fires (Pe38 exactly).
    const _dw=genome.dissolutionWeight||0;
    if(_dw>0.01&&dissolutionFossils.length>0&&Math.random()<_dw){
      const best=dissolutionFossils.reduce((b,f)=>f.quality>b.quality?f:b,dissolutionFossils[0]);
      const ax=best.scenarioAxes,px39=best.physicsAxes;
      const noise=0.35;
      candidate={
        e:Math.max(-2,Math.min(2,(px39.e||0)+(Math.random()-0.5)*noise)),
        k:Math.max(-2,Math.min(2,(px39.k||0)+(Math.random()-0.5)*noise)),
        r:Math.max(-2,Math.min(2,(px39.r||0)+(Math.random()-0.5)*noise)),
        c:Math.max(-2,Math.min(2,(px39.c||0)+(Math.random()-0.5)*noise)),
        t:Math.max(-2,Math.min(2,(px39.t||0)+(Math.random()-0.5)*noise)),
        f:Math.max(-2,Math.min(2,(ax.f||0)+(Math.random()-0.5)*noise)),
        p:0,a:0,tb:0,
        sp:Math.max(-2,Math.min(2,(ax.sp||0)+(Math.random()-0.5)*noise)),
        sm:0,mp:0,
        wins:0,age:0,src:'dissolution',creditTrace:0
      };
    }
    bank.push(candidate);
  }
}

// Pe30 Layer 20: snapshot the global bank's current top scenario as a clean copy.
// Top = highest wins, tiebreak by lowest age. Returns null if no scenario has won yet.
// Used at cluster birth — the cluster carries this for its whole life (Layer 20b).
function topScenarioSnapshot(){
  const bank=genome.shadowScenarioBank;
  if(!Array.isArray(bank)||bank.length===0)return null;
  let bestWins=-1,bestAge=1e9,bestIdx=-1;
  for(let i=0;i<bank.length;i++){
    const sc=bank[i];
    if(sc.wins>bestWins||(sc.wins===bestWins&&sc.age<bestAge)){
      bestWins=sc.wins;bestAge=sc.age;bestIdx=i;
    }
  }
  if(bestIdx<0||bestWins<=0)return null;
  const top=bank[bestIdx];
  return {e:top.e,k:top.k,r:top.r,c:top.c,t:top.t,
    f:top.f||0,p:top.p||0,a:top.a||0,tb:top.tb||0,sp:top.sp||0,sm:top.sm||0,mp:top.mp||0,
    creditTrace:top.creditTrace||0};
}

// ═══ VM PHENOTYPE PROFILER ═══
// Runs the VM against standardised test inputs to produce
// average action coefficients. The shadow sim reads these
// instead of running the full VM. The system models its own behaviour.
function profileVM(){
  // 9 standardised test scenarios covering the interaction space
  const tests=[
    {sim:0.9, align:0.9, prox:0.9, energy:0.8},  // close, similar, aligned, strong
    {sim:0.9, align:0.1, prox:0.9, energy:0.5},  // close, similar, misaligned
    {sim:0.1, align:0.9, prox:0.9, energy:0.5},  // close, different, aligned
    {sim:0.1, align:0.1, prox:0.9, energy:0.3},  // close, different, misaligned
    {sim:0.9, align:0.9, prox:0.2, energy:0.5},  // far, similar, aligned
    {sim:0.5, align:0.5, prox:0.5, energy:0.5},  // neutral baseline
    {sim:0.9, align:0.9, prox:0.9, energy:0.1},  // close, similar, aligned, weak
    {sim:0.1, align:0.1, prox:0.2, energy:0.8},  // far, different, strong
    {sim:0.5, align:0.9, prox:0.7, energy:0.5},  // mid-similar, aligned, medium
  ];

  let totals=[0,0,0,0,0,0,0];
  let totalInst=0;

  for(const t of tests){
    vmRegs[0]=t.sim;vmRegs[1]=t.align;vmRegs[2]=t.prox;vmRegs[3]=t.energy;
    for(let r=4;r<12;r++)vmRegs[r]=0; // no particle memory in profiler
    vmActions[0]=0;vmActions[1]=0;vmActions[2]=0;vmActions[3]=0;vmActions[4]=0;vmActions[5]=0;vmActions[6]=0;vmActions[7]=0;

    const prog=genome.vmProgram;
    const nInst=Math.min(prog.length,genome.vmMaxInstructions);

    for(let ip=0,_prs=0;ip<nInst&&_prs<nInst*2;ip++,_prs++){
      const inst=prog[ip];if(!inst)continue;
      const [op,src,dst,k]=inst;
      const si=Math.abs(src)%12,di=Math.abs(dst)%12;
      switch(op){
        case 0:vmRegs[di]=vmRegs[si];break;
        case 1:vmRegs[di]+=vmRegs[si]*k;break;
        case 2:vmRegs[di]*=vmRegs[si]*(k||1);break;
        case 3:vmRegs[di]=vmRegs[si]>k?1:0;break;
        case 4:{const ai=Math.abs(dst)%8;vmActions[ai]+=vmRegs[si]*k;}break;
        case 5:{const fi=Math.abs(src)%8;vmRegs[di]=vmActions[fi];}break;
        case 6:vmRegs[di]=0.3;break; // stub READ_MEM: return neutral value (not 0 — avoids systematic bias)
        case 7:break; // skip STORE_MEM in profiler
        case 8:vmRegs[di]=0.5;break; // stub READ_FIELD in profiler
        case 9:break; // skip WRITE_FIELD in profiler
        case 10:break; // skip CLUSTER_WRITE_FIELD in profiler
        // Pe33: opcodes 11-23 stubbed in profiler so memory/broadcast/recognition strategies
        // produce non-zero behavioral profiles. Previously all fell through to nothing.
        // The profiler's self-portrait was blind to these — any strategy using these
        // opcodes profiled as flat zero, making behavioral gradient useless for them.
        case 11:{const sl11=Math.abs(dst)%2;vmActions[sl11%8]+=vmRegs[si]*k;}break; // BROADCAST_WRITE → treat as action emit
        case 12:vmRegs[di]=0.3;break;  // BROADCAST_READ → neutral partner signal stub
        case 13:vmRegs[di]=0.2;break;  // SELF_READ_PROGRAM → neutral constant stub
        case 14:break;                  // BRANCH → skip (profiler runs all instructions)
        case 15:{const af15=0.5;vmRegs[di]=vmRegs[si]*(1-af15)+k*af15;}break; // AGE_LERP → neutral age=0.5
        case 16:break;                  // SPAWN_CHILD → skip in profiler
        case 17:{vmRegs[si]=0.1*k;vmRegs[di]=0.1*k;}break; // GRAD_READ → weak neutral gradient
        case 18:break;                  // WRITE_PARTNER_MEM → skip
        case 19:vmRegs[di]=0.1;break;  // COMMONS_READ → low neutral commons value
        case 20:break;                  // INSCRIBE → skip
        case 21:vmRegs[di]=0.3;break;  // READ_FIELD2 → neutral stub
        case 22:{                       // USER_ATOM → return 0 (can't call closures in profiler)
          vmRegs[di]=0;
        }break;
        case 23:{                       // NEIGHBOR_PREDICT (Pe31) → neutral prediction stub
          // Real call needs a live partner — profiler uses a calibrated mid-range stub.
          // 0.3 represents a "somewhat familiar, somewhat cooperative" partner model.
          // Not 0: that would make any genome using Pe31 strategies look non-cooperative.
          const predInf33=genome.neighborPredictionInfluence||0;
          vmRegs[di]=0.3*predInf33*(k||1);
        }break;
        case 26:{                       // META_READ (Pe42) → use current metaSignalValue
          // Profiler runs outside the mutation cycle, so metaSignalValue is whatever was
          // last computed. Non-zero so genomes reading meta health get a meaningful profile.
          const msiProf=genome.metaSignalInfluence||0;
          vmRegs[di]=(genome.metaSignalValue||0.3)*msiProf*(k||1);
        }break;
        case 27:{                       // META_GRAD_READ (Pe43) → use cached gradient
          const msgiProf=genome.metaSignalGradInfluence||0;
          vmRegs[di]=(genome.metaSignalGrad||0)*msgiProf*(k||1);
        }break;
        case 28:{                       // META_VOL_READ (Pe44) → use cached volatility
          const msviProf=genome.metaSignalVolInfluence||0;
          vmRegs[di]=(genome.metaSignalVol||0.1)*msviProf*(k||1);
        }break;
        case 29:{                       // ATTR_QUERY (Pe45) → trace of indexed meta-param
          const mmbProf=genome.metaMutationBias||0;
          if(mmbProf>0.001&&genome.metaCredit){
            const aqIdx=Math.abs(Math.floor(k||0))%META_LAYER_PARAMS.length;
            const aqParam=META_LAYER_PARAMS[aqIdx];
            const aqE=genome.metaCredit[aqParam];
            vmRegs[di]=(aqE?(aqE.trace||0):0)*mmbProf*(k>=0?1:-1);
          }
        }break;
        case 30:{                       // READ_INSCRIPTION (Pe46) → normalized op-type stub
          // Profiler has no live particle positions. Return a mid-range stub.
          // 0.45 ≈ op 5/11, roughly the middle of the cell-op range.
          // Not 0: that would bias any genome using inscription reads toward zero profiles.
          vmRegs[di]=0.45*(k||1);
        }break;
        case 32:{                       // FIELD2_GRAD (Pe48) → calibrated mid-range stub
          // Profiler has no live field2 state. Return a small non-zero gradient stub so
          // genomes that use opcode 32 still produce a non-trivial phenotype profile.
          // Magnitude 0.1 represents a gentle gradient — plausible but not dominant.
          const f2giProf=genome.field2GradInfluence||0;
          vmRegs[si]= 0.1*f2giProf*(k||1);
          vmRegs[di]=-0.1*f2giProf*(k||1);
        }break;
        case 33:{                       // FIELD2_TEMPORAL (Pe49) → small positive rate stub
          // Profiler has no live field2Prev state. Return a small positive delta stub so
          // genomes using opcode 33 produce a plausible non-trivial phenotype profile.
          // 0.03 represents a gentle rising rate — low but nonzero.
          const f2tiProf=genome.field2TemporalInfluence||0;
          vmRegs[di]=0.03*f2tiProf*(k||1);
        }break;
        case 34:{                       // FIELD_CROSS (Pe50) → neutral balance stub
          // Profiler has no live field/field2 state. Return a near-zero balance stub so
          // genomes using opcode 34 produce a plausible contested-zone phenotype profile.
          // 0.05 represents slight field1 dominance — a mildly biased contested region.
          const fxiProf=genome.fieldCrossInfluence||0;
          vmRegs[di]=0.05*fxiProf*(k||1);
        }break;
        case 35:{                       // NEIGHBOR_DENSITY (Pe51) → mid-density stub
          // Profiler has no live neighbor count. Return a moderate density stub so
          // genomes using opcode 35 produce a plausible phenotype profile.
          // 0.3 represents ~3 neighbors — below average but not isolated.
          const ndiProf=genome.neighborDensityInfluence||0;
          vmRegs[di]=0.3*ndiProf*(k||1);
        }break;
        case 36:{                       // SELF_AMP (Pe52) → mid-vigor stub
          // Profiler has no live amp[i]. Return a moderate vigor stub so
          // genomes using opcode 36 produce a plausible phenotype profile.
          // 0.6 represents healthy-but-not-peak amplitude.
          const saiProf=genome.selfAmpInfluence||0;
          vmRegs[di]=0.6*saiProf*(k||1);
        }break;
        case 37:{                       // PARTNER_AMP (Pe53) → mid-vigor partner stub
          // Profiler has no live amp[j]. Return a moderate vigor stub so
          // genomes using opcode 37 produce a plausible phenotype profile.
          // 0.5 represents a partner at moderate health — slightly below own stub (0.6),
          // which biases the profiler toward mild "I am stronger" scenarios.
          const paiProf=genome.partnerAmpInfluence||0;
          vmRegs[di]=0.5*paiProf*(k||1);
        }break;
        case 38:{                       // PARTNER_DENSITY (Pe54) → mid-density partner stub
          // Profiler has no live pNeighborCount[j]. Return a moderate density stub (0.3)
          // so genomes using opcode 38 produce a plausible phenotype profile.
          // 0.3 represents ~3 neighbors — a lightly-populated neighborhood.
          const pdiProf=genome.partnerDensityInfluence||0;
          vmRegs[di]=0.3*pdiProf*(k||1);
        }break;
        case 48:{                       // PARTNER_MEM_READ (Pe64) → neutral partner memory stub
          // Profiler has no live pMem[j]. Return a small neutral stub (0.2) so
          // genomes using opcode 48 produce a plausible phenotype profile.
          // 0.2 represents a lightly-written memory slot — common after early interactions.
          const pmriProf=genome.partnerMemReadInfluence||0;
          vmRegs[di]=0.2*pmriProf*(k||1);
        }break;
        case 49:{                       // PARTNER_TEND_READ (Pe65) → neutral tend component stub
          // Profiler has no live tend[j]. Return a small neutral stub (0.15) so
          // genomes using opcode 49 produce a plausible phenotype profile.
          // 0.15 represents a moderately-loaded tendency dimension — neither peak nor zero.
          const ptriProf=genome.partnerTendInfluence||0;
          vmRegs[di]=0.15*ptriProf*(k||1);
        }break;
        case 50:{                       // SELF_TEND_READ (Pe66) → moderate own identity stub
          // Profiler has no live tend[i]. Return a moderate positive stub (0.25) so
          // genomes using opcode 50 produce a plausible phenotype profile.
          // 0.25 represents a meaningful own identity component — slightly above partner stub
          // (0.15) to bias the profiler toward mild "I am more specialized than my partner"
          // scenarios, which is the most common real condition.
          const striProf=genome.selfTendInfluence||0;
          vmRegs[di]=0.25*striProf*(k||1);
        }break;
        case 51:{                       // SELF_PHASE (Pe67) → neutral phase stub
          // Profiler has no live phase[i]. cos(phase) averages to 0 over a uniform
          // distribution of phase angles, so 0 is the least-biased stub.
          // Genomes using opcode 51 produce a near-zero phenotype contribution at the
          // profiler stage — correct, since phase behavior only emerges in live simulation.
          const sphiProf=genome.selfPhaseInfluence||0;
          vmRegs[di]=0.0*sphiProf*(k||1);
        }break;
        case 52:{                       // PARTNER_PHASE (Pe68) → neutral partner phase stub
          // Profiler has no live phase[j]. cos(phase) averages to 0 over a uniform
          // distribution — identical reasoning to SELF_PHASE (case 51).
          // Both self and partner phase stubs are 0, so their arithmetic difference
          // also stubs at 0. Correct: phase-differential strategies only reveal
          // themselves in live simulation where phases are actually diverse.
