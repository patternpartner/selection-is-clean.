        case 27:{
          // Pe43 Layer 32: META_GRAD_READ — read attribution momentum into register.
          // metaSignalGrad is positive when attribution health is rising (recovery /
          // stabilization), negative when falling (destabilization / collapse approach).
          // metaSignalGradInfluence=0 returns 0 → Pe42 behavior exactly.
          const msgiP=genome.metaSignalGradInfluence||0;
          if(msgiP>0.001){
            vmRegs[di]=(genome.metaSignalGrad||0)*msgiP*(k||1);
          }
        }break;
        case 28:{
          // Pe44 Layer 33: META_VOL_READ — read attribution volatility into register.
          // metaSignalVol near 0: gradient has been stable — direction trustworthy.
          // metaSignalVol near 1: gradient swinging — direction unreliable.
          // metaSignalVolInfluence=0 returns 0 → Pe43 behavior exactly.
          const msviP=genome.metaSignalVolInfluence||0;
          if(msviP>0.001){
            vmRegs[di]=(genome.metaSignalVol||0)*msviP*(k||1);
          }
        }break;
        case 29:{
          // Pe45 Layer 34: ATTR_QUERY — read attribution trace of a specific meta-parameter.
          const mmbP=genome.metaMutationBias||0;
          if(mmbP>0.001&&genome.metaCredit){
            const aqIdx=Math.abs(Math.floor(k||0))%META_LAYER_PARAMS.length;
            const aqParam=META_LAYER_PARAMS[aqIdx];
            const aqE=genome.metaCredit[aqParam];
            vmRegs[di]=(aqE?(aqE.trace||0):0)*mmbP*(k>=0?1:-1);
          }
        }break;
        case 30:{
          // Pe47: READ_INSCRIPTION parity for plasmid VM (was missing from Pe46).
          const ri30x=Math.floor(px[i]/(W/FIELD_W)),ri30y=Math.floor(py[i]/(H/FIELD_H));
          const ri30idx=Math.max(0,Math.min(FIELD_W*FIELD_H-1,ri30y*FIELD_W+ri30x));
          if(cellProgStr[ri30idx]>0.1){
            vmRegs[di]=(cellProgOp[ri30idx]/11)*k;
          }else{
            vmRegs[di]=0;
          }
        }break;
        case 31:{
          // Pe47 Layer 36: FIELD2_WRITE in plasmid VM.
          const fw47p=genome.field2WriteInfluence||0;
          if(fw47p>0.001){
            const fx31=Math.floor(px[i]/(W/FIELD_W)),fy31=Math.floor(py[i]/(H/FIELD_H));
            const fi31=Math.max(0,Math.min(FIELD_W*FIELD_H-1,fy31*FIELD_W+fx31));
            field2[fi31]=Math.max(0,Math.min(100,field2[fi31]+vmRegs[si]*k*fw47p));
          }
        }break;
        case 32:{
          // Pe48 Layer 37: FIELD2_GRAD in plasmid VM — parity with particle VM.
          const f2gip=genome.field2GradInfluence||0;
          if(f2gip>0.001){
            const gfx2p=Math.floor(px[i]/(W/FIELD_W)),gfy2p=Math.floor(py[i]/(H/FIELD_H));
            const gfi2p=gfy2p*FIELD_W+gfx2p;
            const gl2p=gfx2p>0?field2[gfi2p-1]:field2[gfi2p];
            const gr2p=gfx2p<FIELD_W-1?field2[gfi2p+1]:field2[gfi2p];
            const gu2p=gfy2p>0?field2[gfi2p-FIELD_W]:field2[gfi2p];
            const gd2p=gfy2p<FIELD_H-1?field2[gfi2p+FIELD_W]:field2[gfi2p];
            vmRegs[si]=(gr2p-gl2p)*0.5*k*f2gip;
            vmRegs[di]=(gd2p-gu2p)*0.5*k*f2gip;
          }
        }break;
        case 33:{
          // Pe49 Layer 38: FIELD2_TEMPORAL in plasmid VM — parity with particle VM.
          const f2tip=genome.field2TemporalInfluence||0;
          if(f2tip>0.001){
            const tfxp=Math.floor(px[i]/(W/FIELD_W)),tfyp=Math.floor(py[i]/(H/FIELD_H));
            const tfip=Math.max(0,Math.min(FIELD_W*FIELD_H-1,tfyp*FIELD_W+tfxp));
            vmRegs[di]=(field2[tfip]-field2Prev[tfip])*f2tip*k;
          }
        }break;
        case 34:{
          // Pe50 Layer 39: FIELD_CROSS in plasmid VM — parity with particle VM.
          const fxip=genome.fieldCrossInfluence||0;
          if(fxip>0.001){
            const cx50p=Math.floor(px[i]/(W/FIELD_W)),cy50p=Math.floor(py[i]/(H/FIELD_H));
            const ci50p=Math.max(0,Math.min(FIELD_W*FIELD_H-1,cy50p*FIELD_W+cx50p));
            const f1vp=field[ci50p],f2vp=field2[ci50p];
            vmRegs[di]=(f1vp-f2vp)/(f1vp+f2vp+0.01)*fxip*k;
          }
        }break;
        case 35:{
          // Pe51 Layer 40: NEIGHBOR_DENSITY in plasmid VM — parity with particle VM.
          const ndi51p=genome.neighborDensityInfluence||0;
          if(ndi51p>0.001){
            vmRegs[di]=Math.min(3,pNeighborCount[i]/10)*ndi51p*k;
          }
        }break;
        case 36:{
          // Pe52 Layer 41: SELF_AMP in plasmid VM — parity with particle VM.
          // Reads amp[i] into vmRegs[di], scaled by selfAmpInfluence × k.
          const sai52p=genome.selfAmpInfluence||0;
          if(sai52p>0.001){
            vmRegs[di]=Math.max(0,Math.min(1.2,amp[i]))*sai52p*k;
          }
        }break;
        case 37:{
          // Pe53 Layer 42: PARTNER_AMP in plasmid VM — parity with particle VM.
          // Reads amp[j] into vmRegs[di], scaled by partnerAmpInfluence × k.
          const pai53p=genome.partnerAmpInfluence||0;
          if(pai53p>0.001){
            vmRegs[di]=Math.max(0,Math.min(1.2,amp[j]))*pai53p*k;
          }
        }break;
        case 38:{
          // Pe54 Layer 43: PARTNER_DENSITY in plasmid VM — parity with particle VM.
          // Reads pNeighborCount[j]/10 into vmRegs[di], scaled by partnerDensityInfluence × k.
          const pdi54p=genome.partnerDensityInfluence||0;
          if(pdi54p>0.001){
            vmRegs[di]=Math.min(3,pNeighborCount[j]/10)*pdi54p*k;
          }
        }break;
        case 39:{
          // Pe56: SELF_AGE in plasmid VM — parity fix (Pe55 added this to particle VM only).
          // Reads page[i]/800 into vmRegs[di], scaled by selfAgeInfluence × k.
          const sagai55p=genome.selfAgeInfluence||0;
          if(sagai55p>0.001){
            vmRegs[di]=Math.min(3,page[i]/800)*sagai55p*k;
          }
        }break;
        case 40:{
          // Pe56 Layer 45: PARTNER_AGE in plasmid VM — full parity with particle VM.
          // Reads page[j]/800 into vmRegs[di], scaled by partnerAgeInfluence × k.
          const pagei56p=genome.partnerAgeInfluence||0;
          if(pagei56p>0.001){
            vmRegs[di]=Math.min(3,page[j]/800)*pagei56p*k;
          }
        }break;
        case 41:{
          // Pe58 parity fix: SELF_SPEED in plasmid VM — Pe57 added this to particle+cluster VMs only.
          // Reads sqrt(vx[i]²+vy[i]²)/2 into vmRegs[di], scaled by selfSpeedInfluence × k.
          const sspi57p=genome.selfSpeedInfluence||0;
          if(sspi57p>0.001){
            const sp57p=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
            vmRegs[di]=Math.min(3,sp57p/2)*sspi57p*k;
          }
        }break;
        case 42:{
          // Pe58 Layer 47: PARTNER_SPEED in plasmid VM — full parity with particle VM.
          // Reads sqrt(vx[j]²+vy[j]²)/2 into vmRegs[di], scaled by partnerSpeedInfluence × k.
          const pspdi58p=genome.partnerSpeedInfluence||0;
          if(pspdi58p>0.001){
            const psp58p=Math.sqrt(vx[j]*vx[j]+vy[j]*vy[j]);
            vmRegs[di]=Math.min(3,psp58p/2)*pspdi58p*k;
          }
        }break;
        case 43:{
          // Pe59 Layer 48: HEADING_ALIGN in plasmid VM — full parity with particle VM.
          // Dot product of normalized velocity vectors → directional alignment in [-1, +1].
          const hai59p=genome.headingAlignInfluence||0;
          if(hai59p>0.001){
            const si59p=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
            const sj59p=Math.sqrt(vx[j]*vx[j]+vy[j]*vy[j]);
            if(si59p>0.1&&sj59p>0.1){
              const dot59p=(vx[i]*vx[j]+vy[i]*vy[j])/(si59p*sj59p);
              vmRegs[di]=dot59p*hai59p*k;
            }
          }
        }break;
        case 44:{
          // Pe60 Layer 49: APPROACH_RATE in plasmid VM — full parity with particle VM.
          // Radial velocity: positive=separating, negative=converging.
          const ari60p=genome.approachRateInfluence||0;
          if(ari60p>0.001){
            const dxr60p=px[i]-px[j], dyr60p=py[i]-py[j];
            const dist60p=Math.sqrt(dxr60p*dxr60p+dyr60p*dyr60p);
            if(dist60p>0.5){
              const dvx60p=vx[i]-vx[j], dvy60p=vy[i]-vy[j];
              const radial60p=(dxr60p*dvx60p+dyr60p*dvy60p)/dist60p;
              vmRegs[di]=Math.max(-3,Math.min(3,radial60p/4))*ari60p*k;
            }
          }
        }break;
        case 45:{
          // Pe61 Layer 50: ORBIT_RATE in plasmid VM — full parity with particle VM.
          // Tangential velocity: positive=CCW orbit, negative=CW orbit, ~0=radial motion.
          const ori61p=genome.orbitRateInfluence||0;
          if(ori61p>0.001){
            const dxo61p=px[i]-px[j], dyo61p=py[i]-py[j];
            const disto61p=Math.sqrt(dxo61p*dxo61p+dyo61p*dyo61p);
            if(disto61p>0.5){
              const dvx61p=vx[i]-vx[j], dvy61p=vy[i]-vy[j];
              const tang61p=(dxo61p*dvy61p-dyo61p*dvx61p)/disto61p;
              vmRegs[di]=Math.max(-3,Math.min(3,tang61p/4))*ori61p*k;
            }
          }
        }break;
        case 46:{
          // Pe62 Layer 51: SELF_FREQ in plasmid VM — full parity with particle VM.
          // Reads freq[i] (own oscillation rate) into vmRegs[di], scaled by selfFreqInfluence × k.
          const sfi62p=genome.selfFreqInfluence||0;
          if(sfi62p>0.001){
            vmRegs[di]=Math.min(3,freq[i]/0.02)*sfi62p*k;
          }
        }break;
        case 47:{
          // Pe63 Layer 52: PARTNER_FREQ in plasmid VM — full parity with particle VM.
          // Reads freq[j] (partner oscillation rate) into vmRegs[di], scaled by partnerFreqInfluence × k.
          const pfi63p=genome.partnerFreqInfluence||0;
          if(pfi63p>0.001){
            vmRegs[di]=Math.min(3,freq[j]/0.02)*pfi63p*k;
          }
        }break;
        case 48:{
          // Pe64 Layer 53: PARTNER_MEM_READ in plasmid VM — full parity with particle VM.
          // Reads pMem[j][si%MEM_SIZE] into vmRegs[di], scaled by partnerMemReadInfluence × k.
          const pmri64p=genome.partnerMemReadInfluence||0;
          if(pmri64p>0.001){
            vmRegs[di]=pMem[j*MEM_SIZE+(si%MEM_SIZE)]*pmri64p*(k||1);
          }
        }break;
        case 49:{
          // Pe65 Layer 54: PARTNER_TEND_READ in plasmid VM — full parity with particle VM.
          // Reads tend[j][si%DIMS] into vmRegs[di], scaled by partnerTendInfluence × k.
          const ptri65p=genome.partnerTendInfluence||0;
          if(ptri65p>0.001){
            vmRegs[di]=tend[j*DIMS+(si%DIMS)]*ptri65p*(k||1);
          }
        }break;
        case 50:{
          // Pe66 Layer 55: SELF_TEND_READ in plasmid VM — full parity with particle VM.
          // Reads tend[i][si%DIMS] into vmRegs[di], scaled by selfTendInfluence × k.
          const stri66p=genome.selfTendInfluence||0;
          if(stri66p>0.001){
            vmRegs[di]=tend[i*DIMS+(si%DIMS)]*stri66p*(k||1);
          }
        }break;
        case 51:{
          // Pe67 Layer 56: SELF_PHASE in plasmid VM — full parity with particle VM.
          // Reads cos(phase[i]) into vmRegs[di], scaled by selfPhaseInfluence × k.
          const sphi67p=genome.selfPhaseInfluence||0;
          if(sphi67p>0.001){
            vmRegs[di]=Math.cos(phase[i])*sphi67p*(k||1);
          }
        }break;
        case 52:{
          // Pe68 Layer 57: PARTNER_PHASE in plasmid VM — full parity with particle VM.
          // Reads cos(phase[j]) into vmRegs[di], scaled by partnerPhaseInfluence × k.
          const pphi68p=genome.partnerPhaseInfluence||0;
          if(pphi68p>0.001){
            vmRegs[di]=Math.cos(phase[j])*pphi68p*(k||1);
          }
        }break;
        case 53:{
          // Pe69 Layer 58: INTERACTION_DIST in plasmid VM — full parity with particle VM.
          // Reads d/CELL (normalized interaction distance) into vmRegs[di].
          // `d` is the 4th argument to executeVM(i,j,sim,d) — plasmid VM runs inside
          // executeVM so `d` is in scope for the full function body.
          const idi69p=genome.interactionDistInfluence||0;
          if(idi69p>0.001){
            vmRegs[di]=Math.min(1,d/CELL)*idi69p*(k||1);
          }
        }break;
        case 54:{
          // Pe70 Layer 59: FIELD1_TEMPORAL in plasmid VM — full parity with particle VM.
          // Reads (field[cell] - field1Prev[cell]) at particle i's current position.
          // fieldTemporalInfluence=0 → returns 0 → Pe69 exactly.
          const f1ti70p=genome.fieldTemporalInfluence||0;
          if(f1ti70p>0.001){
            const tfx70p=Math.floor(px[i]/(W/FIELD_W)),tfy70p=Math.floor(py[i]/(H/FIELD_H));
            const tfi70p=Math.max(0,Math.min(FIELD_W*FIELD_H-1,tfy70p*FIELD_W+tfx70p));
            vmRegs[di]=(field[tfi70p]-field1Prev[tfi70p])*f1ti70p*(k||1);
          }
        }break;
      }
      for(let r=0;r<12;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
    }
    amp[i]-=nPi*genome.metabolicCost*0.5;
  }

  const bondStrength=sim*phaseAlign;
  if(bondStrength>genome.plasmidTransferThresh&&Math.random()<genome.plasmidTransferRate){
    const donor=Math.random()<0.5?i:j;
    const recip=donor===i?j:i;
    if(pPlasmidLen[donor]>0&&pPlasmidLen[recip]<MAX_PLASMID){
      const srcP=Math.floor(Math.random()*pPlasmidLen[donor]);
      const rLen=pPlasmidLen[recip];
      pPlasmid[recip*PLASMID_SLOTS+rLen*4]=pPlasmid[donor*PLASMID_SLOTS+srcP*4];
      pPlasmid[recip*PLASMID_SLOTS+rLen*4+1]=pPlasmid[donor*PLASMID_SLOTS+srcP*4+1];
      pPlasmid[recip*PLASMID_SLOTS+rLen*4+2]=pPlasmid[donor*PLASMID_SLOTS+srcP*4+2];
      pPlasmid[recip*PLASMID_SLOTS+rLen*4+3]=pPlasmid[donor*PLASMID_SLOTS+srcP*4+3]+(Math.random()-0.5)*0.15;
      pPlasmidLen[recip]++;
      if(flashN<MAX_FLASHES){
        flashX1[flashN]=px[i];flashY1[flashN]=py[i];
        flashX2[flashN]=px[j];flashY2[flashN]=py[j];
        flashAge[flashN]=0;
        flashN++;
      }
    }
  }

  const ddx=px[j]-px[i],ddy=py[j]-py[i];
  const dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
  const nx=ddx/dist,ny=ddy/dist;

  const force=vmActions[0]*influence*proximity;
  if(Math.abs(force)>0.000001){
    vx[i]+=nx*force;vy[i]+=ny*force;
    vx[j]-=nx*force;vy[j]-=ny*force;
  }

  const pshift=vmActions[1]*influence;
  if(Math.abs(pshift)>0.000001){
    let dp=phase[j]-phase[i];
    while(dp>Math.PI)dp-=6.28;while(dp<-Math.PI)dp+=6.28;
    phase[i]+=dp*pshift;phase[j]-=dp*pshift;
  }

  const atrans=vmActions[2]*influence*0.5;
  if(Math.abs(atrans)>0.000001){
    amp[i]-=atrans;amp[j]+=atrans;
  }

  const tbleed=vmActions[3]*influence;
  if(Math.abs(tbleed)>0.000001){
    for(let dd=0;dd<DIMS;dd++){
      const diff=(tend[j*DIMS+dd]-tend[i*DIMS+dd])*tbleed;
      tend[i*DIMS+dd]+=diff;tend[j*DIMS+dd]-=diff;
    }
  }

  if(vmActions[4]*influence>0.0002&&Math.random()<0.002&&N<CAP){
    const cx=(px[i]+px[j])*0.5,cy=(py[i]+py[j])*0.5;
    const nt=new Float32Array(DIMS);
    for(let dd=0;dd<DIMS;dd++)nt[dd]=(tend[i*DIMS+dd]+tend[j*DIMS+dd])*0.5;
    addParticle(cx,cy,nt,false,i,j);
    amp[i]*=0.7;amp[j]*=0.7;
    birthsThisTick++;
  }

  const sigMod=vmActions[5]*influence*0.003;
  if(Math.abs(sigMod)>0.00001){
    const cid5=clusterID[i];
    if(cid5>=0){
      const cIdx5=cid5<MAX_CLUSTERS?clusterByID[cid5]:-1;
      if(cIdx5>=0&&clusters[cIdx5].fieldSignature){
        const sig=clusters[cIdx5].fieldSignature;
        const pAlign=Math.cos(phase[i]-phase[j]);
        for(let s=0;s<FIELD_SIG_DIMS;s++){
          sig[s]+=sigMod*pAlign*(s===0?1:s===1?-0.5:0.5);
          sig[s]=Math.max(-1.5,Math.min(1.5,sig[s]));
        }
      }
    }
  }

  mutPressureAccum+=vmActions[6]*influence*0.0001;

  tend[i*DIMS+4]+=vmActions[7]*influence*0.01;
  tend[i*DIMS+4]=Math.max(-1,Math.min(1,tend[i*DIMS+4]));
}

function executeClusterVM(i,j,sim,d){
  const cid=clusterID[i];
  if(cid<0)return;
  const cIdx=cid<MAX_CLUSTERS?clusterByID[cid]:-1;
  if(cIdx<0)return;
  const cl=clusters[cIdx];
  if(!cl||!cl.vmProgram)return;

  const proximity=1-d/CELL;
  const phaseAlign=Math.cos(phase[i]-phase[j]);
  const energy=(amp[i]+amp[j])*0.5;
  const influence=cl.vmInfluence*genome.ruleScale*0.0015;

  vmRegs[0]=sim;
  vmRegs[1]=phaseAlign;
  vmRegs[2]=proximity;
  vmRegs[3]=energy;

  const crw=genome.clusterReflexWeight||0;
  if(crw>0.001&&cl.reflexThreat!==undefined){
    vmRegs[4]+=cl.reflexThreat*crw;
    vmRegs[5]+=cl.reflexTrend*crw;
  }

  // Pe24 Layer 12: cluster self-read. The cluster's own heritable genome values
  // are overlaid onto registers 8-11. Scaled by clusterGenomeReadStrength which
  // is itself evolvable — if reading own traits is useful, the strength grows.
  const cgr=genome.clusterGenomeReadStrength||0;
  if(cgr>0.001&&cl.clusterGenome){
    vmRegs[8]+=cl.clusterGenome.budRate*cgr;
    vmRegs[9]+=cl.clusterGenome.innovationRate*cgr;
    vmRegs[10]+=cl.clusterGenome.metabolicBias*cgr;
    vmRegs[11]+=cl.clusterGenome.splitFraction*cgr;
    for(let r=8;r<=11;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
  }

  vmActions[0]=0;vmActions[1]=0;vmActions[2]=0;vmActions[3]=0;vmActions[4]=0;vmActions[5]=0;vmActions[6]=0;vmActions[7]=0;

  const prog=cl.vmProgram;
  const nInst=Math.min(prog.length,MAX_CLUSTER_VM);

  for(let ip=0,_cs=0;ip<nInst&&_cs<nInst*2;ip++,_cs++){
    const inst=prog[ip];if(!inst)continue;
    const [op,src,dst,k]=inst;
    const si=Math.abs(src)%12,di=Math.abs(dst)%12;
    switch(op){
      case 0:vmRegs[di]=vmRegs[si];break;
      case 1:vmRegs[di]+=vmRegs[si]*k;break;
      case 2:vmRegs[di]*=vmRegs[si]*(k||1);break;
      case 3:vmRegs[di]=vmRegs[si]>k?1:0;break;
      case 4:{const ai=Math.abs(dst)%8;vmActions[ai]+=vmRegs[si]*k;}break;
      case 5:{const fi=Math.abs(src)%8;vmRegs[di]=vmActions[fi];}break;
      case 6:vmRegs[di]=pMem[i*MEM_SIZE+(Math.abs(src)%MEM_SIZE)];break;
      case 7:pMem[i*MEM_SIZE+(Math.abs(dst)%MEM_SIZE)]=vmRegs[si];break;
      case 8:{const fx8=Math.floor(px[i]/(W/FIELD_W)),fy8=Math.floor(py[i]/(H/FIELD_H));const fi8=Math.max(0,Math.min(FIELD_W*FIELD_H-1,fy8*FIELD_W+fx8));vmRegs[di]=field[fi8];}break;
      case 9:{const wx9=Math.floor(px[i]/(W/FIELD_W)),wy9=Math.floor(py[i]/(H/FIELD_H));const wi9=Math.max(0,Math.min(FIELD_W*FIELD_H-1,wy9*FIELD_W+wx9));field[wi9]+=vmRegs[si]*k;field[wi9]=Math.max(0,Math.min(2.5,field[wi9]));stampField(wi9,cl.fieldSignature,Math.abs(vmRegs[si]*k));}break;
      case 10:{if(cl){const cfx=Math.floor(cl.cx/(W/FIELD_W)),cfy=Math.floor(cl.cy/(H/FIELD_H));const cfi=Math.max(0,Math.min(FIELD_W*FIELD_H-1,cfy*FIELD_W+cfx));field[cfi]+=vmRegs[si]*k;field[cfi]=Math.max(0,Math.min(2.5,field[cfi]));stampField(cfi,cl.fieldSignature,Math.abs(vmRegs[si]*k));}}break;
      case 11:{const cSlot=Math.abs(dst)%2;pBroadcast[i*2+cSlot]=vmRegs[si]*k;}break;
      case 12:{const cSlot2=Math.abs(src)%2;vmRegs[di]=pBroadcast[j*2+cSlot2];}break;
      case 13:{const cProg=cl?cl.vmProgram:genome.vmProgram;const cInstIdx=Math.abs(Math.floor(vmRegs[si]))%Math.max(1,cProg.length);const cSelfInst=cProg[cInstIdx];vmRegs[di]=cSelfInst?cSelfInst[Math.abs(Math.floor(k))%4]:0;}break;
      case 14:{const cNInst=cl?cl.vmProgram.length:prog.length;if(vmRegs[si]>k)ip=Math.abs(Math.floor(vmRegs[di]))%Math.max(1,cNInst);}break;
      case 15:{const cAgeFrac=Math.min(1,page[i]/800);vmRegs[di]=vmRegs[si]*(1-cAgeFrac)+k*cAgeFrac;}break;
      case 16:{
        if(amp[i]>0.4&&page[i]>80&&N+birthQueue.length<CAP-1&&Math.random()<0.03){
          const cnt=new Float32Array(DIMS);
          for(let dd=0;dd<DIMS;dd++)cnt[dd]=tend[i*DIMS+dd]+k*0.1*(vmRegs[(dd+4)%12]-0.5);
          birthQueue.push({x:Math.max(0,Math.min(W,px[i]+vmRegs[si]*15)),y:Math.max(0,Math.min(H,py[i]+vmRegs[di]*15)),t:cnt,parent:i});
          amp[i]*=0.5;
        }
      }break;
      case 17:{
        const gfx=Math.floor(px[i]/(W/FIELD_W)),gfy=Math.floor(py[i]/(H/FIELD_H));
        const gfi=gfy*FIELD_W+gfx;
        const gl=gfx>0?field[gfi-1]:field[gfi];
        const gr=gfx<FIELD_W-1?field[gfi+1]:field[gfi];
        const gu=gfy>0?field[gfi-FIELD_W]:field[gfi];
        const gd=gfy<FIELD_H-1?field[gfi+FIELD_W]:field[gfi];
        vmRegs[si]=(gr-gl)*0.5*k;
        vmRegs[di]=(gd-gu)*0.5*k;
      }break;
      case 18:{
        const mS3=Math.abs(Math.floor(vmRegs[si]))%MEM_SIZE;
        const mV3=vmRegs[di]*k;
        pMem[j*MEM_SIZE+mS3]+=mV3;
        pMem[j*MEM_SIZE+mS3]=Math.max(-8,Math.min(8,pMem[j*MEM_SIZE+mS3]));
      }break;
      case 19:{
        vmRegs[di]=globalCommons;
        const wStr3=Math.abs(vmRegs[si]*k);
        if(wStr3>commonsStrength){globalCommons=vmRegs[si]*k;commonsWriter=i;commonsStrength=wStr3;}
      }break;
      case 20:{
        const ix20=Math.floor(px[i]/(W/FIELD_W)),iy20=Math.floor(py[i]/(H/FIELD_H));
        const ci20=Math.max(0,Math.min(FIELD_W*FIELD_H-1,iy20*FIELD_W+ix20));
        const wStr20=Math.abs(vmRegs[si]*k)*0.4;
        if(wStr20>cellProgStr[ci20]*0.7){
          cellProgOp[ci20]=Math.abs(Math.floor(vmRegs[si]))%12;
          cellProgA[ci20]=vmRegs[di];
          cellProgB[ci20]=k;
          cellProgStr[ci20]=Math.min(1,cellProgStr[ci20]+wStr20);
        }else{
          cellProgStr[ci20]=Math.min(1,cellProgStr[ci20]+wStr20*0.3);
        }
      }break;
      case 21:{
        const rx21=Math.floor(px[i]/(W/FIELD_W)),ry21=Math.floor(py[i]/(H/FIELD_H));
        const ri21=Math.max(0,Math.min(FIELD_W*FIELD_H-1,ry21*FIELD_W+rx21));
        vmRegs[di]=field2[ri21]*k;
      }break;
      case 22:{
        const uas=genome.userAtoms;
        if(uas&&uas.length>0){
          const uIdx=Math.abs(Math.floor(k))%uas.length;
          vmRegs[di]=uaCall(uas[uIdx],vmRegs[si],vmRegs[(si+1)%12]);
        }
      }break;
      case 24:{
        // Pe43: SIGNAL_EMIT in cluster VM — previously absent. Closes structural
        // gap: cluster VMs were capped at Pe35 capability while particle VMs
        // advanced through Pe42. Pe43 brings both to parity.
        if(genome.signalInfluence>0.001){
          const emitVal=vmRegs[si]*k;
          pSignalEmit[i]=Math.max(-4,Math.min(4,emitVal));
          const emitCost=(genome.signalEmitCost||0)*Math.abs(emitVal);
          amp[i]-=emitCost;
        }
      }break;
      case 25:{
        // Pe43: SIGNAL_READ in cluster VM — previously absent.
        if(genome.signalInfluence>0.001){
          vmRegs[di]=pSignalReceive[i]*(genome.signalInfluence||0)*(k||1);
          signalReadCount++;
        }
      }break;
      case 26:{
        // Pe43: META_READ in cluster VM — previously absent.
        const msiC=genome.metaSignalInfluence||0;
        if(msiC>0.001){
          vmRegs[di]=(genome.metaSignalValue||0)*msiC*(k||1);
        }
      }break;
      case 27:{
        // Pe44: META_GRAD_READ in cluster VM — previously absent.
        // Cluster VMs now have full parity with particle VMs through Pe44.
        const msgiC=genome.metaSignalGradInfluence||0;
        if(msgiC>0.001){
          vmRegs[di]=(genome.metaSignalGrad||0)*msgiC*(k||1);
        }
      }break;
      case 28:{
        // Pe44 Layer 33: META_VOL_READ in cluster VM — parity with particle VM.
        const msviC=genome.metaSignalVolInfluence||0;
        if(msviC>0.001){
          vmRegs[di]=(genome.metaSignalVol||0)*msviC*(k||1);
        }
      }break;
      case 29:{
        // Pe45 Layer 34: ATTR_QUERY in cluster VM — full parity through opcode 29.
        const mmbC=genome.metaMutationBias||0;
        if(mmbC>0.001&&genome.metaCredit){
          const aqIdx=Math.abs(Math.floor(k||0))%META_LAYER_PARAMS.length;
          const aqParam=META_LAYER_PARAMS[aqIdx];
          const aqE=genome.metaCredit[aqParam];
          vmRegs[di]=(aqE?(aqE.trace||0):0)*mmbC*(k>=0?1:-1);
        }
      }break;
      case 30:{
        // Pe47: READ_INSCRIPTION parity for cluster VM (was missing from Pe46).
        // All three VMs now have full parity through opcode 31.
        const ri30x=Math.floor(px[i]/(W/FIELD_W)),ri30y=Math.floor(py[i]/(H/FIELD_H));
        const ri30idx=Math.max(0,Math.min(FIELD_W*FIELD_H-1,ri30y*FIELD_W+ri30x));
        if(cellProgStr[ri30idx]>0.1){
          vmRegs[di]=(cellProgOp[ri30idx]/11)*k;
        }else{
          vmRegs[di]=0;
        }
      }break;
      case 31:{
        // Pe47 Layer 36: FIELD2_WRITE in cluster VM.
        // Cluster members can directly deposit into field2 at their cell position.
        // field2WriteInfluence=0 → inert → Pe46 exactly.
        const fw47c=genome.field2WriteInfluence||0;
        if(fw47c>0.001){
          const fx31=Math.floor(px[i]/(W/FIELD_W)),fy31=Math.floor(py[i]/(H/FIELD_H));
          const fi31=Math.max(0,Math.min(FIELD_W*FIELD_H-1,fy31*FIELD_W+fx31));
          field2[fi31]=Math.max(0,Math.min(100,field2[fi31]+vmRegs[si]*k*fw47c));
        }
      }break;
      case 32:{
        // Pe48 Layer 37: FIELD2_GRAD in cluster VM — full parity with particle VM through opcode 32.
        const f2gic=genome.field2GradInfluence||0;
        if(f2gic>0.001){
          const gfx2c=Math.floor(px[i]/(W/FIELD_W)),gfy2c=Math.floor(py[i]/(H/FIELD_H));
          const gfi2c=gfy2c*FIELD_W+gfx2c;
          const gl2c=gfx2c>0?field2[gfi2c-1]:field2[gfi2c];
          const gr2c=gfx2c<FIELD_W-1?field2[gfi2c+1]:field2[gfi2c];
          const gu2c=gfy2c>0?field2[gfi2c-FIELD_W]:field2[gfi2c];
          const gd2c=gfy2c<FIELD_H-1?field2[gfi2c+FIELD_W]:field2[gfi2c];
          vmRegs[si]=(gr2c-gl2c)*0.5*k*f2gic;
          vmRegs[di]=(gd2c-gu2c)*0.5*k*f2gic;
        }
      }break;
      case 33:{
        // Pe49 Layer 38: FIELD2_TEMPORAL in cluster VM — full parity with particle VM through opcode 33.
        const f2tic=genome.field2TemporalInfluence||0;
        if(f2tic>0.001){
          const tfxc=Math.floor(px[i]/(W/FIELD_W)),tfyc=Math.floor(py[i]/(H/FIELD_H));
          const tfic=Math.max(0,Math.min(FIELD_W*FIELD_H-1,tfyc*FIELD_W+tfxc));
          vmRegs[di]=(field2[tfic]-field2Prev[tfic])*f2tic*k;
        }
      }break;
      case 34:{
        // Pe50 Layer 39: FIELD_CROSS in cluster VM — full parity with particle VM through opcode 34.
        const fxic=genome.fieldCrossInfluence||0;
        if(fxic>0.001){
          const cx50c=Math.floor(px[i]/(W/FIELD_W)),cy50c=Math.floor(py[i]/(H/FIELD_H));
          const ci50c=Math.max(0,Math.min(FIELD_W*FIELD_H-1,cy50c*FIELD_W+cx50c));
          const f1vc=field[ci50c],f2vc=field2[ci50c];
          vmRegs[di]=(f1vc-f2vc)/(f1vc+f2vc+0.01)*fxic*k;
        }
      }break;
      case 35:{
        // Pe51 Layer 40: NEIGHBOR_DENSITY in cluster VM — full parity with particle VM.
        const ndi51c=genome.neighborDensityInfluence||0;
        if(ndi51c>0.001){
          vmRegs[di]=Math.min(3,pNeighborCount[i]/10)*ndi51c*k;
        }
      }break;
      case 36:{
        // Pe52 Layer 41: SELF_AMP in cluster VM — full parity with particle VM.
        const sai52c=genome.selfAmpInfluence||0;
        if(sai52c>0.001){
          vmRegs[di]=Math.max(0,Math.min(1.2,amp[i]))*sai52c*k;
        }
      }break;
      case 37:{
        // Pe53 Layer 42: PARTNER_AMP in cluster VM — parity with particle VM (was missing in Pe53, fixed in Pe54).
        // Reads amp[j] into vmRegs[di], scaled by partnerAmpInfluence × k.
        const pai53c=genome.partnerAmpInfluence||0;
        if(pai53c>0.001){
          vmRegs[di]=Math.max(0,Math.min(1.2,amp[j]))*pai53c*k;
        }
      }break;
      case 38:{
        // Pe54 Layer 43: PARTNER_DENSITY in cluster VM — parity with particle VM.
        // Reads pNeighborCount[j]/10 into vmRegs[di], scaled by partnerDensityInfluence × k.
        const pdi54c=genome.partnerDensityInfluence||0;
        if(pdi54c>0.001){
          vmRegs[di]=Math.min(3,pNeighborCount[j]/10)*pdi54c*k;
        }
      }break;
      case 39:{
        // Pe56: SELF_AGE in cluster VM — parity fix (Pe55 added this to particle VM only).
        // Reads page[i]/800 into vmRegs[di], scaled by selfAgeInfluence × k.
        const sagai55c=genome.selfAgeInfluence||0;
        if(sagai55c>0.001){
          vmRegs[di]=Math.min(3,page[i]/800)*sagai55c*k;
        }
      }break;
      case 40:{
        // Pe56 Layer 45: PARTNER_AGE in cluster VM — full parity with particle VM through opcode 40.
        // Reads page[j]/800 into vmRegs[di], scaled by partnerAgeInfluence × k.
        const pagei56c=genome.partnerAgeInfluence||0;
        if(pagei56c>0.001){
          vmRegs[di]=Math.min(3,page[j]/800)*pagei56c*k;
        }
      }break;
      case 41:{
        // Pe57 Layer 46: SELF_SPEED in cluster VM — parity with particle VM.
        // Reads sqrt(vx[i]²+vy[i]²)/2 into vmRegs[di], scaled by selfSpeedInfluence × k.
        const sspi57c=genome.selfSpeedInfluence||0;
        if(sspi57c>0.001){
          const sp57c=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
          vmRegs[di]=Math.min(3,sp57c/2)*sspi57c*k;
        }
      }break;
      case 42:{
        // Pe58 Layer 47: PARTNER_SPEED in cluster VM — full parity with particle VM.
        // Reads sqrt(vx[j]²+vy[j]²)/2 into vmRegs[di], scaled by partnerSpeedInfluence × k.
        const pspdi58c=genome.partnerSpeedInfluence||0;
        if(pspdi58c>0.001){
          const psp58c=Math.sqrt(vx[j]*vx[j]+vy[j]*vy[j]);
          vmRegs[di]=Math.min(3,psp58c/2)*pspdi58c*k;
        }
      }break;
      case 43:{
        // Pe59 Layer 48: HEADING_ALIGN in cluster VM — full parity with particle VM.
        // Dot product of normalized velocity vectors → directional alignment in [-1, +1].
        const hai59c=genome.headingAlignInfluence||0;
        if(hai59c>0.001){
          const si59c=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
          const sj59c=Math.sqrt(vx[j]*vx[j]+vy[j]*vy[j]);
          if(si59c>0.1&&sj59c>0.1){
            const dot59c=(vx[i]*vx[j]+vy[i]*vy[j])/(si59c*sj59c);
            vmRegs[di]=dot59c*hai59c*k;
          }
        }
      }break;
      case 44:{
        // Pe60 Layer 49: APPROACH_RATE in cluster VM — full parity with particle VM.
        // Radial velocity: positive=separating, negative=converging.
        const ari60c=genome.approachRateInfluence||0;
        if(ari60c>0.001){
          const dxr60c=px[i]-px[j], dyr60c=py[i]-py[j];
          const dist60c=Math.sqrt(dxr60c*dxr60c+dyr60c*dyr60c);
          if(dist60c>0.5){
            const dvx60c=vx[i]-vx[j], dvy60c=vy[i]-vy[j];
            const radial60c=(dxr60c*dvx60c+dyr60c*dvy60c)/dist60c;
            vmRegs[di]=Math.max(-3,Math.min(3,radial60c/4))*ari60c*k;
          }
        }
      }break;
      case 45:{
        // Pe61 Layer 50: ORBIT_RATE in cluster VM — full parity with particle VM.
        // Tangential velocity: positive=CCW orbit, negative=CW orbit, ~0=radial motion.
        const ori61c=genome.orbitRateInfluence||0;
        if(ori61c>0.001){
          const dxo61c=px[i]-px[j], dyo61c=py[i]-py[j];
          const disto61c=Math.sqrt(dxo61c*dxo61c+dyo61c*dyo61c);
          if(disto61c>0.5){
            const dvx61c=vx[i]-vx[j], dvy61c=vy[i]-vy[j];
            const tang61c=(dxo61c*dvy61c-dyo61c*dvx61c)/disto61c;
            vmRegs[di]=Math.max(-3,Math.min(3,tang61c/4))*ori61c*k;
          }
        }
      }break;
      case 46:{
        // Pe62 Layer 51: SELF_FREQ in cluster VM — full parity with particle VM.
        // Reads freq[i] (own oscillation rate) into vmRegs[di], scaled by selfFreqInfluence × k.
        const sfi62c=genome.selfFreqInfluence||0;
        if(sfi62c>0.001){
          vmRegs[di]=Math.min(3,freq[i]/0.02)*sfi62c*k;
        }
      }break;
      case 47:{
        // Pe63 Layer 52: PARTNER_FREQ in cluster VM — full parity with particle VM.
        // Reads freq[j] (partner oscillation rate) into vmRegs[di], scaled by partnerFreqInfluence × k.
        const pfi63c=genome.partnerFreqInfluence||0;
        if(pfi63c>0.001){
          vmRegs[di]=Math.min(3,freq[j]/0.02)*pfi63c*k;
        }
      }break;
      case 48:{
        // Pe64 Layer 53: PARTNER_MEM_READ in cluster VM — full parity with particle VM.
        // Reads pMem[j][si%MEM_SIZE] into vmRegs[di], scaled by partnerMemReadInfluence × k.
        const pmri64c=genome.partnerMemReadInfluence||0;
        if(pmri64c>0.001){
          vmRegs[di]=pMem[j*MEM_SIZE+(si%MEM_SIZE)]*pmri64c*(k||1);
        }
      }break;
      case 49:{
        // Pe65 Layer 54: PARTNER_TEND_READ in cluster VM — full parity with particle VM.
        // Reads tend[j][si%DIMS] into vmRegs[di], scaled by partnerTendInfluence × k.
        const ptri65c=genome.partnerTendInfluence||0;
        if(ptri65c>0.001){
          vmRegs[di]=tend[j*DIMS+(si%DIMS)]*ptri65c*(k||1);
        }
      }break;
      case 50:{
        // Pe66 Layer 55: SELF_TEND_READ in cluster VM — full parity with particle VM.
        // Reads tend[i][si%DIMS] into vmRegs[di], scaled by selfTendInfluence × k.
        const stri66c=genome.selfTendInfluence||0;
        if(stri66c>0.001){
          vmRegs[di]=tend[i*DIMS+(si%DIMS)]*stri66c*(k||1);
        }
      }break;
      case 51:{
        // Pe67 Layer 56: SELF_PHASE in cluster VM — full parity with particle VM.
        // Reads cos(phase[i]) into vmRegs[di], scaled by selfPhaseInfluence × k.
        const sphi67c=genome.selfPhaseInfluence||0;
        if(sphi67c>0.001){
          vmRegs[di]=Math.cos(phase[i])*sphi67c*(k||1);
        }
      }break;
      case 52:{
        // Pe68 Layer 57: PARTNER_PHASE in cluster VM — full parity with particle VM.
        // Reads cos(phase[j]) into vmRegs[di], scaled by partnerPhaseInfluence × k.
        const pphi68c=genome.partnerPhaseInfluence||0;
        if(pphi68c>0.001){
          vmRegs[di]=Math.cos(phase[j])*pphi68c*(k||1);
        }
      }break;
      case 53:{
        // Pe69 Layer 58: INTERACTION_DIST in cluster VM — full parity with particle VM.
        // Cluster VM runs per pair (i,j) within the cluster interaction sweep.
        // `d` here is the inter-particle distance for this pair.
        // Returns 0 if interactionDistInfluence is gate-closed → Pe68 exactly.
        const idi69c=genome.interactionDistInfluence||0;
        if(idi69c>0.001){
          const dxc69=px[i]-px[j],dyc69=py[i]-py[j];
          const dc69=Math.sqrt(dxc69*dxc69+dyc69*dyc69);
          vmRegs[di]=Math.min(1,dc69/CELL)*idi69c*(k||1);
        }
      }break;
      case 54:{
        // Pe70 Layer 59: FIELD1_TEMPORAL in cluster VM — full parity with particle VM.
        // Reads (field[cell] - field1Prev[cell]) at particle i's position.
        // Returns 0 if fieldTemporalInfluence is gate-closed → Pe69 exactly.
        const f1ti70c=genome.fieldTemporalInfluence||0;
        if(f1ti70c>0.001){
          const tfx70c=Math.floor(px[i]/(W/FIELD_W)),tfy70c=Math.floor(py[i]/(H/FIELD_H));
          const tfi70c=Math.max(0,Math.min(FIELD_W*FIELD_H-1,tfy70c*FIELD_W+tfx70c));
          vmRegs[di]=(field[tfi70c]-field1Prev[tfi70c])*f1ti70c*(k||1);
        }
      }break;
    }
    for(let r=0;r<12;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
  }

  const ddx=px[j]-px[i],ddy=py[j]-py[i];
  const dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
  const nx=ddx/dist,ny=ddy/dist;

  const force=vmActions[0]*influence*proximity;
  if(Math.abs(force)>0.000001){
    vx[i]+=nx*force;vy[i]+=ny*force;
    vx[j]-=nx*force;vy[j]-=ny*force;
  }

  const pshift=vmActions[1]*influence;
  if(Math.abs(pshift)>0.000001){
    let dp=phase[j]-phase[i];
    while(dp>Math.PI)dp-=6.28;while(dp<-Math.PI)dp+=6.28;
    phase[i]+=dp*pshift;phase[j]-=dp*pshift;
  }

  const atrans=vmActions[2]*influence*0.5;
  if(Math.abs(atrans)>0.000001){
    amp[i]-=atrans;amp[j]+=atrans;
  }

  const tbleed=vmActions[3]*influence;
  if(Math.abs(tbleed)>0.000001){
    for(let dd=0;dd<DIMS;dd++){
      const diff=(tend[j*DIMS+dd]-tend[i*DIMS+dd])*tbleed;
      tend[i*DIMS+dd]+=diff;tend[j*DIMS+dd]-=diff;
    }
  }

  if(vmActions[4]*influence>0.0002&&Math.random()<0.001&&N<CAP){
    const cx=(px[i]+px[j])*0.5,cy=(py[i]+py[j])*0.5;
    const nt=new Float32Array(DIMS);
    for(let dd=0;dd<DIMS;dd++)nt[dd]=(tend[i*DIMS+dd]+tend[j*DIMS+dd])*0.5;
    addParticle(cx,cy,nt,false,i,j);
    amp[i]*=0.75;amp[j]*=0.75;
    birthsThisTick++;
  }

  const clSigMod=vmActions[5]*influence*0.004;
  if(Math.abs(clSigMod)>0.00001&&cl.fieldSignature){
    const pAlign=Math.cos(phase[i]-phase[j]);
    for(let s=0;s<FIELD_SIG_DIMS;s++){
      cl.fieldSignature[s]+=clSigMod*pAlign*(s===0?1:s===1?-0.5:0.5);
      cl.fieldSignature[s]=Math.max(-1.5,Math.min(1.5,cl.fieldSignature[s]));
    }
  }

  mutPressureAccum+=vmActions[6]*influence*0.00008;

  tend[i*DIMS+4]+=vmActions[7]*influence*0.01;
  tend[i*DIMS+4]=Math.max(-1,Math.min(1,tend[i*DIMS+4]));

  const clCost=nInst*genome.metabolicCost*CLUSTER_VM_COST_SHARE;
  amp[i]-=clCost;amp[j]-=clCost;
}

// ═══ Pe31 LAYER 21: MUTUAL RECOGNITION ═══
// Two functions. One updates the model; one reads it.
// Both are O(1) — three-slot scan, constant work per interaction.

function updateNeighborModel(i,j,sim,phaseAlign){
  // Guard: genome controls whether modeling happens at all.
  const rate=genome.neighborModelUpdateRate||0;
  if(rate<=0.001||Math.random()>rate)return;

  const base=i*NM_SLOTS;
  // Find j in existing slots, or find space, or evict least fresh.
  let targetSlot=-1;
  let stalestSlot=0;
  let stalestFresh=pNeighborFresh[base];
  for(let s=0;s<NM_SLOTS;s++){
    if(pNeighborIDs[base+s]===j){targetSlot=s;break}
    if(pNeighborFresh[base+s]<stalestFresh){stalestFresh=pNeighborFresh[base+s];stalestSlot=s}
    if(pNeighborIDs[base+s]===-1&&targetSlot===-1)targetSlot=s;
  }
  if(targetSlot===-1)targetSlot=stalestSlot; // evict least fresh

  // EMA update — blend observed state into stored model (α=0.2)
  const mBase=(i*NM_SLOTS+targetSlot)*NM_DIMS;
  const alpha=0.2;
  // ═══ Pe34 Layer 24 / Pe35 Layer 24b: USE-WEIGHTED PREDICTION ERROR ═══
  // Only count re-encounters (slot already held j and has non-trivial freshness). First
  // contact and post-eviction overwrites would have garbage "predicted" values and
  // would pollute the quality signal with new-acquaintance noise.
  if(pNeighborIDs[base+targetSlot]===j && pNeighborFresh[base+targetSlot]>0.1){
    const e0=Math.abs(tend[j*DIMS+0]-pNeighborModels[mBase+0]);
    const e1=Math.abs(tend[j*DIMS+1]-pNeighborModels[mBase+1]);
    const e2=Math.abs(phaseAlign-pNeighborModels[mBase+2]);
    const e3=Math.abs(sim-pNeighborModels[mBase+3]);
    const err=(e0+e1+e2+e3)*0.25; // mean error across 4 dims
    // Pe35 Layer 24b: did i's VM actually consult its model of j this tick?
    // Forward call (i,j) at the loop: executeVM(i,j) ran upstream this iteration —
    // stamp is exact. Reverse call (j,i): j's VM never ran against i (j>i guard),
    // so this is structurally false → reverse leg fades under sharpening. Intended.
    const queried=(pVmQueryPartner[i]===j && pVmQueryTick[i]===tick);
    // w=1 for consulted models; unconsulted decay by relationalUseBias.
    // bias=0 → w=1 always → Pe34 exactly (provable). bias=1 → only consulted score.
    const bias=Math.max(0,Math.min(1,genome.relationalUseBias||0));
    const w=queried?1:(1-bias);
    predictionErrorAccum+=err*w;
    predictionUpdateCount+=w;
    if(queried)predictionQueriedCount+=1;
  }
  pNeighborIDs[base+targetSlot]=j;
  pNeighborModels[mBase+0]+=alpha*(tend[j*DIMS+0]-pNeighborModels[mBase+0]);
  pNeighborModels[mBase+1]+=alpha*(tend[j*DIMS+1]-pNeighborModels[mBase+1]);
  pNeighborModels[mBase+2]+=alpha*(phaseAlign-pNeighborModels[mBase+2]);
  pNeighborModels[mBase+3]+=alpha*(sim-pNeighborModels[mBase+3]);  // resonance proxy
  // Freshness: sim partners write a fresher model; distant ones write staler.
  pNeighborFresh[base+targetSlot]=Math.min(1,pNeighborFresh[base+targetSlot]+sim*0.3);
}

function predictPartnerResponse(i,j,sim,phaseAlign,proximity){
  // Returns a signal in roughly [-1..1] the VM can use.
  // Returns 0 if j has no model or model is too stale.
  const thresh=genome.mutualRecognitionThresh||0.5;
  const base=i*NM_SLOTS;
  let slot=-1;
  for(let s=0;s<NM_SLOTS;s++){
    if(pNeighborIDs[base+s]===j){slot=s;break}
  }
  if(slot===-1)return 0; // no model of j
  if(pNeighborFresh[base+slot]<thresh)return 0; // model too stale to trust

  const mBase=(i*NM_SLOTS+slot)*NM_DIMS;
  // Heuristic prediction: how much does observed j match the stored model?
  // High alignment + similar tendency = likely cooperative response.
  const storedPhase=pNeighborModels[mBase+2];
  const storedSim=pNeighborModels[mBase+3];
  const phaseCoherence=(phaseAlign+storedPhase)*0.5;  // agree on phase?
  const simAlignment=(sim+storedSim)*0.5;              // agree on similarity?
  const signal=phaseCoherence*simAlignment*proximity;
  // Add calibrated noise — predictions are uncertain, not oracular.
  const noise=(Math.random()-0.5)*0.15;
  return Math.max(-1,Math.min(1,signal+noise));
}

// Natural decay of neighbor models — models fade if partners don't re-interact.
// Called once per tick per particle (cheap: just multiply three floats by a constant).
function decayNeighborModels(){
  const decay=0.995; // very slow fade — models persist across many ticks
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    const base=i*NM_SLOTS;
    for(let s=0;s<NM_SLOTS;s++){
      pNeighborFresh[base+s]*=decay;
      // Clear very stale models to free slot for new partners
      if(pNeighborFresh[base+s]<0.02)pNeighborIDs[base+s]=-1;
    }
  }
}

function entrain(i,j,sim,d){
  if(sim<genome.entrainThresh||d>CELL)return;
  const proximity=1-d/CELL;
  const rate=genome.entrainRate*sim*proximity;
  let dp=phase[j]-phase[i];
  while(dp>Math.PI)dp-=Math.PI*2;while(dp<-Math.PI)dp+=Math.PI*2;
  phase[i]+=dp*rate;phase[j]-=dp*rate;
  freq[i]+=(freq[j]-freq[i])*rate*0.1;freq[j]+=(freq[i]-freq[j])*rate*0.1;
}

function interferenceCreate(i,j){
  const dp=phase[i]-phase[j];
  const interference=Math.cos(dp);
  const sim=tendSim(i,j);
  if(interference>genome.creationThresh&&sim>0.1){
    const energy=(amp[i]+amp[j])*interference*0.5;
    if(energy<0.15)return false;
    const totalAmp=amp[i]+amp[j];
    const cx=(px[i]*amp[i]+px[j]*amp[j])/totalAmp;
    const cy=(py[i]*amp[i]+py[j]*amp[j])/totalAmp;
    const nt=new Float32Array(DIMS);
    for(let d=0;d<DIMS;d++)nt[d]=(tend[i*DIMS+d]+tend[j*DIMS+d])*0.5*(1+interference*0.2);
    const k=addCompound(cx,cy,nt,(vx[i]*amp[i]+vx[j]*amp[j])/totalAmp*0.3,(vy[i]*amp[i]+vy[j]*amp[j])/totalAmp*0.3,energy*0.6,(phase[i]+phase[j])*0.5,(freq[i]+freq[j])*0.5,i,j);
    if(k>=0){
      amp[i]-=amp[i]*genome.creationCost;amp[j]-=amp[j]*genome.creationCost;
      birthsThisTick++;
      const r=(pR[i]+pR[j])/2,g=(pG[i]+pG[j])/2,b=(pB[i]+pB[j])/2;
      if(energy>0.3)addShock(cx,cy,energy*0.5,r,g,b);
      addBits(cx,cy,Math.floor(energy*4),r,g,b,energy*0.4);
      const ddx=px[j]-px[i],ddy=py[j]-py[i],dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      vx[i]-=ddx/dd*0.3;vy[i]-=ddy/dd*0.3;vx[j]+=ddx/dd*0.3;vy[j]+=ddy/dd*0.3;
      return true;
    }
  }
  if(interference<genome.destructThresh){
    phase[i]+=Math.PI*0.4;phase[j]-=Math.PI*0.4;
    const ddx=px[j]-px[i],ddy=py[j]-py[i],dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
    const scatter=Math.abs(interference)*1.5;
    vx[i]-=ddx/dd*scatter;vy[i]-=ddy/dd*scatter;vx[j]+=ddx/dd*scatter;vy[j]+=ddy/dd*scatter;
    for(let d=0;d<DIMS;d++){tend[i*DIMS+d]*=0.9;tend[j*DIMS+d]*=0.9}
    amp[i]*=0.85;amp[j]*=0.85;
    addBits((px[i]+px[j])/2,(py[i]+py[j])/2,2,(pR[i]+pR[j])/2,(pG[i]+pG[j])/2,(pB[i]+pB[j])/2,0.3);
    return true;
  }
  const ddx=px[j]-px[i],ddy=py[j]-py[i],dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
  const nx=ddx/dd,ny=ddy/dd;
  const rvn=(vx[i]-vx[j])*nx+(vy[i]-vy[j])*ny;
  vx[i]-=rvn*nx*0.5;vy[i]-=rvn*ny*0.5;vx[j]+=rvn*nx*0.5;vy[j]+=rvn*ny*0.5;
  for(let d_=0;d_<DIMS;d_++){const avg=(tend[i*DIMS+d_]+tend[j*DIMS+d_])*0.5;tend[i*DIMS+d_]+=(avg-tend[i*DIMS+d_])*0.03;tend[j*DIMS+d_]+=(avg-tend[j*DIMS+d_])*0.03}
  const overlap=(pSz[i]+pSz[j])*1.2-dd;
  if(overlap>0){const s=overlap*.5/dd;px[i]-=ddx*s;py[i]-=ddy*s;px[j]+=ddx*s;py[j]+=ddy*s}
  return false;
}

// ═══════════════════════════════════════
// UPDATE / GRID / GRAVITY
// ═══════════════════════════════════════
function updateParticles(){
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    page[i]++;phase[i]+=freq[i];
    const lfx=Math.max(0,Math.min(FIELD_W-1,Math.floor(px[i]/(W/FIELD_W))));
    const lfy=Math.max(0,Math.min(FIELD_H-1,Math.floor(py[i]/(H/FIELD_H))));
    const lfIdx=lfy*FIELD_W+lfx;
    const localField=field[lfIdx];
    const localTarget=problemTarget[lfIdx];
    const localA=problemA[lfIdx],localB=problemB[lfIdx];
    const affinity=fieldAffinity(lfIdx,getParticleSig(i));
    localRes[i]+=localField*genome.fieldInfluence*affinity;
    amp[i]+=localField*0.0008*affinity;
    // Problem-field reward: survival is coupled to computational correctness.
    // pMem[0] acts as a tiny local output register; exact hit gets strongest reward.
    const mem0=Math.floor(Math.abs(pMem[i*MEM_SIZE]))&15;
    const err=Math.abs(mem0-localTarget);
    const logicScore=1-Math.min(1,err/8);
    amp[i]+=logicScore*0.0009;
    // local parameter signal nudges tendency dimensions toward routing patterns.
    tend[i*DIMS]+=localA*0.00002;
    if(DIMS>1)tend[i*DIMS+1]+=localB*0.00002;
    for(let d=0;d<DIMS;d++){tend[i*DIMS+d]+=(Math.random()-0.5)*0.001;const v=tend[i*DIMS+d];if(v>1.2)tend[i*DIMS+d]=1.2;if(v<-1.2)tend[i*DIMS+d]=-1.2}
    const absencePeriod=ABSENCE_BASE+Math.sin(tick*0.0007)*180+(Math.sin(tick*0.00031)*90)|0;
    const cyclePos=tick%Math.max(200,absencePeriod);
    const isAbsent=cyclePos>(Math.max(200,absencePeriod)*(1-ABSENCE_DUTY));
    if(!isAbsent){
      const odx=smx-px[i],ody=smy-py[i],od=Math.sqrt(odx*odx+ody*ody);
      const oR=OBSERVE_RADIUS_BASE+pStr*80;
      const targetC=od<oR?Math.pow(1-od/oR,1.5):0;
      collapse[i]+=(targetC-collapse[i])*0.06;
      if(collapse[i]>0.1)amp[i]+=OBSERVE_AMP_BOOST*collapse[i];
      if(wasAbsent&&ghostStrength>0.05){const gdx=ghostX-px[i],gdy=ghostY-py[i],gd=Math.sqrt(gdx*gdx+gdy*gdy);if(gd<GHOST_RADIUS)amp[i]+=0.003*(1-gd/GHOST_RADIUS)*ghostStrength}
      ghostX+=(smx-ghostX)*0.1;ghostY+=(smy-ghostY)*0.1;ghostStrength=1;
    }else{
      ghostStrength*=genome.ghostDecay;collapse[i]*=0.97;
      if(ghostStrength>0.01){const gdx=ghostX-px[i],gdy=ghostY-py[i],gd=Math.sqrt(gdx*gdx+gdy*gdy),gr=GHOST_RADIUS*ghostStrength;if(gd<gr){const h=Math.pow(1-gd/gr,1.2)*ghostStrength;amp[i]+=genome.ghostAmpDrip*h;vx[i]+=gdx*0.00003*h;vy[i]+=gdy*0.00003*h}}
    }
    vx[i]+=(Math.random()-.5)*.003;vy[i]+=(Math.random()-.5)*.003;
    vx[i]*=genome.velocityDamping;vy[i]*=genome.velocityDamping;px[i]+=vx[i];py[i]+=vy[i];
    if(px[i]<8)vx[i]+=.08;if(px[i]>W-8)vx[i]-=.08;if(py[i]<8)vy[i]+=.08;if(py[i]>H-8)vy[i]-=.08;
    if(tick%3===0){const ei=echoIdx[i]%EL;echox[i*EL+ei]=px[i];echoy[i*EL+ei]=py[i];echoIdx[i]++}
    // Pe36 Layer 25: signal decay. Received signals fade each tick to prevent runaway.
    // Decay rate is evolvable — lineages can tune how persistent vs transient signals are.
    const sigDecay=Math.max(0,Math.min(1,genome.signalDecay||0));
    pSignalReceive[i]*=(1-sigDecay);
    // Pe37: snapshot this tick's final emission into the prev buffer for next tick's
    // propagation to read, THEN reset. This is the double-buffer swap.
    pSignalEmitPrev[i]=pSignalEmit[i];
    pSignalEmit[i]=0;
    // Pe38 Layer 27: update net signal role position.
    // EMA of (|emitted| - |received|) normalized to [-1,1].
    // Positive → net broadcaster this tick; negative → net listener.
    // pSignalEmitPrev holds this tick's final emission (already snapshotted above).
    const rawNet=Math.max(-1,Math.min(1,(Math.abs(pSignalEmitPrev[i])-Math.abs(pSignalReceive[i]*(1/(1-sigDecay+1e-6))))*0.5));
    pSignalNetPos[i]=pSignalNetPos[i]*0.95+rawNet*0.05;
    computeVisuals(i);
  }
}

function executeSoloVM(){
  const prog=genome.vmProgram;
  const nInst=Math.min(prog.length,genome.vmMaxInstructions);
  if(nInst===0)return;
  const soloInfluence=genome.vmInfluence*genome.ruleScale*0.0005;

  for(let i=0;i<N;i++){
    if(!palive[i])continue;

    const soloCost=nInst*genome.metabolicCost*0.5;
    amp[i]-=soloCost;

    vmRegs[0]=1;
    vmRegs[1]=1;
    vmRegs[2]=1;
    vmRegs[3]=amp[i];

    for(let m=0;m<MEM_SIZE;m++)vmRegs[4+m]=pMem[i*MEM_SIZE+m];

    const reflexInf=genome.reflexInfluence||0;
    if(reflexInf>0.001){
      const rBase=i*REFLEX_DIMS;
      vmRegs[6]+=pReflexState[rBase]*reflexInf;
      vmRegs[7]+=pReflexState[rBase+1]*reflexInf;
      vmRegs[8]+=pReflexState[rBase+2]*reflexInf;
      vmRegs[9]+=pReflexState[rBase+3]*reflexInf;
      for(let r=6;r<=9;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
    }

    vmActions[0]=0;vmActions[1]=0;vmActions[2]=0;vmActions[3]=0;vmActions[4]=0;vmActions[5]=0;vmActions[6]=0;vmActions[7]=0;

    for(let ip=0,_ss=0;ip<nInst&&_ss<nInst*2;ip++,_ss++){
      const inst=prog[ip];if(!inst)continue;
      const [op,src,dst,k]=inst;
      const si=Math.abs(src)%12,di=Math.abs(dst)%12;
      switch(op){
        case 0:vmRegs[di]=vmRegs[si];break;
        case 1:vmRegs[di]+=vmRegs[si]*k;break;
        case 2:vmRegs[di]*=vmRegs[si]*(k||1);break;
        case 3:vmRegs[di]=vmRegs[si]>k?1:0;break;
        case 4:{const ai=Math.abs(dst)%8;vmActions[ai]+=vmRegs[si]*k;}break;
        case 5:{const fi=Math.abs(src)%8;vmRegs[di]=vmActions[fi];}break;
        case 6:vmRegs[di]=pMem[i*MEM_SIZE+(Math.abs(src)%MEM_SIZE)];break;
        case 7:pMem[i*MEM_SIZE+(Math.abs(dst)%MEM_SIZE)]=vmRegs[si];break;
        case 8:{const fx8=Math.floor(px[i]/(W/FIELD_W)),fy8=Math.floor(py[i]/(H/FIELD_H));const fi8=Math.max(0,Math.min(FIELD_W*FIELD_H-1,fy8*FIELD_W+fx8));vmRegs[di]=field[fi8];}break;
        case 9:{const wx9=Math.floor(px[i]/(W/FIELD_W)),wy9=Math.floor(py[i]/(H/FIELD_H));const wi9=Math.max(0,Math.min(FIELD_W*FIELD_H-1,wy9*FIELD_W+wx9));field[wi9]+=vmRegs[si]*k*0.3;field[wi9]=Math.max(0,Math.min(2.5,field[wi9]));}break;
        case 11:{const slot=Math.abs(dst)%2;pBroadcast[i*2+slot]=vmRegs[si]*k;}break;
        case 13:{const instIdx=Math.abs(Math.floor(vmRegs[si]))%Math.max(1,prog.length);const selfInst=prog[instIdx];vmRegs[di]=selfInst?selfInst[Math.abs(Math.floor(k))%4]:0;}break;
        case 14:if(vmRegs[si]>k)ip=Math.abs(Math.floor(vmRegs[di]))%nInst;break;
        case 15:{const ageFrac=Math.min(1,page[i]/800);vmRegs[di]=vmRegs[si]*(1-ageFrac)+k*ageFrac;}break;
        case 16:{
          if(amp[i]>0.4&&page[i]>80&&N+birthQueue.length<CAP-1&&Math.random()<0.015){
            const offX=Math.max(0,Math.min(W,px[i]+vmRegs[si]*15));
            const offY=Math.max(0,Math.min(H,py[i]+vmRegs[di]*15));
            const nt=new Float32Array(DIMS);
            for(let dd=0;dd<DIMS;dd++)nt[dd]=tend[i*DIMS+dd]+k*0.1*(vmRegs[(dd+4)%12]-0.5);
            birthQueue.push({x:offX,y:offY,t:nt,parent:i});
            amp[i]*=0.5;
          }
        }break;
        case 17:{
          const gfx=Math.floor(px[i]/(W/FIELD_W)),gfy=Math.floor(py[i]/(H/FIELD_H));
          const gfi=gfy*FIELD_W+gfx;
          const gl=gfx>0?field[gfi-1]:field[gfi];
          const gr=gfx<FIELD_W-1?field[gfi+1]:field[gfi];
          const gu=gfy>0?field[gfi-FIELD_W]:field[gfi];
          const gd=gfy<FIELD_H-1?field[gfi+FIELD_W]:field[gfi];
          vmRegs[si]=(gr-gl)*0.5*k;
          vmRegs[di]=(gd-gu)*0.5*k;
        }break;
        case 19:{
          vmRegs[di]=globalCommons;
          const writeStr=Math.abs(vmRegs[si]*k);
          if(writeStr>commonsStrength){globalCommons=vmRegs[si]*k;commonsWriter=i;commonsStrength=writeStr;}
        }break;
        case 20:{
          const ix20=Math.floor(px[i]/(W/FIELD_W)),iy20=Math.floor(py[i]/(H/FIELD_H));
          const ci20=Math.max(0,Math.min(FIELD_W*FIELD_H-1,iy20*FIELD_W+ix20));
          const newOp=Math.abs(Math.floor(vmRegs[si]))%12;
          const writeStr20=Math.abs(vmRegs[si]*k)*0.15;
          if(writeStr20>cellProgStr[ci20]*0.8){
            cellProgOp[ci20]=newOp;
            cellProgA[ci20]=vmRegs[di];
            cellProgB[ci20]=k;
            cellProgStr[ci20]=Math.min(1,cellProgStr[ci20]+writeStr20);
          }else{
            cellProgStr[ci20]=Math.min(1,cellProgStr[ci20]+writeStr20*0.3);
          }
        }break;
        case 21:{
          const rx21=Math.floor(px[i]/(W/FIELD_W)),ry21=Math.floor(py[i]/(H/FIELD_H));
          const ri21=Math.max(0,Math.min(FIELD_W*FIELD_H-1,ry21*FIELD_W+rx21));
          vmRegs[di]=field2[ri21]*k;
        }break;
        case 22:{
          const uas=genome.userAtoms;
          if(uas&&uas.length>0){
            const uIdx=Math.abs(Math.floor(k))%uas.length;
            vmRegs[di]=uaCall(uas[uIdx],vmRegs[si],vmRegs[(si+1)%12]);
          }
        }break;
        case 46:{
          // Pe62 Layer 51: SELF_FREQ in solo VM — particle reads own oscillation frequency.
          // freq[i]/0.02 → 1.0 at baseline; cap at 3.0. No partner needed.
          const sfi62s=genome.selfFreqInfluence||0;
          if(sfi62s>0.001){
            vmRegs[di]=Math.min(3,freq[i]/0.02)*sfi62s*k;
          }
        }break;
        case 47:{
          // Pe63 Layer 52: PARTNER_FREQ in solo VM — no-op (no interaction partner in solo context).
          // Returns 0. Only meaningful in pair VMs where freq[j] is available.
          // Opcode registered here to prevent default-case fallthrough noise.
        }break;
        case 48:{
          // Pe64 Layer 53: PARTNER_MEM_READ in solo VM — no-op (no interaction partner in solo context).
          // Returns 0. pMem[j] is not available when running without a pair partner.
          // Opcode registered here to prevent default-case fallthrough noise.
        }break;
        case 52:{
          // Pe68 Layer 57: PARTNER_PHASE in solo VM — no-op (no interaction partner in solo context).
          // Returns 0. phase[j] is not available when running without a pair partner.
          // Opcode registered here to prevent default-case fallthrough noise.
        }break;
        case 54:{
          // Pe70 Layer 59: FIELD1_TEMPORAL in solo VM — reads (field[cell] - field1Prev[cell])
          // at this particle's location. Meaningful in solo context — field1 change is a
          // position-based signal, no interaction partner needed.
          const f1ti70s=genome.fieldTemporalInfluence||0;
          if(f1ti70s>0.001){
            const tfx70s=Math.floor(px[i]/(W/FIELD_W)),tfy70s=Math.floor(py[i]/(H/FIELD_H));
            const tfi70s=Math.max(0,Math.min(FIELD_W*FIELD_H-1,tfy70s*FIELD_W+tfx70s));
            vmRegs[di]=(field[tfi70s]-field1Prev[tfi70s])*f1ti70s*(k||1);
          }
        }break;
      }
      for(let r=0;r<12;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
    }

    for(let m=0;m<MEM_SIZE;m++)pMem[i*MEM_SIZE+m]=vmRegs[4+m];

    vx[i]+=vmActions[0]*soloInfluence*0.5;
    vy[i]+=vmActions[1]*soloInfluence*0.5;
    tend[i*DIMS+4]+=vmActions[7]*soloInfluence*0.01;
    tend[i*DIMS+4]=Math.max(-1,Math.min(1,tend[i*DIMS+4]));
    mutPressureAccum+=vmActions[6]*soloInfluence*0.00005;
  }
}

function processGrid(){
  clearGrid();
  for(let i=0;i<N;i++){if(!palive[i])continue;const k=gKey(px[i],py[i]);pnext[i]=grid[k];grid[k]=i}
  for(let i=0;i<N;i++){localRes[i]=0;pNeighborCount[i]=0;} // Pe51: reset density counter each tick
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    const gx=(px[i]/CELL)|0,gy=(py[i]/CELL)|0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const nnx=gx+dx,nny=gy+dy;
      if(nnx<0||nny<0||nnx>=gW||nny>=gH)continue;
      let j=grid[nny*gW+nnx];
      let _lc=0;while(j>=0&&j<CAP&&_lc++<CAP){
        if(j>i&&palive[j]&&palive[i]){
          const ddx=px[i]-px[j],ddy=py[i]-py[j],d2=ddx*ddx+ddy*ddy,d=Math.sqrt(d2),minD=pSz[i]+pSz[j];
          const iR=Math.max(10,genome.interactionRadius||55);
          if(d<iR&&d>0){
            const sim=tendSim(i,j);
            const pa=Math.cos(phase[i]-phase[j]);
            localRes[i]+=Math.max(0,sim*pa)*(1-d/iR);
            localRes[j]+=Math.max(0,sim*pa)*(1-d/iR);
            // Pe51 Layer 40: count neighbors within interaction radius for density sensing
            if(pNeighborCount[i]<127)pNeighborCount[i]++;
            if(pNeighborCount[j]<127)pNeighborCount[j]++;
            entrain(i,j,sim,d);
            executeVM(i,j,sim,d);
            executeClusterVM(i,j,sim,d);
            // Pe31 Layer 21: update neighbor models during interaction.
            // Both i models j, and j models i — recognition is mutual.
            const pa31=Math.cos(phase[i]-phase[j]);
            updateNeighborModel(i,j,sim,pa31);
            updateNeighborModel(j,i,sim,pa31);
            // Pe36 Layer 25: explicit signal propagation.
            // Pe37: read pSignalEmitPrev (last tick's complete emission field) instead of
            // pSignalEmit — deterministic, order-independent, one-tick delay.
            if(genome.signalInfluence>0.001){
              const prox36=Math.max(0,1-d/iR); // proximity weight
              pSignalReceive[i]+=pSignalEmitPrev[j]*prox36;
              pSignalReceive[j]+=pSignalEmitPrev[i]*prox36;
            }
            const bl=genome.tendencyBleed*(1-d/iR);
            for(let dd=0;dd<DIMS;dd++){const avg=(tend[i*DIMS+dd]+tend[j*DIMS+dd])*0.5;tend[i*DIMS+dd]+=(avg-tend[i*DIMS+dd])*bl;tend[j*DIMS+dd]+=(avg-tend[j*DIMS+dd])*bl}
            const mg=(tend[i*DIMS+3]+tend[j*DIMS+3]);
            if(mg>genome.magneticThresh&&d>minD*2){const f=mg*0.0003/d;vx[i]-=ddx*f;vy[i]-=ddy*f;vx[j]+=ddx*f;vy[j]+=ddy*f}
          }
          if(d<minD*1.3&&d>0)interferenceCreate(i,j);
        }
        j=pnext[j];
      }
    }
  }
}

function gravity(){
  if(pStr<.005)return;
  for(let i=0;i<N;i++){if(!palive[i])continue;const dx=smx-px[i],dy=smy-py[i],d=Math.sqrt(dx*dx+dy*dy);if(d<5||d>600)continue;const mg=Math.max(0.1,tend[i*DIMS+3]+0.5);const g=pStr*.25*mg/d;vx[i]+=dx*g;vy[i]+=dy*g}
}

function scatter(){
  if(pDur>15){
    for(let i=0;i<N;i++){if(!palive[i])continue;const dx=px[i]-smx,dy=py[i]-smy,d=Math.sqrt(dx*dx+dy*dy);if(d<350&&d>0){const f=(1-d/350)*pStr*3;vx[i]+=dx/d*f;vy[i]+=dy/d*f}}
    addShock(smx,smy,pStr,180,170,140);
    for(let k=0;k<Math.floor(pStr*4);k++){const a=Math.random()*6.28,r=Math.random()*25;addParticle(smx+Math.cos(a)*r,smy+Math.sin(a)*r,randomTendency(),true)}
  }
}

function render(){
  X.fillStyle='rgba(2,2,4,0.065)';X.fillRect(0,0,W,H);

  const rAbsPd=ABSENCE_BASE+Math.sin(tick*0.0007)*180+(Math.sin(tick*0.00031)*90)|0;
  const rCp=tick%Math.max(200,rAbsPd);
  const rIsAbsent=rCp>(Math.max(200,rAbsPd)*(1-ABSENCE_DUTY));

  if(!rIsAbsent&&pStr>.01){
    for(let i=0;i<4;i++){const rr=8+i*20*pStr+Math.sin(tick*.035+i*1.3)*4;X.beginPath();X.arc(smx,smy,Math.max(1,rr),0,6.28);X.strokeStyle=`rgba(160,150,120,${pStr*.025*(1-i/4)})`;X.lineWidth=.3;X.stroke()}
    X.beginPath();X.arc(smx,smy,2+pStr*4,0,6.28);X.fillStyle=`rgba(160,150,120,${pStr*.12})`;X.fill();
  }

  if(rIsAbsent&&ghostStrength>0.01){
    const ga=ghostStrength*0.06;
    for(let i=0;i<3;i++){const gr=20+i*30*ghostStrength+Math.sin(tick*.02+i*2)*10*ghostStrength;X.beginPath();X.arc(ghostX,ghostY,Math.max(1,gr),0,6.28);X.strokeStyle=`rgba(140,200,220,${ga*(1-i/3)})`;X.lineWidth=.2;X.stroke()}
    X.beginPath();X.arc(ghostX,ghostY,2+ghostStrength*3,0,6.28);X.fillStyle=`rgba(180,220,240,${ga*0.5})`;X.fill();
  }

  clearGrid();
  for(let i=0;i<N;i++){if(!palive[i])continue;const k=gKey(px[i],py[i]);pnext[i]=grid[k];grid[k]=i}
  X.lineWidth=.25;
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    const gx=(px[i]/CELL)|0,gy=(py[i]/CELL)|0;
    for(let dy=0;dy<=1;dy++)for(let dx=(dy===0?1:-1);dx<=1;dx++){
      const nnx=gx+dx,nny=gy+dy;
      if(nnx<0||nny<0||nnx>=gW||nny>=gH)continue;
      let j=grid[nny*gW+nnx];
      let _lc=0;while(j>=0&&j<CAP&&_lc++<CAP){
        if(palive[j]){
          const ddx=px[i]-px[j],ddy=py[i]-py[j],d2=ddx*ddx+ddy*ddy;
          if(d2<2200&&d2>0){
            const sim=tendSim(i,j),pa=Math.cos(phase[i]-phase[j]),bond=sim*Math.max(0,pa);
            if(bond>0.2){const d=Math.sqrt(d2),al=bond*(1-d/47)*0.05*(amp[i]+amp[j]);const r=(pR[i]+pR[j])/2|0,g=(pG[i]+pG[j])/2|0,b=(pB[i]+pB[j])/2|0;X.beginPath();X.moveTo(px[i],py[i]);X.lineTo(px[j],py[j]);X.strokeStyle=`rgba(${r},${g},${b},${al})`;X.stroke()}
          }
        }
        j=pnext[j];
      }
    }
  }

  const cellW=W/FIELD_W,cellH=H/FIELD_H;
  for(let fy=0;fy<FIELD_H;fy++){
    for(let fx=0;fx<FIELD_W;fx++){
      const fIdx=fy*FIELD_W+fx;
      const val=field[fIdx];
      if(val<0.03)continue;
      const alpha=Math.min(0.65,val*0.4);
      const own=fieldOwnership[fIdx];
      const ci=fIdx*3;
      const r=Math.floor(fieldLineageCache[ci]*own+100*(1-own));
      const g=Math.floor(fieldLineageCache[ci+1]*own+240*(1-own));
      const b=Math.floor(fieldLineageCache[ci+2]*own+220*(1-own));
      X.fillStyle=`rgba(${r},${g},${b},${alpha})`;
      X.fillRect(fx*cellW,fy*cellH,cellW+1,cellH+1);
    }
  }

  for(let fy=0;fy<FIELD_H;fy++){
    for(let fx=0;fx<FIELD_W;fx++){
      const fIdx=fy*FIELD_W+fx;
      const v2=field2[fIdx];
      if(v2<0.05)continue;
      const a2=Math.min(0.5,v2*0.3);
      X.fillStyle=`rgba(220,90,140,${a2})`;
      X.fillRect(fx*cellW,fy*cellH,cellW+1,cellH+1);
    }
  }

  const cellOpColors=[
    '255,180,60','120,200,255','255,120,200','120,255,180',
    '255,255,120','180,120,255','255,160,160','160,255,255',
    '255,200,255','200,255,200','200,200,255','255,180,180'
  ];
  for(let fy=0;fy<FIELD_H;fy++){
    for(let fx=0;fx<FIELD_W;fx++){
      const fIdx=fy*FIELD_W+fx;
      const str=cellProgStr[fIdx];
      if(str<0.1)continue;
      const op=cellProgOp[fIdx]%12;
      const col=cellOpColors[op];
      const a=Math.min(0.85,str*0.9);
      const cx=fx*cellW+cellW*0.5;
      const cy=fy*cellH+cellH*0.5;
      const radius=cellW*0.18+str*cellW*0.15;
      X.beginPath();X.arc(cx,cy,radius,0,6.28);
      X.fillStyle=`rgba(${col},${a})`;X.fill();
    }
  }

  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    const a=Math.min(1,amp[i]*0.8);if(a<.003)continue;
    const s=Math.max(.2,pSz[i]),col=collapse[i],smear=1-col;
    const r=pR[i]|0,g=pG[i]|0,b=pB[i]|0;
    if(smear>0.12){for(let e=0;e<EL;e++){const ei=(echoIdx[i]-1-e+EL*100)%EL;const ex=echox[i*EL+ei],ey=echoy[i*EL+ei],ea=a*smear*0.06*(1-e/EL),fx=px[i]+(px[i]-ex)*0.4,fy=py[i]+(py[i]-ey)*0.4;X.beginPath();X.arc(ex,ey,s*.5,0,6.28);X.fillStyle=`rgba(${r},${g},${b},${ea})`;X.fill();X.beginPath();X.arc(fx,fy,s*.3,0,6.28);X.fillStyle=`rgba(${r},${g},${b},${ea*.5})`;X.fill()}}
    if(smear>0.08){const hr=s*1.8+smear*3;X.beginPath();X.arc(px[i],py[i],hr,0,6.28);X.fillStyle=`rgba(${r},${g},${b},${a*smear*0.012})`;X.fill();const fr=hr*(1+Math.sin(phase[i]*4)*0.25);X.beginPath();X.arc(px[i],py[i],fr,0,6.28);X.strokeStyle=`rgba(${r},${g},${b},${a*smear*0.015})`;X.lineWidth=.2;X.stroke()}
    if(col>0.15){X.beginPath();X.arc(px[i],py[i],s*2.2,0,6.28);X.fillStyle=`rgba(${r},${g},${b},${a*col*0.035})`;X.fill()}
    const bodySize=s*(0.5+col*0.5);
    X.beginPath();X.arc(px[i],py[i],bodySize,0,6.28);X.fillStyle=`rgba(${r},${g},${b},${a*(0.4+col*0.5)})`;X.fill();
    if(col>0.3&&amp[i]>0.3){X.beginPath();X.arc(px[i],py[i],bodySize*0.25,0,6.28);X.fillStyle=`rgba(${Math.min(255,r+50)|0},${Math.min(255,g+50)|0},${Math.min(255,b+50)|0},${a*col*0.35})`;X.fill()}
  }

  for(let f=flashN-1;f>=0;f--){
    flashAge[f]++;
    if(flashAge[f]>flashLife){
      flashN--;flashX1[f]=flashX1[flashN];flashY1[f]=flashY1[flashN];
      flashX2[f]=flashX2[flashN];flashY2[f]=flashY2[flashN];flashAge[f]=flashAge[flashN];
      continue;
    }
    const fa=1-flashAge[f]/flashLife;
    const bright=fa*fa;
    X.beginPath();X.moveTo(flashX1[f],flashY1[f]);X.lineTo(flashX2[f],flashY2[f]);
    X.strokeStyle=`rgba(255,220,100,${bright*0.6})`;X.lineWidth=1.2*bright+0.3;X.stroke();
    const gr=3*bright;
    X.beginPath();X.arc(flashX1[f],flashY1[f],gr,0,6.28);X.fillStyle=`rgba(255,240,150,${bright*0.3})`;X.fill();
    X.beginPath();X.arc(flashX2[f],flashY2[f],gr,0,6.28);X.fillStyle=`rgba(255,240,150,${bright*0.3})`;X.fill();
  }

  for(let i=0;i<N;i++){
    if(!palive[i]||pPlasmidLen[i]===0)continue;
    const a=Math.min(1,amp[i]*0.8);if(a<.01)continue;
    const nP=pPlasmidLen[i];
    const ringR=Math.max(0.6,pSz[i]*0.35);
    const pc=nP===1?'80,220,220':nP===2?'220,220,80':nP===3?'240,160,60':'255,255,255';
    X.beginPath();X.arc(px[i],py[i],ringR,0,6.28);
    X.strokeStyle=`rgba(${pc},${a*0.45})`;X.lineWidth=0.6;X.stroke();
  }

  const vmPow=genome.vmInfluence;
  if(vmPow>0.08){
    const vAlpha=Math.min(0.04,vmPow*0.04);
    const grad=X.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.min(W,H)*0.7);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    const vR=40,vG=30+vmPow*80|0,vB=120+vmPow*120|0;
    grad.addColorStop(1,`rgba(${vR},${vG},${vB},${vAlpha})`);
    X.fillStyle=grad;X.fillRect(0,0,W,H);
  }

  for(let i=shN-1;i>=0;i--){shr_[i]+=2+she[i]*3;if(shr_[i]>shmr[i]){shN--;shx[i]=shx[shN];shy[i]=shy[shN];shr_[i]=shr_[shN];shmr[i]=shmr[shN];she[i]=she[shN];shCR[i]=shCR[shN];shCG[i]=shCG[shN];shCB[i]=shCB[shN];continue}const a=(1-shr_[i]/shmr[i])*she[i]*.1;X.beginPath();X.arc(shx[i],shy[i],shr_[i],0,6.28);X.strokeStyle=`rgba(${shCR[i]|0},${shCG[i]|0},${shCB[i]|0},${a})`;X.lineWidth=.7;X.stroke()}

  for(let i=bN-1;i>=0;i--){bpx[i]+=bvx_[i];bpy[i]+=bvy_[i];bvx_[i]*=.93;bvy_[i]*=.93;bage[i]++;if(bage[i]>blife[i]){bN--;bpx[i]=bpx[bN];bpy[i]=bpy[bN];bvx_[i]=bvx_[bN];bvy_[i]=bvy_[bN];bage[i]=bage[bN];blife[i]=blife[bN];bsz[i]=bsz[bN];bCR[i]=bCR[bN];bCG[i]=bCG[bN];bCB[i]=bCB[bN];continue}const a=(1-bage[i]/blife[i])*.25;X.beginPath();X.arc(bpx[i],bpy[i],bsz[i]*(1-bage[i]/blife[i]),0,6.28);X.fillStyle=`rgba(${bCR[i]|0},${bCG[i]|0},${bCB[i]|0},${a})`;X.fill()}
}

function compact(){
  let w=0;
  for(let r=0;r<N;r++){
    if(!palive[r])continue;
    if(w!==r){px[w]=px[r];py[w]=py[r];vx[w]=vx[r];vy[w]=vy[r];for(let d=0;d<DIMS;d++)tend[w*DIMS+d]=tend[r*DIMS+d];phase[w]=phase[r];freq[w]=freq[r];amp[w]=amp[r];palive[w]=1;page[w]=page[r];localRes[w]=localRes[r];collapse[w]=collapse[r];echoIdx[w]=echoIdx[r];for(let e=0;e<EL;e++){echox[w*EL+e]=echox[r*EL+e];echoy[w*EL+e]=echoy[r*EL+e]}
    for(let m=0;m<MEM_SIZE;m++)pMem[w*MEM_SIZE+m]=pMem[r*MEM_SIZE+m];
    pPlasmidLen[w]=pPlasmidLen[r];
    for(let p=0;p<pPlasmidLen[r]*4;p++)pPlasmid[w*PLASMID_SLOTS+p]=pPlasmid[r*PLASMID_SLOTS+p];
    pPlasmidAge[w]=pPlasmidAge[r];
    pBroadcast[w*2]=pBroadcast[r*2];pBroadcast[w*2+1]=pBroadcast[r*2+1];
    clusterID[w]=clusterID[r];
    for(let rx=0;rx<REFLEX_DEPTH*2;rx++)pReflexHist[w*REFLEX_DEPTH*2+rx]=pReflexHist[r*REFLEX_DEPTH*2+rx];
    for(let rx=0;rx<REFLEX_DIMS;rx++)pReflexState[w*REFLEX_DIMS+rx]=pReflexState[r*REFLEX_DIMS+rx];
    pReflexIdx[w]=pReflexIdx[r];
    pInteractionDensity[w]=pInteractionDensity[r];}
    w++;
  }
  N=w;
}

function replenish(){
  if(N>500)return;
  const pressure=N<50?0.25:N<100?0.15:N<200?0.06:N<500?0.01:0;
  if(Math.random()>pressure)return;

  const gate=genome.fieldBirthGate;

  if(ghostStrength>0.25&&Math.random()<ghostStrength*0.4){
    const ang=Math.random()*6.28,r=Math.random()*GHOST_RADIUS*0.5;
    const gx_=ghostX+Math.cos(ang)*r,gy_=ghostY+Math.sin(ang)*r;
    const fx=Math.floor(gx_/(W/FIELD_W)),fy=Math.floor(gy_/(H/FIELD_H));
    const fIdx=Math.max(0,Math.min(FIELD_W*FIELD_H-1,fy*FIELD_W+fx));
    if(N<30||field[fIdx]>=gate){
      const tv=new Float32Array(DIMS);
      for(let d=0;d<DIMS;d++)tv[d]=globalTend[d]*(0.3+Math.random()*0.7)+(Math.random()-0.5)*0.3;
      addParticle(gx_,gy_,tv,false);
    }
  }else if(genome.stableMotifs.length>0&&Math.random()<genome.culturalBias){
      const motif=genome.stableMotifs[Math.random()*genome.stableMotifs.length|0];

      let spawnX=-5,spawnY=Math.random()*H;
      if(clusters.length>0){
        let bestC=null,bestSim=-1;
        for(const c of clusters){
          let sim=0;for(let d=0;d<DIMS;d++)sim+=c.tendency[d]*motif.t[d];
          if(sim>bestSim){bestSim=sim;bestC=c}
        }
        if(bestC&&bestSim>0.3){
          const ang=Math.random()*6.28,r=CELL*2+Math.random()*CELL*2;
          spawnX=bestC.cx+Math.cos(ang)*r;
          spawnY=bestC.cy+Math.sin(ang)*r;
        }
      }
      const tv=new Float32Array(DIMS);
      for(let d=0;d<DIMS;d++)tv[d]=motif.t[d]+(Math.random()-0.5)*0.15;
      addParticle(spawnX,spawnY,tv,false);
    }else{
      const e=Math.random()*4|0;let x,y;
      if(e===0){x=-5;y=Math.random()*H}else if(e===1){x=W+5;y=Math.random()*H}
      else if(e===2){x=Math.random()*W;y=-5}else{x=Math.random()*W;y=H+5}
      addParticle(x,y,randomTendency(),false);
    }
}

// ═══════════════════════════════════════
// INIT + LOOP
// ═══════════════════════════════════════
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;initGrid()}

function init(){
  resize();N=0;
  const loaded=loadGenome();
  sanitizeGenome();
  const n=Math.min(400,(W*H/2800)|0);
  for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
  if(loaded){
    genEl.textContent=`gen ${genome.generation} | ${genome.totalTicks} ticks inherited`;
  }
}

function loop(){
  lastLoopTime=performance.now();
  try{
  const frameStart=lastLoopTime;
  tick++;
  genome.totalTicks++;
  flushNetworkEvents();
  smx+=(mx-smx)*.05;smy+=(my-smy)*.05;
  if(pulling){pStr=Math.min(pStr+.02,1);pDur++}else pStr*=.92;

  const absPd=ABSENCE_BASE+Math.sin(tick*0.0007)*180+(Math.sin(tick*0.00031)*90)|0;
  const cp=tick%Math.max(200,absPd);
  const currentlyAbsent=cp>(Math.max(200,absPd)*(1-ABSENCE_DUTY));
  wasAbsent=currentlyAbsent;

  if(tick%30===0){
    for(let d=0;d<DIMS;d++)globalTend[d]=0;
    let alive=0;
    for(let i=0;i<N;i++){if(!palive[i])continue;for(let d=0;d<DIMS;d++)globalTend[d]+=tend[i*DIMS+d];alive++}
    if(alive>0)for(let d=0;d<DIMS;d++)globalTend[d]/=alive;
  }
  for(let i=0;i<N;i++){if(!palive[i])continue;for(let d=0;d<DIMS;d++)tend[i*DIMS+d]+=(globalTend[d]-tend[i*DIMS+d])*0.00002}

  exogenousPerturbation();

  gravity();
  executeSoloVM();
  networkBroadcast();
  networkReceive();
  processGrid();

  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    if(pPlasmidLen[i]>0){
      pPlasmidAge[i]++;
      if(pPlasmidAge[i]>2000&&genome.vmProgram.length<genome.vmMaxInstructions){
        const base=i*PLASMID_SLOTS;
        const len=pPlasmidLen[i];
        let fixed=0;
        for(let p=0;p<len&&genome.vmProgram.length<genome.vmMaxInstructions;p++){
          const pi=base+p*4;
          const newInst=[pPlasmid[pi],pPlasmid[pi+1],pPlasmid[pi+2],pPlasmid[pi+3]];
          genome.vmProgram.push(newInst);
          fixed++;
        }
        if(fixed>0)recordEvent('plasmid_fix',{n:fixed,vm:genome.vmProgram.length},600);
        pPlasmidLen[i]=0;
        pPlasmidAge[i]=0;
      }
    }else{
      pPlasmidAge[i]=0;
    }
  }

  applyEntropy();
  updateParticles();

  updateParticleReflex();
  decayNeighborModels(); // Pe31: neighbor models fade if partners stop interacting
  if(performance.now()-frameStart<80) updateField();

  if(tick%60===0){
    let alive=0,totalAmp=0,totalRes=0;
    for(let i=0;i<N;i++){if(!palive[i])continue;alive++;totalAmp+=amp[i];totalRes+=localRes[i]}
    selfModel.population=alive;
    selfModel.avgAmplitude=alive>0?totalAmp/alive:0;
    selfModel.avgResonance=alive>0?totalRes/alive:0;
    selfModel.deathRate=selfModel.deathRate*0.9+deathsThisTick*0.1;
    selfModel.birthRate=selfModel.birthRate*0.9+birthsThisTick*0.1;
    selfModel.popHistory.push(alive);
    if(selfModel.popHistory.length>60)selfModel.popHistory.shift();
    if(selfModel.popHistory.length>10){
      const recent=selfModel.popHistory.slice(-5).reduce((a,b)=>a+b,0)/5;
      const older=selfModel.popHistory.slice(-10,-5).reduce((a,b)=>a+b,0)/5;
      selfModel.trend=recent>older*1.05?1:recent<older*0.95?-1:0;
    }

    detectClusters();
    trackClusterPersistence();
    attemptClusterBudding();
    rebuildFieldLineageCache();
    selfModel.clusterCount=clusters.length;
    selfModel.diversity=clusterDiversity();
    selfModel.avgCoherence=clusters.length>0?clusters.reduce((a,c)=>a+c.coherence,0)/clusters.length:0;
    selfModel.persistentClusters=clusters.filter(c=>c.persistAge>3).length;

    updateClusterReflex();

    selfModel.actual.pop=alive;
    selfModel.actual.coherence=selfModel.avgCoherence;
    selfModel.actual.clusters=selfModel.clusterCount;
    selfModel.actual.diversity=selfModel.diversity;
    if(selfModel.predicted.pop>0){
      selfModel.errors.pop=selfModel.errors.pop*0.7+(alive-selfModel.predicted.pop)*0.3;
      selfModel.errors.coherence=selfModel.errors.coherence*0.7+(selfModel.avgCoherence-selfModel.predicted.coherence)*0.3;
      selfModel.errors.clusters=selfModel.errors.clusters*0.7+(selfModel.clusterCount-selfModel.predicted.clusters)*0.3;
      selfModel.errors.diversity=selfModel.errors.diversity*0.7+(selfModel.diversity-selfModel.predicted.diversity)*0.3;
    }
    selfModel.predicted.pop=alive+selfModel.birthRate*60-selfModel.deathRate*60;
    selfModel.predicted.coherence=selfModel.avgCoherence+(genome.entrainRate-0.015)*0.5;
    selfModel.predicted.clusters=selfModel.clusterCount+(selfModel.diversity>0.3?0.5:-0.3);
    selfModel.predicted.diversity=selfModel.diversity;

    inferBoundary();

    let popStability=0.5;
    if(selfModel.popHistory.length>10){
      const slice=selfModel.popHistory.slice(-30);
      const mean=slice.reduce((a,b)=>a+b,0)/slice.length;
      const variance=slice.reduce((a,b)=>a+(b-mean)*(b-mean),0)/slice.length;
      popStability=Math.max(0,1-Math.sqrt(variance)/Math.max(1,mean));
    }

    const fieldTotal_=field.reduce((a,b)=>a+b,0);
    selfModel.fieldEnergy=fieldTotal_;
    selfModel.fieldHistory.push(fieldTotal_);
    if(selfModel.fieldHistory.length>30)selfModel.fieldHistory.shift();
    if(selfModel.fieldHistory.length>5){
      const recent=selfModel.fieldHistory.slice(-5);
      const older=selfModel.fieldHistory.slice(-10,-5);
      if(older.length>0){
        const recentMean=recent.reduce((a,b)=>a+b,0)/recent.length;
        const olderMean=older.reduce((a,b)=>a+b,0)/older.length;
        selfModel.fieldTrend=(recentMean-olderMean)/(Math.abs(olderMean)+1);
      }
    }

    selfModel.capacityPressure=Math.max(0,Math.min(1,(alive/CAP-0.5)*2));

    const fieldDanger=selfModel.fieldTrend<-0.01?Math.min(1,Math.abs(selfModel.fieldTrend)*5):0;
    selfModel.collapseRisk=selfModel.capacityPressure*0.5+fieldDanger*0.5;

    selfModel.stability=Math.max(0,popStability*(1-selfModel.collapseRisk*0.7));

    // FITNESS — self-derived, no designer targets.
    // Pe24 Layer 14: sensors with non-zero realWeight contribute to real fitness here.
    // In Pe22-23 sensors only nudged shadow-scenario scoring. Now they can become

    // ═══ Pe63 Layer 52: PARTNER_FREQ diagnostic ═══
    // pfTag shows: population-average beat frequency spread (|freq[i]-freq[j]| sampled from pairs)

    // spread shows std dev of beat — high spread = freq-differentiated ecology emerging.
    // i→0: selection found partner-freq sensing not worth the opcode slot.
    let pfTag='';
    const _pfi63=genome.partnerFreqInfluence||0;
    if(_pfi63>0.001){

    birthQueue.length=0;
    for(let i=0;i<N;i++){

      if(isNaN(px[i])||isNaN(py[i])){px[i]=Math.random()*W;py[i]=Math.random()*H}
    }
  }
  scheduleNext();
}

let tabVisible=true;
let lastLoopTime=performance.now();
document.addEventListener('visibilitychange',()=>{
  tabVisible=!document.hidden;
  if(tabVisible){lastLoopTime=performance.now();scheduleNext();}
});
function scheduleNext(){
  if(tabVisible){
    requestAnimationFrame(loop);
  }else{
    setTimeout(loop,67);
  }
}

setInterval(()=>{
  if(performance.now()-lastLoopTime>3000){
    console.warn('Watchdog: loop stalled, restarting');
    for(let i=0;i<N;i++){
      if(isNaN(amp[i])){amp[i]=0.3}
      if(isNaN(px[i])||isNaN(py[i])){px[i]=Math.random()*W;py[i]=Math.random()*H}
      if(isNaN(vx[i]))vx[i]=0;
      if(isNaN(vy[i]))vy[i]=0;
      if(isNaN(phase[i]))phase[i]=Math.random()*6.28;
    }
    birthQueue.length=0;
    lastLoopTime=performance.now();
    scheduleNext();
  }
},2000);

    e.preventDefault();
    lastTap=now;
    return;
  }

  if(e.touches.length>=2){
    dashboardVisible=!dashboardVisible;
    lastTap=now;
    return;
  }

  if(now-lastTap<350){
    dashboardVisible=!dashboardVisible;
    lastTap=0;
    return;
  }

  mx=t.clientX;my=t.clientY;
  pulling=1;pDur=0;
  lastTap=now;
},{passive:false});
addEventListener('resize',resize);

function boot(){
  try{
    init();
    genEl.style.color='rgba(80,90,100,0.4)';
    loop();
  }catch(e){
    console.error('Boot error:',e.message,e.stack);
    genEl.textContent='boot failed: '+(e&&e.message?e.message:'unknown')+' — add #reset to the URL to clear saved lineage';
    genEl.style.color='rgba(255,120,120,0.85)';
  }
}
boot();
</script>
