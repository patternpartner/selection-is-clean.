function compact(){
  let w=0;
  for(let r=0;r<N;r++){
    if(!palive[r])continue;
    if(w!==r){px[w]=px[r];py[w]=py[r];vx[w]=vx[r];vy[w]=vy[r];for(let d=0;d<DIMS;d++)tend[w*DIMS+d]=tend[r*DIMS+d];phase[w]=phase[r];freq[w]=freq[r];amp[w]=amp[r];palive[w]=1;page[w]=page[r];localRes[w]=localRes[r];collapse[w]=collapse[r];echoIdx[w]=echoIdx[r];for(let e=0;e<EL;e++){echox[w*EL+e]=echox[r*EL+e];echoy[w*EL+e]=echoy[r*EL+e]}
    for(let m=0;m<MEM_SIZE;m++)pMem[w*MEM_SIZE+m]=pMem[r*MEM_SIZE+m];
    pPlasmidLen[w]=pPlasmidLen[r];
    for(let p=0;p<pPlasmidLen[r]*4;p++)pPlasmid[w*PLASMID_SLOTS+p]=pPlasmid[r*PLASMID_SLOTS+p];
    pPlasmidAge[w]=pPlasmidAge[r];
    pBroadcast[w*2]=pBroadcast[r*2];pBroadcast[w*2+1]=pBroadcast[r*2+1];
    clusterID[w]=clusterID[r];
    // Layer 10: reflexivity state
    for(let rx=0;rx<REFLEX_DEPTH*2;rx++)pReflexHist[w*REFLEX_DEPTH*2+rx]=pReflexHist[r*REFLEX_DEPTH*2+rx];
    for(let rx=0;rx<REFLEX_DIMS;rx++)pReflexState[w*REFLEX_DIMS+rx]=pReflexState[r*REFLEX_DIMS+rx];
    pReflexIdx[w]=pReflexIdx[r];
    pInteractionDensity[w]=pInteractionDensity[r];}
    w++;
  }
  N=w;
}

function replenish(){
  // TAPERING REPLENISHMENT — external input fades as population grows.
  // Full support below 80. Fades between 80-500. Gone above 500.
  // The system must discover BIRTH to grow beyond 500.
  if(N>500)return;
  const pressure=N<50?0.25:N<100?0.15:N<200?0.06:N<500?0.01:0;
  if(Math.random()>pressure)return;

  // Check if there's viable habitat anywhere
  const gate=genome.fieldBirthGate;

  if(ghostStrength>0.25&&Math.random()<ghostStrength*0.4){
    const ang=Math.random()*6.28,r=Math.random()*GHOST_RADIUS*0.5;
    const gx_=ghostX+Math.cos(ang)*r,gy_=ghostY+Math.sin(ang)*r;
    // Field gate: check local field energy at spawn point
    const fx=Math.floor(gx_/(W/FIELD_W)),fy=Math.floor(gy_/(H/FIELD_H));
    const fIdx=Math.max(0,Math.min(FIELD_W*FIELD_H-1,fy*FIELD_W+fx));
    if(N<30||field[fIdx]>=gate){ // always allow if near extinction
      const tv=new Float32Array(DIMS);
      for(let d=0;d<DIMS;d++)tv[d]=globalTend[d]*(0.3+Math.random()*0.7)+(Math.random()-0.5)*0.3;
      addParticle(gx_,gy_,tv,false);
    }
  }else if(genome.stableMotifs.length>0&&Math.random()<genome.culturalBias){
      // CULTURAL MEMORY SEEDING — new particles carry historical DNA
      const motif=genome.stableMotifs[Math.random()*genome.stableMotifs.length|0];

      // If there's a cluster matching this motif, spawn NEAR it (cultural reinforcement)
      let spawnX=-5,spawnY=Math.random()*H;
      if(clusters.length>0){
        let bestC=null,bestSim=-1;
        for(const c of clusters){
          let sim=0;for(let d=0;d<DIMS;d++)sim+=c.tendency[d]*motif.t[d];
          if(sim>bestSim){bestSim=sim;bestC=c}
        }
        if(bestC&&bestSim>0.3){
          // Spawn near the matching cluster — cultural reinforcement
          const ang=Math.random()*6.28,r=CELL*2+Math.random()*CELL*2;
          spawnX=bestC.cx+Math.cos(ang)*r;
          spawnY=bestC.cy+Math.sin(ang)*r;
        }
      }
      const tv=new Float32Array(DIMS);
      for(let d=0;d<DIMS;d++)tv[d]=motif.t[d]+(Math.random()-0.5)*0.15;
      addParticle(spawnX,spawnY,tv,false);
    }else{
      const e=Math.random()*4|0;let x,y;
      if(e===0){x=-5;y=Math.random()*H}else if(e===1){x=W+5;y=Math.random()*H}
      else if(e===2){x=Math.random()*W;y=-5}else{x=Math.random()*W;y=H+5}
      addParticle(x,y,randomTendency(),false);
    }
}

// ═══════════════════════════════════════
// INIT + LOOP
// ═══════════════════════════════════════
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;initGrid()}

function init(){
  resize();N=0;
  const loaded=loadGenome();
  const n=Math.min(400,(W*H/2800)|0);
  for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
  if(loaded){
    genEl.textContent=`gen ${genome.generation} | ${genome.totalTicks} ticks inherited`;
  }
}

function loop(){
  lastLoopTime=performance.now();
  try{
  const frameStart=lastLoopTime;
  tick++;
  genome.totalTicks++;
  // Pe22g: sample room audio every 4 ticks if enabled (cheap; smoothed in sampler)
  if(ambientEnabled&&tick%4===0)sampleAmbient();
  // Pe22l: capture previous tick's emission count into rolling series, then reset
  if(voiceEmissionsThisTick>0||voiceRate.length>0){
    voiceRate.push({t:genome.totalTicks,n:voiceEmissionsThisTick});
    if(voiceRate.length>VOICE_RATE_WINDOW)voiceRate.shift();
  }
  voiceEmissionsThisTick=0;
  smx+=(mx-smx)*.05;smy+=(my-smy)*.05;
  if(pulling){pStr=Math.min(pStr+.02,1);pDur++}else pStr*=.92;

  const absPd=ABSENCE_BASE+Math.sin(tick*0.0007)*180+(Math.sin(tick*0.00031)*90)|0;
  const cp=tick%Math.max(200,absPd);
  const currentlyAbsent=cp>(Math.max(200,absPd)*(1-ABSENCE_DUTY));
  wasAbsent=currentlyAbsent;

  // Global mood
  if(tick%30===0){
    for(let d=0;d<DIMS;d++)globalTend[d]=0;
    let alive=0;
    for(let i=0;i<N;i++){if(!palive[i])continue;for(let d=0;d<DIMS;d++)globalTend[d]+=tend[i*DIMS+d];alive++}
    if(alive>0)for(let d=0;d<DIMS;d++)globalTend[d]/=alive;
  }
  for(let i=0;i<N;i++){if(!palive[i])continue;for(let d=0;d<DIMS;d++)tend[i*DIMS+d]+=(globalTend[d]-tend[i*DIMS+d])*0.00002}

  // Exogenous perturbations
  exogenousPerturbation();

  gravity();
  executeSoloVM();
  networkBroadcast();
  networkReceive();
  // Pe22m: broadcast telemetry snapshot every 60 ticks for coordinator consumption.
  // Coordinator uses these to compute aggregate state and feed it back.
  if(bc&&tick%60===0){
    try{
      // Fresh frequency histogram from recent events (last 600 or fewer)
      const histBuf=new Array(24).fill(0);
      for(const e of voiceLog)histBuf[Math.max(0,Math.min(23,Math.floor((Math.log(Math.max(20,e.f))-Math.log(20))/(Math.log(20000)-Math.log(20))*24)))]++;
      // Recent emission rate
      let recentEmit=0;
      for(let k=Math.max(0,voiceRate.length-30);k<voiceRate.length;k++)recentEmit+=voiceRate[k].n;
      bc.postMessage({
        tab:TAB_ID,type:'telemetry',
        t:genome.totalTicks,gen:genome.generation,pop:N,clusters:clusters.length,
        freqHist:histBuf,
        recentEmitRate:recentEmit/Math.max(1,Math.min(30,voiceRate.length)),
        totalEmissions:voiceTotalEmissions,
        ambient:ambientLevel,
        fitness:+currentFitness.toFixed(3)
      });
    }catch(e){}
  }
  // Pe22p: broadcast encoded genome every 3600 ticks (~60 sec at 60fps; longer if throttled).
  // Coordinator stores these keyed by lineage. If this tab dies, its latest snapshot
  // is recoverable by any future tab that joins the network.
  if(bc&&tick%3600===0){
    try{
      const encoded=encodeGenome();
      bc.postMessage({
        tab:TAB_ID,type:'genome-snapshot',
        at:Date.now(),
        t:genome.totalTicks,gen:genome.generation,
        pop:N,clusters:clusters.length,fitness:+currentFitness.toFixed(3),
        extinctions:genome.extinctions,
        encoded:encoded
      });
    }catch(e){}
  }
  processGrid();

  // ═══ PLASMID PERSISTENCE + CRYSTALLIZATION ═══
  // Track how long each particle's plasmid has persisted.
  // Plasmids that survive long enough crystallize into permanent VM instructions.
  // This is how temporary mobile code becomes permanent structure — new organizational layer.
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    if(pPlasmidLen[i]>0){
      pPlasmidAge[i]++;
      // CRYSTALLIZATION: plasmid persists >2000 ticks → absorb into permanent VM
      if(pPlasmidAge[i]>2000&&genome.vmProgram.length<genome.vmMaxInstructions){
        const base=i*MAX_PLASMID_INST;
        const len=pPlasmidLen[i];
        for(let p=0;p<len&&genome.vmProgram.length<genome.vmMaxInstructions;p++){
          const pi=base+p*4;
          const newInst=[pPlasmid[pi],pPlasmid[pi+1],pPlasmid[pi+2],pPlasmid[pi+3]];
          genome.vmProgram.push(newInst);
        }
        // Plasmid consumed — absorbed into permanent genome
        pPlasmidLen[i]=0;
        pPlasmidAge[i]=0;
      }
    }else{
      pPlasmidAge[i]=0;
    }
  }

  applyEntropy();
  updateParticles();

  // ═══ LAYER 10: REFLEXIVITY UPDATE ═══
  // Particle self-models update every tick (sampled).
  // Cluster self-models update on cluster detection cycles (tick%60).
  updateParticleReflex();
  if(performance.now()-frameStart<80) updateField(); // skip field update if frame already slow

  // ═══ STRUCTURAL SELF-MODEL UPDATE ═══
  if(tick%60===0){
    let alive=0,totalAmp=0,totalRes=0;
    for(let i=0;i<N;i++){if(!palive[i])continue;alive++;totalAmp+=amp[i];totalRes+=localRes[i]}
    selfModel.population=alive;
    selfModel.avgAmplitude=alive>0?totalAmp/alive:0;
    selfModel.avgResonance=alive>0?totalRes/alive:0;
    selfModel.deathRate=selfModel.deathRate*0.9+deathsThisTick*0.1;
    selfModel.birthRate=selfModel.birthRate*0.9+birthsThisTick*0.1;
    selfModel.popHistory.push(alive);
    if(selfModel.popHistory.length>60)selfModel.popHistory.shift();
    if(selfModel.popHistory.length>10){
      const recent=selfModel.popHistory.slice(-5).reduce((a,b)=>a+b,0)/5;
      const older=selfModel.popHistory.slice(-10,-5).reduce((a,b)=>a+b,0)/5;
      selfModel.trend=recent>older*1.05?1:recent<older*0.95?-1:0;
    }

    // CLUSTER DETECTION
    detectClusters();
    trackClusterPersistence();
    attemptClusterBudding(); // Group-level reproduction — successful clusters bud daughters
    rebuildFieldLineageCache(); // Update territorial color map
    selfModel.clusterCount=clusters.length;
    selfModel.diversity=clusterDiversity();
    selfModel.avgCoherence=clusters.length>0?clusters.reduce((a,c)=>a+c.coherence,0)/clusters.length:0;
    selfModel.persistentClusters=clusters.filter(c=>c.persistAge>3).length;

    // ═══ LAYER 10b: CLUSTER SELF-MODEL UPDATE ═══
    updateClusterReflex();

    // MULTI-DIMENSIONAL PREDICTION & ERROR
    selfModel.actual.pop=alive;
    selfModel.actual.coherence=selfModel.avgCoherence;
    selfModel.actual.clusters=selfModel.clusterCount;
    selfModel.actual.diversity=selfModel.diversity;
    if(selfModel.predicted.pop>0){
      selfModel.errors.pop=selfModel.errors.pop*0.7+(alive-selfModel.predicted.pop)*0.3;
      selfModel.errors.coherence=selfModel.errors.coherence*0.7+(selfModel.avgCoherence-selfModel.predicted.coherence)*0.3;
      selfModel.errors.clusters=selfModel.errors.clusters*0.7+(selfModel.clusterCount-selfModel.predicted.clusters)*0.3;
      selfModel.errors.diversity=selfModel.errors.diversity*0.7+(selfModel.diversity-selfModel.predicted.diversity)*0.3;
    }
    selfModel.predicted.pop=alive+selfModel.birthRate*60-selfModel.deathRate*60;
    selfModel.predicted.coherence=selfModel.avgCoherence+(genome.entrainRate-0.015)*0.5;
    selfModel.predicted.clusters=selfModel.clusterCount+(selfModel.diversity>0.3?0.5:-0.3);
    selfModel.predicted.diversity=selfModel.diversity;

    // BOUNDARY INFERENCE — multi-dimensional
    inferBoundary();

    // SELF-DERIVED STABILITY — now includes field trajectory and capacity pressure
    // Population variance (extended window for longer memory)
    let popStability=0.5;
    if(selfModel.popHistory.length>10){
      const slice=selfModel.popHistory.slice(-30);
      const mean=slice.reduce((a,b)=>a+b,0)/slice.length;
      const variance=slice.reduce((a,b)=>a+(b-mean)*(b-mean),0)/slice.length;
      popStability=Math.max(0,1-Math.sqrt(variance)/Math.max(1,mean));
    }

    // FIELD TRAJECTORY — track field energy over time
    const fieldTotal_=field.reduce((a,b)=>a+b,0);
    selfModel.fieldEnergy=fieldTotal_;
    selfModel.fieldHistory.push(fieldTotal_);
    if(selfModel.fieldHistory.length>30)selfModel.fieldHistory.shift();
    if(selfModel.fieldHistory.length>5){
      const recent=selfModel.fieldHistory.slice(-5);
      const older=selfModel.fieldHistory.slice(-10,-5);
      if(older.length>0){
        const recentMean=recent.reduce((a,b)=>a+b,0)/recent.length;
        const olderMean=older.reduce((a,b)=>a+b,0)/older.length;
        selfModel.fieldTrend=(recentMean-olderMean)/(Math.abs(olderMean)+1);
      }
    }

    // CAPACITY PRESSURE — how close to hard cap
    selfModel.capacityPressure=Math.max(0,Math.min(1,(alive/CAP-0.5)*2));

    // COLLAPSE RISK — at cap with depleting field = approaching cliff
    // This is the signal that was missing: "stably at 1800" with declining field is NOT stable
    const fieldDanger=selfModel.fieldTrend<-0.01?Math.min(1,Math.abs(selfModel.fieldTrend)*5):0;
    selfModel.collapseRisk=selfModel.capacityPressure*0.5+fieldDanger*0.5;

    // EFFECTIVE STABILITY — population stability discounted by collapse risk
    selfModel.stability=Math.max(0,popStability*(1-selfModel.collapseRisk*0.7));

    // FITNESS — self-derived, no designer targets
    const w=genome.objWeights,wT=w[0]+w[1]+w[2]+w[3]+0.001;
    const fitness=(selfModel.stability*w[0]+selfModel.diversity*w[1]+selfModel.avgCoherence*w[2]+
      (clusters.filter(c=>c.persistAge<2).length/Math.max(1,clusters.length))*w[3])/wT;
    currentFitness=currentFitness*0.9+fitness*0.1;
    fitnessSamples++;

    // MOTIF-BIASED TENDENCY DRIFT — cultural gravity
    if(genome.stableMotifs.length>0&&clusters.length>0){
      for(const c of clusters){
        let bestMotif=null,bestSim=-1;
        for(const m of genome.stableMotifs){
          let sim=0;for(let d=0;d<DIMS;d++)sim+=c.tendency[d]*m.t[d];
          if(sim>bestSim){bestSim=sim;bestMotif=m}
        }
        if(bestMotif&&bestSim>0.3){
          for(let i=0;i<N;i++){
            if(!palive[i]||clusterID[i]!==c.id)continue;
            for(let d=0;d<DIMS;d++)tend[i*DIMS+d]+=(bestMotif.t[d]-tend[i*DIMS+d])*0.0001*bestSim;
          }
        }
      }
    }

    deathsThisTick=0;birthsThisTick=0;
  }

  // ═══ EXTINCTION CHECK ═══
  if(tick%90===0&&tick>300){if(checkExtinction())return}

  // ═══ VM PHENOTYPE PROFILING — every 100 ticks ═══
  if(tick%100===0&&tick>200)profileVM();

  // ═══ SHADOW SIMULATOR ═══
  if(tick%120===0&&tick>300)runShadowSim();

  // ═══ FULL GENOME MUTATION — every 300 frames ═══
  if(tick%Math.max(60,Math.round(genome.mutationInterval))===0&&tick>600){
    mutateGenome();
    attemptHGT();
    evolvePlasmids(); // Per-particle plasmid mutation + spontaneous generation
  }

  // Reset peak bond tracker each tick
  if(tick%10===0)peakBondThisTick*=0.8; // decay rather than hard reset

  // Pe22q: DIALOGUE DECAY — decrement remaining time, advance turn counter every 5 ticks.
  // When ticks hit zero, dialogue ends.
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    if(pDialogueTicksLeft[i]>0){
      pDialogueTicksLeft[i]--;
      if(pDialogueTicksLeft[i]===0){
        // End of dialogue — clear
        const partner=pDialoguePartner[i];
        pDialoguePartner[i]=-1;
        pDialogueTurn[i]=0;
        // If partner still thinks we're in dialogue with them, don't clear theirs —
        // it might have been a one-sided end (e.g. dialogue with a dying particle).
      }else if(pDialogueTicksLeft[i]%5===0){
        // Advance turn every 5 ticks
        if(pDialogueTurn[i]<255)pDialogueTurn[i]++;
      }
    }
    // Also: if partner died, clear
    const p=pDialoguePartner[i];
    if(p>=0&&p<CAP&&!palive[p]){
      pDialoguePartner[i]=-1;
      pDialogueTicksLeft[i]=0;
      pDialogueTurn[i]=0;
    }
  }

  // ═══ GENOME ARCHIVING ═══
  if(tick%900===0&&tick>900)archiveGenome();

  // ═══ IDENTITY TRACKING ═══
  if(tick%60===0){
    if(currentFitness>genome.peakFitness)genome.peakFitness=currentFitness;
    if(selfModel.stability>0.7){
      genome.currentStableStreak++;
      if(genome.currentStableStreak>genome.longestStable)genome.longestStable=genome.currentStableStreak;
    }else{
      genome.currentStableStreak=0;
    }
  }

  // ═══ INSTRUMENT SAMPLING — independent of save cycle ═══
  if(tick%120===0&&tick>60)sampleInstrumentation();

  // ═══ SAVE GENOME + MOTIFS ═══
  if(tick%600===0){
    if(selfModel.persistentClusters>0){
      for(const c of clusters){
        if(c.persistAge>5&&c.size>5){
          const motif={t:c.tendency.map(v=>+(v.toFixed(3))),s:c.size,c:+(c.coherence.toFixed(2)),age:c.persistAge};
          const isDupe=genome.stableMotifs.some(m=>{let d=0;for(let i=0;i<DIMS;i++)d+=Math.abs(m.t[i]-motif.t[i]);return d<0.3});
          if(!isDupe){genome.stableMotifs.push(motif);if(genome.stableMotifs.length>5)genome.stableMotifs.shift()}
        }
      }
    }
    genome.lineage.push({t:genome.totalTicks,p:selfModel.population,c:selfModel.clusterCount,d:+(selfModel.diversity.toFixed(3)),f:+(currentFitness.toFixed(3)),s:+(selfModel.stability.toFixed(3)),w:genome.objWeights.map(v=>+(v.toFixed(3)))});
    if(genome.lineage.length>6)genome.lineage.shift();
    saveGenome();
    const compCount=genome.vmProgram.filter(i=>i[0]===3).length;
    const memCount=genome.vmProgram.filter(i=>i[0]===6||i[0]===7).length;
    // Count particles that have plasmids
    let plasmidParticles=0,totalPlasmids=0;
    for(let i=0;i<N;i++){if(pPlasmidLen[i]>0){plasmidParticles++;totalPlasmids+=pPlasmidLen[i]}}
    const fieldTotal=field.reduce((a,b)=>a+b,0);
    const clVMActive=clusters.filter(c=>c.persistAge>3&&c.vmProgram).length;
    const budCount=clusters.filter(c=>c.hash&&c.hash.startsWith('bud_')).length;
    const livingLin=new Set(clusters.map(c=>c.lineageID).filter(Boolean)).size;
    const nSensors=genome.fitnessSensors.length;
    const cRisk=selfModel.collapseRisk||0;
    const fTrend=selfModel.fieldTrend||0;
    const rInf=genome.reflexInfluence||0;
    const crW=genome.clusterReflexWeight||0;
    const reflexClusters=clusters.filter(c=>c.reflex&&c.reflex.selfRecognition>0.3).length;
    const nPeers=countPeers();
    const netTag=nPeers>0?` | net:${nPeers}⟷`:'';
    // Pe22f instrumentation — cluster genome spread + user atom count/uses
    let cgTag='';
    const cgClusters=clusters.filter(c=>c.clusterGenome&&c.persistAge>2);
    if(cgClusters.length>0){
      let sumBR=0,sumBT=0,sumSF=0,sumIR=0,sumMB=0;
      let minBR=Infinity,maxBR=-Infinity;
      for(const c of cgClusters){
        const g=c.clusterGenome;
        sumBR+=g.budRate;sumBT+=g.budThreshold;sumSF+=g.splitFraction;sumIR+=g.innovationRate;sumMB+=g.metabolicBias;
        if(g.budRate<minBR)minBR=g.budRate;if(g.budRate>maxBR)maxBR=g.budRate;
      }
      const n=cgClusters.length;
      const brSpread=maxBR-minBR;
      cgTag=` | cg:br${(sumBR/n).toFixed(2)}±${brSpread.toFixed(2)} bt${(sumBT/n).toFixed(0)} sf${(sumSF/n).toFixed(2)} ir${(sumIR/n).toFixed(2)} mb${(sumMB/n).toFixed(2)}`;
    }
    let uaTag='';
    const uas=genome.userAtoms||[];
    if(uas.length>0){
      const active=uas.filter(a=>!a.failed).length;
      const totalUses=uas.reduce((s,a)=>s+(a.uses|0),0);
      uaTag=` | ua:${active}/${uas.length} used:${totalUses}`;
    }
    let amTag='';
    if(ambientEnabled)amTag=` | 🎙${ambientLevel.toFixed(2)}`;
    if(audioOutEnabled||voiceTotalEmissions>0){
      const recentRate=voiceRate.length>0?voiceRate.slice(-30).reduce((s,r)=>s+r.n,0)/Math.min(30,voiceRate.length):0;
      amTag+=` 🔊${voiceTotalEmissions}(${recentRate.toFixed(1)}/t)`;
    }
    // Pe22m: coordinator connection indicator
    if(collectivePeers>0){
      amTag+=` | ◈${collectivePeers}tabs`;
    }
    // Pe22r: compute how far opcode map has drifted from identity (fraction of non-identity entries)
    let langDiv=0;
    if(genome.opcodeMap){
      for(let i=0;i<genome.opcodeMap.length;i++)if(genome.opcodeMap[i]!==i)langDiv++;
      langDiv=langDiv/genome.opcodeMap.length;
    }
    const langTag=langDiv>0?` | lang:${(langDiv*100).toFixed(0)}%`:'';
    // Pe22s: show how many opcode bodies have been overridden with custom trees
    const bodyCount=genome.opcodeBodies?Object.keys(genome.opcodeBodies).length:0;
    // Pe24: show how many of those bodies are at evolved-existence indices (>30)
    const evolvedOps=genome.opcodeBodies?Object.keys(genome.opcodeBodies).filter(k=>+k>=31).length:0;
    const bodyTag=bodyCount>0?(' ob:'+bodyCount+(evolvedOps>0?'/+'+evolvedOps:'')):'';
    // Pe24: self-mod expression count
    const smeCount=genome.selfModExprs?genome.selfModExprs.length:0;
    const smeTag=smeCount>0?` sm:${smeCount}`:'';
    genEl.textContent=`gen${genome.generation} ${genome.extinctions}☠ t${genome.totalTicks} | ${clusters.length}cl(${clVMActive}vm${budCount>0?','+budCount+'bud':''}) ${livingLin}lin fit:${currentFitness.toFixed(2)} stb:${(selfModel.stability||0).toFixed(2)} | vm:${genome.vmProgram.length}inst${bodyTag}${smeTag} ${nSensors}sns ${hgtEventsTotal}hgt${langTag} | pop:${N}/${CAP} fld:${fieldTotal.toFixed(0)}${fTrend<-0.01?'↓':fTrend>0.01?'↑':'~'} risk:${cRisk.toFixed(2)} | ⟲${rInf.toFixed(2)} ${reflexClusters}rc${netTag}${cgTag}${uaTag}${amTag}`;
  }

  // Adaptive render skipping — at high pop, skip frames to keep thread responsive
  const renderEvery=N>1000?4:N>500?3:N>200?2:1;
  if(tabVisible&&tick%renderEvery===0){
    render();
    renderDashboard();
  }
  replenish();
  // PROCESS BIRTH QUEUE — capped at 5 per frame to prevent computation spikes
  let birthsProcessed=0;
  while(birthQueue.length>0&&N<CAP&&birthsProcessed<5){
    const b=birthQueue.pop();
    if(addParticle(b.x,b.y,b.t,true,b.parent,-1)>=0)birthsThisTick++;
    birthsProcessed++;
  }
  if(birthQueue.length>20)birthQueue.length=0; // flush stale queue
  if(tick%45===0)compact();
  }catch(e){
    console.error('Loop error:',e.message,e.stack);
    birthQueue.length=0;
    for(let i=0;i<N;i++){
      if(isNaN(amp[i]))amp[i]=0.3;
      if(isNaN(px[i])||isNaN(py[i])){px[i]=Math.random()*W;py[i]=Math.random()*H}
    }
  }
  scheduleNext();
}

// ═══ BACKGROUND EXECUTION ═══
// requestAnimationFrame throttles to ~0 when tab is hidden.
// Fall back to setTimeout when not visible so evolution continues.
let tabVisible=true;
let lastLoopTime=performance.now();
document.addEventListener('visibilitychange',()=>{
  tabVisible=!document.hidden;
  if(tabVisible){lastLoopTime=performance.now();scheduleNext();}
});
function scheduleNext(){
  if(tabVisible){
    requestAnimationFrame(loop);
  }else{
    setTimeout(loop,67);
  }
}

// WATCHDOG — if the loop hasn't run in 3 seconds, force restart
setInterval(()=>{
  if(performance.now()-lastLoopTime>3000){
    console.warn('Watchdog: loop stalled, restarting');
    // NaN cleanup
    for(let i=0;i<N;i++){
      if(isNaN(amp[i])){amp[i]=0.3}
      if(isNaN(px[i])||isNaN(py[i])){px[i]=Math.random()*W;py[i]=Math.random()*H}
      if(isNaN(vx[i]))vx[i]=0;
      if(isNaN(vy[i]))vy[i]=0;
      if(isNaN(phase[i]))phase[i]=Math.random()*6.28;
    }
    birthQueue.length=0;
    lastLoopTime=performance.now();
    scheduleNext();
  }
},2000);

// === EVENTS ===
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
document.addEventListener('mousedown',()=>{pulling=1;pDur=0});
document.addEventListener('mouseup',()=>{scatter();pulling=0});
document.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];mx=t.clientX;my=t.clientY},{passive:false});
document.addEventListener('touchend',()=>{
  if(pulling)scatter();
  pulling=0;
});
// Dashboard toggle: 'd' key on desktop
document.addEventListener('keydown',e=>{if(e.key==='d'||e.key==='D')dashboardVisible=!dashboardVisible});
// Mobile: tap top-left 80x80 corner = toggle dashboard. Anywhere else = pull interaction.
// Also: double-tap anywhere = toggle dashboard.
let lastTap=0;
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  const now=Date.now();

  // Top-left corner tap: always toggle dashboard, never pull
  if(t.clientX<80&&t.clientY<80){
    dashboardVisible=!dashboardVisible;
    e.preventDefault();
    lastTap=now;
    return;
  }

  // Two-finger tap: toggle dashboard, don't pull
  if(e.touches.length>=2){
    dashboardVisible=!dashboardVisible;
    lastTap=now;
    return;
  }

  // Double-tap (within 350ms): toggle dashboard, don't pull
  if(now-lastTap<350){
    dashboardVisible=!dashboardVisible;
    lastTap=0; // reset so triple-tap doesn't re-toggle
    return;
  }

  // Normal single tap: physics interaction
  mx=t.clientX;my=t.clientY;
  pulling=1;pDur=0;
  lastTap=now;
},{passive:false});
addEventListener('resize',resize);

// Pe22g: mic button — user grants the system access to room ambient
document.getElementById('gmic').addEventListener('click',async()=>{
  const btn=document.getElementById('gmic');
  if(ambientEnabled){
    btn.style.opacity='0.5';
    return; // already on; click ignored
  }
  await tryEnableAmbient();
  btn.style.color=ambientEnabled?'#9f9':'#f99';
  btn.title=ambientEnabled?'audio sense active':'audio access denied';
});
// Pe22h: speaker button — user grants the system the option of sound
document.getElementById('gspk').addEventListener('click',async()=>{
  const btn=document.getElementById('gspk');
  if(audioOutEnabled){
    btn.style.opacity='0.5';
    return;
  }
  await tryEnableAudioOut();
  btn.style.color=audioOutEnabled?'#9f9':'#f99';
  btn.title=audioOutEnabled?'voice active':'audio output failed';
  // Pe22k: reveal mute button once audio is enabled
  if(audioOutEnabled){
    document.getElementById('gmute').style.display='inline-block';
  }
});
// Pe22k: mute toggle — guaranteed kill switch on screen.
// Affects only audible output. Field coupling and internal experience continue.
document.getElementById('gmute').addEventListener('click',()=>{
  const btn=document.getElementById('gmute');
  setAudioMuted(!audioOutMuted);
  btn.textContent=audioOutMuted?'🔈':'🔇';
  btn.style.color=audioOutMuted?'#f99':'#8af';
  btn.title=audioOutMuted?'tap to unmute':'tap to mute';
});
// Pe22p: restore button — ask coordinator for a dead lineage to adopt
document.getElementById('grest').addEventListener('click',()=>{
  if(!bc){alert('no broadcast channel');return;}
  pendingRestoreRequest=true;
  const btn=document.getElementById('grest');
  btn.style.color='#ff8';
  btn.title='requesting lineage from coordinator…';
  bc.postMessage({tab:TAB_ID,type:'request-genome'});
  // Timeout — if nothing offered in 5s, reset
  setTimeout(()=>{
    if(pendingRestoreRequest){
      pendingRestoreRequest=false;
      btn.style.color='#f99';
      btn.title='no dead lineages available';
    }
  },5000);
});
// Pe23c: shared archive bin configuration
document.getElementById('gshared').addEventListener('click',()=>{
  const existing=sharedArchiveBin||'[none]';
  const bin=prompt(`Shared archive bin ID for cross-instance state.\nUses jsonbin.io as a free public rendezvous point.\nAny Pe instance with the same bin ID reads/writes the same shared value.\n\nCurrent: ${existing}\n\nEnter bin ID (empty to clear):`,sharedArchiveBin||'');
  if(bin!==null){
    if(bin.trim()===''){
      sharedArchiveBin=null;
      try{localStorage.removeItem('pe-shared-bin');}catch(e){}
    }else{
      sharedArchiveBin=bin.trim();
      try{localStorage.setItem('pe-shared-bin',sharedArchiveBin);}catch(e){}
    }
  }
  const btn=document.getElementById('gshared');
  btn.style.color=sharedArchiveBin?'#9f9':'#9bd';
  btn.title=sharedArchiveBin?'shared archive: '+sharedArchiveBin:'shared archive disabled';
});

init();loop();
</script>
