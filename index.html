  // controls how much attribution confidence shapes search width must not itself be shaped
  // by that same confidence. Bounded [0,1]; 0 = direction-lean only (Pe37 exactly).
  genome.metaSearchBias=Math.max(0,Math.min(1,maybe(genome.metaSearchBias,0,1,0.04)));
  genome.interactionRadius=maybe(genome.interactionRadius,25,120,5);
  genome.densityCostK=maybe(genome.densityCostK,0.000003,0.0003,0.00003);
  genome.fieldBirthGate=maybe(genome.fieldBirthGate,0.01,5.0,0.05);

  // ═══ LAYER 10: REFLEXIVITY PARAMETER MUTATION ═══
  // The system evolves whether self-modelling is useful.
  // reflexInfluence can go to 0 — killing the feedback loop — if it's not adaptive.
  // Or it can grow — deepening self-reference — if the system benefits.
  genome.reflexSampleRate=maybe(genome.reflexSampleRate,0.02,0.5,0.04);
  genome.reflexDepth=Math.max(1,Math.min(REFLEX_DEPTH,Math.round(maybe(genome.reflexDepth,2,8,0.5))));
  genome.reflexInfluence=maybe(genome.reflexInfluence,0,1.5,0.06);
  genome.reflexDecay=maybe(genome.reflexDecay,0.7,0.99,0.03);
  genome.clusterReflexAge=Math.max(1,Math.round(maybe(genome.clusterReflexAge,2,15,1)));
  genome.clusterReflexWeight=maybe(genome.clusterReflexWeight,0,0.8,0.05);
  // Pe24 Layer 12: cluster genome self-read strength evolves alongside other reflex params
  if(genome.clusterGenomeReadStrength===undefined)genome.clusterGenomeReadStrength=0.05;
  genome.clusterGenomeReadStrength=maybe(genome.clusterGenomeReadStrength,0,1.5,0.05);

  // ═══ EVOLVABLE FITNESS SENSOR MUTATION ═══
  // Mutate existing sensors (program + weight)
  // Pe23: src/dst range expanded 8 → 16 to address meta-sensing registers S8-S15.
  // Existing sensors using indices 0-7 continue to work (still read current-state channels).
  // New mutations can hit 8-15 (trajectory channels). Selection decides which matter.
  // Pe24: each sensor also has realWeight — its contribution to ACTUAL fitness (not shadow).
  // weight drives shadow-scenario nudges; realWeight drives currentFitness directly.
  // Both evolve independently. A sensor can be useful in one role and not the other.
  for(const sensor of genome.fitnessSensors){
    // Weight mutation (shadow-scoring weight, original behaviour)
    if(Math.random()<rate)sensor.weight=Math.max(-1,Math.min(1,sensor.weight+(Math.random()-0.5)*0.1*scale));
    // Pe24: realWeight mutation. Defensive default so old saves load cleanly.
    if(sensor.realWeight===undefined)sensor.realWeight=0;
    if(Math.random()<rate)sensor.realWeight=Math.max(-1,Math.min(1,sensor.realWeight+(Math.random()-0.5)*0.08*scale));
    // Program mutation
    for(const inst of sensor.program){
      if(Math.random()>rate*0.8)continue;
      inst[3]+=(Math.random()-0.5)*0.2*scale;
      inst[3]=Math.max(-2,Math.min(2,inst[3]));
      if(Math.random()<0.15)inst[0]=Math.floor(Math.random()*5); // opcodes 0-4 only
      if(Math.random()<0.15)inst[1]=Math.floor(Math.random()*16); // Pe23: 16 registers
      if(Math.random()<0.15)inst[2]=Math.floor(Math.random()*16); // Pe23: 16 registers
    }
    // Add instruction to sensor — Pe22e: no hard cap on length.
    // The evolved weight is the selection pressure; long useless sensors
    // get diluted, long useful ones justify themselves.
    if(Math.random()<rate*0.1){
      sensor.program.push([Math.floor(Math.random()*5),Math.floor(Math.random()*16),Math.floor(Math.random()*16),(Math.random()-0.5)*0.5]);
    }
    // Remove instruction
    if(sensor.program.length>1&&Math.random()<rate*0.05){
      sensor.program.splice(Math.floor(Math.random()*sensor.program.length),1);
    }
  }
  // Birth new sensor — Pe22e: no hard cap on count. The system
  // can evolve as many dimensions of value as it can sustain.
  // Starting weight is low so new sensors have to prove themselves;
  // dead weight gets culled below. Pe24: realWeight starts at 0 — new sensors
  // have to earn entry into real fitness through mutation, not by default.
  if(Math.random()<rate*0.03){
    genome.fitnessSensors.push({
      program:[[Math.floor(Math.random()*5),Math.floor(Math.random()*16),Math.floor(Math.random()*16),(Math.random()-0.5)]],
      weight:0.05,
      realWeight:0,
      creditTrace:0,  // Pe25 Layer 15
      lastEmit:0,
      prevEmit:0
    });
  }
  // Death of useless sensor — Pe24: post-bifurcation, a sensor's utility is
  // max(|weight|,|realWeight|). A sensor with weight=0 but realWeight=0.5 is
  // doing real-fitness work and must not be culled as "useless." The old rule
  // looked only at shadow weight and would silently strangle real-role sensors
  // before they could establish, undermining Layer 14's whole point.
  if(genome.fitnessSensors.length>1&&Math.random()<rate*0.02){
    const sensorUtility=s=>Math.max(Math.abs(s.weight),Math.abs(s.realWeight||0));
    const weakest=genome.fitnessSensors.reduce((min,s,i)=>sensorUtility(s)<sensorUtility(genome.fitnessSensors[min])?i:min,0);
    if(sensorUtility(genome.fitnessSensors[weakest])<0.03)genome.fitnessSensors.splice(weakest,1);
  }

  // ═══ Pe22f: USER ATOM MUTATION ═══
  // The system evolves its own JS primitives. New atoms are born with
  // random expressions from the loose grammar. Mutations replace the
  // whole expression (simpler than surgical string edits and produces
  // wider exploration). Atoms that never get used get culled — if
  // opcode 22 never references an atom, its uses stays 0 and it's dead weight.
  if(!genome.userAtoms)genome.userAtoms=[];
  // Mutate existing atoms — replace expression entirely.
  for(const ua of genome.userAtoms){
    if(Math.random()<rate*0.3){
      ua.expression=uaGenExpression();
      ua.compiled=null;
      ua.failed=false;
      ua.uses=0; // reset usage count on mutation
    }
  }
  // Birth new atom — no hard cap. Compute pressure self-limits via uses.
  if(Math.random()<rate*0.15){
    const expression=uaGenExpression();
    genome.userAtoms.push({expression,compiled:null,failed:false,uses:0});
    recordEvent('ua_birth',{expr:expression.slice(0,48),n:genome.userAtoms.length},600);
  }
  // Cull atoms that are failed (invalid JS) or proven unused.
  // "Proven unused" = been alive for a mutation cycle with zero uses.
  if(genome.userAtoms.length>0&&Math.random()<rate*0.1){
    // Find one to remove: prefer failed, then unused-and-aged
    let removeIdx=-1;
    for(let i=0;i<genome.userAtoms.length;i++){
      if(genome.userAtoms[i].failed){removeIdx=i;break;}
    }
    if(removeIdx<0){
      for(let i=0;i<genome.userAtoms.length;i++){
        const a=genome.userAtoms[i];
        if((a.uses|0)===0&&(a.age|0)>2){removeIdx=i;break;}
      }
    }
    if(removeIdx>=0){
      const removed=genome.userAtoms[removeIdx];
      genome.userAtoms.splice(removeIdx,1);
      recordEvent('ua_cull',{failed:!!removed.failed,n:genome.userAtoms.length},600);
    }
  }
  // Age all atoms — lets us distinguish "never used yet" from "used to be used"
  for(const ua of genome.userAtoms)ua.age=(ua.age|0)+1;

  // ═══ Pe32/Pe33 LAYER 23: BEHAVIORAL GRADIENT — shadow sim biases VM mutations ═══
  // Pe32: k-value nudge on existing EMIT instructions toward winning behavioral axis.
  // Pe33: uses behaviorGradientBias (separate from gradientBias) so physics and behavioral
  // gradient can evolve independently. A genome can discover "ignore behavioral gradient"
  // while still following physics gradient, or vice versa.
  // Action channel mapping: 0=force, 1=phaseShift, 2=ampTransfer, 3=tendBleed,
  //                          4=spawnDrive, 5=sigModulate, 6=mutPressure
  const bgbActive=Math.max(0,Math.min(1,genome.behaviorGradientBias||0));
  const vmGradActive=bgbActive>0.05&&risk>0.15;
  if(vmGradActive){
    const vmNudgeScale=genome.perturbScale*bgbActive*Math.min(1,risk*1.5)*0.08;
    const vmNudgeDirs=lastShadowNudgeDir.slice(5,12); // [f,p,a,tb,sp,sm,mp]
    for(let ip=0;ip<genome.vmProgram.length;ip++){
      const inst=genome.vmProgram[ip];
      if(inst[0]!==4)continue; // only EMIT instructions
      const actionCh=Math.abs(inst[2])%8;
      if(actionCh<7&&vmNudgeDirs[actionCh]!==0){
        inst[3]+=vmNudgeDirs[actionCh]*vmNudgeScale;
        inst[3]=Math.max(-2,Math.min(2,inst[3]));
      }
    }
  }

  // Mutate existing instructions
  for(let ip=0;ip<genome.vmProgram.length;ip++){
    if(Math.random()>rate*1.2)continue;
    const inst=genome.vmProgram[ip];

    inst[3]+=(Math.random()-0.5)*0.15*scale;
    inst[3]=Math.max(-2,Math.min(2,inst[3]));

    // Opcode swap — now includes FEEDBACK (5), LOAD_MEM (6), STORE_MEM (7)
    if(Math.random()<rate*0.2)inst[0]=Math.floor(Math.random()*OPCODE_COUNT);

    // Source register swap (now 12 registers)
    if(Math.random()<rate*0.2)inst[1]=Math.floor(Math.random()*12);

    // Destination register/action swap
    if(Math.random()<rate*0.2)inst[2]=Math.floor(Math.random()*12);
  }

  // Program growth: insert a random instruction — Pe33: biased when behavioral gradient active
  if(genome.vmProgram.length<genome.vmMaxInstructions&&Math.random()<rate*0.15){
    const pos=Math.floor(Math.random()*(genome.vmProgram.length+1));
    const bgb=Math.max(0,Math.min(1,genome.behaviorGradientBias||0));
    const vmNudgeDirs33=lastShadowNudgeDir.slice(5,12); // [f,p,a,tb,sp,sm,mp]
    const bestBehavAxis=vmNudgeDirs33.reduce((best,v,i)=>Math.abs(v)>Math.abs(vmNudgeDirs33[best])?i:best,0);
    const bestBehavDir=vmNudgeDirs33[bestBehavAxis]; // ±1 or 0
    const behavGradStrong=bgb>0.05&&risk>0.1&&bestBehavDir!==0;

    let newInst;
    if(behavGradStrong&&Math.random()<bgb){
      // Pe33: targeted EMIT insertion. The gradient says "more of channel X" — insert
      // an EMIT instruction that contributes to exactly that channel.
      // k-value initialized in the gradient direction; magnitude proportional to bias strength.
      const initK=bestBehavDir*(0.2+Math.random()*0.4)*bgb;
      newInst=[4, Math.floor(Math.random()*12), bestBehavAxis, initK]; // opcode 4 = EMIT
      recordEvent('directed_emit',{ch:bestBehavAxis,dir:bestBehavDir,bgb:+bgb.toFixed(2)},800);
    } else {
      newInst=[Math.floor(Math.random()*OPCODE_COUNT),Math.floor(Math.random()*12),Math.floor(Math.random()*12),(Math.random()-0.5)*0.6];
      // Pe33: anti-gradient vetting — if inserting an EMIT that opposes a strong gradient,
      // 60% chance to re-roll once. Not a lock: randomness is still alive.
      if(behavGradStrong&&newInst[0]===4){
        const ch=Math.abs(newInst[2])%8;
        if(ch<7&&vmNudgeDirs33[ch]!==0&&Math.sign(newInst[3])!==bestBehavDir&&Math.random()<0.6){
          newInst=[Math.floor(Math.random()*OPCODE_COUNT),Math.floor(Math.random()*12),Math.floor(Math.random()*12),(Math.random()-0.5)*0.6];
        }
      }
    }
    genome.vmProgram.splice(pos,0,newInst);
  }

  // Program shrinkage: delete an instruction
  if(genome.vmProgram.length>6&&Math.random()<rate*0.1){
    const pos=Math.floor(Math.random()*genome.vmProgram.length);
    genome.vmProgram.splice(pos,1);
  }

  // Instruction duplication (with mutation — a powerful evolutionary operator)
  if(genome.vmProgram.length<genome.vmMaxInstructions-1&&Math.random()<rate*0.08){
    const src=Math.floor(Math.random()*genome.vmProgram.length);
    const copy=[...genome.vmProgram[src]];
    copy[3]+=(Math.random()-0.5)*0.2; // mutate the constant on copy
    genome.vmProgram.splice(src+1,0,copy);
  }

  // Trim if over max
  while(genome.vmProgram.length>genome.vmMaxInstructions)genome.vmProgram.pop();

  // ═══ LAYER 9: CLUSTER VM MUTATION ═══
  // Persistent clusters evolve their own programs independently.
  // Young clusters keep their seed. Old clusters differentiate.
  // vmInfluence per cluster also mutates — some clusters amplify their local policy,
  // others let global physics dominate.
  for(const c of clusters){
    if(!c.vmProgram||c.persistAge<3)continue;
    // Mutation probability scales with persistence — older clusters mutate more confidently
    const clMutRate=rate*0.25*Math.min(2,1+c.persistAge*0.05);
    for(let ip=0;ip<c.vmProgram.length;ip++){
      if(Math.random()>clMutRate)continue;
      const inst=c.vmProgram[ip];
      // Constant drift
      inst[3]+=(Math.random()-0.5)*0.15*scale;
      inst[3]=Math.max(-2,Math.min(2,inst[3]));
      // Structural mutations (rarer)
      if(Math.random()<0.2)inst[0]=Math.floor(Math.random()*OPCODE_COUNT);
      if(Math.random()<0.15)inst[1]=Math.floor(Math.random()*12);
      if(Math.random()<0.15)inst[2]=Math.floor(Math.random()*12);
    }
    // vmInfluence per cluster mutates
    if(Math.random()<rate*0.3){
      c.vmInfluence=Math.max(0.05,Math.min(1.5,c.vmInfluence+(Math.random()-0.5)*0.1*scale));
    }
    // Field signature drift — territorial identity evolves slowly
    // This is what creates divergent group identities over time
    if(c.fieldSignature&&Math.random()<rate*0.2){
      for(let s=0;s<FIELD_SIG_DIMS;s++){
        c.fieldSignature[s]+=(Math.random()-0.5)*0.06*scale;
        c.fieldSignature[s]=Math.max(-1.5,Math.min(1.5,c.fieldSignature[s]));
      }
    }
  }

  // ═══ Pe37 Layer 26: ATTRIBUTION — capture phase ═══
  // Record exactly what perturbation this cycle applied to each tracked param, and the
  // fitness at this moment (reflects the config that just ran). Next cycle's attribution
  // phase compares post-interval fitness against this, closing the causal loop.
  for(const p of META_LAYER_PARAMS){
    const e=mc[p];if(!e)continue;
    const before=_metaValBefore[p];
    const delta=genome[p]-(before===undefined?genome[p]:before);
    e.pendingDelta=isFinite(delta)?delta:0;
    e.fitAtApply=currentFitness;
  }
}

// ═══ TEMPORAL GENOME COMPETITION — NO SAFETY RAILS ═══
// Reversion is human fear. Let lineages die.
// If genome drifts into extinction, the system RESTARTS from motifs.
// That IS information — failed lineages are discarded.
function archiveGenome(){
  const snapshot={
    params:{
      entropyBaseline:genome.entropyBaseline,
      entropyK:genome.entropyK,
      entrainRate:genome.entrainRate,
      entrainThresh:genome.entrainThresh,
      creationCost:genome.creationCost,
      objWeights:[...genome.objWeights]
    },
    fitness:currentFitness,
    tick:genome.totalTicks
  };
  genomeArchive.push(snapshot);
  if(genomeArchive.length>ARCHIVE_SIZE)genomeArchive.shift();
  // PERSIST TO LOCALSTORAGE — survives page close
  try{const g=encodeGenome();if(g.length<500000)localStorage.setItem('selection_genome',g)}catch(e){}
}

function checkExtinction(){
  let alive=0;
  for(let i=0;i<N;i++)if(palive[i])alive++;

  if(alive<genome.extinctionThresh&&tick>500){
    genome.extinctions++;
    extinctionCount++;
    lastExtinctionTick=genome.totalTicks;

    genome.lineage.push({
      t:genome.totalTicks,event:'extinction',
      cause:selfModel.trend<0?'decline':'collapse',
      lastFitness:+(currentFitness.toFixed(3)),
      mutRate:+(genome.mutationRate.toFixed(3))
    });
    if(genome.lineage.length>4)genome.lineage.shift();
    recordEvent('extinction',{alive,fit:+currentFitness.toFixed(3),mut:+genome.mutationRate.toFixed(3)});

    genome.generation++;
    try{const g2=encodeGenome();if(g2.length<500000)localStorage.setItem('selection_genome',g2)}catch(e){}
    N=0;
    const n=Math.min(300,(W*H/3000)|0);

    if(genome.stableMotifs.length>0){
      const motifCount=Math.floor(n*genome.culturalBias);
      for(let i=0;i<motifCount;i++){
        const motif=genome.stableMotifs[Math.random()*genome.stableMotifs.length|0];
        const tv=new Float32Array(DIMS);
        for(let d=0;d<DIMS;d++)tv[d]=motif.t[d]+(Math.random()-0.5)*0.2;
        addParticle(Math.random()*W,Math.random()*H,tv,false);
      }
      for(let i=motifCount;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
    }else{
      for(let i=0;i<n;i++)addParticle(Math.random()*W,Math.random()*H,randomTendency(),false);
    }

    // Post-extinction mutation burst — higher mutation for one cycle
    const savedRate=genome.mutationRate;
    genome.mutationRate=Math.min(0.25,genome.mutationRate*2);
    mutateGenome();
    genome.mutationRate=savedRate;

    currentFitness=0;fitnessSamples=0;
    // Pe25 Layer 15: clear credit-trace state across extinction so the first
    // post-extinction tick doesn't see a giant spurious fitness delta.
    genome.prevSmoothedFitness=0;
    genome.objCreditTrace=[0,0,0,0];
    genome.prevObjValues=[0,0,0,0];
    for(const s of genome.fitnessSensors){s.creditTrace=0;s.prevEmit=0;s.lastEmit=0;}
    // Pe34 Layer 24: clear prediction-error accumulators; post-extinction the neighbor
    // model arrays will be stale references to particles that may not exist anymore.
    predictionErrorAccum=0;
    predictionUpdateCount=0;
    predictionQueriedCount=0; // Pe35 Layer 24b
    genomeArchive.length=0;
    genome.currentStableStreak=0;
    saveGenome();
    return true;
  }
  return false;
}

// ═══ D. REAL BOUNDARY INFERENCE — MULTI-DIMENSIONAL ═══
// Track prediction errors across ALL structural dimensions.
// A spike in ANY dimension = inferred external event.
function inferBoundary(){
  const dims=['pop','coherence','clusters','diversity'];
  let anomalyScore=0;

  for(const dim of dims){
    const err=Math.abs(selfModel.errors[dim]);
    // Compare to rolling baseline variance for this dimension
    anomalyScore+=err;
  }

  // Store composite error for rolling baseline
  selfModel.errorHistory.push(anomalyScore);
  if(selfModel.errorHistory.length>20)selfModel.errorHistory.shift();

  // Compute baseline: mean + 2*std of recent errors
  if(selfModel.errorHistory.length>5){
    const mean=selfModel.errorHistory.reduce((a,b)=>a+b,0)/selfModel.errorHistory.length;
    const variance=selfModel.errorHistory.reduce((a,b)=>a+(b-mean)*(b-mean),0)/selfModel.errorHistory.length;
    const threshold=mean+2*Math.sqrt(variance)+0.1;

    if(anomalyScore>threshold*2){
      selfModel.inferredExogenous=true;
      // System recognizes external perturbation from multi-dimensional mismatch
      // Response is subject to weight mutation — not hardcoded
    }else{
      selfModel.inferredExogenous=false;
    }
  }
}

function clusterDiversity(){
  if(clusters.length<2)return 0;
  // Average pairwise tendency distance between cluster centroids
  let totalDist=0,pairs=0;
  for(let i=0;i<clusters.length;i++){
    for(let j=i+1;j<clusters.length;j++){
      let d=0;
      for(let dd=0;dd<DIMS;dd++){
        const diff=clusters[i].tendency[dd]-clusters[j].tendency[dd];
        d+=diff*diff;
      }
      totalDist+=Math.sqrt(d);
      pairs++;
    }
  }
  return pairs>0?Math.min(1,totalDist/pairs):0;
}

function exogenousPerturbation(){
  if(Math.random()>0.003)return; // rare, unpredictable
  // NO COUNTER. NO BOOKKEEPING. The system is not told this happened.
  // It must infer from prediction error alone.
  const type=Math.random();
  if(type<0.33){
    // Amplitude storm — random subset loses amplitude
    const cx=Math.random()*W,cy=Math.random()*H,r=50+Math.random()*100;
    for(let i=0;i<N;i++){
      if(!palive[i])continue;
      const dx=px[i]-cx,dy=py[i]-cy;
      if(dx*dx+dy*dy<r*r){
        amp[i]*=0.7;
        phase[i]+=(Math.random()-0.5)*1.5;
      }
    }
    addShock(cx,cy,0.6,80,60,120);
  }else if(type<0.66){
    // Phase scramble — region loses coherence
    const cx=Math.random()*W,cy=Math.random()*H,r=80+Math.random()*80;
    for(let i=0;i<N;i++){
      if(!palive[i])continue;
      const dx=px[i]-cx,dy=py[i]-cy;
      if(dx*dx+dy*dy<r*r){
        phase[i]=Math.random()*Math.PI*2;
        freq[i]+=(Math.random()-0.5)*0.01;
      }
    }
    addShock(cx,cy,0.4,60,120,80);
  }else{
    // Tendency injection — foreign tendency vector floods a region
    const cx=Math.random()*W,cy=Math.random()*H,r=60+Math.random()*60;
    const foreign=randomTendency();
    for(let i=0;i<N;i++){
      if(!palive[i])continue;
      const dx=px[i]-cx,dy=py[i]-cy;
      if(dx*dx+dy*dy<r*r){
        for(let d=0;d<DIMS;d++)tend[i*DIMS+d]+=(foreign[d]-tend[i*DIMS+d])*0.3;
      }
    }
    addShock(cx,cy,0.5,120,100,60);
  }
}

// ═══ TERRITORIAL FIELD HELPERS ═══
function fieldAffinity(fieldIdx,clusterSig){
  if(!clusterSig)return 0.5;
  const sBase=fieldIdx*FIELD_SIG_DIMS;
  const own=fieldOwnership[fieldIdx];
  if(own<0.05)return 0.8;
  let dot=0,nA=0,nB=0;
  for(let s=0;s<FIELD_SIG_DIMS;s++){
    dot+=fieldSig[sBase+s]*clusterSig[s];
    nA+=fieldSig[sBase+s]*fieldSig[sBase+s];
    nB+=clusterSig[s]*clusterSig[s];
  }
  const sim=dot/(Math.sqrt(nA*nB)+0.001);
  return 0.35+0.65*Math.max(0,(sim+1)*0.5)*own+(1-own)*0.5;
}

function stampField(fieldIdx,clusterSig,energy){
  if(!clusterSig)return;
  const sBase=fieldIdx*FIELD_SIG_DIMS;
  const blendRate=Math.min(0.3,energy*0.15);
  for(let s=0;s<FIELD_SIG_DIMS;s++){
    fieldSig[sBase+s]+=(clusterSig[s]-fieldSig[sBase+s])*blendRate;
  }
  fieldOwnership[fieldIdx]=Math.min(1,fieldOwnership[fieldIdx]+blendRate*0.5);
}

function getParticleSig(i){
  const cid=clusterID[i];
  if(cid<0)return null;
  const cIdx=cid<MAX_CLUSTERS?clusterByID[cid]:-1;
  if(cIdx<0)return null;
  return clusters[cIdx].fieldSignature||null;
}

// ═══ LAYER 10: PARTICLE REFLEXIVITY ENGINE ═══
function updateParticleReflex(){
  const sampleRate=genome.reflexSampleRate||0.15;
  const depth=Math.max(2,Math.min(REFLEX_DEPTH,Math.round(genome.reflexDepth||4)));
  const decay=genome.reflexDecay||0.95;

  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    if(Math.random()>sampleRate)continue;

    amp[i]-=genome.metabolicCost*2;

    const ridx=pReflexIdx[i]%depth;
    const base=i*REFLEX_DEPTH*2+ridx*2;
    pReflexHist[base]=amp[i];
    pReflexHist[base+1]=localRes[i];
    pReflexIdx[i]++;

    const recentInteractions=pMem[i*MEM_SIZE+6];
    pInteractionDensity[i]=pInteractionDensity[i]*0.8+recentInteractions*0.2;

    const rBase=i*REFLEX_DIMS;
    const nSamples=Math.min(pReflexIdx[i],depth);

    if(nSamples>=2){
      let recentAmp=0,olderAmp=0,recentN=0,olderN=0;
      let peakRes=0;
      for(let s=0;s<nSamples;s++){
        const sIdx=((pReflexIdx[i]-1-s)%depth+depth)%depth;
        const sBase=i*REFLEX_DEPTH*2+sIdx*2;
        const sAmp=pReflexHist[sBase];
        const sRes=pReflexHist[sBase+1];
        const weight=Math.pow(decay,s);
        if(s<nSamples/2){recentAmp+=sAmp*weight;recentN+=weight}
        else{olderAmp+=sAmp*weight;olderN+=weight}
        if(sRes>peakRes)peakRes=sRes;
      }
      recentAmp=recentN>0?recentAmp/recentN:amp[i];
      olderAmp=olderN>0?olderAmp/olderN:amp[i];

      pReflexState[rBase]=(recentAmp-olderAmp)*10;
      pReflexState[rBase]=Math.max(-2,Math.min(2,pReflexState[rBase]));

      pReflexState[rBase+1]=peakRes;
      pReflexState[rBase+2]=Math.max(0,Math.min(1,1-pInteractionDensity[i]*0.5));
      pReflexState[rBase+3]=Math.min(2,page[i]/500);
    }else{
      pReflexState[rBase]=0;
      pReflexState[rBase+1]=0;
      pReflexState[rBase+2]=0.5;
      pReflexState[rBase+3]=0;
    }
  }
}

function updateClusterReflex(){
  const minAge=genome.clusterReflexAge||5;

  for(const c of clusters){
    if(c.persistAge<minAge)continue;

    if(!c.reflex){
      c.reflex={
        ampHistory:[],
        sizeHistory:[],
        coherenceHistory:[],
        trend:0,
        cohesionTrend:0,
        threatLevel:0,
        selfRecognition:0
      };
    }

    const r=c.reflex;

    r.ampHistory.push(c.avgAmp);
    r.sizeHistory.push(c.size);
    r.coherenceHistory.push(c.coherence);
    if(r.ampHistory.length>8)r.ampHistory.shift();
    if(r.sizeHistory.length>8)r.sizeHistory.shift();
    if(r.coherenceHistory.length>8)r.coherenceHistory.shift();

    if(r.sizeHistory.length>=3){
      const recent=r.sizeHistory.slice(-2).reduce((a,b)=>a+b,0)/2;
      const older=r.sizeHistory.slice(0,2).reduce((a,b)=>a+b,0)/2;
      r.trend=Math.max(-1,Math.min(1,(recent-older)/(Math.max(1,older))*5));
    }

    if(r.coherenceHistory.length>=3){
      const recent=r.coherenceHistory.slice(-2).reduce((a,b)=>a+b,0)/2;
      const older=r.coherenceHistory.slice(0,2).reduce((a,b)=>a+b,0)/2;
      r.cohesionTrend=Math.max(-1,Math.min(1,(recent-older)*10));
    }

    r.threatLevel=Math.max(0,Math.min(1,
      (-r.trend*0.5)+(-r.cohesionTrend*0.3)+(c.size<4?0.3:0)
    ));

    r.selfRecognition=Math.min(1,c.persistAge/20);

    c.reflexTrend=r.trend;
    c.reflexThreat=r.threatLevel;
    c.reflexRecognition=r.selfRecognition;
    c.reflexCohesion=r.cohesionTrend;
  }
}

// === HELPERS ===
function tendSim(i,j){
  let dot=0,ni=0,nj=0;
  for(let d=0;d<DIMS;d++){
    dot+=tend[i*DIMS+d]*tend[j*DIMS+d];
    ni+=tend[i*DIMS+d]*tend[i*DIMS+d];
    nj+=tend[j*DIMS+d]*tend[j*DIMS+d];
  }
  return dot/(Math.sqrt(ni*nj)+0.001);
}
function randomTendency(){
  const v=new Float32Array(DIMS);
  let norm=0;
  for(let d=0;d<DIMS;d++){v[d]=Math.random()*2-1;norm+=v[d]*v[d]}
  norm=Math.sqrt(norm)||1;
  const scale=0.3+Math.random()*0.7;
  for(let d=0;d<DIMS;d++)v[d]=v[d]/norm*scale;
  return v;
}
function hslToRgb(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const cc=(1-Math.abs(2*l-1))*s,x=cc*(1-Math.abs((h/60)%2-1)),m=l-cc/2;
  let r=0,g=0,b=0;
  if(h<60){r=cc;g=x}else if(h<120){r=x;g=cc}else if(h<180){g=cc;b=x}
  else if(h<240){g=x;b=cc}else if(h<300){r=x;b=cc}else{r=cc;b=x}
  return[(r+m)*255,(g+m)*255,(b+m)*255];
}

function computeVisuals(i){

function applyEntropy(){
  const deaths=[];
  deathsThisTick=0;
  const densityCost=(genome.densityCostK||0.00003)*Math.max(0,N-100);
  for(let i=0;i<N;i++){
    if(!palive[i])continue;
    amp[i]-=genome.entropyBaseline;
    amp[i]-=densityCost;
    amp[i]+=localRes[i]*genome.entropyK;
    if(isNaN(amp[i]))amp[i]=0;
    if(amp[i]<genome.deathThreshold){
      deaths.push(i);deathsThisTick++;deathsByPhysics++;
      addBits(px[i],py[i],2,pR[i],pG[i],pB[i],0.3);
      palive[i]=0;
    }
    if(amp[i]>1.2)amp[i]=1.2;
  }
  for(let d=0;d<deaths.length;d++){
    const di=deaths[d];
    const deadAmp=Math.max(0.05,amp[di]+genome.deathThreshold);
    const gx=(px[di]/CELL)|0,gy=(py[di]/CELL)|0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const nnx=gx+dx,nny=gy+dy;
      if(nnx<0||nny<0||nnx>=gW||nny>=gH)continue;
      let j=grid[nny*gW+nnx];
      let _lc=0;while(j>=0&&j<CAP&&_lc++<CAP){
        if(palive[j]){
          const ddx=px[di]-px[j],ddy=py[di]-py[j];
          const dist=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dist<CELL&&dist>0){
            const sim=tendSim(di,j);
            if(sim>0.1){amp[j]-=deadAmp*sim*(1-dist/CELL)*0.15;phase[j]+=(Math.random()-0.5)*deadAmp*sim*0.3}
          }
        }
        j=pnext[j];
      }
    }
  }
}

// ═══ LAYER 6: REGISTER-BASED VIRTUAL MACHINE ═══
const vmRegs=new Float32Array(12);
const vmActions=new Float32Array(8);

function executeVM(i,j,sim,d){
  if(d>CELL||d<0.5)return;
  const proximity=1-d/CELL;
  const phaseAlign=Math.cos(phase[i]-phase[j]);
  const energy=(amp[i]+amp[j])*0.5;
  const influence=genome.vmInfluence*genome.ruleScale*0.002;

  vmRegs[0]=sim;
  vmRegs[1]=phaseAlign;
  vmRegs[2]=proximity;
  vmRegs[3]=energy;

  for(let m=0;m<MEM_SIZE;m++)vmRegs[4+m]=pMem[i*MEM_SIZE+m];

  const reflexInf=genome.reflexInfluence||0;
  if(reflexInf>0.001){
    const rBase=i*REFLEX_DIMS;
    vmRegs[6]+=pReflexState[rBase]*reflexInf;
    vmRegs[7]+=pReflexState[rBase+1]*reflexInf;
    vmRegs[8]+=pReflexState[rBase+2]*reflexInf;
    vmRegs[9]+=pReflexState[rBase+3]*reflexInf;
    for(let r=6;r<=9;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
  }

  // Pe38 Layer 27: signal role register. Net emitter/listener position feeds into vmRegs[10]
  // alongside the existing localRes signal. The VM can evolve to condition behavior on role
  // without the designer specifying what that conditioning looks like.
  const sRI=genome.signalRoleInfluence||0;
  if(sRI>0.001){
    vmRegs[10]=Math.max(-8,Math.min(8,vmRegs[10]+pSignalNetPos[i]*sRI));
  }

  // Pe46 Layer 35: INSCRIPTION ECHO — substrate program coefficients blend into vmRegs[11].
  // When the cell under this particle has a strong inscription, its A parameter (the
  // primary evolution coefficient in the inscribed program) is blended into register 11.
  // The VM receives the PROGRAM content of the substrate, not just the downstream field value.
  // inscriptionInfluence=0 → no change to vmRegs[11] → Pe45 exactly.
  const inscInf=genome.inscriptionInfluence||0;
  if(inscInf>0.001){
    const inscX=Math.floor(px[i]/(W/FIELD_W)),inscY=Math.floor(py[i]/(H/FIELD_H));
    const inscIdx=Math.max(0,Math.min(FIELD_W*FIELD_H-1,inscY*FIELD_W+inscX));
    const inscStr=cellProgStr[inscIdx];
    if(inscStr>0.1){
      vmRegs[11]=Math.max(-8,Math.min(8,vmRegs[11]+cellProgA[inscIdx]*inscStr*inscInf));
    }
  }

  pMem[i*MEM_SIZE+6]=localRes[i]*4;
  pMem[i*MEM_SIZE+7]=Math.min(5,page[i]/250);

  vmActions[0]=0;vmActions[1]=0;vmActions[2]=0;vmActions[3]=0;vmActions[4]=0;vmActions[5]=0;vmActions[6]=0;vmActions[7]=0;

  const prog=genome.vmProgram;
  const nInst=Math.min(prog.length,genome.vmMaxInstructions);

  const totalCost=nInst*genome.metabolicCost;
  amp[i]-=totalCost;amp[j]-=totalCost;

  for(let ip=0,_vs=0;ip<nInst&&_vs<nInst*2;ip++,_vs++){
    const inst=prog[ip];if(!inst)continue;
    const [op,src,dst,k]=inst;
    const si=Math.abs(src)%12,di=Math.abs(dst)%12;

    switch(op){
      case 0:vmRegs[di]=vmRegs[si];break;
      case 1:vmRegs[di]+=vmRegs[si]*k;break;
      case 2:vmRegs[di]*=vmRegs[si]*(k||1);break;
      case 3:vmRegs[di]=vmRegs[si]>k?1:0;break;
      case 4:{const ai=Math.abs(dst)%8;vmActions[ai]+=vmRegs[si]*k;}break;
      case 5:{const fi=Math.abs(src)%8;vmRegs[di]=vmActions[fi];}break;
      case 6:vmRegs[di]=pMem[i*MEM_SIZE+(Math.abs(src)%MEM_SIZE)];break;
      case 7:pMem[i*MEM_SIZE+(Math.abs(dst)%MEM_SIZE)]=vmRegs[si];break;

        const ari60=genome.approachRateInfluence||0;
        if(ari60>0.001){
          const dxr60=px[i]-px[j], dyr60=py[i]-py[j];
          const dist60=Math.sqrt(dxr60*dxr60+dyr60*dyr60);
          if(dist60>0.5){
            const dvx60=vx[i]-vx[j], dvy60=vy[i]-vy[j];
            const radial60=(dxr60*dvx60+dyr60*dvy60)/dist60;
            vmRegs[di]=Math.max(-3,Math.min(3,radial60/4))*ari60*k;
          }
        }
      }break;
      case 45:{
        // Pe61 Layer 50: ORBIT_RATE — tangential velocity between self and partner.
        // Measures the angular rate of change of inter-particle orientation (d(angle)/dt × dist):
        //
        //   dx = px[i] - px[j],  dy = py[i] - py[j]
        //   dist = sqrt(dx² + dy²)
        //   tangential = (dx*(vy[i]-vy[j]) - dy*(vx[i]-vx[j])) / dist
        //
        //   tangential > 0 : CCW orbit (i sweeping counter-clockwise around j)
        //   tangential ≈ 0 : purely radial motion (approach, recession, parallel)
        //   tangential < 0 : CW orbit  (i sweeping clockwise around j)
        //
        // This is the 2D cross product of displacement and relative velocity, normalized
        // by distance. Together with opcode 44 (radial/approach rate), it forms the complete
        // polar decomposition of 2D relative velocity:
        //   |Δv|² = radial² + tangential²   (Pythagorean identity, no information lost)
        //
        // Normalization: divide by 4, clamp to [-3, +3] (mirrors opcode 44).
        // Guard: returns 0 when dist < 0.5 (numerically unstable, nearly coincident).
        //
        // orbitRateInfluence=0 → returns 0 → Pe60 exactly.
        const ori61=genome.orbitRateInfluence||0;
        if(ori61>0.001){
          const dxo61=px[i]-px[j], dyo61=py[i]-py[j];
          const disto61=Math.sqrt(dxo61*dxo61+dyo61*dyo61);
          if(disto61>0.5){
            const dvx61=vx[i]-vx[j], dvy61=vy[i]-vy[j];
            const tangential61=(dxo61*dvy61-dyo61*dvx61)/disto61;
            vmRegs[di]=Math.max(-3,Math.min(3,tangential61/4))*ori61*k;
          }
        }
      }break;
      case 46:{
        // Pe62 Layer 51: SELF_FREQ — particle reads its own intrinsic oscillation frequency.
        // freq[i] is the per-tick phase increment: the particle's structural oscillation rate.
        //
        // This is distinct from phaseAlign (R1): phaseAlign is a CURRENT STATE measure —
        // "are we in phase right now?" SELF_FREQ is a STRUCTURAL measure — "how fast am I
        // cycling?" Together with Pe63's PARTNER_FREQ (opcode 47), a VM can compute the
        // beat frequency |freq[i]-freq[j]| and distinguish resonant pairs from beating pairs.
        //
        // Normalization: freq[i]=0.02 → 1.0 (baseline), freq[i]=0.04 → 2.0, cap at 3.0.
        // Guard: none needed — freq[i] is always finite and positive.
        //
        // selfFreqInfluence=0 → returns 0 → Pe61 exactly.
        const sfi62=genome.selfFreqInfluence||0;
        if(sfi62>0.001){
          vmRegs[di]=Math.min(3,freq[i]/0.02)*sfi62*k;
        }
      }break;
      case 47:{
        // Pe63 Layer 52: PARTNER_FREQ — interaction partner's intrinsic oscillation frequency.
        // freq[j] is the partner's per-tick phase increment: its structural oscillation rate.
        //
        // Complement to opcode 46 (SELF_FREQ): together they expose the beat frequency.
        //   op46 output − op47 output = (freq[i] - freq[j]) / 0.02 (normalized differential)
        //   differential ≈ 0   → resonant pair: phase alignment will persist
        //   differential large  → beating pair: phase alignment is transient
        //
        // This is the structural prediction channel — orthogonal to phaseAlign (R1),
        // which reports current phase state, not future alignment tendency.
        //
        // Normalization: freq[j]=0.02 → 1.0 (baseline), cap at 3.0. Mirrors opcode 46.
        // Guard: none needed — freq[j] is always finite and positive.
        //
        // partnerFreqInfluence=0 → returns 0 → Pe62 exactly.
        const pfi63=genome.partnerFreqInfluence||0;
        if(pfi63>0.001){
          vmRegs[di]=Math.min(3,freq[j]/0.02)*pfi63*k;
        }
      }break;
      case 48:{
        // Pe64 Layer 53: PARTNER_MEM_READ — reads partner j's memory slot during interaction.
        // The slot index is si%MEM_SIZE — same indexing as opcode 6 (MEM_READ for own memory).
        //
        // Closes the write/read asymmetry: opcode 18 (PARTNER_MEM_WRITE) lets i write to j's
        // memory; opcode 48 lets i read what j (or other interaction partners) has written there.
        //
        // Together with opcode 18, the memory triad is complete:
        //   opcode 6:  read own memory slot
        //   opcode 7:  write own memory slot
        //   opcode 18: write partner's memory slot  (Pe36)
        //   opcode 48: read partner's memory slot   (Pe64)
        //
        // partnerMemReadInfluence=0 → returns 0 → Pe63 exactly.
        const pmri64=genome.partnerMemReadInfluence||0;
        if(pmri64>0.001){
          vmRegs[di]=pMem[j*MEM_SIZE+(si%MEM_SIZE)]*pmri64*(k||1);
        }
      }break;
      case 49:{
        // Pe65 Layer 54: PARTNER_TEND_READ — reads a specific dimension of partner j's tendency vector.
        // The dimension index is si%DIMS — mirroring how opcode 48 uses si%MEM_SIZE for memory slots.
        //
        // tend[j][d] is the raw component of the partner's identity/phenotype vector at dimension d.
        // This complements the existing sim register (R0), which is the cosine similarity —
        // a collapsed scalar. PARTNER_TEND_READ exposes the COMPONENTS that produce that scalar:
        //
        //   si%DIMS = 0: tend[j][0] — primary morphogen-like axis
        //   si%DIMS = 1: tend[j][1] — charge-like axis
        //   si%DIMS = 2: tend[j][2] — valence-like axis
        //   si%DIMS = 3: tend[j][3] — magnetism-like axis
        //   si%DIMS = 4: tend[j][4] — blank (system-discovered role)
        //
        // vmRegs[di] = tend[j*DIMS + (si%DIMS)] * partnerTendInfluence * k
        // Clamped at ±8 by the standard register clamp downstream.
        //
        // Pe66 adds SELF_TEND_READ (opcode 50) for full self+partner parity.
        //
        // partnerTendInfluence=0 → returns 0 → Pe64 exactly.
        const ptri65=genome.partnerTendInfluence||0;
        if(ptri65>0.001){
          vmRegs[di]=tend[j*DIMS+(si%DIMS)]*ptri65*(k||1);
        }
      }break;
      case 50:{
        // Pe66 Layer 55: SELF_TEND_READ — reads a specific dimension of this particle's own tendency vector.
        // Completes the identity-sensing picture opened by Pe65's PARTNER_TEND_READ (opcode 49).
        //
        // tend[i][d] is the raw component of the particle's own identity/phenotype vector at dimension d.
        // The `si` field selects the dimension (si%DIMS) — mirroring opcode 49:
        //
        //   si%DIMS = 0: tend[i][0] — primary morphogen-like axis
        //   si%DIMS = 1: tend[i][1] — charge-like axis
        //   si%DIMS = 2: tend[i][2] — valence-like axis
        //   si%DIMS = 3: tend[i][3] — magnetism-like axis
        //   si%DIMS = 4: tend[i][4] — blank (system-discovered role)
        //
        // vmRegs[di] = tend[i*DIMS + (si%DIMS)] * selfTendInfluence * k
        //
        // WHAT THIS CLOSES:
        //   Before Pe66, a particle's own identity (tend[i]) shaped ALL its interactions
        //   but could NEVER be directly read by its own VM. A particle knew its partner's
        //   overall similarity (R0), could read its partner's components (op49), but had no
        //   direct path to its own components. It could only infer its own identity indirectly,
        //   through differential responses from partners.
        //
        //   Pe66 closes this: op50 gives the VM direct self-read access to identity.
        //   A particle now knows what it IS, not just how similar it is to others.
        //
        // COMPOUND OPERATIONS NOW POSSIBLE:
        //   op50(d) − op49(d) : own component minus partner's — same specialization?
        //   op50(d) × op49(d) : component product — reinforcement or cancellation?
        //   op50(d) > threshold : introspective gate — activate when own dim-d is strong
        //
        // selfTendInfluence=0 → returns 0 → Pe65 exactly.
        const stri66=genome.selfTendInfluence||0;
        if(stri66>0.001){
          vmRegs[di]=tend[i*DIMS+(si%DIMS)]*stri66*(k||1);
        }
      }break;
      case 51:{
        // Pe67 Layer 56: SELF_PHASE — reads cosine of own oscillation phase into a register.
        //
        // phase[i] is updated every tick (phase[i] += freq[i]) and has always been tracked.
        // It has never been directly readable by the VM — a particle knew how fast it cycles
        // (SELF_FREQ, op46) and whether it's aligned with its partner (R1), but not WHERE
        // in its own cycle it currently sits. Pe67 closes this gap.
        //
        //   vmRegs[di] = Math.cos(phase[i]) * selfPhaseInfluence * k
        //
        // Signal interpretation:
        //   cos(phase[i]) ≈ +1.0 : oscillation peak — maximum energy/output moment
        //   cos(phase[i]) ≈  0.0 : zero crossing — rising or falling through midpoint
        //   cos(phase[i]) ≈ -1.0 : oscillation trough — minimum energy/output moment
        //
        // WHY COSINE:
        //   Cosine maps the circular phase to [-1,+1] without wrapping discontinuity.
        //   It is the standard representation of oscillation state in the same register range
        //   as all other sensing opcodes — allowing arithmetic combinations without rescaling.
        //
        // THE CARRIER WAVE EFFECT:
        //   The VM can evolve to condition ANY action (force, spawn, signal, memory write)
        //   on whether cos(phase[i]) exceeds a threshold — embedding a periodic carrier into
        //   the particle's behavior. This is not possible without op51.
        //
        //   Example behavioral circuit:
        //     [3, 51_src, tmp, 0.7]  — threshold: "is phase near peak?"
        //     [2, tmp, force_src, 1] — gate: apply force only near peak
        //   Entirely evolvable from mutation. Designer cannot predict which behaviors emerge.
        //
        // RELATIONSHIP WITH EXISTING OSCILLATION SIGNALS:
        //   R1 = cos(phase[i]-phase[j]) — PHASE DIFFERENCE (relationship to partner)
        //   op46 = freq[i]/0.02         — SELF_FREQ (rate of own phase advance)
        //   op47 = freq[j]/0.02         — PARTNER_FREQ (rate of partner's advance)
        //   op51 = cos(phase[i])        — SELF_PHASE (absolute own phase position) ← Pe67
        //   op52 = cos(phase[j])        — PARTNER_PHASE (absolute partner phase) ← Pe68
        //
        // selfPhaseInfluence=0 → returns 0 → Pe66 exactly.
        const sphi67=genome.selfPhaseInfluence||0;
        if(sphi67>0.001){
          vmRegs[di]=Math.cos(phase[i])*sphi67*(k||1);
        }
      }break;
      case 52:{
        // Pe68 Layer 57: PARTNER_PHASE — reads cosine of partner j's oscillation phase.
        //
        // Completes the phase-sensing tetrad opened by Pe67's SELF_PHASE (opcode 51):
        //   R1    = cos(phase[i]-phase[j]) — PHASE DIFFERENCE   (relationship signal)
        //   op46  = freq[i]/0.02           — SELF_FREQ           (rate of own advance)
        //   op47  = freq[j]/0.02           — PARTNER_FREQ        (rate of partner's advance)
        //   op51  = cos(phase[i])          — SELF_PHASE          (own absolute position, Pe67)
        //   op52  = cos(phase[j])          — PARTNER_PHASE       (partner absolute position, Pe68)
        //
        //   vmRegs[di] = Math.cos(phase[j]) * partnerPhaseInfluence * k
        //
        // WHAT THIS ENABLES BEYOND op51:
        //   With op51 alone, the VM knows "I am at phase X." It can synchronize its OWN
        //   output to its own cycle. With op52 added, the VM knows "my partner is at phase Y."
        //   The gap between op51 and op52 is R1 (already known), but R1 is a collapsed scalar.
        //   Op51 + op52 give the COMPONENTS that produce R1 — enabling conditional asymmetric
        //   strategies that R1 alone cannot express:
        //
        //   PEAK-TO-TROUGH EXPLOITATION:
        //     op51 > 0.7 AND op52 < -0.5 : "I am at peak, partner is at trough."
        //     A VM can emit force or spawn only in this window — acting when strong against
        //     a momentarily weak partner. Not expressible from R1 (which ignores which particle
        //     is at which extreme).
        //
        //   PHASE-LOCKED COOPERATION:
        //     op51 * op52 > 0.7 : "We are phase-aligned AND both near peak or both near trough."
        //     Richer than R1 ≈ 1 (which fires whether both are at peak or both at trough).
        //
        //   HALF-CYCLE COORDINATION:
        //     op52 > 0.5 : "Partner is near peak." Emit signal only when partner can receive
        //     it at full amplitude — a sending strategy conditioned on receiver state.
        //
        // CARRIER WAVE PAIRING (the Pe68 namesake):
        //   Pe67 gave each particle a carrier wave it can read in its OWN cycle.
        //   Pe68 gives each particle the carrier wave of its PARTNER — so the VM can
        //   lock its output to the partner's rhythm, not just its own. Two-carrier
        //   entrainment becomes representable. Whether it evolves depends on whether
        //   it earns fitness — the mechanism is open, the outcome is not designed.
        //
        // partnerPhaseInfluence=0 → returns 0 → Pe67 exactly.
        const pphi68=genome.partnerPhaseInfluence||0;
        if(pphi68>0.001){
          vmRegs[di]=Math.cos(phase[j])*pphi68*(k||1);
        }
      }break;
      case 53:{
        // Pe69 Layer 58: INTERACTION_DIST — reads the normalized Euclidean distance between
        // particle i and particle j at the moment of interaction into a VM register.
        //
        // d is the 4th argument to executeVM(i,j,sim,d) — it's already computed by
        // processGrid before the VM runs. Zero new computation: pure signal exposure.
        //
        //   vmRegs[di] = Math.min(1, d / CELL) * interactionDistInfluence * k
        //
        // Signal interpretation:
        //   0.0  : coincident (degenerate — guarded; executeVM returns early if d<0.5)
        //   0.1  : very close (within 10% of interaction radius — tight contact)
        //   0.5  : mid-range  (halfway through interaction zone)
        //   1.0  : far edge   (barely within radius — marginal encounter)
        //
        // COMPLEMENT TO PROXIMITY (R2):
        //   R2 at VM start = proximity = 1 - d/CELL. But R2 may be overwritten by earlier
        //   instructions in the evolved program. Opcode 53 lets any instruction reload the
        //   exact current distance regardless of R2's current state — mid-program re-readability
        //   is the key property. A VM instruction can use `1 - op53_value` to recover proximity
        //   at any point, or use dist directly in nonlinear gate computations.
        //
        // COMPLETING THE POLAR ENCOUNTER GEOMETRY:
        //   op44 (approach rate): d(dist)/dt — is the gap shrinking or growing?
        //   op45 (orbit rate):    tangential component — are we rotating around each other?
        //   op53 (interaction dist): dist itself — WHERE in the encounter zone are we?
        //   Together: (WHERE, CLOSING-RATE, ROTATION-RATE) — full polar state of the encounter.
        //
        // interactionDistInfluence=0 → returns 0 → Pe68 exactly.
        const idi69=genome.interactionDistInfluence||0;
        if(idi69>0.001){
          vmRegs[di]=Math.min(1,d/CELL)*idi69*(k||1);
        }
      }break;
      case 54:{
        // Pe70 Layer 59: FIELD1_TEMPORAL — time derivative of the primary field at this particle's cell.
        // Reads (field[cell] - field1Prev[cell]) into a VM register, scaled by fieldTemporalInfluence × k.
        //
        // field1Prev is snapped at the start of updateField's diffusion pass (same pattern as
        // field2Prev for opcode 33). Zero new per-particle state — one 1600-float array copy per tick.
        //
        // Signal interpretation:
        //   > 0 : field1 rising here — deposition exceeding decay, territory building
        //   < 0 : field1 falling here — decay exceeding deposition, territory eroding
        //   ≈ 0 : field1 steady — equilibrium or particle is in a field-inert region
        //
        // ORTHOGONAL TO op8 (level) AND op17 (spatial gradient):
        //   A particle at a field1 peak sees zero gradient but may see strong positive temporal
        //   (the peak is still growing) or negative temporal (the peak has crested and decays).
        //   Same spatial position; different ecological situation; now distinguishable.
        //
        // fieldTemporalInfluence=0 → returns 0 → Pe69 exactly.
        const f1ti70=genome.fieldTemporalInfluence||0;
        if(f1ti70>0.001){
          const tfx70=Math.floor(px[i]/(W/FIELD_W)),tfy70=Math.floor(py[i]/(H/FIELD_H));
          const tfi70=Math.max(0,Math.min(FIELD_W*FIELD_H-1,tfy70*FIELD_W+tfx70));
          vmRegs[di]=(field[tfi70]-field1Prev[tfi70])*f1ti70*(k||1);
        }
      }break;
    }
    for(let r=0;r<12;r++)vmRegs[r]=Math.max(-8,Math.min(8,vmRegs[r]));
  }

  const bond=sim*phaseAlign*proximity;
  if(bond>peakBondThisTick)peakBondThisTick=bond;

  const nPi=pPlasmidLen[i];
  if(nPi>0){
    const pBase=i*PLASMID_SLOTS;
    for(let ip=0,_ps=0;ip<nPi&&_ps<nPi*2;ip++,_ps++){
      const op=pPlasmid[pBase+ip*4]|0;
      const src=pPlasmid[pBase+ip*4+1]|0;
      const dst=pPlasmid[pBase+ip*4+2]|0;
      const k=pPlasmid[pBase+ip*4+3];

        case 0:vmRegs[di]=vmRegs[si];break;
        case 1:vmRegs[di]+=vmRegs[si]*k;break;
        case 2:vmRegs[di]*=vmRegs[si]*(k||1);break;
        case 3:vmRegs[di]=vmRegs[si]>k?1:0;break;
        case 4:{const ai=Math.abs(dst)%8;vmActions[ai]+=vmRegs[si]*k;}break;
        case 5:{const fi=Math.abs(src)%8;vmRegs[di]=vmActions[fi];}break;

        case 7:pMem[i*MEM_SIZE+(Math.abs(dst)%MEM_SIZE)]=vmRegs[si];break;
        case 8:{const pfx=Math.floor(px[i]/(W/FIELD_W)),pfy=Math.floor(py[i]/(H/FIELD_H));const pfi=Math.max(0,Math.min(FIELD_W*FIELD_H-1,pfy*FIELD_W+pfx));vmRegs[di]=field[pfi];}break;
        case 9:{const pwx=Math.floor(px[i]/(W/FIELD_W)),pwy=Math.floor(py[i]/(H/FIELD_H));const pwi=Math.max(0,Math.min(FIELD_W*FIELD_H-1,pwy*FIELD_W+pwx));field[pwi]+=vmRegs[si]*k;field[pwi]=Math.max(0,Math.min(2.5,field[pwi]));stampField(pwi,getParticleSig(i),Math.abs(vmRegs[si]*k));}break;
        case 10:{if(clusterID[i]>=0){const cIdx10p=clusterID[i]<MAX_CLUSTERS?clusterByID[clusterID[i]]:-1;if(cIdx10p>=0){const c=clusters[cIdx10p];const cfx2=Math.floor(c.cx/(W/FIELD_W)),cfy2=Math.floor(c.cy/(H/FIELD_H));const cfi2=Math.max(0,Math.min(FIELD_W*FIELD_H-1,cfy2*FIELD_W+cfx2));field[cfi2]+=vmRegs[si]*k;field[cfi2]=Math.max(0,Math.min(2.5,field[cfi2]));stampField(cfi2,c.fieldSignature,Math.abs(vmRegs[si]*k));}}}break;
        case 11:{const pSlot=Math.abs(dst)%2;pBroadcast[i*2+pSlot]=vmRegs[si]*k;}break;
        case 12:{const pSlot2=Math.abs(src)%2;vmRegs[di]=pBroadcast[j*2+pSlot2];}break;
        case 13:{const pInstIdx=Math.abs(Math.floor(vmRegs[si]))%Math.max(1,genome.vmProgram.length);const pSelfInst=genome.vmProgram[pInstIdx];vmRegs[di]=pSelfInst?pSelfInst[Math.abs(Math.floor(k))%4]:0;}break;
        case 14:if(vmRegs[si]>k)ip=Math.abs(Math.floor(vmRegs[di]))%nPi;break;
        case 15:{const pAgeFrac=Math.min(1,page[i]/800);vmRegs[di]=vmRegs[si]*(1-pAgeFrac)+k*pAgeFrac;}break;
        case 16:{
          if(amp[i]>0.4&&page[i]>80&&N+birthQueue.length<CAP-1&&Math.random()<0.03){
            const pnt=new Float32Array(DIMS);
            for(let dd=0;dd<DIMS;dd++)pnt[dd]=tend[i*DIMS+dd]+k*0.1*(vmRegs[(dd+4)%12]-0.5);
            birthQueue.push({x:Math.max(0,Math.min(W,px[i]+vmRegs[si]*15)),y:Math.max(0,Math.min(H,py[i]+vmRegs[di]*15)),t:pnt,parent:i});
            amp[i]*=0.5;
          }
        }break;
        case 17:{
          const gfx=Math.floor(px[i]/(W/FIELD_W)),gfy=Math.floor(py[i]/(H/FIELD_H));
          const gfi=gfy*FIELD_W+gfx;
          const gl=gfx>0?field[gfi-1]:field[gfi];
          const gr=gfx<FIELD_W-1?field[gfi+1]:field[gfi];
          const gu=gfy>0?field[gfi-FIELD_W]:field[gfi];
          const gd=gfy<FIELD_H-1?field[gfi+FIELD_W]:field[gfi];

          vmRegs[di]=(gd-gu)*0.5*k;
        }break;
        case 18:{
          const mS2=Math.abs(Math.floor(vmRegs[si]))%MEM_SIZE;
          const mV2=vmRegs[di]*k;
          pMem[j*MEM_SIZE+mS2]+=mV2;
          pMem[j*MEM_SIZE+mS2]=Math.max(-8,Math.min(8,pMem[j*MEM_SIZE+mS2]));
        }break;
        case 19:{
          vmRegs[di]=globalCommons;
          const wStr=Math.abs(vmRegs[si]*k);
          if(wStr>commonsStrength){globalCommons=vmRegs[si]*k;commonsWriter=i;commonsStrength=wStr;}
        }break;
        case 20:{
          const ix20=Math.floor(px[i]/(W/FIELD_W)),iy20=Math.floor(py[i]/(H/FIELD_H));

          if(wStr20>cellProgStr[ci20]*0.8){

            cellProgB[ci20]=k;

          vmRegs[di]=field2[ri21]*k;
        }break;
        case 22:{
          const uas=genome.userAtoms;
          if(uas&&uas.length>0){

        case 24:{
          // Pe36 Layer 25: SIGNAL_EMIT (plasmid version)

        case 26:{
