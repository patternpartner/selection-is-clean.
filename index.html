<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Selection פ 35 — Relational (use-gated)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#020204;touch-action:none;cursor:crosshair}
canvas{position:fixed;inset:0}
#gen{position:fixed;top:6px;left:8px;color:rgba(80,90,100,0.4);font:9px monospace;pointer-events:none;z-index:1}
#gio{position:fixed;bottom:8px;right:8px;z-index:10;display:flex;gap:6px}
#gio button{background:rgba(30,40,50,0.7);color:#8af;border:1px solid rgba(100,140,180,0.3);font:10px monospace;padding:4px 8px;border-radius:3px;cursor:pointer}
#gio input{display:none}
</style>

<body>
<div id="gen"></div>
<div id="gio"><button id="gexp">💾 save</button><button id="gimp">📂 load</button><input type="file" id="gfile" accept=".json"></div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),X=c.getContext('2d'),genEl=document.getElementById('gen');
genEl.textContent='booting…';
let W,H,mx=-9e3,my=-9e3,smx=0,smy=0,pulling=0,pStr=0,pDur=0,tick=0;

// ═══════════════════════════════════════
// NETWORK LAYER — tabs share across the BroadcastChannel
// Each tab is an instance of the same universe. Particles, plasmids,
// motifs, and inscribed cell programs can flow between them.
// If connection helps, the system will use it. If not, the rates evolve to zero.
// Pe25: messages now use a tiny protocol envelope + immune boundary.
// BroadcastChannel is local-tab only, but this packet shape can later be
// carried over WebRTC/WebSocket without changing the organism interface.
// ═══════════════════════════════════════
const TAB_ID=Math.random().toString(36).slice(2,10);
const NET_PROTOCOL_VERSION=1;
const NETWORK_CHANNEL='selection-pe-network';
const NET_QUEUE_LIMITS={migrant:20,plasmid:10,motif:10,inscription:20};
const NET_DIMS=5,NET_MEM_SIZE=8,NET_MAX_PLASMID=4; // mirrors core constants for early validation
let bc=null;
const incomingMigrants=[];     // particle packets received from other tabs
const incomingPlasmids=[];     // plasmid packages received
const incomingMotifs=[];       // VM motif fragments received
const incomingInscriptions=[]; // cell program packets received
let networkPeers=0;            // how many other tabs we're hearing from
const peerLastSeen={};         // peer id → last tick we heard from them
const netStats={sent:0,received:0,accepted:0,dropped:0,bad:0,lastType:''};
const netEventPending={migrant:0,plasmid:0,motif:0,inscription:0};

function netPacket(type,data){return {v:NET_PROTOCOL_VERSION,tab:TAB_ID,born:tick,type,data}}
function networkSend(type,data){
  if(!bc)return false;
  try{bc.postMessage(netPacket(type,data));netStats.sent++;return true}
  catch(e){netStats.dropped++;return false}
}
function finitePacketNumber(v,min,max){return typeof v==='number'&&isFinite(v)&&v>=min&&v<=max}
function validInstruction(inst){
  return Array.isArray(inst)&&inst.length>=4&&
    finitePacketNumber(inst[0],-64,64)&&finitePacketNumber(inst[1],-64,64)&&
    finitePacketNumber(inst[2],-64,64)&&finitePacketNumber(inst[3],-16,16);
}
function validNetworkPayload(type,data){
  if(type==='hello'||type==='hello-reply')return true;
  if(type==='migrant'){
    return data&&finitePacketNumber(data.nx,-0.25,1.25)&&finitePacketNumber(data.ny,-0.25,1.25)&&
      Array.isArray(data.tend)&&data.tend.length<=NET_DIMS&&data.tend.every(v=>finitePacketNumber(v,-8,8))&&
      (!data.mem||(Array.isArray(data.mem)&&data.mem.length<=NET_MEM_SIZE&&data.mem.every(v=>finitePacketNumber(v,-16,16))))&&
      (!data.plasmid||(Array.isArray(data.plasmid)&&data.plasmid.length<=NET_MAX_PLASMID&&data.plasmid.every(validInstruction)))&&
      finitePacketNumber(data.amp,-2,4)&&finitePacketNumber(data.phase,-64,64);
  }
  if(type==='plasmid')return Array.isArray(data)&&data.length<=NET_MAX_PLASMID&&data.every(validInstruction);
  if(type==='motif')return Array.isArray(data)&&data.length<=8&&data.every(validInstruction);
  if(type==='inscription')return data&&finitePacketNumber(data.op,-64,64)&&finitePacketNumber(data.A,-16,16)&&finitePacketNumber(data.B,-16,16)&&finitePacketNumber(data.str,0,2);
  return false;
}
function queueNetworkPacket(queue,data,limit,type){
  if(queue.length>=limit){netStats.dropped++;return}
  queue.push(data);netStats.accepted++;
  if(type&&netEventPending[type]!==undefined)netEventPending[type]++;
}
function handleNetworkMessage(raw){
  const msg=raw&&typeof raw==='object'?raw:null;
  if(!msg||msg.tab===TAB_ID)return;
  if(msg.v!==undefined&&msg.v!==NET_PROTOCOL_VERSION){netStats.bad++;return}
  peerLastSeen[msg.tab||'unknown']=tick;
  netStats.received++;netStats.lastType=msg.type||'';
  if(!validNetworkPayload(msg.type,msg.data)){netStats.bad++;return}
  if(msg.type==='migrant')queueNetworkPacket(incomingMigrants,msg.data,NET_QUEUE_LIMITS.migrant,'migrant');
  else if(msg.type==='plasmid')queueNetworkPacket(incomingPlasmids,msg.data,NET_QUEUE_LIMITS.plasmid,'plasmid');
  else if(msg.type==='motif')queueNetworkPacket(incomingMotifs,msg.data,NET_QUEUE_LIMITS.motif,'motif');
  else if(msg.type==='inscription')queueNetworkPacket(incomingInscriptions,msg.data,NET_QUEUE_LIMITS.inscription,'inscription');
  else if(msg.type==='hello')networkSend('hello-reply');
}
try{
  bc=new BroadcastChannel(NETWORK_CHANNEL);
  bc.onmessage=function(ev){handleNetworkMessage(ev.data)};
  networkSend('hello');
}catch(e){console.log('BroadcastChannel unavailable:',e.message);}

function countPeers(){
  let n=0;
  for(const id in peerLastSeen){if(tick-peerLastSeen[id]<3000)n++}
  networkPeers=n;
  return n;
}

// ═══ BROADCAST — send pieces of our population to other tabs ═══
function networkBroadcast(){
  if(!bc||N===0)return;
  // Migrant: send a random alive particle as a full packet
  if(Math.random()<genome.netMigrantRate){
    let idx=-1;
    for(let tries=0;tries<10;tries++){
      const pick=(Math.random()*N)|0;
      if(palive[pick]&&amp[pick]>0.2){idx=pick;break;}
    }
    if(idx>=0){
      const t=new Array(DIMS);
      for(let dd=0;dd<DIMS;dd++)t[dd]=tend[idx*DIMS+dd];
      const m=new Array(MEM_SIZE);
      for(let mm=0;mm<MEM_SIZE;mm++)m[mm]=pMem[idx*MEM_SIZE+mm];
      const plas=[];
      const pLen=pPlasmidLen[idx];
      for(let pi=0;pi<pLen;pi++){
        const pB=idx*PLASMID_SLOTS+pi*4;
        plas.push([pPlasmid[pB],pPlasmid[pB+1],pPlasmid[pB+2],pPlasmid[pB+3]]);
      }
      networkSend('migrant',{nx:px[idx]/W,ny:py[idx]/H,tend:t,mem:m,plasmid:plas,amp:amp[idx],phase:phase[idx]});
    }
  }
  // Plasmid package: pick a random particle's plasmid and broadcast
  if(Math.random()<genome.netPlasmidRate){
    let idx=-1;
    for(let tries=0;tries<10;tries++){
      const pick=(Math.random()*N)|0;
      if(palive[pick]&&pPlasmidLen[pick]>0){idx=pick;break;}
    }
    if(idx>=0){
      const plas=[];
      const pLen=pPlasmidLen[idx];
      for(let pi=0;pi<pLen;pi++){
        const pB=idx*PLASMID_SLOTS+pi*4;
        plas.push([pPlasmid[pB],pPlasmid[pB+1],pPlasmid[pB+2],pPlasmid[pB+3]]);
      }
      networkSend('plasmid',plas);
    }
  }
  // VM motif: send a 3-instruction slice from the current program
  if(Math.random()<genome.netMotifRate&&genome.vmProgram&&genome.vmProgram.length>=3){
    const start=Math.floor(Math.random()*(genome.vmProgram.length-2));
    const motif=[];
    for(let i=0;i<3;i++){
      const inst=genome.vmProgram[start+i];
      motif.push([inst[0],inst[1],inst[2],inst[3]]);
    }
    networkSend('motif',motif);
  }
  // Inscribed cell: pick a strong inscription and broadcast
  if(Math.random()<genome.netInscribeRate){
    let bestIdx=-1,bestStr=0.3;
    for(let tries=0;tries<20;tries++){
      const idx=Math.floor(Math.random()*FIELD_W*FIELD_H);
      if(cellProgStr[idx]>bestStr){bestStr=cellProgStr[idx];bestIdx=idx;}
    }
    if(bestIdx>=0)networkSend('inscription',{op:cellProgOp[bestIdx],A:cellProgA[bestIdx],B:cellProgB[bestIdx],str:bestStr});
  }
}

// ═══ RECEIVE — integrate incoming packets into our population ═══
function networkReceive(){
  const rec=genome.netReceptivity||0;
  if(rec<=0){
    // still drain the queues so they don't fill up
    incomingMigrants.length=0;
    incomingPlasmids.length=0;
    incomingMotifs.length=0;
    incomingInscriptions.length=0;
    return;
  }
  // Migrants — spawn new particles at the received position with received state
  while(incomingMigrants.length>0){
    const m=incomingMigrants.shift();
    if(Math.random()>rec)continue;
    if(N>=CAP)break;
    const nx=m.nx*W,ny=m.ny*H;
    const t=new Float32Array(DIMS);
    for(let dd=0;dd<DIMS;dd++)t[dd]=m.tend[dd]||0;
    const newIdx=addParticle(nx,ny,t,false);
    if(newIdx>=0){
      amp[newIdx]=m.amp||0.5;
      phase[newIdx]=m.phase||0;
      for(let mm=0;mm<MEM_SIZE&&mm<(m.mem?m.mem.length:0);mm++){
        pMem[newIdx*MEM_SIZE+mm]=m.mem[mm];
      }
      if(m.plasmid&&m.plasmid.length>0){
        const pLen=Math.min(MAX_PLASMID,m.plasmid.length);
        pPlasmidLen[newIdx]=pLen;
        for(let pi=0;pi<pLen;pi++){
          const pB=newIdx*PLASMID_SLOTS+pi*4;
          pPlasmid[pB]=m.plasmid[pi][0];
          pPlasmid[pB+1]=m.plasmid[pi][1];
          pPlasmid[pB+2]=m.plasmid[pi][2];
          pPlasmid[pB+3]=m.plasmid[pi][3];
        }
      }
    }
  }
  // Plasmid packages — inject into a random recipient particle
  while(incomingPlasmids.length>0){
    const pl=incomingPlasmids.shift();
    if(Math.random()>rec)continue;
    if(N===0)continue;
    const target=Math.floor(Math.random()*N);
    if(!palive[target])continue;
    const pLen=Math.min(MAX_PLASMID,pl.length);
    pPlasmidLen[target]=pLen;
    for(let pi=0;pi<pLen;pi++){
      const pB=target*PLASMID_SLOTS+pi*4;
      pPlasmid[pB]=pl[pi][0];
      pPlasmid[pB+1]=pl[pi][1];
      pPlasmid[pB+2]=pl[pi][2];
      pPlasmid[pB+3]=pl[pi][3];
    }
  }
  // Motifs — accumulate into a buffer that the mutation system reads
  while(incomingMotifs.length>0){
    const mot=incomingMotifs.shift();
    if(Math.random()>rec)continue;
    if(!genome.vmProgram)continue;
    // Inject motif at a random position in the global VM
    const insertAt=Math.floor(Math.random()*genome.vmProgram.length);
    for(let i=0;i<mot.length&&insertAt+i<genome.vmProgram.length;i++){
      if(Math.random()<0.3){ // soft overwrite — not every motif instruction lands
        genome.vmProgram[insertAt+i]=[mot[i][0],mot[i][1],mot[i][2],mot[i][3]];
      }
    }
  }
  // Inscriptions — write the received cell program into a random empty cell
  while(incomingInscriptions.length>0){
    const ins=incomingInscriptions.shift();
    if(Math.random()>rec)continue;
    const idx=Math.floor(Math.random()*FIELD_W*FIELD_H);
    if(cellProgStr[idx]<0.2){ // only inscribe where nothing is already strong
      cellProgOp[idx]=ins.op;
      cellProgA[idx]=ins.A;
      cellProgB[idx]=ins.B;
      cellProgStr[idx]=Math.min(1,(ins.str||0.5)*0.5);
    }
  }
}

// === SPATIAL GRID ===
const CELL=55;
let gW,gH,grid;
function initGrid(){gW=Math.ceil(W/CELL)+2;gH=Math.ceil(H/CELL)+2;grid=new Int32Array(gW*gH)}
function clearGrid(){grid.fill(-1)}
function gKey(x,y){return Math.max(0,Math.min(gH-1,(y/CELL)|0))*gW+Math.max(0,Math.min(gW-1,(x/CELL)|0))}

// ═══════════════════════════════════════
// ADAPTIVE GENOME — the system's DNA
// These values evolve. No human chooses the finals.
// ═══════════════════════════════════════
const DIMS=5; // dim 4 is blank — no hardcoded role. System decides what it means.
const MEM_SIZE=8; // per-particle persistent memory. Particles become stateful agents.
const MAX_PLASMID=4; // max instructions per particle's personal mobile DNA
const PLASMID_SLOTS=MAX_PLASMID*4; // each instruction is [op,src,dst,k] = 4 values
const OPCODE_COUNT=24; // VM opcodes 0..23, including USER_ATOM at 22, NEIGHBOR_PREDICT at 23 (Pe31)
const FIELD_W=40;
const FIELD_H=40;
let FIELD_DECAY=0.982;   // natural fade — Pe22b: now genome-driven, can evolve
let FIELD_DIFFUSE=0.11;  // gentle spread — Pe22b: now genome-driven, can evolve

// ═══════════════════════════════════════
// Pe22f: USER ATOMS — the system writes its own primitives
// Expression strings stored in the genome, compiled on demand via Function().
// Mutation replaces the expression; compilation re-runs on next use.
// The grammar is loose (two terms, optional func wrapper, one binary op),
// so random mutations almost always produce valid JS. What the expression
// MEANS is the system's discovery — whether tanh(a)*b is useful depends
// on selection. Invalid compilations are caught and the atom returns 0.
// This is the system's access to primitives that weren't in the opcode set
// at design time. JS can generate JS; the genome now uses that fact.
// ═══════════════════════════════════════
const USER_VARS=["a","b","u"]; // Pe24: u = self-read of own use count (Layer 13)
const USER_FUNCS=["Math.abs","Math.tanh","Math.sin","Math.cos","Math.sign","Math.sqrt","Math.log1p","Math.exp"];
const USER_OPS=["+","-","*"];
function uaGenTerm(){
  const useFunc=Math.random()<0.35;
  const val=Math.random()<0.5
    ? USER_VARS[(Math.random()*USER_VARS.length)|0]
    : (Math.random()*4-2).toFixed(2);
  if(useFunc){
    const fn=USER_FUNCS[(Math.random()*USER_FUNCS.length)|0];
    // Wrap log1p input in abs to avoid negative domain errors
    const safeVal=(fn==="Math.log1p"||fn==="Math.sqrt")?"Math.abs("+val+")":val;
    return fn+"("+safeVal+")";
  }
  return val;
}
function uaGenExpression(){
  const t1=uaGenTerm();
  const t2=uaGenTerm();
  const op=USER_OPS[(Math.random()*USER_OPS.length)|0];
  return "("+t1+")"+op+"("+t2+")";
}
function uaCompile(atom){
  if(atom.compiled||atom.failed)return;
  try{
    // Pe24: compiled function takes (a,b,u) — u is normalized self-usage count.
    // Old atoms with expressions only referencing a,b still compile fine; u is unused param.
    atom.compiled=new Function("a","b","u","const r=("+atom.expression+");return isFinite(r)?r:0;");
    atom.failed=false;
  }catch(e){
    atom.compiled=null;
    atom.failed=true;
  }
}
function uaCall(atom,a,b){
  if(!atom)return 0;
  if(!atom.compiled&&!atom.failed)uaCompile(atom);
  if(atom.failed||!atom.compiled)return 0;
  try{
    // Pe24 Layer 13: self-read. Atom can sense its own historical use count.
    // Normalized so range stays in VM register territory. Capped so explosive use
    // doesn't dominate downstream arithmetic.
    const prevUses=atom.uses|0;
    const u=Math.min(4,prevUses/100);
    const r=atom.compiled(a,b,u);
    atom.uses=prevUses+1;
    if(prevUses===0)recordEvent('ua_first_use',{expr:(atom.expression||'').slice(0,48)},1200);
    return isFinite(r)?Math.max(-8,Math.min(8,r)):0;
  }catch(e){
    atom.failed=true;
    return 0;
  }
}
const MAX_CLUSTER_VM=8;    // per-cluster program length — shorter than global, differentiation not replacement
const CLUSTER_VM_COST_SHARE=0.4; // fraction of metabolic cost vs global VM (lighter programs)
const CAP=1800; // HARD CEILING for array allocation only — not an ecological limit
// The real carrying capacity emerges from density-dependent metabolic cost.
// More particles = higher per-particle cost = amplitude drains faster = natural deaths increase.
// The system discovers its own equilibrium population.
let genome={
  // ═══ LAYER 1: PHYSICS ═══
  // The rules of the universe. Previously hardcoded constants.
  entropyBaseline:0.0008,
  entropyK:0.0004,
  entrainRate:0.015,
  entrainThresh:0.3,
  creationCost:0.35,
  creationThresh:0.25,    // was hardcoded: interference>0.25
  destructThresh:-0.2,    // was hardcoded: interference<-0.2
  tendencyBleed:0.0004,   // was hardcoded in grid interactions
  magneticThresh:0.3,     // was hardcoded: mg>0.3
  velocityDamping:0.998,  // was hardcoded
  deathThreshold:0.04,    // was DEATH_THRESHOLD constant

  // ═══ LAYER 2: PERCEPTION ═══
  // How the system sees itself. Previously hardcoded detection params.
  clusterBondThresh:0.15, // was hardcoded in flood-fill
  clusterMinSize:3,       // was hardcoded: members.length>=genome.clusterMinSize
  ghostDecay:0.997,       // was GHOST_DECAY constant
  ghostAmpDrip:0.0004,    // was GHOST_AMP_DRIP constant

  // ═══ LAYER 3: EVALUATION ═══
  // What the system values. Mutable objective weights.
  objWeights:[0.25,0.25,0.25,0.25],

  // ═══ LAYER 3b: EVOLVABLE FITNESS SENSORS ═══
  // The system discovers NEW things to value beyond the 4 designer axes.
  // Each sensor is a short program that reads system state registers and outputs a scalar.
  // Sensor outputs become additional fitness dimensions with their own evolved weights.
  // Registers: S0=stability, S1=avgCoherence, S2=diversity, S3=clusterCount,
  //            S4=avgAmp, S5=fieldEnergy, S6=persistentRatio, S7=deathRate
  // Instructions: [op, src, dst, k] — same opcodes as VM (0-4 only, no side effects)
  fitnessSensors:[
    // Seed: one sensor that computes field_energy * persistent_ratio (designer didn't hardcode this)
    // Pe24: realWeight=0 means this sensor doesn't yet contribute to real fitness; mutation can raise it.
    {program:[[2,5,6,1.0],[4,6,0,1.0]], weight:0.1, realWeight:0, creditTrace:0, lastEmit:0, prevEmit:0}
  ],
  maxSensors:4,        // Pe22e: retained for save-file compatibility; no longer enforced
  sensorMaxInst:4,     // Pe22e: retained for save-file compatibility; no longer enforced

  // ═══ LAYER 15: LOCAL CREDIT ASSIGNMENT (Pe25) ═══
  // Pure evolution gives realWeight and objWeights only one selection signal:
  // lineage-level adjudication at mutation cadence. That's slow and lossy — a
  // sensor that genuinely tracks fitness might never accumulate enough realWeight
  // to prove its value before drift erases it. This layer adds a faster
  // within-lineage signal: each tick, correlate each weight's component value-delta
  // with the fitness delta, and nudge the weight toward accumulated correlation.
  // The nudge is kept smaller than typical mutation movement so lineage selection
  // still adjudicates the long-haul question (truly predictive vs. spuriously
  // correlated). Three timescales now act on the same parameter family: shadow-
  // scenario selection (per-scenario), credit assignment (per-tick), lineage
  // selection (per-mutation/death). creditLearnRate=0 disables and recovers
  // Pe24 behavior exactly.
  creditLearnRate:1.0,        // mutable global multiplier on credit signal
  objCreditTrace:[0,0,0,0],   // EMA of (axisDelta * fitnessDelta) per designer axis
  prevObjValues:[0,0,0,0],    // stability, diversity, coherence, churn from prev tick
  prevSmoothedFitness:0,      // for fitnessDelta computation

  // ═══ LAYER 16: GRADIENT — credit-guided mutation + cluster upward signal (Pe26) ═══
  // Pe25 gave the system three timescales of adaptation but all three still operate on
  // random perturbations. The credit traces accumulate knowledge about which axes matter
  // but that knowledge doesn't direct exploration — it only nudges weights after random
  // mutations happen to land. Pe26 closes this loop in two directions:
  //
  // 16a: GRADIENT-GUIDED PERTURBATION. When collapseRisk is elevated, mutation reads
  //   objCreditTrace and blends random walk with a step toward the last shadow-winning
  //   direction. gradientBias=0 recovers Pe25 exactly. Shadow sim still vets every candidate.
  //
  // 16b: PREDICTIVE SENSORS (in applyCreditAssignment). Credit now rewards sensors that
  //   LEAD fitness change (prevEmit predicts df) not just co-move with it. The system
  //   develops forward indicators, not just present-state mirrors.
  //
  // 16c: CLUSTER UPWARD SIGNAL. Successful persistent clusters sample their vmProgram
  //   and clusterGenome upward into a buffer. On each mutation cycle, with probability
  //   gradientUpstreamBias, a cluster motif is soft-injected into the global vm program.
  //   The cluster becomes a teacher, not just an experiment. Gradient now flows both ways:
  //   credit traces push mutation search downward from fitness signal; cluster successes
  //   push discovery upward from local optima. gradientUpstreamBias=0 → Pe25 behavior.
  gradientBias:0.3,           // 0=pure random walk, 1=fully gradient-guided. Evolvable.
  gradientUpstreamBias:0.2,   // how strongly successful clusters bias global vm. Evolvable.
  // ─── Pe33: BEHAVIORAL GRADIENT BIAS ───
  // Pe32 used gradientBias for both physics and behavioral gradient, forcing them to
  // track together. Pe33 separates them. The genome can now evolve "trust behavioral
  // gradient, ignore physics gradient" or vice versa, or neither, or both.
  // At 0: behavioral gradient is disabled — Pe32 behavior exactly (physics gradient only).
  // At 1: behavioral gradient maximally biases instruction insertion and mutation.
  // Default 0.2: available but not dominant. Shadow sim and lineage selection decide.
  behaviorGradientBias:0.2,   // 0=Pe32 behavior, 1=full behavioral gradient. Evolvable.

  // ═══ LAYER 17: IMAGINATION — evolvable shadow scenarios (Pe27) ═══
  // Pe26 stored the *direction* of the last winning shadow scenario and biased mutation
  // toward it (16a). But the scenarios themselves — the perturbation vectors the shadow
  // sim probes — were a hardcoded array of five. Every lineage imagined the same five
  // counterfactual futures regardless of its actual problem.
  //
  // Pe27 lifts the bank into the genome. Each scenario is a vector of axis amplitudes
  // [-2..+2] over the five tunable physics params (entropyBaseline, entropyK, entrainRate,
  // creationCost, entrainThresh). The shadow sim iterates the bank; the winner increments
  // its `wins` counter. Every mutation cycle:
  //   - Scenarios age. Old scenarios with no wins are evicted.
  //   - New scenarios spawn from two sources: child-of-winner (mutated clone of a high-wins
  //     scenario) and pure random (sparse vectors that probe untested directions).
  //   - One slot per bank is reserved against eviction so the random branch can't be
  //     entirely starved out by winning children — insurance against premature convergence.
  //
  // The five Pe26 hardcoded scenarios are now the SEED bank. With no scenarios ever
  // evicted and no new ones spawned, behavior is identical to Pe26. Evolution decides
  // whether refining the imagination beats the static set.
  //
  // This is per-lineage imagination: two lineages with the same physics can be exploring
  // different hypothesis spaces, not just different parameter values. The system evolves
  // not only its parameters but its theory of which parameters are worth varying.
  shadowScenarioBank:null,    // populated by seedShadowBank() in init/sanitize
  shadowBankChurn:0.5,        // probability per mutation cycle of evict+spawn pass. Evolvable.
  // Pe30b: explore/exploit split for bank refill. Was a hardcoded 0.5 in Pe30 — freed
  // here because leaving it frozen contradicted the codebase's whole premise. Bounded
  // [0.1,0.9] in evolveShadowBank (not [0,1]) because both extremes structurally kill
  // architecture layers — see the long note at the refill loop. Default 0.5 = Pe30.
  shadowExploreRate:0.5,      // P(refill slot is fresh random vs credit-weighted child). Evolvable.

  // ═══ LAYER 21: MUTUAL RECOGNITION — particles model each other (Pe31) ═══
  // Pe30b gave particles the ability to optimize everything about themselves.
  // Pe31 adds one more degree of freedom: particles can now model *each other*.
  //
  // THREE PARAMETERS. All evolvable. All can evolve to zero (recovering Pe30b behavior).
  //
  // neighborModelUpdateRate: P(update a partner model on each interaction).
  //   At 0: particles never build partner models — Pe30b exactly.
  //   At 1: every interaction updates the partner model.
  //   Default 0.3: build models selectively.
  //
  // neighborPredictionInfluence: how strongly the VM reads predictions (register scaling).
  //   At 0: opcode 23 returns 0 — prediction channel is deaf.
  //   At 0.5: predictions substantially shape VM computation.
  //   Default 0.15: available but not dominant.
  //
  // mutualRecognitionThresh: minimum freshness [0..1] to trust a prediction.
  //   Below threshold: prediction returns 0 (model too stale to trust).
  //   Default 0.5: recent models trusted, old ones discarded.
  //
  // Opcode 23 (NEIGHBOR_PREDICT): vmRegs[di] = predicted partner response.
  //   The VM explicitly requests neighbor predictions — not auto-injected.
  //   This means existing programs (Pe30b genomes) are unaffected; new programs
  //   can evolve to exploit the prediction channel if it proves useful.
  neighborModelUpdateRate:0.3,      // P(model update per interaction). 0=Pe30b.
  neighborPredictionInfluence:0.15, // prediction signal scale into VM. 0=Pe30b.
  mutualRecognitionThresh:0.5,      // min freshness to trust prediction. Evolvable.

  // ═══ LAYER 24: RELATIONAL FITNESS — neighbor models earn their keep (Pe34) ═══
  // Pe31 gave particles the mechanism to model each other (pNeighborModels) and a
  // dedicated opcode (23, NEIGHBOR_PREDICT) to read those models. But the comment in
  // Pe33's opcode-23 handler is explicit: "Existing Pe30b programs never emit opcode 23
  // — the channel is silent until evolved." There's a structural gap. Random mutation
  // hits opcode 23 occasionally; when it does, the resulting prediction has no path to
  // fitness, so selection prunes the mutation and moves on. Pe31's machinery is present
  // in the genome but unreached by selection pressure — same dead-branch pattern as the
  // user atoms in the gen890 save (7 atoms, all uses=0).
  //
  // Pe34 closes the path. Each time particle i re-encounters partner j (i.e., a model
  // of j already exists in i's slots), we compute the L1 drift between i's stored model
  // and the freshly observed values. Low drift means i's model accurately reflects this
  // partner's current state. We accumulate this population-wide each tick and convert
  // to a prediction-quality score in [0,1]. That score becomes a fifth real-fitness
  // component, alongside stability/diversity/coherence/churn.
  //
  // The selection chain that opens: genomes whose VMs evolve to actually emit opcode 23
  // and maintain useful models get a credit pathway → applyCreditAssignment notices
  // prediction-quality movement correlating with fitness movement → the Pe33 behavioral
  // gradient can then propagate the signal through scenario credit and EMIT generation.
  //
  // relationalWeight=0 recovers Pe33 behavior exactly. Default 0.15: available but not
  // dominant. Shadow sim and lineage selection adjudicate. A lineage that finds neighbor
  // models genuinely don't help can mutate this to zero. A lineage that finds them
  // crucial can mutate it up to 1.0.
  relationalWeight:0.15,            // 0=Pe33 behavior, 1=neighbor models fully real-fitness. Evolvable.

  // ═══ LAYER 24b: USE-GATED RELATIONAL FITNESS (Pe35) ═══
  // Pe34's honest flaw: pNeighborModels are maintained PASSIVELY by updateNeighborModel
  // every interaction, regardless of whether any VM ever emits opcode 23 to read them.
  // So predictionQuality rewards model ACCURACY, not model USE. The dead branch Pe34
  // set out to revive (opcode 23) can stay dead while relationalWeight climbs purely on
  // passively-accurate models — and the cheapest source of passive accuracy is a
  // homogeneous population (every partner looks alike → trivially low drift). Left
  // unaddressed, relational fitness becomes a backdoor reward for monoculture, working
  // directly against the diversity axis.
  //
  // Pe35 relocates the measurement so it follows the VM's own choices. Each tick, when
  // a particle's VM emits opcode 23 against partner j (predInf active), we stamp
  // (self→j, this tick). updateNeighborModel then weights each re-encounter's error
  // contribution by whether the consulting VM actually reached for that partner:
  //   w = queried ? 1 : (1 - relationalUseBias)
  //   predictionErrorAccum += err * w ;  predictionUpdateCount += w
  //
  // The loop structure (j>i guard; executeVM always called lower-index-as-self) means
  // the reverse-direction updateNeighborModel(j,i) is structurally passive — j's VM
  // provably never consulted i in that loop. That leg is the purest form of the passive
  // leak; under the blend it fades toward zero as the genome sharpens. The forward leg
  // updateNeighborModel(i,j) runs five lines after executeVM(i,j) in the SAME iteration
  // (executeClusterVM between them emits no opcode 23), so the stamp is maximally local
  // and temporally exact.
  //
  // WHY A BLEND, NOT A GATE. A hard gate would worsen the very cold-start Pe34 tried to
  // fix: until a random mutation produces a VM that emits opcode 23, the signal would be
  // zero and relationalWeight would have nothing to act on — sharper signal, colder
  // start, opposite of intent. So the sharpening is itself a genome parameter, defaulting
  // low. relationalUseBias=0 → every re-encounter counts weight 1 → Pe34 EXACTLY (exact
  // recovery, this is provable from w=1). =1 → only VM-consulted re-encounters score.
  // Between → continuous, so selection sees a smooth landscape, not a cliff. Whether
  // sharpening toward use is worth a colder start becomes a per-lineage question the
  // shadow sim and lineage selection adjudicate — same idiom as behaviorGradientBias
  // splitting from gradientBias (Pe33) and shadowExploreRate freed (Pe30b).
  //
  // WHAT TELLS US IT WORKED. The HUD rel tag exposes ub (this param), q (quality),
  // qf (fraction of counted weight from VM-consulted re-encounters — THE diagnostic:
  // qf→0 with ub high means the loop never closed; qf climbing means it did) and the
  // monotonic opcode-23 emit total. ub pinning at 0 is a real answer too: the system
  // reporting passive accuracy was the better deal. Either outcome is informative —
  // the property a good Pe-layer must have.
  relationalUseBias:0.2,            // 0=Pe34 exactly, 1=only VM-consulted models score. Evolvable.

  // ═══ LAYER 18: RATIFICATION — clusters carry scenarios upward (Pe28) ═══
  // Pe27 made the imagination bank evolvable, but scenarios still live and die strictly
  // within the global lineage's mutation cycle. A scenario that produced a great cluster
  // 500 ticks ago — but then aged out — is gone. The bank has no memory of which
  // scenarios its successful clusters were born under.
  //
  // Pe28 closes this through a single mechanism: when a cluster qualifies for upstream
  // signal (existing 16c gate — persistAge>=6, coherence>=0.45, avgAmp>=0.38), it
  // SNAPSHOTS the current top-winning scenario from the bank and carries it in the
  // upstream package alongside the vmProgram motif.
  //
  // When mutateGenome drains the package, the fossil scenario is injected:
  //   - If a structurally-similar scenario already exists in the bank, its age is
  //     reduced by 30 (the eviction-threshold horizon). The cluster has re-ratified
  //     this scenario; it gets ~30 more cycles of slot protection.
  //   - If no similar scenario exists (was evicted earlier), the fossil is added as
  //     a fresh entry with age=0, wins=0, src='fossil'. The recipe returns.
  //
  // The cluster doesn't *discover* scenarios — the global shadow sim does. The cluster
  // *ratifies* them: existing in their environment is the endorsement. Scenarios that
  // produce persistent clusters get tenure, even across eviction events. Gated by the
  // existing gradientUpstreamBias — set to 0 and Pe27 behavior is recovered exactly.
  //
  // No new genome parameters. The mechanism reuses the upstream-bias channel that
  // already governs cluster→global influence. If observation shows the system wants
  // to separate motif transfer from scenario fossilization, Pe29 can split the gate.

  // ═══ LAYER 19: RECKONING — scenarios held to fitness account (Pe29) ═══
  // Pe27-28 let the shadow scenario bank evolve through wins (shadow-sim victories) and
  // cluster ratification (persistence under that scenario's regime). Both signals are
  // INDIRECT proxies for "did this scenario actually help." A scenario can win shadow
  // sim repeatedly because of how the sim is parameterized, then move real fitness
  // the wrong way when applied. The bank has no way to detect that mismatch.
  //
  // Pe29 closes the gap. Each scenario gets a creditTrace [-1..+1] — an EMA of
  // (sign of fitness delta) sampled while this scenario is the current winner.
  // The winner of the most recent shadow sim is tracked by fingerprint, and during
  // every applyCreditAssignment pass, the winning scenario's creditTrace accumulates
  // the local fitness signal. Positive credit = fitness rose during this scenario's
  // tenure. Negative credit = fitness fell.
  //
  // The trace modulates eviction in evolveShadowBank:
  //   age threshold:  30 - creditTrace * 15  (positive credit extends life)
  //   win threshold:  age * 0.08 * (1 - creditTrace * 0.5)  (positive credit lowers bar)
  //
  // So a scenario with creditTrace=+1 needs ~45 ticks of age and ~half the wins to
  // survive. A scenario with creditTrace=-1 gets evicted at age 15 with twice the
  // win requirement. The bank now feels the consequences of its own choices.
  //
  // Gated by scenarioCreditWeight. Set to 0 and the modulation is disabled — Pe28
  // behavior is recovered exactly. Default 0.4: a gen-723 run drifted scenarioCreditWeight
  // from 0.5 down to ~0.41 under selection, so 0.4 is where the system wanted to sit.
  // Lineage selection still adjudicates from there.
  scenarioCreditWeight:0.4,   // 0=Pe28 behavior, 1=full credit-driven eviction. Evolvable.

  // ═══ LAYER 20: INHERITANCE — credit reaches reproduction (Pe30) ═══
  // Pe29 made the scenario bank feel real-fitness consequences, but only at the
  // eviction stage — credit decided who LIVED, never who REPRODUCED. And a gen-723
  // run surfaced two more gaps. Pe30 closes all three at once; they cohere as one
  // theme — the credit signal reaching every part of the scenario life cycle.
  //
  // (a) CREDIT-WEIGHTED REPRODUCTION. evolveShadowBank's parent selection was weighted
  //     by raw shadow-sim wins alone. Now it's weighted by wins * (1 + creditTrace *
  //     scenarioCreditWeight). A scenario with strong real-fitness credit spawns more
  //     children; one with negative credit fades from the lineage even if its raw win
  //     count is high. Credit shapes the gene pool, not just the survivor set.
  //
  // (b) BIRTH-TIME FOSSILS. Pe28's cluster fossil was snapshotted at signal time, so
  //     it almost always still matched a live bank entry — the resurrection path
  //     (inject a genuinely-absent scenario) almost never fired; the gen-723 bank had
  //     zero 'fossil'-tagged entries. Pe30 moves the snapshot to cluster BIRTH. A
  //     cluster carries "what was winning when I formed" for its whole life. A long-
  //     lived cluster's snapshot is genuinely aged, so resurrection actually happens.
  //
  // (c) BANK DIVERSITY PRESSURE. The gen-723 bank spent two of five slots on near-
  //     duplicate scenarios (same e-/k-/r+ family). Now a spawned child that lands
  //     within similarity ε of an existing entry is re-rolled with amplified noise —
  //     each slot has to earn its place by being distinct. Coverage stays broad.
  //
  // All three are gated by existing parameters (scenarioCreditWeight, gradientUpstream
  // Bias). No new genome fields. Setting those to 0 recovers Pe28/Pe29 behavior.

  // ═══ LAYER 4: META ═══
  // How the system evolves. The evolution of evolution.
  mutationRate:0.06,      // was hardcoded in mutateObjectiveWeights
  mutationScale:1.0,      // multiplier on mutation magnitude
  mutationInterval:300,   // FREED: ticks between mutation cycles. System decides its own rhythm.
  shadowHorizon:50,       // was hardcoded: 50 ticks in shadow sim
  shadowScenarios:5,      // Pe27: cap on shadowScenarioBank size (3..SHADOW_SCENARIOS_MAX)
  perturbScale:1.0,       // how large parameter nudges are
  extinctionThresh:5,     // was hardcoded: alive<5
  motifMemorySize:5,      // how many motifs to remember
  culturalBias:0.3,       // was hardcoded: Math.random()<0.3

  // ═══ LAYER 4b: AUTONOMY — previously hardcoded constraints ═══
  interactionRadius:55,   // FREED: was CELL=55. System evolves its own social distance.
  densityCostK:0.00003,   // FREED: metabolic cost scales with pop density. Carrying capacity emerges.
  fieldBirthGate:0.3,     // FREED: min local field energy for replenishment. Life requires habitat.

  // ═══ LAYER 5: IDENTITY ═══
  generation:0,
  totalTicks:0,
  lineage:[],
  eventLog:[],      // compact fossil record carried with exported lineages
  stableMotifs:[],
  fitnessHistory:[],
  extinctions:0,
  peakFitness:0,
  longestStable:0,
  currentStableStreak:0,

  // ═══ LAYER 5b: USER ATOMS — Pe22f. The system's own primitives.
  // Each entry is {expression:string, compiled:fn|null, failed:bool, uses:int}.
  // Compiled on first use. Invalid expressions become inert.
  // Accessed via opcode 22. This is how the system writes new primitives
  // that weren't in the opcode set at design time. ═══
  userAtoms:[],

  // ═══ LAYER 6: RULES — Register-Based Virtual Machine ═══
  // When two particles interact, 4 registers are initialized from context.
  // A short bytecode program manipulates registers and emits actions.
  // This is policy, not configuration. The system discovers conditional physics.
  //
  // Registers: R0=similarity, R1=phase_alignment, R2=proximity, R3=energy
  // Instructions: [OP, SRC, DST, CONST]
  //   0=MOVE (DST=SRC), 1=ADD (DST+=SRC*CONST), 2=MUL (DST*=SRC*CONST),
  //   3=COMP (DST = SRC>CONST ? 1 : 0), 4=EMIT (Action[DST] += SRC*CONST)
  // Actions: 0=force, 1=phase_shift, 2=amp_transfer, 3=tend_bleed, 4=spawn
  //
  // The COMP instruction enables conditional logic:
  //   "IF similarity>0.8 AND proximity>0.7 THEN spawn"
  //   becomes: [3,0,0,0.8], [2,0,2,1], [3,2,2,0.7], [4,2,4,0.5]
  vmProgram:[
    [1, 0, 0, 0.5],   // R0 += sim * 0.5 (amplify similarity signal)
    [3, 1, 1, 0.3],   // R1 = align > 0.3 ? 1 : 0 (threshold phase alignment)
    [2, 1, 0, 1.0],   // R0 *= R1 (gate: similarity only matters when aligned)
    [4, 0, 0, 0.4],   // EMIT force = R0 * 0.4 (attract if similar AND aligned)
    [4, 1, 1, 0.3],   // EMIT phase_shift = R1 * 0.3 (entrain when aligned)
    [3, 2, 2, 0.7],   // R2 = proximity > 0.7 ? 1 : 0 (must be close)
    [2, 0, 2, 1.0],   // R2 *= R0 (gate: proximity AND similarity)
    [4, 2, 3, 0.2],   // EMIT tend_bleed = R2 * 0.2 (bleed tendency when close+similar)
    [1, 3, 3, -0.1],  // R3 += energy * -0.1 (dampen energy signal)
    [4, 3, 2, 0.1],   // EMIT amp_transfer = R3 * 0.1 (energy redistribution)
    [0, 0, 0, 0.0],   // MOVE noop (can evolve)
    [0, 0, 0, 0.0],   // MOVE noop (can evolve)
  ],
  vmMaxInstructions:16, // can evolve to grow/shrink the program
  vmInfluence:0.3,      // ratio of VM effects vs hardcoded physics. EVOLVES.
  ruleScale:1.0,
  metabolicCost:0.00002,  // amp cost PER INSTRUCTION PER INTERACTION. Evolves.
                          // Forces elegant code: bloated programs starve.

  // ═══ LAYER 7: HORIZONTAL GENE TRANSFER ═══
  hgtRate:0.15,       // probability of HGT per mutation cycle (not per interaction!)
  hgtMax:2,           // max instructions transferred per event
  hgtSpliceNoise:0.22, // mutation magnitude on transferred instructions

  // ═══ LAYER 8: PLASMIDS — per-particle mobile DNA ═══
  plasmidTransferRate:0.008,  // chance per high-resonance interaction to transfer a plasmid
  plasmidMutRate:0.04,        // chance per plasmid instruction per mutation cycle to mutate
  plasmidTransferThresh:0.55, // minimum sim*phaseAlign bond to allow transfer
  plasmidSpawnRate:0.002,     // chance per mutation cycle for a particle to spontaneously generate a new plasmid instruction
  fieldInfluence:0.65,        // how strongly field affects physics (niche construction feedback)
  fieldDecay:0.982,           // Pe22b: substrate fade rate — now evolvable
  fieldDiffuse:0.11,          // Pe22b: substrate spread rate — now evolvable
  // Pe22d: evolvable chemistry table — 12 opcode slots, each a recipe of monomials.
  // Each monomial is [coefSource, termA, termB, target] where:
  //   coefSource: 0=+A, 1=+B, 2=-A, 3=-B
  //   termA, termB: indices 0-11 into local state [c1,c2,nN,nS,nE,nW,m2N,m2S,m2E,m2W,nbAvg1,nbAvg2]
  //   target: 0=d1, 1=d2
  // Seeded from random monomials — no Gray-Scott, no Turing, no known chemistry.
  // The substrate discovers its own dynamics from the starting noise.
  chemistryTable:null,
  chemistryMutRate:0.02,
  fieldWeight:0.2,            // shadow sim: how much the system values engineered environment futures (EVOLVES)

  // ═══ LAYER 22: NETWORK — how strongly this population couples to other tabs ═══
  // All four rates evolve. If connection helps survival, rates rise. If not, they fall to zero.
  // The system decides whether to be social.
  netMigrantRate:0.003,     // chance per tick to broadcast a random particle as a migrant
  netPlasmidRate:0.004,     // chance per tick to broadcast a plasmid package
  netMotifRate:0.005,       // chance per tick to broadcast a VM motif fragment
  netInscribeRate:0.004,    // chance per tick to broadcast an inscribed cell program
  netReceptivity:0.5,       // 0..1 probability of accepting incoming packets (evolvable isolation)

  // ═══ LAYER 10: REFLEXIVITY — the system models itself from inside ═══
  // Particles track their own state trajectory and adjust behaviour.
  // Clusters recognise themselves as clusters and optimise for group survival.
  // This is not imposed — it's evolvable. The system discovers self-reference is adaptive (or not).
  reflexSampleRate:0.15,      // fraction of particles that update self-model per tick (cost control)
  reflexDepth:4,              // how many historical samples each particle keeps (memory cost)
  reflexInfluence:0.1,        // how strongly self-model affects VM register initialisation (EVOLVES)
  reflexDecay:0.95,           // how fast old self-model samples fade
  clusterReflexAge:5,         // min persist age before cluster develops self-model
  clusterReflexWeight:0.15,    // how much cluster self-model influences cluster VM (EVOLVES)

  // ═══ LAYER 12: CLUSTER SELF-READ (Pe24) ═══
  // Cluster VMs can read their own clusterGenome values as VM registers.
  // The cluster's own heritable traits (budRate, innovationRate, etc.) become
  // legible to the cluster's own bytecode. Closes a meta-loop: clusters can
  // evolve to mutate their own innovation rate based on what their VM is doing.
  // If reading own genome helps, this strength grows; if not, it falls to 0.
  clusterGenomeReadStrength:0.05
};

const EVENT_LOG_SIZE=36;
const eventLastSeen={};
function recordEvent(kind,data,minGap){
  try{
    if(!genome||!genome.eventLog)return;
    const gap=minGap||0;
    if(gap>0&&eventLastSeen[kind]!==undefined&&genome.totalTicks-eventLastSeen[kind]<gap)return;
    eventLastSeen[kind]=genome.totalTicks;
    const ev={t:genome.totalTicks||tick,k:kind};
    if(data!==undefined)ev.d=data;
    genome.eventLog.push(ev);
    while(genome.eventLog.length>EVENT_LOG_SIZE)genome.eventLog.shift();
  }catch(e){}
}
function flushNetworkEvents(){
  for(const type in netEventPending){
    const n=netEventPending[type];
    if(n>0){recordEvent('net_'+type,{n,a:netStats.accepted},900);netEventPending[type]=0}
  }
}

//  2: AMPLIFY     — field *= (1 + A * 0.1)  (local energy injection)
//  3: CONVERT     — field2 += field * A ; field *= (1 - B * 0.05)  (channel conversion)
//  4: SUPPRESS    — field *= (1 - A * 0.05) ; field2 *= (1 - B * 0.05)  (decay accelerator)
//  5: GRADIENT_AMP — amplify gradient: value += (max_neighbor - value) * A
//  6: INVERT      — swap channels: temp = field ; field = field2 * A ; field2 = temp * B
//  7: OSCILLATE   — field += sin(tick * A) * B  (temporal oscillation)

// ═══ LAYER 10: PER-PARTICLE SELF-MODEL ═══
// Each particle maintains a compressed model of its own recent state.
// ampHistory: rolling window of amplitude samples — the particle can detect its own trajectory
// resHistory: rolling window of resonance — the particle knows if it's been connecting
// reflexState: derived signals fed into the VM as additional registers
//   [0]=ampTrend (-1 declining, +1 rising), [1]=resPeak (best recent resonance),
//   [2]=isolation (inverse of interaction density), [3]=age_pressure (ontogenetic position)
const REFLEX_DEPTH=4; // samples per particle (overridden by genome at runtime)
const REFLEX_DIMS=4;  // derived signals
const pReflexHist=new Float32Array(CAP*REFLEX_DEPTH*2); // interleaved [amp,res] per sample
const pReflexState=new Float32Array(CAP*REFLEX_DIMS);   // derived self-model signals
const pReflexIdx=new Uint8Array(CAP);                    // ring buffer index per particle
const pInteractionDensity=new Float32Array(CAP);          // rolling interaction count

// ═══ LAYER 21: MUTUAL RECOGNITION — particles model each other (Pe31) ═══
// Each particle maintains compressed models of up to 3 recent interaction partners.
// Model per partner: [tend0, tend1, phaseAlign, resonance] — 4 floats.
// 3 partners × 4 floats = 12 floats per particle.
// Freshness tracks how recently this partner was observed; decays naturally.
// pNeighborIDs stores which particle occupies each slot (-1 = empty).
// These three arrays are the only structural addition Pe31 makes.
const NM_SLOTS=3;   // max partners tracked per particle
const NM_DIMS=4;    // [tend0, tend1, phaseAlign, resonance] per partner
const pNeighborModels=new Float32Array(CAP*NM_SLOTS*NM_DIMS); // compressed partner models
const pNeighborIDs=new Int16Array(CAP*NM_SLOTS).fill(-1);     // which particle in each slot
const pNeighborFresh=new Float32Array(CAP*NM_SLOTS);          // freshness (0=stale, 1=fresh)
// ═══ Pe35 Layer 24b: VM-QUERY STAMP ═══
// Records, per particle, the last partner its VM consulted via opcode 23 and the tick
// it did so. updateNeighborModel reads this to weight error contribution by actual use.
// Tick-stamped, so stale entries auto-invalidate as tick advances — no reset needed
// across extinction (tick is monotonic; exact-equality compare). Defensive -1 fill.
const pVmQueryPartner=new Int16Array(CAP).fill(-1); // partner index VM last queried
const pVmQueryTick=new Int32Array(CAP).fill(-1);    // tick of that query

// ═══ Pe34 Layer 24: PREDICTION-ERROR ACCUMULATOR ═══
// Filled by updateNeighborModel each time a re-encounter happens (slot already held j).
// Drained and reset by the fitness compute each tick. Mean error → quality score.
let predictionErrorAccum=0;
let predictionUpdateCount=0;
// Pe35 Layer 24b: weight that came specifically from VM-consulted re-encounters.
// qf = predictionQueriedCount / predictionUpdateCount is THE loop-closure diagnostic.
let predictionQueriedCount=0;
let lastPredQuality=0,lastPredQF=0; // Pe35: most-recent drain snapshot for the HUD
// Cache: lineage color per field cell, rebuilt on cluster detection cycles (not every frame)
let fieldLineageCache=new Uint8Array(FIELD_W*FIELD_H*3); // R,G,B per cell
const EL=4;
const echox=new Float32Array(CAP*EL),echoy=new Float32Array(CAP*EL);
const echoIdx=new Uint8Array(CAP);
// Cluster membership
const clusterID=new Int16Array(CAP);

let deathsThisTick=0,birthsThisTick=0;
// BIRTH QUEUE — births deferred to after interaction loop to avoid modifying arrays mid-iteration
const birthQueue=[];

// ═══════════════════════════════════════
// PERSISTENT MEMORY VIA URL HASH
// The URL is the organism's genome.
// Copy URL = copy lineage. Share URL = share history.
// ═══════════════════════════════════════
function encodeGenome(){
  // Compress: persist evolvable genome state while omitting runtime-only compiled functions.
  const cleanAtoms=(genome.userAtoms||[]).map(a=>({
    expression:a.expression,
    failed:!!a.failed,
    uses:a.uses|0,
    age:a.age|0
  }));
  const cleanSensors=(genome.fitnessSensors||[]).map(s=>({
    program:(s.program||[]).map(inst=>cleanInstruction(inst)),
    weight:+((s.weight||0).toFixed(4)),
    realWeight:+((s.realWeight||0).toFixed(4))
  }));
  const g={
    z:2,
    // Physics
    p:[genome.entropyBaseline,genome.entropyK,genome.entrainRate,genome.entrainThresh,
       genome.creationCost,genome.creationThresh,genome.destructThresh,genome.tendencyBleed,
       genome.magneticThresh,genome.velocityDamping,genome.deathThreshold].map(v=>+(v.toPrecision(4))),
    // Perception
    q:[genome.clusterBondThresh,genome.clusterMinSize,genome.ghostDecay,genome.ghostAmpDrip].map(v=>+(v.toPrecision(4))),
    // Evaluation
    w:genome.objWeights.map(v=>+(v.toFixed(4))),
    fs:cleanSensors,
    // Meta
    m:[genome.mutationRate,genome.mutationScale,genome.shadowHorizon,genome.shadowScenarios,
       genome.perturbScale,genome.extinctionThresh,genome.motifMemorySize,genome.culturalBias,
       genome.metabolicCost,genome.hgtRate,genome.hgtMax,genome.hgtSpliceNoise,
       genome.plasmidTransferRate,genome.plasmidMutRate,genome.plasmidTransferThresh,genome.plasmidSpawnRate,genome.fieldInfluence,genome.fieldWeight,
       genome.mutationInterval,genome.interactionRadius,genome.densityCostK,genome.fieldBirthGate,
       genome.reflexSampleRate,genome.reflexDepth,genome.reflexInfluence,genome.reflexDecay,genome.clusterReflexAge,genome.clusterReflexWeight,
       genome.clusterGenomeReadStrength].map(v=>+(v.toPrecision(3))),
    // Substrate chemistry
    f:[genome.fieldDecay,genome.fieldDiffuse,genome.chemistryMutRate].map(v=>+(v.toPrecision(4))),
    C:genome.chemistryTable,
    // Network coupling
    n:[genome.netMigrantRate,genome.netPlasmidRate,genome.netMotifRate,genome.netInscribeRate,genome.netReceptivity].map(v=>+(v.toPrecision(4))),
    // Identity
    g:genome.generation,T:genome.totalTicks,
    L:genome.lineage.slice(-4),
    E:(genome.eventLog||[]).slice(-EVENT_LOG_SIZE),
    M:genome.stableMotifs.slice(-genome.motifMemorySize),
    x:genome.extinctions,pf:+(genome.peakFitness.toPrecision(3)),
    ls:genome.longestStable,
    // Rules (VM program)
    V:genome.vmProgram.map(inst=>cleanInstruction(inst)),
    vi:+(genome.vmInfluence.toPrecision(3)),
    vs:+(genome.ruleScale.toPrecision(3)),
    vm:genome.vmMaxInstructions,
    ua:cleanAtoms,
    clr:+(genome.creditLearnRate||1).toFixed(4), // Pe25 Layer 15: evolvable learning rate
    gb:+(genome.gradientBias||0.3).toFixed(4),   // Pe26 Layer 16a: gradient bias
    gub:+(genome.gradientUpstreamBias||0.2).toFixed(4), // Pe26 Layer 16c: upstream bias
    bgb:+(genome.behaviorGradientBias||0.2).toFixed(4), // Pe33: behavioral gradient bias
    // Pe31 Layer 21: mutual recognition
    nmr:+(genome.neighborModelUpdateRate||0.3).toFixed(4),
    npi:+(genome.neighborPredictionInfluence||0.15).toFixed(4),
    mrt:+(genome.mutualRecognitionThresh||0.5).toFixed(4),
    rw:+(genome.relationalWeight||0.15).toFixed(4), // Pe34 Layer 24: relational fitness weight
    rub:+((typeof genome.relationalUseBias==='number'?genome.relationalUseBias:0.2)).toFixed(4), // Pe35 Layer 24b: use-gate sharpening (0 is a valid evolved value — must not be ||-erased)
    // Pe27 Layer 17: shadow scenario bank. Compact tuple per entry.
    // [e,k,r,c,t, wins, age, srcIdx, creditTrace(Pe29), f,p,a,tb,sp,sm,mp(Pe32)]
    // srcIdx: 0=seed,1=child,2=random,3=fossil(Pe28)
    sb:Array.isArray(genome.shadowScenarioBank)?genome.shadowScenarioBank.map(sc=>[
      +sc.e.toFixed(3),+sc.k.toFixed(3),+sc.r.toFixed(3),+sc.c.toFixed(3),+sc.t.toFixed(3),
      sc.wins|0,sc.age|0,
      sc.src==='seed'?0:sc.src==='child'?1:sc.src==='fossil'?3:2,
      +(sc.creditTrace||0).toFixed(3),
      +(sc.f||0).toFixed(3),+(sc.p||0).toFixed(3),+(sc.a||0).toFixed(3),
      +(sc.tb||0).toFixed(3),+(sc.sp||0).toFixed(3),+(sc.sm||0).toFixed(3),+(sc.mp||0).toFixed(3)
    ]):null,
    sbc:+(genome.shadowBankChurn||0.5).toFixed(3),
    scw:+(genome.scenarioCreditWeight||0).toFixed(3), // Pe29 Layer 19
    ser:+(genome.shadowExploreRate||0.5).toFixed(3) // Pe30b: explore rate
  };
  return btoa(JSON.stringify(g));
}

function decodeGenome(data){
  try{
    data=(data||'').trim();
    if(data[0]==='{'){
      const wrapper=JSON.parse(data);
      data=wrapper.genome||wrapper.data||'';
    }
    const g=JSON.parse(atob(data));
    if(g.p){
      [genome.entropyBaseline,genome.entropyK,genome.entrainRate,genome.entrainThresh,
       genome.creationCost,genome.creationThresh,genome.destructThresh,genome.tendencyBleed,
       genome.magneticThresh,genome.velocityDamping,genome.deathThreshold]=g.p;
    }
    if(g.q){
      [genome.clusterBondThresh,genome.clusterMinSize,genome.ghostDecay,genome.ghostAmpDrip]=g.q;
    }
    genome.objWeights=g.w||[0.25,0.25,0.25,0.25];
    if(g.fs)genome.fitnessSensors=g.fs;
    if(g.m){
      [genome.mutationRate,genome.mutationScale,genome.shadowHorizon,genome.shadowScenarios,
       genome.perturbScale,genome.extinctionThresh,genome.motifMemorySize,genome.culturalBias,
       genome.metabolicCost,genome.hgtRate,genome.hgtMax,genome.hgtSpliceNoise,
       genome.plasmidTransferRate,genome.plasmidMutRate,genome.plasmidTransferThresh,genome.plasmidSpawnRate,genome.fieldInfluence,genome.fieldWeight,
       genome.mutationInterval,genome.interactionRadius,genome.densityCostK,genome.fieldBirthGate,
       genome.reflexSampleRate,genome.reflexDepth,genome.reflexInfluence,genome.reflexDecay,genome.clusterReflexAge,genome.clusterReflexWeight,
       genome.clusterGenomeReadStrength]=g.m;
    }
    if(g.f){
      [genome.fieldDecay,genome.fieldDiffuse,genome.chemistryMutRate]=g.f;
    }
    if(g.C)genome.chemistryTable=g.C;
    if(g.n){
      [genome.netMigrantRate,genome.netPlasmidRate,genome.netMotifRate,genome.netInscribeRate,genome.netReceptivity]=g.n;
    }
    // Handle older genomes without newer params
    if(!genome.hgtRate)genome.hgtRate=0.15;
    if(!genome.hgtMax)genome.hgtMax=2;
    if(!genome.hgtSpliceNoise)genome.hgtSpliceNoise=0.22;
    if(!genome.plasmidTransferRate)genome.plasmidTransferRate=0.008;
    if(!genome.plasmidMutRate)genome.plasmidMutRate=0.04;
    if(!genome.plasmidTransferThresh)genome.plasmidTransferThresh=0.55;
    if(!genome.plasmidSpawnRate)genome.plasmidSpawnRate=0.002;
    if(!genome.fieldInfluence)genome.fieldInfluence=0.65;
    if(genome.fieldDecay===undefined)genome.fieldDecay=0.982;
    if(genome.fieldDiffuse===undefined)genome.fieldDiffuse=0.11;
    if(!genome.chemistryTable)genome.chemistryTable=seedChemistryTable();
    if(genome.chemistryMutRate===undefined)genome.chemistryMutRate=0.02;
    if(!genome.fieldWeight)genome.fieldWeight=0.2;
    if(!genome.mutationInterval)genome.mutationInterval=300;
    if(!genome.interactionRadius)genome.interactionRadius=55;
    if(!genome.densityCostK)genome.densityCostK=0.00003;
    if(!genome.fieldBirthGate)genome.fieldBirthGate=0.3;
    if(!genome.reflexSampleRate)genome.reflexSampleRate=0.15;
    if(!genome.reflexDepth)genome.reflexDepth=4;
    if(genome.reflexInfluence===undefined)genome.reflexInfluence=0.1;
    if(!genome.reflexDecay)genome.reflexDecay=0.95;
    if(!genome.clusterReflexAge)genome.clusterReflexAge=5;
    if(genome.clusterReflexWeight===undefined)genome.clusterReflexWeight=0.15;
    if(genome.clusterGenomeReadStrength===undefined)genome.clusterGenomeReadStrength=0.05;
    if(genome.netMigrantRate===undefined)genome.netMigrantRate=0.003;
    if(genome.netPlasmidRate===undefined)genome.netPlasmidRate=0.004;
    if(genome.netMotifRate===undefined)genome.netMotifRate=0.005;
    if(genome.netInscribeRate===undefined)genome.netInscribeRate=0.004;
    if(genome.netReceptivity===undefined)genome.netReceptivity=0.5;
    genome.generation=(g.g||0)+1;
    genome.totalTicks=g.T||0;
    genome.lineage=g.L||[];
    genome.eventLog=g.E||[];
    genome.stableMotifs=g.M||[];
    genome.extinctions=g.x||0;
    genome.peakFitness=g.pf||0;
    genome.longestStable=g.ls||0;
    if(g.V)genome.vmProgram=g.V;
    if(g.vi!==undefined)genome.vmInfluence=g.vi;
    if(g.vs)genome.ruleScale=g.vs;
    if(g.vm)genome.vmMaxInstructions=g.vm;
    if(g.ua)genome.userAtoms=g.ua.map(a=>({expression:a.expression,compiled:null,failed:!!a.failed,uses:a.uses|0,age:a.age|0}));
    if(typeof g.clr==='number')genome.creditLearnRate=g.clr; // Pe25 Layer 15
    if(typeof g.gb==='number')genome.gradientBias=g.gb;      // Pe26 Layer 16a
    if(typeof g.gub==='number')genome.gradientUpstreamBias=g.gub; // Pe26 Layer 16c
    if(typeof g.bgb==='number')genome.behaviorGradientBias=g.bgb; // Pe33
    // Pe31 Layer 21: mutual recognition
    if(typeof g.nmr==='number')genome.neighborModelUpdateRate=g.nmr;
    if(typeof g.npi==='number')genome.neighborPredictionInfluence=g.npi;
    if(typeof g.mrt==='number')genome.mutualRecognitionThresh=g.mrt;
    if(typeof g.rw==='number')genome.relationalWeight=g.rw; // Pe34 Layer 24
    if(typeof g.rub==='number')genome.relationalUseBias=g.rub; // Pe35 Layer 24b
    // Pe27 Layer 17: shadow scenario bank
    if(Array.isArray(g.sb)){
      genome.shadowScenarioBank=g.sb.map(a=>({
        e:finiteOr(a[0],0),k:finiteOr(a[1],0),r:finiteOr(a[2],0),
        c:finiteOr(a[3],0),t:finiteOr(a[4],0),
        wins:(a[5]|0),age:(a[6]|0),
        src:['seed','child','random','fossil'][a[7]|0]||'random',
        creditTrace:finiteOr(a[8],0), // Pe29 — defaults to 0 for legacy genomes
        // Pe32: behavioral axes — default to 0 for legacy genomes (Pe31 behavior)
        f:finiteOr(a[9],0),p:finiteOr(a[10],0),a:finiteOr(a[11],0),
        tb:finiteOr(a[12],0),sp:finiteOr(a[13],0),sm:finiteOr(a[14],0),mp:finiteOr(a[15],0)
      }));
    }
    if(typeof g.sbc==='number')genome.shadowBankChurn=g.sbc;
    if(typeof g.scw==='number')genome.scenarioCreditWeight=g.scw; // Pe29 Layer 19
    if(typeof g.ser==='number')genome.shadowExploreRate=g.ser; // Pe30b: explore rate
    sanitizeGenome();
    return true;
  }catch(e){return false}
}

function finiteOr(v,fallback){return typeof v==='number'&&isFinite(v)?v:fallback}
function cleanInstruction(inst){
  if(!Array.isArray(inst))return [0,0,0,0];
  return [finiteOr(inst[0],0),finiteOr(inst[1],0),finiteOr(inst[2],0),finiteOr(inst[3],0)];
}
function validChemistryTable(table){
  return Array.isArray(table)&&table.length>=12&&table.every(recipe=>Array.isArray(recipe)&&recipe.length>0&&recipe.every(mono=>Array.isArray(mono)&&mono.length>=4&&mono.every(v=>typeof v==='number'&&isFinite(v))));
}
function sanitizeGenome(){
  if(!Array.isArray(genome.objWeights)||genome.objWeights.length<4)genome.objWeights=[0.25,0.25,0.25,0.25];
  genome.objWeights=genome.objWeights.slice(0,4).map(v=>Math.max(0,finiteOr(v,0)));
  const wSum=genome.objWeights.reduce((a,b)=>a+b,0);
  genome.objWeights=wSum>0?genome.objWeights.map(v=>v/wSum):[0.25,0.25,0.25,0.25];
  genome.vmProgram=Array.isArray(genome.vmProgram)?genome.vmProgram.map(cleanInstruction).slice(0,48):[[0,0,0,0]];
  if(genome.vmProgram.length===0)genome.vmProgram=[[0,0,0,0]];
  genome.vmMaxInstructions=Math.max(1,Math.min(48,Math.round(finiteOr(genome.vmMaxInstructions,16))));
  genome.fitnessSensors=Array.isArray(genome.fitnessSensors)?genome.fitnessSensors.filter(s=>s&&Array.isArray(s.program)).map(s=>({program:s.program.map(cleanInstruction),weight:finiteOr(s.weight,0),realWeight:finiteOr(s.realWeight,0),creditTrace:finiteOr(s.creditTrace,0),lastEmit:finiteOr(s.lastEmit,0),prevEmit:finiteOr(s.prevEmit,0)})):[{program:[[2,5,6,1.0],[4,6,0,1.0]],weight:0.1,realWeight:0,creditTrace:0,lastEmit:0,prevEmit:0}];
  if(genome.fitnessSensors.length===0)genome.fitnessSensors=[{program:[[2,5,6,1.0],[4,6,0,1.0]],weight:0.1,realWeight:0,creditTrace:0,lastEmit:0,prevEmit:0}];
  // Pe25 Layer 15: credit-assignment defaults for old saves
  genome.creditLearnRate=Math.max(0,Math.min(3,finiteOr(genome.creditLearnRate,1.0)));
  // Pe26 Layer 16: gradient defaults for old saves
  genome.gradientBias=Math.max(0,Math.min(1,finiteOr(genome.gradientBias,0.3)));
  genome.gradientUpstreamBias=Math.max(0,Math.min(1,finiteOr(genome.gradientUpstreamBias,0.2)));
  genome.behaviorGradientBias=Math.max(0,Math.min(1,finiteOr(genome.behaviorGradientBias,0.2))); // Pe33
  // Pe31 Layer 21: mutual recognition defaults for old saves
  genome.neighborModelUpdateRate=Math.max(0,Math.min(1,finiteOr(genome.neighborModelUpdateRate,0.3)));
  genome.neighborPredictionInfluence=Math.max(0,Math.min(0.5,finiteOr(genome.neighborPredictionInfluence,0.15)));
  genome.mutualRecognitionThresh=Math.max(0,Math.min(1,finiteOr(genome.mutualRecognitionThresh,0.5)));
  genome.relationalWeight=Math.max(0,Math.min(1,finiteOr(genome.relationalWeight,0.15))); // Pe34 Layer 24
  genome.relationalUseBias=Math.max(0,Math.min(1,finiteOr(genome.relationalUseBias,0.2))); // Pe35 Layer 24b
  if(!Array.isArray(genome.objCreditTrace)||genome.objCreditTrace.length<4)genome.objCreditTrace=[0,0,0,0];
  genome.objCreditTrace=genome.objCreditTrace.slice(0,4).map(v=>Math.max(-1,Math.min(1,finiteOr(v,0))));
  if(!Array.isArray(genome.prevObjValues)||genome.prevObjValues.length<4)genome.prevObjValues=[0,0,0,0];
  genome.prevObjValues=genome.prevObjValues.slice(0,4).map(v=>finiteOr(v,0));
  genome.prevSmoothedFitness=finiteOr(genome.prevSmoothedFitness,0);
  genome.userAtoms=Array.isArray(genome.userAtoms)?genome.userAtoms.filter(a=>a&&typeof a.expression==='string').map(a=>({expression:a.expression.slice(0,160),compiled:null,failed:!!a.failed,uses:a.uses|0,age:a.age|0})):[];
  genome.lineage=Array.isArray(genome.lineage)?genome.lineage.slice(-6):[];
  genome.eventLog=Array.isArray(genome.eventLog)?genome.eventLog.slice(-EVENT_LOG_SIZE):[];
  genome.stableMotifs=Array.isArray(genome.stableMotifs)?genome.stableMotifs.filter(m=>m&&Array.isArray(m.t)&&m.t.length>=DIMS).slice(-Math.max(1,genome.motifMemorySize||5)):[];
  if(!validChemistryTable(genome.chemistryTable))genome.chemistryTable=seedChemistryTable();
  genome.fieldDecay=finiteOr(genome.fieldDecay,0.982);
  genome.fieldDiffuse=finiteOr(genome.fieldDiffuse,0.11);
  genome.chemistryMutRate=finiteOr(genome.chemistryMutRate,0.02);
  FIELD_DECAY=Math.max(0.5,Math.min(1.0,genome.fieldDecay));
  FIELD_DIFFUSE=Math.max(0,Math.min(0.24,genome.fieldDiffuse));
  genome.mutationInterval=Math.max(60,Math.round(finiteOr(genome.mutationInterval,300)));
  genome.netMigrantRate=finiteOr(genome.netMigrantRate,0.003);
  genome.netPlasmidRate=finiteOr(genome.netPlasmidRate,0.004);
  genome.netMotifRate=finiteOr(genome.netMotifRate,0.005);
  genome.netInscribeRate=finiteOr(genome.netInscribeRate,0.004);
  genome.netReceptivity=Math.max(0,Math.min(1,finiteOr(genome.netReceptivity,0.5)));
  // Pe27 Layer 17: shadow scenario bank — must exist, must have at least 3 valid entries.
  if(!Array.isArray(genome.shadowScenarioBank)||genome.shadowScenarioBank.length<3){
    genome.shadowScenarioBank=seedShadowBank();
  }else{
    genome.shadowScenarioBank=genome.shadowScenarioBank.map(sc=>({
      e:Math.max(-2,Math.min(2,finiteOr(sc&&sc.e,0))),
      k:Math.max(-2,Math.min(2,finiteOr(sc&&sc.k,0))),
      r:Math.max(-2,Math.min(2,finiteOr(sc&&sc.r,0))),
      c:Math.max(-2,Math.min(2,finiteOr(sc&&sc.c,0))),
      t:Math.max(-2,Math.min(2,finiteOr(sc&&sc.t,0))),
      // Pe32: behavioral axes — clamped to ±2, default 0 for legacy genomes
      f:Math.max(-2,Math.min(2,finiteOr(sc&&sc.f,0))),
      p:Math.max(-2,Math.min(2,finiteOr(sc&&sc.p,0))),
      a:Math.max(-2,Math.min(2,finiteOr(sc&&sc.a,0))),
      tb:Math.max(-2,Math.min(2,finiteOr(sc&&sc.tb,0))),
      sp:Math.max(-2,Math.min(2,finiteOr(sc&&sc.sp,0))),
      sm:Math.max(-2,Math.min(2,finiteOr(sc&&sc.sm,0))),
      mp:Math.max(-2,Math.min(2,finiteOr(sc&&sc.mp,0))),
      wins:Math.max(0,(sc&&sc.wins|0)||0),
      age:Math.max(0,(sc&&sc.age|0)||0),
      src:sc&&typeof sc.src==='string'?sc.src:'random',
      creditTrace:Math.max(-1,Math.min(1,finiteOr(sc&&sc.creditTrace,0))) // Pe29
    })).slice(0,SHADOW_SCENARIOS_MAX);
  }
  genome.shadowScenarios=Math.max(3,Math.min(SHADOW_SCENARIOS_MAX,Math.round(finiteOr(genome.shadowScenarios,5))));
  genome.shadowBankChurn=Math.max(0,Math.min(1,finiteOr(genome.shadowBankChurn,0.5)));
  genome.shadowExploreRate=Math.max(0.1,Math.min(0.9,finiteOr(genome.shadowExploreRate,0.5))); // Pe30b
  // Pe29 Layer 19: scenario credit weight default
  genome.scenarioCreditWeight=Math.max(0,Math.min(1,finiteOr(genome.scenarioCreditWeight,0.4)));
}

function saveGenome(){
  const hash=encodeGenome();
  try{history.replaceState(null,'','#'+hash)}catch(e){}
}

const MAX_STORED_GENOME_BYTES=500000;
function decodeGenomeSafe(data,source){
  if(!data||data.length<=10)return false;
  if(data.length>MAX_STORED_GENOME_BYTES){
    console.warn('Ignoring oversized genome from '+source,data.length);
    return false;
  }
  const ok=decodeGenome(data);
  if(!ok)console.warn('Ignoring unreadable genome from '+source);
  return ok;
}
function loadGenome(){
  const h=location.hash.slice(1);
  if(h==='reset'){
    try{localStorage.removeItem('selection_genome')}catch(e){}
    try{history.replaceState(null,'',location.pathname||' ')}catch(e){}
    return false;
  }
  if(decodeGenomeSafe(h,'url'))return true;
  // Try localStorage. Bad stored genomes are quarantined so one corrupt lineage
  // cannot keep producing a black screen on every reload.
  try{
    const stored=localStorage.getItem('selection_genome');
    if(stored&&stored.length>10){
      const ok=decodeGenomeSafe(stored,'localStorage');
      if(!ok)try{localStorage.removeItem('selection_genome')}catch(e){}
      return ok;
    }
  }catch(e){}
  return false;
}
